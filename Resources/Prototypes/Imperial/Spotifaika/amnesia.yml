- type: entity
  parent: XenoStructuralGel
  id: AmnesiaFleshTile
  name: fibres of flesh
  description: Fleshy organic sediment that pulsates slightly.
  suffix: Amnesia, Spotifaika
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  components:
    - type: Sprite
      sprite: Imperial/Spotifaika/Amnesia/flesh.rsi
      drawdepth: WallMountedItems
      layers:
        - state: icon-1
          map: ["spiderWebLayer"]
    - type: RandomSprite
      available:
      - spiderWebLayer:
        icon-1: ""
        icon-6: ""

