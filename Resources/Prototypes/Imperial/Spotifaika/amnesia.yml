- type: entity
  parent: XenoStructuralGel
  id: AmnesiaFleshTile
  name: волокна плоти
  description: Мясистый органический осадок, что слегка пульсирует.
  suffix: Amnesia, Spotifaika
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  components:
    - type: Sprite
      sprite: Imperial/Spotifaika/Amnesia/flesh.rsi
      drawdepth: WallMountedItems
      layers:
        - state: icon-1
          map: ["spiderWebLayer"]
    - type: GenericVisualizer
      visuals:
        enum.SpiderWebVisuals.Variant:
          spiderWebLayer:
            1:  {state: icon-1}
            2:  {state: icon-6}

