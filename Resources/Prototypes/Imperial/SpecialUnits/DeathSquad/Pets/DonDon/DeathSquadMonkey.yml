- type: startingGear
  id: DeathSquadDondonGear
  equipment:
    mask: ClothingMaskDeathSquadAlt
    eyes: GlassesDeathSquad
    back: ClothingBackpackDeadSquadSecurity
    ears: SODDeathSquadHeadset
    jumpsuit: ClothingUniformJumpsuitDeathSquadMonkey
    suitstorage: OxygenTankFilled
    outerClothing: ClothingOuterHardsuitDeathsquadAlt
    id: DeadSquadIDCard
  inhand:
  - WeaponSniperHristovDonDon

- type: body
  id: PrimateAdv #Дон Дон крайне умен и это не шутка. Его IQ составляет 120.
  name: "primateext"
  root: torso
  slots:
    torso:
      part: TorsoAnimal
      connections:
      - right_hand #Вторая рука для применения минигана и импульсного дробовика. А еще потому что так монки становится действительно полезным.
      - left_hand
      - legs
      organs:
        lungs: OrganAnimalLungs
        stomach: OrganAnimalStomach
        liver: OrganAnimalLiver
        heart: OrganAnimalHeart
        kidneys: OrganAnimalKidneys
    right_hand:
      part: HandAnimalAdvR
    left_hand:
      part: HandAnimalAdvL
    legs:
      part: LegsAnimal
      connections:
      - feet
    feet:
      part: FeetAnimal

