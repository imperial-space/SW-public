- type: body
  id: DeathSquadKitty
  name: "cot"
  root: torso
  slots:
    torso:
      part: TorsoHuman
      connections:
      - right_hand
      - legs
      organs:
        lungs: OrganAnimalLungs
        stomach: OrganAnimalStomach
        liver: OrganAnimalLiver
        heart: OrganAnimalHeart
        kidneys: OrganAnimalKidneys
    right_hand:
      part: RightHandHuman
    legs:
      part: LegsAnimal
      connections:
      - feet
    feet:
      part: FeetAnimal

- type: startingGear #gear
  id: DeathSquadCatLodout
  equipment:
    mask: CatHardsuitDeathSquad
    suitstorage: OxygenTankFilled
  inhand:
  - KittyEnergyClaws

