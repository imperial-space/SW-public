#DeathSquad kitty
- type: entity
  name: deathcat
  id: MobCatDeathSquad
  parent: MobCat
  description: Stroke him properly and maybe he won't rip your head off...
  suffix: DeathSquad
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: Imperial/SpecialUnits/DeathSquad/Pets/Kitty/deathsquad_kitty.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: deathcat_alive
    - map: [ "mask" ]
#    - map: [ "blade" ] #Легаси от прошлой реализации лазерных когтей.
#      state: inhand_blade
#      color: "#FFFFFF"
#      visible: false
#      shader: unshaded
  - type: Inventory
    speciesId: cat
    templateId: deathsquadcat
  - type: DamageStateVisuals
    states:
      Alive:
        Base: deathcat_alive
      Critical:
        Base: deathcat_dead
      Dead:
        Base: deathcat_dead
  - type: GhostRole
    prob: 1
    name: ghost-role-information-dscat-name
    allowMovement: true
    description: ghost-role-information-dscat-description
    rules: ghost-role-information-dscat-rules
    raffle:
      settings: default
  - type: GhostTakeoverAvailable
  - type: StandingState
  - type: RotationVisuals
    defaultRotation: 180
    horizontalRotation: 180
  - type: AutoImplant
    implants:
    - MindShieldImplant
  - type: NpcFactionMember
    factions:
    - DeathSquad
  - type: MeleeWeapon
    attackRate: 1
    altDisarm: false
    angle: 0
    animation: WeaponArcClaw
    soundHit:
      path: /Audio/Effects/bite.ogg
    damage:
      types:
        Slash: 5
  - type: ComplexInteraction
  - type: Access #Доступы тоже.
    groups:
    - AllAccess
    tags:
    - CentralCommand
  - type: IntrinsicRadioReceiver #Радио также прифигачино прямо в моба.
  - type: IntrinsicRadioTransmitter
    channels:
    - SODDeathSquad
    - CentCom
    - Common
    - Command
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
  - type: ActiveRadio
    channels:
    - SODDeathSquad
    - CentCom
    - Common
    - Command
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
  - type: ZombieImmune
  - type: Loadout
    prototypes: [ DeathSquadCatLodout ]
  - type: StatusEffects
    allowed:
    - Stun
    - KnockedDown
    - PressureImmunity
    - SlowedDown
    - Stutter
#    - Electrocution #Это тоже можно пофиксить, но я не хочу еще сильнее менять и без того сильно измененого от базовых мобов кота.
#    - ForcedSleep #Я мог бы выдать в темплейт инвентаря голову и аутер клозинг, сделать шлем скафандру, но мне гига лень. Так что котика невозможно усыпить насильно. Живите с этим)
    - TemporaryBlindness
    - Pacified
    - StaminaModifier
#    - Flashed #По аналогии с предыдущеми пунктами. Я вообще был бы рад глобально переработать котиков, и не только. Скафандры им сделать, Синдика поменять. Но для этого надо сильно менять ванильные прототипы.
    - RadiationProtection
    - Drowsiness
    - Adrenaline
  - type: NoSlip
  - type: MovementSpeedModifier
    baseWalkSpeed : 3
    baseSprintSpeed : 5
  - type: Tag
    tags:
      - DoorBumpOpener
      - CanPilot
  - type: MovementAlwaysTouching
  - type: Barotrauma
    protectionSlots:
    - mask
    damage:
      types:
        Blunt: 0.15
  - type: InteractionPopup
    successChance: 0.7
    interactSuccessString: petting-success-deathcat
    interactFailureString: petting-failure-deathcat
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/cat_meow.ogg
  - type: CrewSkills #То самое чувство, когда котенок со своими лапками, и лошадь на ходу остановит, и шаттлом управлять умеет, и товарища вылечить может, и мета наварит, пока ты только в носу ковыряться умеешь...
    skills:
      - skillBotany #Base
      - skillBaseMed
      - skillBaseConstraction
      - skillCooking  #Easy
      - skillBartending
      - skillHacking
      - skillInstrumentation #Medium
      - skillMaintenance
      - skillMediumConstruction
      - skillMediumBotany
      - skillBasicAtmos
      - skillMedicalEquipment
      - skillPharmacology
      - skillPiloting #Hard
      - skillAtmos
      - skillHardInstrumentation
      - skillRobotics
      - skillResearch
      - skillPharmaceuticals
      - skillShooting
      - skillSurgery
      - skillNeuroSurgery
  - type: Puller
    needsHands: false
  - type: Body
    prototype: DeathSquadKitty
  - type: Hands
#door pry
  - type: Prying
    pryPowered: true
    force: true
    speedModifier: 1.5
    useSound:
      path: /Audio/Items/crowbar.ogg
