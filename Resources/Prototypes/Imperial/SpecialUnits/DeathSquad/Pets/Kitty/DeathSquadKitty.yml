- type: entity
  name: energy claws #Лазерные когти
  parent: BaseMeleeWeaponEnergy
  id: KittyEnergyClaws
  categories: [ HideSpawnMenu ]
  description: A very loud & dangerous sw-... claws with a beam made of pure, concentrated plasma. Cat claws?..
  components:
  - type: Sprite
    sprite: Imperial/SpecialUnits/DeathSquad/Pets/Kitty/deathsquad_kitty_claws.rsi ##Imperial/SpecialUnits/DeathSquad/Pets/Kitty/deathsquad_kitty_claws.rsi
    layers:
    - state: e_claws
    - state: e_claws_blade
      color: white
      visible: false
      shader: unshaded
      map: [ "blade" ]
  - type: Item
    sprite: Imperial/SpecialUnits/DeathSquad/Pets/Kitty/deathsquad_kitty_claws_inhands.rsi
  - type: Unremoveable
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcClaw
    wideAnimationRotation: -135
    attackRate: 2
    damage:
      types:
        Blunt: 4.5
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/Weapons/eblade1.ogg
      params:
        variation: 0.250
    activatedSoundOnHitNoDamage:
      path: /Audio/Weapons/eblade1.ogg
      params:
        variation: 0.250
        volume: -10
    activatedSoundOnSwing:
      path: /Audio/Weapons/eblademiss.ogg
      params:
        variation: 0.125
    activatedDamage:
      types:
        Slash: 10
        Heat: 10
        Structural: 40
