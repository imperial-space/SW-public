#Light
  - type: UnpoweredFlashlight
  - type: PointLight
    color: "#9defee"
    radius: 5
    energy: 2.5
    autoRot: true
    mask: /Textures/Effects/LightMasks/cone.png
    netsync: false
    enabled: false
  - type: ToggleableLightVisuals
    clothingVisuals:
      mask:
      - state: equipped-MASK
      - state: on-equipped-MASK
        shader: unshaded
  - type: Battery
    maxCharge: 600
    startingCharge: 600
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 3
