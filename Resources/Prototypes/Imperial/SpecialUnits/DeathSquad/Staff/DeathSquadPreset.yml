- type: entity
  parent: MobHuman
  id: DeathSquadEVAPreset
  suffix: DeathSquad, Alt, Noghostrole
  name: Department Agent
  components:
    - type: Sprite
      netsync: false
      sprite: Markers/imperial_jobs.rsi
      state: deathsquad-icon
    - type: Loadout
      prototypes: [ DeathSquadEVALodout ] #new lodout
    - type: AutoImplant
      implants:
      - FreedomImplant
      - EmpImplant
      - MindShieldImplant
    - type: NpcFactionMember
      factions:
      - DeathSquad
    - type: RandomMetadata
      nameSegments:
      - DeathSquadFirst
      - DeathSquadSecond
      - DeathSquadNumber
    - type: CrewSkills
      skills:
        - skillBotany #Base
        - skillBaseMed
        - skillBaseConstraction
        - skillCooking  #Easy
        - skillBartending
        - skillHacking
        - skillInstrumentation #Medium
        - skillMaintenance
        - skillMediumConstruction
        - skillMediumBotany
        - skillBasicAtmos
        - skillMedicalEquipment
        - skillPharmacology
        - skillPiloting #Hard
        - skillAtmos
        - skillHardInstrumentation
        - skillRobotics
        - skillResearch
        - skillPharmaceuticals
        - skillShooting
        - skillSurgery
        - skillNeuroSurgery
    - type: GhostRole
      name: ertcall-deathsquad-security-eva-name
      description: ertcall-deathsquad-security-eva-desc
      rules: ertcall-deathsquad-security-eva-rules
      raffle:
        settings: default
    - type: GhostTakeoverAvailable

- type: startingGear #gear
  id: DeathSquadEVALodout
  equipment:
    jumpsuit: ClothingUniformJumpsuitDeathSquad
    back: ClothingBackpackDeadSquadSecurityFilled
    eyes: GlassesDeathSquad
    mask: ClothingMaskDeathSquadAlt
    ears: SODDeathSquadHeadset
    gloves: ClothingHandsGlovesCombat
    outerClothing: ClothingOuterHardsuitDeathsquadAlt
    shoes: BootsMagDeathSquad
    id: DeadSquadPDA
    pocket1: EnergySword
    pocket2: WeaponRevolverMateba
    suitstorage: OxygenTankFilled
    belt: ClothingBeltDeadSquadFilled

- type: entity #role spawn
  id: DeathSquadEVAPresetGhostRole
  name: Death Squad EVA preset
  parent: MarkerBase
  suffix: DeathSquad, Alt
  components:
    - type: GhostRole
      name: ertcall-deathsquad-security-eva-name
      description: ertcall-deathsquad-security-eva-desc
      rules: ertcall-deathsquad-security-eva-rules
      raffle:
        settings: default
    - type: GhostRoleMobSpawner
      prototype: DeathSquadEVAPreset
    - type: Sprite
      sprite: Markers/imperial_jobs.rsi
      layers:
        - sprite: Markers/imperial_jobs.rsi
          state: deathsquad-icon #new icon

- type: job
  id: ImperialDeathSquad
  name: job-name-imperial-deathsquad
  description: job-description-imperial-deathsquad
  playTimeTracker: JobImperialDeathSquad
  weight: 40
  setPreference: false
  startingGear: DeathSquadEVALodout
  icon: "JobIconImperialDeathSquad"
  supervisors: job-supervisors-specialofficer
  canBeAntag: false
  accessGroups:
  - AllAccess
  access:
  - CentralCommand
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]

- type: playTimeTracker
  id: JobImperialDeathSquad

- type: jobIcon
  parent: JobIcon
  id: JobIconImperialDeathSquad
  icon:
    sprite: /Textures/Imperial/SpecialUnits/job_icon.rsi
    state: Deathsquad
  jobName: job-name-imperial-deathsquad
