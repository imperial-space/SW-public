#ODEN magazine

- type: entity
  id: ItemODENMagazine
  parent: BaseMagazineLightRifle
  name: ODEN magazine (.30)
  description: Mag of a heavy rifle.
  suffix: RiotControlUnit
  components:
  - type: Tag
    tags:
      - ItemODENMagazine
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    proto: CartridgeLightRifle
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeLightRifle
    capacity: 40
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: Imperial/SpecialUnits/RCU/Weapones/Magazines/ODENmagazine.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

#MilkorMGL speedloader

- type: entity
  id: BaseSpeedLoaderGrenadeFrag
  name: "speed loader (.45 magnum)"
  parent: BaseItem
  abstract: true
  components:
  - type: SpeedLoader
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - Grenade
    capacity: 6
  - type: Sprite
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []

- type: entity
  id: SpeedLoaderGrenadeFrag
  name: "speed loader (frag grenades)"
  description: ":3"
  parent: BaseSpeedLoaderGrenadeFrag
  suffix: RiotControlUnit
  components:
  - type: Tag
    tags:
      - SpeedLoaderGrenadeFrag
  - type: BallisticAmmoProvider
    proto: GrenadeFrag
  - type: Sprite
    sprite: Imperial/SpecialUnits/RCU/Weapones/Magazines/grenade.rsi
    layers:
      - state: base
        map: [ "enum.GunVisualLayers.Base" ]
      - state: base-6
        map: [ "enum.GunVisualLayers.Mag" ]
    scale: 0.53, 0.53
  - type: MagazineVisuals
    magState: base
    steps: 7
    zeroVisible: false
  - type: Appearance
