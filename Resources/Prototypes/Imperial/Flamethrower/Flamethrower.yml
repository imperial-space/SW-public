    capacity: 500
    cycleable: false
  - type: Sprite
    sprite: Imperial/Flamethrower/fueltank_medium.rsi
    layers:
    - state: icon
      map: ["enum.ToggleableVisuals.Layer"]
  - type: Item
    size: Small
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
  - type: Appearance

- type: entity
  id: FuelTankFlamethrowerBig
  name: "Big Flamethrower Fuel Tank"
  suffix: РХБЗЗ, Огнемёт
  parent: BaseFueltankFlamethrower
  components:
  - type: BallisticAmmoProvider
    proto: FlamethrowerBullet
    capacity: 1000
    cycleable: false
  - type: Sprite
    sprite: Imperial/Flamethrower/fueltank_big.rsi
