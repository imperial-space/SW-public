- type: entity
  id: WaterfallOnsen
  parent: WallRock
  name: Waterfall
  description: A beautyful waterfall
  suffix: Onsen
  components:
    - type: Sprite
      sprite: Imperial/Onsen/Vodopad.rsi
      layers:
        - state: rock
        - map: [ "enum.EdgeLayer.South" ]
          state: rock_south
        - map: [ "enum.EdgeLayer.East" ]
          state: rock_east
        - map: [ "enum.EdgeLayer.North" ]
          state: rock_north
        - map: [ "enum.EdgeLayer.West" ]
          state: rock_west
        - state: vodopadik
    - type: AmbientSound
      volume: -3
      range: 5
      sound:
        path: /Audio/Imperial/Onsen/waterfallsoundeffect.ogg
        params:
          pitch: 1
          loop: true
