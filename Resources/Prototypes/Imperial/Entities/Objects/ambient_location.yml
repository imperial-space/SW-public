- type: entity
  parent: MarkerBase
  id: AmbientLocationBase
  abstract: true
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
      - state: green
      - sprite: Objects/Fun/Instruments/guitar.rsi
        state: icon

- type: entity
  parent: AmbientLocationBase
  id: ImperialAmbientTriggerForest
  name: Imperial Ambient Trigger - Forest
  description: Desc
  suffix: AUDIO TEST
  components:
  - type: LocationTrigger
    locationId: location_forest
    sound:
      path: "/Audio/Ambience/ambidanger.ogg"
    fixtureId: trigger-collision
  - type: Fixtures
    fixtures:
      trigger-collision:
        shape:
          !type:PhysShapeCircle
          radius: 10.0
        hard: false
        density: 0
        mask:
        - MobMask
        layer:
        - Impassable

