#мех

- type: entity
  id: USSPObjectSpecialMech
  parent: BaseStructure
  name: memorial
  description: Commemorating something.
  components:
  - type: Sprite
    sprite: Imperial/ussp/mech/base.rsi
    state: rgeneric
    scale: "1.5, 1.5"
  - type: Transform
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 1000
  - type: InteractionOutline
  - type: GenericVisualizer
    visuals:
      enum.ReinforcedWallVisuals.DeconstructionStage:
        ReinforcedWallVisualLayers.Deconstruction:
          -1: { visible: false }
          0: { state: reinf_construct-0, visible: true}
          1: { state: reinf_construct-1, visible: true}
          2: { state: reinf_construct-2, visible: true}
          3: { state: reinf_construct-3, visible: true}
          4: { state: reinf_construct-4, visible: true}
          5: { state: reinf_construct-5, visible: true}
  - type: ReinforcedWallReplacementMarker
  - type: Construction
    graph: USSPObjectMechDeconstruction
    node: Mech

- type: entity
  id: USSPObjectSpecialMechDeconstructed
  parent: BaseStructure
  name: memorial
  description: Commemorating something.
  components:
  - type: Sprite
    sprite: Imperial/ussp/mech/base.rsi
    state: reinforced_wall_girder
    scale: "1.5, 1.5"
  - type: Transform
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 1000
  - type: Construction
    graph: USSPObjectMechDeconstruction
    node: Deconstructed
  - type: InteractionOutline

- type: constructionGraph
  id: USSPObjectMechDeconstruction
  start: start
  graph:
  - node: start

  - node: Mech
    entity: USSPObjectSpecialMech
    edges:
      - to: Deconstructed
        completed:
          - !type:SpawnPrototype
            prototype: USSPObjectSpecialMechHand
            amount: 1
        steps:
          - tool: Cutting
            doAfter: 1
            completed:
              - !type:VisualizerDataInt
                key: "enum.ReinforcedWallVisuals.DeconstructionStage"
                data: 5
          - tool: Screwing
            doAfter: 1
          - tool: Welding
            doAfter: 5
            completed:
              - !type:VisualizerDataInt
                key: "enum.ReinforcedWallVisuals.DeconstructionStage"
                data: 4
          - tool: Prying
            doAfter: 1
          - tool: Anchoring
            doAfter: 1
            completed:
              - !type:VisualizerDataInt
                key: "enum.ReinforcedWallVisuals.DeconstructionStage"
                data: 3
          - tool: Welding
            doAfter: 10
            completed:
              - !type:VisualizerDataInt
                key: "enum.ReinforcedWallVisuals.DeconstructionStage"
                data: 2
          - tool: Prying
            doAfter: 1
            completed:
              - !type:VisualizerDataInt
                key: "enum.ReinforcedWallVisuals.DeconstructionStage"
                data: 1
          - tool: Screwing
            doAfter: 1
            completed:
              - !type:VisualizerDataInt
                key: "enum.ReinforcedWallVisuals.DeconstructionStage"
                data: 0
          - tool: Cutting
            doAfter: 1

  - node: Deconstructed
    entity: USSPObjectSpecialMechDeconstructed

- type: entity
  parent: BaseScrap
  id: USSPObjectSpecialMechHand
  name: blasted steel pile
  description: An pile of steel welded together in extreme heat. It's of a decent size overall; you could probably get a fair amount of sheets out of it.
  components:
  - type: Sprite
    sprite: Imperial/ussp/mech/hand.rsi
    layers:
      - state: icon
        map: [ "base" ]
    scale: "1.5, 1.5"
  - type: Item
    sprite: Imperial/ussp/mech/hand.rsi
    size: Large
    shape:
    - 0,0,4,4 # 5x5
  - type: MultiHandedItem
  - type: ClothingSpeedModifier
    walkModifier: 0.6
    sprintModifier: 0.6
  - type: HeldSpeedModifier
