- type: entity
  name: envelope
  parent: BaseItem
  id: USSPDocumentFolder
  description: 'A small envelope for keeping prying eyes off of your sensitive documents.'
  components:
  - type: Sprite
    sprite: Imperial/ussp/doc.rsi
    layers:
    - state: envelope_open
      map: ["enum.EnvelopeVisualLayers.Open"]
      offset: "-0.5,0"
    - state: envelope_closed
      map: ["enum.EnvelopeVisualLayers.Sealed"]
      visible: false
      offset: "-0.5,0"
    - state: envelope_torn
      map: ["enum.EnvelopeVisualLayers.Torn"]
      visible: false
      offset: "-0.5,0"
  - type: Paper
    content: envelope-default-message
  - type: PaperVisuals
    headerImagePath: "/Textures/Interface/Paper/paper_heading_syndicate_logo.svg.96dpi.png"
    headerMargin: 216.0, 0.0, 0.0, 0.0
    contentMargin: 0.0, 0.0, 0.0, 0.0
    maxWritableArea: 368.0, 256.0
  - type: Envelope
  - type: ContainerContainer
    containers:
      letter_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      letter_slot:
        name: envelope-letter-slot
        insertSound: /Audio/Effects/packetrip.ogg
        ejectSound: /Audio/Effects/packetrip.ogg
        whitelist:
          tags:
            - Paper
  - type: ActivatableUI
    key: enum.PaperUiKey.Key
    requiresComplex: false
  - type: UserInterface
    interfaces:
      enum.PaperUiKey.Key:
        type: PaperBoundUserInterface
  - type: Item
    size: small
  - type: Tag
    tags:
    - Trash
    - Document

- type: entity
  parent: BaseItem
  name: envelope
  description: 'A small envelope for keeping prying eyes off of your sensitive documents.'
  id: USSPDocumentFolderClosed
  components:
  - type: Sprite
    sprite: Imperial/ussp/doc.rsi
    layers:
    - state: envelope_closed
      map: [ "enum.DeliveryVisualLayers.Icon" ]
      offset: "-0.5,0"
    - state: envelope_torn
      map: [ "enum.DeliveryVisualLayers.Trash" ]
      offset: "-0.5,0"
      visible: false
    - state: postmark
    - map: [ "enum.DeliveryVisualLayers.JobStamp" ]
      offset: "-0.5,0"
      visible: false
  - type: GenericVisualizer
    visuals:
      enum.DeliveryVisuals.IsTrash:
        enum.DeliveryVisualLayers.Trash:
          True: { visible: true }
          False: { visible: false }
  - type: Appearance
#  - type: Label
#    examinable: false
  - type: Delivery
  - type: ContainerContainer
    containers:
      delivery: !type:Container
  - type: StealTarget
    stealGroup: Mail
  - type: Item
    storedRotation: 90
  - type: SimpleToolUsage
    doAfter: 4
    usageVerb: delivery-slice-verb
  - type: ContainerFill
    containers:
      delivery: [ MailSpamLetter ]

- type: entity
  name: Golt
  parent: USSPDocumentFolderClosed
  id: USSPDocumentFolderDossier1
  description: 'A small envelope for keeping prying eyes off of your sensitive documents.'
  components:
    - type: ContainerFill
      containers:
        delivery: [ PaperWrittenUSSPDossierViktorGolt ]

