- type: entity
  id: RCDCE
  parent: [ BaseItem, BaseEngineeringContraband ]
  name: RCD
  description: The rapid construction device can be used to quickly place and remove various station structures and fixtures. Requires compressed matter to function.
  components:
  - type: RCD
    availablePrototypes:
    - WallSolid
    - FloorSteel
    - Plating
    - Catwalk
    - Grille
    - Window
    - WindowDirectional
    - WindowReinforcedDirectional
    - ReinforcedWindow
    - Airlock
    - AirlockGlass
    - Firelock
    - TubeLight
    - BulbLight
    - LVCable
    - MVCable
    - HVCable
    - CableTerminal
    - Deconstruct
    - GasPipeStraightCE
  - type: LimitedCharges
    maxCharges: 55
  - type: Sprite
    sprite: Imperial/RCDCE/RCDCE.rsi
    state: icon
  - type: Item
    size: Normal
  - type: Clothing
    sprite: Imperial/RCDCE/RCDCE.rsi
    quickEquip: false
    slots:
    - Belt
  - type: PhysicalComposition
    materialComposition:
      Steel: 600
      Plastic: 100
  - type: StaticPrice
    price: 25100
  - type: UserInterface
    interfaces:
      enum.RcdUiKey.Key:
        type: RCDMenuBoundUserInterface
  - type: Tag
    tags:
    - HighRiskItem
  #Imperial Space Pirates: New Horizon start
  - type: GPSTrackerPrice
    startprice: 0
    endprice: 25100
  #Imperial Space Pirates: New Horizon end
  - type: StaticPrice
    price: 1150
  - type: ActivatableUI
    inHandsOnly: true
    key: enum.RcdUiKey.Key

- type: rcd
  id: GasPipeStraightCE
  category: WallsAndFlooring
  sprite: /Textures/Interface/Radial/RCD/catwalk.png
  mode: ConstructObject
  prototype: GasPipeStraight
  cost: 1
  delay: 1
  collisionMask: InteractImpassable
  rules:
    - MustBuildOnSubfloor
    - IsCatwalk
  rotation: Fixed
  fx: EffectRCDConstruct1

