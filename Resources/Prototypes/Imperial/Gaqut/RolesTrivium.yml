- type: entity
  parent: MobHuman
  id: TriviumCMDUSSP
  name: TriviumCMDUSSP
  suffix: Gaqut, Void, SideUSSP
  components:
  - type: AntagImmune
  - type: RandomMetadata
    nameSegments:
    - NamesMilitaryFirst
    - NamesMilitaryLast
  - type: GhostRole
    name: TriviumCMDUSSP-ghost-name
    description: TriviumCMDUSSP-ghost-desc
    rules: TriviumCMDUSSP-ghost-rules
    raffle:
      settings: short
    nameFormat: name-format-ert
  - type: GhostTakeoverAvailable
  - type: Sprite
    netsync: false
    sprite: Markers/jobs.rsi
    state: coroner
  - type: Loadout
    prototypes: [ TriviumCMDUSSPgear ]
  - type: RandomHumanoidAppearance
    randomizeName: false
  - type: CrewSkills
    skills:
      - skillBotany
      - skillBaseMed
      - skillBaseConstraction
      - skillHacking
      - skillInstrumentation
      - skillMaintenance
      - skillMedicalEquipment
      - skillPharmacology
      - skillShooting
      - skillSurgery

