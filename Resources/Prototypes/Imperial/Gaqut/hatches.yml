- type: entity
  parent: DoorElectronics
  id: DoorElectronicsVoidTriviumMain
  suffix: Gaqut, Void, SideTrivium
  components:
  - type: AccessReader
    access: [["TriviumMainAccess"]]

- type: entity
  parent: Airlock
  id: AirlockHatchTrivium
  name: trivium main airtight hatch
  suffix: Gaqut, Void, SideTrivium
  description: Just some hatch for soldiers
  components:
  - type: Sprite
    sprite: Imperial/Gaqut/hatch-trivium.rsi
  - type: AccessReader
    access: [ [ "TriviumMainAccess" ] ]
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsVoidTriviumMain ]
  - type: Door
    crushDamage:
      types:
        Blunt: 15
    openSound:
      path: /Audio/Machines/airlock_open.ogg
    closeSound:
      path: /Audio/Machines/airlock_close.ogg
    denySound:
      path: /Audio/Machines/airlock_deny.ogg
    closeTimeOne: 0.1
    closeTimeTwo: 1.6
    openTimeOne: 0.1
    openTimeTwo: 1.6
    openingAnimationTime: 1.6
    closingAnimationTime: 1.6

