- type: entity
  id: TriviumIDCardMain
  parent: IDCardStandard
  name: Trivium ID card
  suffix: Gaqut, Void, SideTrivium
  description: Identification Card.
  components:
    - type: Item
      size: Tiny
      sprite: Imperial/Gaqut/Clothing/id-trivium-main.rsi
    - type: IdCard
      jobIcon: TriviumJobIcon
      jobTitle: job-name-trivium-main
    - type: Access
      tags:
      - TriviumMainAccess
    - type: Sprite
      sprite: Imperial/Gaqut/Clothing/id-trivium-main.rsi
      layers:
        - state: icon
    - type: Clothing
      quickEquip: true
      slots:
        - idcard
      sprite: Imperial/Gaqut/Clothing/id-trivium-main.rsi
    - type: PresetIdCard
      job: null

