- type: radioChannel
  id: TriviumMain
  name: chat-radio-trivium-main
  keycode: 'a'
  frequency: 1623
  color: "#095872"
  longRange: true

- type: entity
  parent: EncryptionKeyCustomBase
  id: EncryptionKeyTriviumMain
  name: trivium encryption key
  description: An encryption key
  suffix: Gaqut, Void, SideTrivium
  components:
  - type: EncryptionKey
    channels:
    - TriviumMain
    defaultChannel: TriviumMain
  - type: Sprite
    sprite: Imperial/Gaqut/radio.rsi
    state: trivium-main
    netsync: false

