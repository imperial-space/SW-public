# Гарнитуры

- type: entity
  parent: ClothingHeadset
  id: ClothingHeadsetTriviumMain
  name: trivium main headset
  description: Some normal trivium headset
  suffix: Gaqut, Void, SideTrivium
  components:
    - type: ContainerFill
      containers:
        key_slots:
        - EncryptionKeyTriviumMain
    - type: Sprite
      sprite: Imperial/Gaqut/Clothing/trivium-main-headset.rsi
      state: icon-trivium
    - type: Clothing
      sprite: Imperial/Gaqut/Clothing/trivium-main-headset.rsi

- type: entity
