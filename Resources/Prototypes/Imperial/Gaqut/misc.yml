- type: entity
  id: BannerSideTrivium
  parent: BannerBase
  name: trivium banner
  description: A banner displaying the Trivium corp. logo. It looks shabby.
  suffix: Gaqut, Void, SideTrivium, Decor
  components:
  - type: Sprite
    sprite: Imperial/Gaqut/banners.rsi
    state: banner-trivium

- type: entity
  id: BannerSideTriviumSound1
  parent: BannerSideTrivium
  name: trivium banner
  description: Some modern bannern with the Trivium corp. logo on it. It has some speakers with Trivium propaganda
  components:
