- type: entity
  id: GaqutBrokenWall
  parent: BaseStructure
  name: Broken reinforced wall
  suffix: Gaqut, Decor
  description: Destroyed reinforced wall. Maybe it was destroyed during the war?
  components:
  - type: Sprite
    noRot: true
    sprite: Imperial/Gaqut/wall.rsi
    state: icon
    #drawdepth: Mobs
  - type: Appearance
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 15
        layer:
        - WallLayer
  - type: Climbable
