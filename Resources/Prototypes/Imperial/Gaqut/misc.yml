- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHatBeretGaqut
  name: beret
  description: An USSP beret. It has some protection.
  suffix: Gaqut, Void, SideTrivium
  components:
  - type: Sprite
    sprite: Clothing/Head/Hats/beret.rsi
  - type: Clothing
    sprite: Clothing/Head/Hats/beret.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.85
        Heat: 0.85
  - type: Tag
    tags:
    - ClothMade
    - Recyclable
    - HamsterWearable

