- type: entity
  parent: MobHuman
  id: JRTEVAPreset
  name: JRT
  suffix: JRT, EVA
  components:
    - type: RandomMetadata
      nameSegments:
      - NamesLast
    - type: Sprite
      netsync: false
      sprite: Markers/jobs.rsi
      state: ertjanitoreva
    - type: Loadout
      prototypes: [ JRTGearEVA ]
    - type: RandomHumanoidAppearance
      randomizeName: false
    - type: AutoImplant
      implants:
      - MindShieldImplant
    - type: GhostRole
      name: jrt-eva-name
      description: jrt-eva-desc
      rules: jrt-eva-rules
      raffle:
        settings: short
    - type: GhostTakeoverAvailable


- type: entity
  id: CrateJRTSpaceSprayNozzle
  parent: CratePlastic
  name: janitorial supplies crate
  suffix: JRT
  description: Fight back against dirt and grime with Nanotrasen's Janitorial Essentials(tm)! Contains three buckets, caution signs, and cleaner grenades. Also has a single mop, broom, spray cleaner, rag, and trash bag.
  components:
  - type: StorageFill
    contents:
      - id: WeaponSprayNozzle
      - id: ClothingBackpackWaterTank
      - id: SpaceCleanerTankFull


