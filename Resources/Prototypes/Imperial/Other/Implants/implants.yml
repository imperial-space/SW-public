## Smoke Implant
- type: entity
  parent: BaseSubdermalImplant
  id: ImperialSmokeImplant
  name: smoke implant
  description: smoke implant
  categories: [ HideSpawnMenu ]
  components:
    - type: SubdermalImplant
      implantAction: ActivateSmokeImplant
    - type: TriggerImplantAction
    - type: SmokeOnTrigger
      spreadAmount: 25
      duration: 16
    - type: SoundOnTrigger
      sound: /Audio/Effects/smoke.ogg

- type: entity
  id: ImperialSmokeImplanter
  name: smoke implanter
  parent: BaseImplantOnlyImplanterSyndi
  components:
    - type: Implanter
      implant: ImperialSmokeImplant
