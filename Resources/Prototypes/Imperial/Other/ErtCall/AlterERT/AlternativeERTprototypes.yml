#ERT START
#Leader
- type: entity
  parent: MobHuman
  id: ERTLeaderEVAPresetAlternative
  name: ERT leader
  suffix: EVA, Alter
  components:
    - type: RandomMetadata
      nameSegments:
        - NamesMilitaryFirstLeader
        - NamesLast
    - type: Sprite
      netsync: false
      sprite: Markers/jobs.rsi
      state: ertleadereva
    - type: Loadout
      prototypes: [ ERTCallLeaderGearEVAAlternative ]
    - type: RandomHumanoidAppearance
      randomizeName: false
    - type: GhostTakeoverAvailable # Для корректной работы ТТС
    - type: GhostRole
      name: ertcall-leader-eva-name-alternative
      description: ertcall-leader-eva-desc-alternative
      rules: ertcall-leader-eva-rules-alternative
      raffle:
        settings: short


