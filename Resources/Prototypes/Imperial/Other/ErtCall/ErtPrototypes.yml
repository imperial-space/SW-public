#ERT START
#Leader
- type: entity
  parent: MobHuman
  id: ERTLeaderEVAPreset
  name: ERT leader
  suffix: EVA
  components:
    - type: RandomMetadata
      nameSegments:
      - NamesMilitaryFirstLeader
      - NamesLast
    - type: Sprite
      netsync: false
      sprite: Markers/jobs.rsi
      state: ertleadereva
    - type: Loadout
      prototypes: [ ERTCallLeaderGearEVA ]
    - type: RandomHumanoidAppearance
      randomizeName: false
    - type: AutoImplant
      implants:
      - MindShieldImplant
    - type: GhostTakeoverAvailable # Для корректной работы ТТС
    - type: GhostRole
      name: ertcall-leader-eva-name
      description: ertcall-leader-eva-desc
      rules: ertcall-leader-eva-rules
      raffle:
        settings: short


