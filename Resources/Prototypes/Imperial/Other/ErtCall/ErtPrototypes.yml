#DEAD SQUAD START
- type: entity
  parent: MobHuman
  id: DeadSquadSecurityEVAPreset
  suffix: РИГ
  name: Dead Squad Agent
  components:
    # - type: RandomMetadata
    #   nameSegments:
    #   - NamesFirstMilitary
    #   - NamesLast
    - type: Sprite
      netsync: false
      sprite: Imperial/Other/ErtCall/imperial_jobs.rsi
      state: deadSquad
    - type: Loadout
      prototypes: [ ERTCallDeadSquadSecurityGearEVA ]
    - type: AutoImplant
      implants:
      - FreedomImplant
      - EmpImplant
      - MindShieldImplant
    - type: NpcFactionMember
      factions:
      - DeathSquad
    - type: GhostRole
      name: ertcall-deadsquad-security-eva-name
      description: ertcall-deadsquad-security-eva-desc
      rules: ertcall-deadsquad-security-eva-rules
      raffle:
        settings: short
    - type: GhostTakeoverAvailable # Для корректной работы ТТС

- type: npcFaction ##Новая фракция для эскадрона смерти
  id: DeathSquad
  hostile:
  - NanoTrasen
  - RiotControlUnit
  - Syndicate
  - Passive
  - PetsNT
  - Zombie
  - Revolutionary
  - Dragon
  - SimpleHostile
  - SyndicateAgent
  - Wizard # Обновление фракци ЭС
#DEAD SQUAD END


