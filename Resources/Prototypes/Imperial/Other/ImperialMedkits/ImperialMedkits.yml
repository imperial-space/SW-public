# Аптечка первой помощи
- type: entity
  name: first aid kit
  description: It's an emergency medical kit for those serious boo-boos.
  parent: [ BaseStorageItem, BaseBagOpenClose ]
  id: FirstAidMedkitImperial
  components:
  - type: Sprite
    sprite: Imperial/Other/ImperialMedkits/firstaidkit.rsi
    layers:
      - state: closed
        map: ["closeLayer"]
      - state: open
        map: ["openLayer"]
        visible: false
      - state: gauze
        map: ["gauze"]
        visible: false
      - state: jar1
        map: ["jar1"]
        visible: false
      - state: jar2
        map: ["jar2"]
        visible: false
      - state: brutepack
        map: ["brutepack"]
        visible: false
      - state: ointment
        map: ["ointment"]
        visible: false
      - state: bottle1
        map: ["bottle1"]
        visible: false
      - state: bottle2
        map: ["bottle2"]
        visible: false
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,5,1
  - type: Item
    size: Large
    sprite: Imperial/Other/ImperialMedkits/firstaidkit.rsi
    heldPrefix: firstaid
  - type: Tag
    tags:
    - Medkit
  - type: ItemCounter
    count:
      tags: [ Gauze, Brutepack, Ointment, PillCanister, FitsHardsuit ]
    composite: true
    layerStates:
    - gauze
