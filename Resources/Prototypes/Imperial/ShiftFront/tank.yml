    soundGunshot:
      path: /Audio/Imperial/ShiftFront/shot_tank.ogg
      params:
        maxDistance: 45
  - type: BallisticAmmoProvider
    capacity: 12
    proto: MagazineLightRifleHard
    whitelist:
      tags:
      - MagazineLightRifleHard
  - type: Clickable
  #- type: InteractionOutline
  - type: Actions
  - type: Sprite
    scale: 1.7, 1.7
    sprite: Imperial/ShiftFront/tank.rsi
    drawdepth: Mobs
    layers:
    - state: tankbashnya
  - type: CombatMode
    toggleMouseRotator: false
  - type: Damageable
    damageContainer: ShiftFrontTank
  - type: MouseRotator
    angleTolerance: 5
    rotationSpeed: 45
    simple4DirMode: false
  - type: NoRotateOnInteract
  - type: NoRotateOnMove
  - type: Input
    context: "human"
  - type: Examiner
  - type: Eye
    pvsScale: 2
  - type: ContentEye
  - type: CameraRecoil

- type: entity
  id: TankStartMoveAction
  components:
  - type: InstantAction
    itemIconStyle: BigAction
    icon:
      sprite: Imperial/ShiftFront/light.rsi
      state: tankstart
    event: !type:TankStartMoveEvent

- type: entity
