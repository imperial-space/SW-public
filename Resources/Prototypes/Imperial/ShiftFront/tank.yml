- type: entity
  id: MobShiftTankHullBase
  parent: ContentsExplosionResistanceBase
  components:
  - type: AlwaysInFov
  - type: FieldOfView
    angle: 90
    minDistance: 1.5
  - type: ExplosionResistance
    damageCoefficient: 0.25
  - type: ContainerContainer
    containers:
      entity_storage: !type:Container
  - type: Sprite
    scale: 1.4, 1.4
    drawdepth: SmallObjects
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: tankhull
      sprite: Imperial/ShiftFront/tank.rsi
  - type: Speech
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.75,-1.2,0.75,1.3"
        density: 60000
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: StatusEffects
    allowed:
    - Stun
    - KnockedDown
    - SlowedDown
    - Stutter
    - Electrocution
    - ForcedSleep
    - TemporaryBlindness
    - Pacified
    - StaminaModifier
    - Flashed
    - RadiationProtection
    - Drowsiness
    - Adrenaline
  - type: NameIdentifier
    group: GenericNumber
  - type: MobCollision
  - type: Physics
    bodyType: KinematicController
  - type: Clickable
  #- type: InteractionOutline
  #- type: InputMover
  #- type: Input
  #  context: "human"
  - type: LagCompensation
  #- type: MobMover
  - type: Actions
  - type: Alerts
  - type: Appearance
  - type: RotationVisuals
    defaultRotation: 0
    horizontalRotation: 0
  - type: DoAfter
  - type: Examiner
  - type: Eye
    pvsScale: 2
  - type: ContentEye
  - type: CameraRecoil
  - type: MindContainer
  #- type: MovementSpeedModifier
  #  baseWalkSpeed : 3.5
  #  baseSprintSpeed : 3.5
  #  acceleration: 4
  #  friction: 5
  - type: Damageable
    damageContainer: ShiftFrontTank
    damageModifierSet: ShiftFrontTank
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 750
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: MobThresholds
    thresholds:
      0: Alive
      750: Dead
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: ShiftTankHull
    turretProto: MedievalTavernMarker3
    moveSpeed: 1.9
    turnRate: 0.0172
  - type: GhostRole
    name: Танк (Механик-водитель)
    rules: Выполняйте приказы
    raffle:
      settings: short
  - type: GhostTakeoverAvailable
  - type: MouseRotator
    angleTolerance: 0
    rotationSpeed: 0
    simple4DirMode: false
  - type: NoRotateOnInteract
  - type: EyeCursorOffset
    maxOffset: 1.3
    pvsIncrease: 1.5
    offsetSpeed: 0.06
  - type: AmbientSound
    volume: -6
    range: 14
    sound:
      path: /Audio/Imperial/ShiftFront/bmp_ambient.ogg

- type: damageModifierSet
  id: ShiftFrontTank
  coefficients:
    Slash: 0.7
    Piercing: 0.2
  flatReductions:
    Slash: 2
    Piercing: 10

- type: damageModifierSet
  id: ShiftFrontLightTank
  coefficients:
    Slash: 0.7
    Piercing: 0.3
  flatReductions:
    Slash: 2
    Piercing: 8

- type: damageContainer
  id: ShiftFrontTank
  supportedGroups:
    - Brute
  supportedTypes:
    - Heat
    - Shock
    - AntiTank

- type: damageContainer
  id: ShiftFrontLightTank
  supportedGroups:
    - Brute
  supportedTypes:
    - Heat
    - Shock
    - AntiTank
    - AntiLightTank

- type: Tag
  id: MagazineLightRifleBoxBMP

- type: Tag
  id: MagazineLightRifleHard

- type: entity
  id: MagazineLightRifleBoxBMP
  name: "L6 SAW magazine box (.30 rifle)"
  parent: BaseMagazineLightRifle
  components:
  - type: Tag
    tags:
      - MagazineLightRifleBoxBMP
  - type: BallisticAmmoProvider
    proto: CartridgeLightRifleBMP
    capacity: 50
  - type: Item
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Magazine/LightRifle/light_rifle_box.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 8
    zeroVisible: false
  - type: Appearance

- type: entity
  id: CartridgeLightRifleBMP
  parent: BaseCartridgeLightRifle
  components:
  - type: CartridgeAmmo
    proto: BulletLightRifleBMP

- type: entity
  id: BulletLightRifleBMP
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: ShiftTankBullet
  - type: Projectile
    suppression: 15
    damage:
      types:
        Piercing: 27
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 3
    intensitySlope: 3
    totalIntensity: 10
  - type: PointLight
    radius: 2.5
    color: orange
    energy: 2.5
    castShadows: false

- type: entity
  id: MagazineLightRifleHard
  parent: BaseCartridge
  components:
  - type: CartridgeAmmo
    proto: BulletLightRifleTank
  - type: Tag
    tags:
      - MagazineLightRifleHard
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    state: blast

- type: entity
  id: BulletLightRifleTank
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: ShiftTankBullet
  - type: Projectile
    suppression: 55
    damage:
      types:
        Piercing: 190
        AntiTank: 130
        AntiLightTank: 220
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 30
    intensitySlope: 6
    totalIntensity: 240
  - type: PointLight
    radius: 3.5
    color: orange
    energy: 4.5
    castShadows: false

- type: entity
  id: MobShiftTankTurret
  components:
  - type: AlwaysInFov
  - type: FieldOfView
    angle: 90
    minDistance: 1.5
  #- type: Physics
  #  bodyType: KinematicController
  - type: Speech
  - type: EyeCursorOffset
    maxOffset: 4
    pvsIncrease: 0.7
    offsetSpeed: 0.035
  - type: GhostRole
    name: Танк (Командир-наводчик)
    rules: Выполняйте приказы
    raffle:
      settings: short
  - type: GhostTakeoverAvailable
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineLightRifleBoxBMP
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineLightRifleBoxBMP
  - type: Gun
    fireRate: 3
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Imperial/ShiftFront/shot_bmp.ogg
      params:
        maxDistance: 45
  - type: MagazineAmmoProvider
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Clickable
  #- type: InteractionOutline
  - type: Actions
  - type: Sprite
    scale: 1.5, 1.5
    sprite: Imperial/ShiftFront/tank.rsi
    drawdepth: Mobs
    layers:
    - state: tankturret
  - type: CombatMode
    toggleMouseRotator: false
  - type: Damageable
    damageContainer: ShiftFrontTank
  - type: MouseRotator
    angleTolerance: 5
    rotationSpeed: 45
    simple4DirMode: false
  - type: NoRotateOnInteract
  - type: NoRotateOnMove
  - type: Input
    context: "human"
  - type: Examiner
  - type: Eye
    pvsScale: 2
  - type: ContentEye
  - type: CameraRecoil

- type: entity
  id: MobShiftTankHardTurret
  components:
  - type: AlwaysInFov
  - type: FieldOfView
    angle: 90
    minDistance: 1.5
  #- type: Physics
  #  bodyType: KinematicController
  - type: Speech
  - type: EyeCursorOffset
    maxOffset: 12
    pvsIncrease: 0.7
    offsetSpeed: 0.035
  - type: GhostRole
    name: Танк (Командир-наводчик)
    rules: Выполняйте приказы
    raffle:
      settings: short
  - type: GhostTakeoverAvailable
  - type: Gun
    projectileSpeed: 20
    fireRate: 0.15
    selectedMode: SemiAuto
    availableModes:
