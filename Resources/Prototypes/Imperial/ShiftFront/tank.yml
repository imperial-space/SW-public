### Базовые прототипы ###
- type: entity
  id: BaseShiftVehicle
  abstract: true
  components:
  - type: MobMover
  - type: Polymorphable
  - type: Input
    context: "human"
  - type: MindContainer
  - type: AlwaysInFov
  - type: FieldOfView
    angle: 90
    minDistance: 1.5
  - type: Speech
  - type: Clickable
  - type: Actions
  - type: Alerts
  - type: Appearance
  - type: DoAfter
  - type: Examiner
  - type: Eye
    pvsScale: 2
  - type: ContentEye
  - type: CameraRecoil
  - type: LagCompensation
  - type: StatusEffects
    allowed:
    - Stun
    - KnockedDown
    - SlowedDown
    - Stutter
    - Electrocution
    - ForcedSleep
    - TemporaryBlindness
    - Pacified
    - StaminaModifier
    - Flashed
    - RadiationProtection
    - Drowsiness
    - Adrenaline

### Фракционные базовые прототипы ###
- type: entity
  id: BaseBlueFaction
  abstract: true
  components:
  - type: NpcFactionMember
    factions: [ShiftFrontBlue]
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels: [Radio2]
  - type: ActiveRadio
    channels: [Radio2]
  - type: LanguageSpeaker
    languages: {English: Speak}
  - type: DamageContacts
    damage:
      types:
        Blunt: 50
    ignoreWhitelist:
      tags:
      - ShiftFrontMedVTower
      - ShiftFrontFactBlue
  - type: ShiftTeamRespWait
    faction: Blue

- type: entity
  id: BaseRedFaction
  abstract: true
  components:
  - type: NpcFactionMember
    factions: [ShiftFrontRed]
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels: [Radio1]
  - type: ActiveRadio
    channels: [Radio1]
  - type: LanguageSpeaker
    languages: {Russian: Speak}
  - type: DamageContacts
    damage:
      types:
        Blunt: 50
    ignoreWhitelist:
      tags:
      - ShiftFrontMedVTower
      - ShiftFrontFactRed
  - type: ShiftTeamRespWait
    faction: Red

### Корпуса техники ###
- type: entity
  id: BaseVehicleHull
  parent: BaseShiftVehicle
  abstract: true
  components:
  - type: ShiftIgnoreExplosionThrow
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeAabb
          bounds: "-0.75,-1.2,0.75,1.3"
        density: 60000
        friction: 0.4
        mask:
        - SmallMobMask
        layer:
        - MachineLayer
  - type: ExplosionResistance
    damageCoefficient: 0.56
  - type: NameIdentifier
    group: GenericNumber
  - type: MouseRotator
    angleTolerance: 0
    rotationSpeed: 0
    simple4DirMode: false
  - type: NoRotateOnInteract
  - type: EyeCursorOffset
    maxOffset: 1.3
    pvsIncrease: 1.5
    offsetSpeed: 0.06
  - type: AmbientSound
    volume: -5
    range: 16
    sound: {path: /Audio/Imperial/ShiftFront/bmp_ambient.ogg}

### БТР ###
- type: entity
  id: BaseBTRHull
  parent: BaseVehicleHull
  abstract: true
  components:
  - type: Sprite
    scale: 1.55,1.55
    drawdepth: SmallObjects
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: tankhull
      sprite: Imperial/ShiftFront/tank.rsi
    - map: ["enum.StorageVisualLayers.Door"]
      state: closed
      sprite: Imperial/ShiftFront/tank.rsi
  - type: Damageable
    damageContainer: ShiftFrontLightTank
    damageModifierSet: ShiftFrontLightTank
  - type: MobThresholds
    thresholds: {0: Alive, 500: Dead}
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Imperial/ShiftFront/tank_destroy.ogg
          params:
            volume: 20
            maxDistance: 45
      - !type:SpawnEntitiesBehavior
        spawn:
          AdminInstantEffectSmoke10:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: ShiftTankHull
    needMoveForRotating: true
    smokeStep: 250
    fireStep: 400
    insideController: TankPartController
    insideGunner: TankPartGunner
    insideEntry: TankPartEntry
    insideExit: TankPartExit
    insideMotor: TankPartMotor
    insideRotor: TankPartRotor
    insideCartridge: TankPartAmmoPrimary
    gridLink:
    - "/Maps/Imperial/bmp.yml"
    #moveSpeed: 4.8
    maxSoftMoveDir: 5.5
    slowdownSpeed: 0.02
    accelSpeed: 0.05
    minSoftMoveDir: -3.5
    turnRate: 0.04


- type: entity
  id: BaseBTRTurret
  parent: BaseShiftVehicle
  abstract: true
  components:
  - type: CombatMode
    toggleMouseRotator: false
  - type: MouseRotator
    angleTolerance: 5
    rotationSpeed: 75
    simple4DirMode: false
  - type: NoRotateOnInteract
  - type: NoRotateOnMove
  - type: Input
    context: "human"
  - type: EyeCursorOffset
    maxOffset: 4
    pvsIncrease: 0.7
    offsetSpeed: 0.035
  - type: Sprite
    scale: 1.55,1.55
    sprite: Imperial/ShiftFront/tank.rsi
    drawdepth: Mobs
    layers:
    - state: BTRbashnya
  - type: ItemSlots
    slots:
      gun_magazine:
        name: "Magazine"
        startingItem: MagazineLightRifleBoxBTR
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags: [MagazineLightRifleBoxBTR]
  - type: Gun
    fireRate: 4
    selectedMode: FullAuto
    availableModes: [FullAuto]
    soundGunshot:
      path: /Audio/Imperial/ShiftFront/shot_btr.ogg
      params: {maxDistance: 45}
  - type: MagazineAmmoProvider
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot


- type: entity
  id: ShiftFrontBTRBlue
  parent: [BaseBTRHull, BaseBlueFaction]
  components:
  - type: Sprite
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: BTRblue
      sprite: Imperial/ShiftFront/tank.rsi
  - type: ShiftTankHull
    faction: Blue
    turretProto: ShiftFrontBTRTurretBlue
  - type: ShiftShowOnMap
