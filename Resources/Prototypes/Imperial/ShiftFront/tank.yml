### Базовые прототипы ###
- type: entity
  id: BaseShiftVehicle
  abstract: true
  components:
  - type: MobMover
  - type: Polymorphable
  - type: Input
    context: "human"
  - type: MindContainer
  - type: AlwaysInFov
  - type: FieldOfView
    angle: 90
    minDistance: 1.5
  - type: Speech
  - type: Clickable
  - type: Actions
  - type: Alerts
  - type: Appearance
  - type: DoAfter
  - type: Examiner
  - type: Eye
    pvsScale: 2
  - type: ContentEye
  - type: CameraRecoil
  - type: LagCompensation
  - type: MobCollision
    strength: 500
  - type: StatusEffects
    allowed:
    - Stun
    - KnockedDown
    - SlowedDown
    - Stutter
    - Electrocution
    - ForcedSleep
    - TemporaryBlindness
    - Pacified
    - StaminaModifier
    - Flashed
    - RadiationProtection
    - Drowsiness
    - Adrenaline

### Фракционные базовые прототипы ###
- type: entity
  id: BaseBlueFaction
  abstract: true
  components:
  - type: NpcFactionMember
    factions: [ShiftFrontBlue]
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels: [Radio2]
  - type: ActiveRadio
    channels: [Radio2]
  - type: LanguageSpeaker
    languages: {English: Speak}
  - type: DamageContacts
    damage:
      types:
        Blunt: 50
    ignoreWhitelist:
      tags:
      - ShiftFrontFactBlue

- type: entity
  id: BaseRedFaction
  abstract: true
  components:
  - type: NpcFactionMember
    factions: [ShiftFrontRed]
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels: [Radio1]
  - type: ActiveRadio
    channels: [Radio1]
  - type: LanguageSpeaker
    languages: {Russian: Speak}
  - type: DamageContacts
    damage:
      types:
        Blunt: 50
    ignoreWhitelist:
      tags:
      - ShiftFrontFactRed

### Корпуса техники ###
- type: entity
  id: BaseVehicleHull
  parent: BaseShiftVehicle
  abstract: true
  components:
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: Physics
    bodyType: KinematicController
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeAabb
          bounds: "-0.75,-1.2,0.75,1.3"
        density: 60000
        restitution: 0
        friction: 0.4
        mask:
          - Impassable
          - MobMask
        layer:
          - Impassable
          - MobLayer
  - type: NameIdentifier
    group: GenericNumber
  - type: MouseRotator
    angleTolerance: 0
    rotationSpeed: 0
    simple4DirMode: false
  - type: NoRotateOnInteract
  - type: EyeCursorOffset
    maxOffset: 1.3
    pvsIncrease: 1.5
    offsetSpeed: 0.06
  - type: AmbientSound
    volume: -6
    range: 14
    sound: {path: /Audio/Imperial/ShiftFront/bmp_ambient.ogg}

### БМП ###
- type: entity
  id: BaseBMPHull
  parent: BaseVehicleHull
  abstract: true
  components:
  - type: Sprite
    scale: 1.5,1.5
    drawdepth: SmallObjects
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: tankhull
      sprite: Imperial/ShiftFront/tank.rsi
    - map: ["enum.StorageVisualLayers.Door"]
      state: closed
      sprite: Imperial/ShiftFront/tank.rsi
  - type: Damageable
    damageContainer: ShiftFrontLightTank
    damageModifierSet: ShiftFrontLightTank
  - type: MobThresholds
    thresholds: {0: Alive, 650: Dead}
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger {damage: 650}
      behaviors: [!type:DoActsBehavior {acts: [Destruction]}]
  - type: ShiftTankHull
    smokeStep: 350
    fireStep: 500
    insideController: TankPartController
    insideGunner: TankPartGunner
    insideEntry: TankPartEntry
    insideExit: TankPartExit
    gridLink:
    - "/Maps/Imperial/bmp.yml"
    moveSpeed: 1.9
    turnRate: 0.0172

### Синяя БМП ###
- type: entity
  id: ShiftFrontBMPBlue
  parent: [BaseBMPHull, BaseBlueFaction]
  components:
  - type: Sprite
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: BMPblue
      sprite: Imperial/ShiftFront/tank.rsi
  - type: ShiftTankHull
    faction: Blue
    turretProto: ShiftFrontBMPTurretBlue
  - type: ShiftShowOnMap
    faction: Blue
    mippleProto: ShiftFrontVehicle

### Башни ###
- type: entity
  id: BaseBMPTurret
  parent: BaseShiftVehicle
  abstract: true
  components:
  - type: CombatMode
    toggleMouseRotator: false
  - type: MouseRotator
    angleTolerance: 5
    rotationSpeed: 45
    simple4DirMode: false
  - type: NoRotateOnInteract
  - type: NoRotateOnMove
  - type: Input
    context: "human"
  - type: EyeCursorOffset
    maxOffset: 4
    pvsIncrease: 0.7
    offsetSpeed: 0.035
  - type: Sprite
    scale: 1.5,1.5
    sprite: Imperial/ShiftFront/tank.rsi
    drawdepth: Mobs
    layers:
    - state: BMPbashnya
  - type: ItemSlots
    slots:
      gun_magazine:
        name: "Magazine"
        startingItem: MagazineLightRifleBoxBMP
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags: [MagazineLightRifleBoxBMP]
  - type: Gun
    fireRate: 3
    selectedMode: FullAuto
    availableModes: [FullAuto]
    soundGunshot:
      path: /Audio/Imperial/ShiftFront/shot_bmp.ogg
      params: {maxDistance: 45}
  - type: MagazineAmmoProvider
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot

### Синяя башня БМП ###
