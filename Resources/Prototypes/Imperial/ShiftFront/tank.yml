- type: entity
  id: MobShiftTankObserver
  parent: BaseShiftVehicle
  components:
  - type: CombatMode
    toggleMouseRotator: false
  - type: NoRotateOnInteract
  - type: NoRotateOnMove
  - type: Input
    context: "human"
  - type: Sprite
    scale: 1.5,1.5
    sprite: Imperial/ShiftFront/tank.rsi
    drawdepth: Overdoors
    layers:
    - state: tankmachinegun
  - type: ItemSlots
    slots:
      gun_magazine:
        name: "Magazine"
        startingItem: MagazineLightRifleBoxBig
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags: [MagazineLightRifleBox]
  - type: Gun
    fireRate: 4.5
    selectedMode: FullAuto
    availableModes: [FullAuto]
    soundGunshot:
      path: /Audio/Imperial/ShiftFront/shot_mg.ogg
      params: {maxDistance: 45}
  - type: MagazineAmmoProvider
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot

  - type: AlwaysInFov
  - type: Speech
  - type: EyeCursorOffset
    maxOffset: 10
    pvsIncrease: 0.7
    offsetSpeed: 1
  - type: Actions
  - type: Damageable
    damageContainer: ShiftFrontTank
  - type: MouseRotator
    angleTolerance: 5
    rotationSpeed: 150
    simple4DirMode: false
  - type: Examiner
  - type: Eye
    pvsScale: 2
  - type: ContentEye
  - type: CameraRecoil

