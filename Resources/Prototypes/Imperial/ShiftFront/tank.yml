### Типы урона ###
- type: damageType
  id: AntiTank
  name: damage-type-antitank
  armorCoefficientPrice: 2
  armorFlatPrice: 10

- type: damageType
  id: AntiLightTank
  name: damage-type-antilighttank
  armorCoefficientPrice: 2
  armorFlatPrice: 10

### Наборы модификаторов урона ###
- type: damageModifierSet
  id: ShiftFrontTank
  coefficients:
    Slash: 0.5
    Piercing: 0.2
  flatReductions:
    Slash: 7
    Piercing: 10

- type: damageModifierSet
  id: ShiftFrontLightTank
  coefficients:
    Slash: 0.5
    Piercing: 0.3
  flatReductions:
    Slash: 3
    Piercing: 8

### Контейнеры урона ###
- type: damageContainer
  id: ShiftFrontTank
  supportedGroups: [Brute]
  supportedTypes: [AntiTank]

- type: damageContainer
  id: ShiftFrontLightTank
  supportedGroups: [Brute]
  supportedTypes: [AntiTank, AntiLightTank]

