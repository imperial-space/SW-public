
- type: entity
  parent: [ SimpleMobBase, FlyingMobBase ]
  id: MobFPVDrone
  components:
  - type: Eye
    pvsScale: 2
  - type: HTN
    enabled: false
  - type: Item
    size: Normal
  - type: MovementSpeedModifier
    baseWalkSpeed : 7
    baseSprintSpeed : 7
    acceleration: 1.8
    baseAcceleration: 1.8
    weightlessAcceleration: 1.8
    baseWeightlessAcceleration: 1.8
    friction: 0.17
    frictionNoInput: 0.17
    baseFriction: 0.17
  - type: MedievalDash
    force: 0
    staminaDamage: 0
  - type: Sprite
    scale: 0.6, 0.6
    drawdepth: Mobs
    noRot: false
    sprite: Imperial/ShiftFront/light.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: drone
  - type: AmbientSound
    enabled: false
    volume: -3
    range: 14
    sound:
      path: /Audio/Imperial/ShiftFront/drone_active.ogg
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.23
        density: 10
        mask:
        - FlyingMobMask
        layer:
        - FlyingMobLayer
  - type: ShiftFPVDrone

- type: entity
  parent: MobFPVDrone
  id: MobFPVDroneBlue
  components:
  - type: NpcFactionMember
    factions:
      - ShiftFrontBlue
  - type: Sprite
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: drone
  - type: ShiftFPVDrone
    faction: Blue
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Radio2
  - type: ActiveRadio
