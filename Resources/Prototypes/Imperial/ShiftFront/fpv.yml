    sprite: Imperial/ShiftFront/fpvmask.rsi
  - type: Clothing
    sprite: Imperial/ShiftFront/fpvmask.rsi
  - type: IdentityBlocker
  - type: ShiftFPVMask

- type: entity
  parent: BaseItem
  id: FPVController
  components:
  - type: Sprite
    sprite: Imperial/ShiftFront/light.rsi
    state: pult
  - type: ShiftFPVController
  - type: UseDelay

- type: entity
  parent: BaseItem
  id: FPVControllerUp
  components:
  - type: Sprite
    sprite: Imperial/ShiftFront/light.rsi
    state: pult
  - type: ShiftFPVController
    needVR: false
  - type: UseDelay

- type: entity
  id: StopFPVControll
  components:
  - type: InstantAction
    itemIconStyle: BigAction
    icon:
      sprite: Imperial/ShiftFront/light.rsi
      state: drone
    event: !type:FPVStopControlEvent

