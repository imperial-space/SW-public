# Sniper rifle
- type: entity
  name: Hristov
  parent: [BaseWeaponSniper, BaseGunWieldable]
  id: WeaponSniperHristovShiftingFront
  suffix: Shifting Front
  description: A portable anti-materiel rifle. Fires armor piercing 14.5mm shells. Uses .60 anti-materiel ammo.
  components:
  - type: Unremoveable
  - type: Sprite
    sprite: Objects/Weapons/Guns/Snipers/heavy_sniper.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Snipers/heavy_sniper.rsi
  - type: GunRequiresWield
  - type: Gun
    soundGunshot:
      path: /Audio/Imperial/ShiftFront/shot_sniper.ogg
      params:
        maxDistance: 45
    projectileSpeed: 50 # Imperial Balance
    fireRate: 0.4
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - CartridgeAntiMateriel
    capacity: 5
    proto: CartridgeAntiMateriel
  - type: SpeedModifiedOnWield
    walkModifier: 0.2 # Imperial balance
    sprintModifier: 0.2 # Imperial balance
  - type: GunWieldBonus # Imperial balance
    minAngle: -20
    maxAngle: -20
  - type: EyeCursorOffset
    maxOffset: 22.5
    pvsIncrease: 2.5
    offsetSpeed: 0.03
  - type: CursorOffsetRequiresWield

