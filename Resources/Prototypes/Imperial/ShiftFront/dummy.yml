- type: entity
  name: explosive mine
  parent: BaseLandMine
  id: AntitankLandMineExplosive
  components:
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: AntiTankLandmine
    maxIntensity: 5
    intensitySlope: 7
    totalIntensity: 50 # about a ~4 tile radius
    canCreateVacuum: false
  - type: LandMine
    instantTrigger: true
    antiTank: true
  - type: Stealth
  - type: StealthOnMove

- type: explosion
  id: AntiTankLandmine
  damagePerIntensity:
    types:
      Heat: 25
      Blunt: 25
      Piercing: 25
      AntiTank: 160
      AntiLightTank: 320
  tileBreakChance: [ 0, 0.5, 1 ]
  tileBreakIntensity: [ 0, 10, 30 ]
  tileBreakRerollReduction: 20
  lightColor: Orange
  texturePath: /Textures/Effects/fire.rsi
  fireStates: 3

