- type: entity
  id: BulletGrenadeFragBSA
  name: frag grenade
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Imperial/Spaceguns/BSA1.rsi
    layers:
      - state: projectileBSA
  - type: SingularityDistortion
    falloffPower: 2.4
    intensity: 2000
  - type: PointLight
    color: "#00ccff"
    castShadows: false
    energy: 99
    radius: 99999
  - type: TimedDespawn
    lifetime: 180
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 100
    intensitySlope: 5
    totalIntensity: 950000
  - type: RadiationSource
    intensity: 85
  - type: WarpPoint
    follow: true
    location: FragBSA

- type: entity
  parent: BaseGrenade
  id: CoreBluespaceBSA
  suffix: SpaceGuns, Phantom4502
  components:
  - type: Sprite
    sprite: Imperial/Spaceguns/BSA1.rsi
    layers:
    - state: BulletGrenadeFragBSA
      map: ["enum.AmmoVisualLayers.Base"]
  - type: CartridgeAmmo
    proto: BulletGrenadeFragBSA
  - type: Appearance
  - type: SpentAmmoVisuals
    state: frag
  - type: PointLight
    radius: 1.5
    energy: 3.5
    color: "#00ccff"
    castShadows: false
  - type: Tag
    tags:
    - SpaceGunsBSAGrenade

