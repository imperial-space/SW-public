- type: entity
  id: SpaceGunsBSA1
  parent: [SpaceGunsBase, ConstructibleMachine]
  name: EXP-2100g "Duster"
  suffix: SpaceGuns, Phantom4502
  description: A powerful stationary grenade launcher. A cartridge is required for use.
  components:
  - type: Sprite
    sprite: Imperial/Spaceguns/BSA.rsi
    layers:
    - state: icon
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      ballistic-ammo: !type:Container
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    projectileSpeed: 100
    fireRate: 0.05
    angleDecay: 45
    minAngle: 0
    maxAngle: 1
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon2.ogg
      params:
        variation: 0.12
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - SpaceGunsBSAGrenade
    capacity: 1
    soundInsert:
      path: /Audio/Imperial/Lavaland/PlasmaCutter/replenishment-of-the-firearm.ogg
  - type: Machine
    board: MachineSpaceGunBSA1
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.42,-0.85,0.42,0.88"
        density: 70
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: WarpPoint
    follow: true
    location: BSA

