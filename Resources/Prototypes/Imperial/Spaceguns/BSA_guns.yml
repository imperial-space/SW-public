- type: entity
  id: SpaceGunsBSA
  parent: [SpaceGunsBase, ConstructibleMachine]
  name: PTK-800 "Matter Dematerializer"
  description: Salvage stationary mining turret. Gradually accumulates charges on its own, extremely effective for asteroid excavation.
  components:
  - type: Sprite
    sprite: Imperial/Spaceguns/BSA.rsi
    layers:
    - state: icon
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    projectileSpeed: 100
    fireRate: 1
    angleDecay: 45
    minAngle: 0
    maxAngle: 1
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon2.ogg
      params:
        variation: 0.12
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 250
    rechargeSound:
      path: /Audio/Imperial/Lavaland/PlasmaCutter/replenishment-of-the-firearm.ogg
      params:
        pitch: 1.2
        variation: 0.08
  - type: BasicEntityAmmoProvider
    proto: BulletGrenadeFragBSA
    capacity: 1
    count: 1
  - type: Machine
    board: MachineSpaceGunBSA
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.42,-0.85,0.42,0.88"
        density: 70
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: WarpPoint
    follow: true
    location: BSA

