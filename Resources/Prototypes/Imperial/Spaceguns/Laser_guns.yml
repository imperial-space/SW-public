- type: entity
  id: SpaceGunPerforator1
  suffix: SpaceGuns, Phantom4502
  parent: [ SpaceGunsBase, ConstructibleMachine]
  name: SpaceGunPerforator
  description: 
  components:
  - type: Sprite
    sprite: Imperial/Spaceguns/plasma_accelerator.rsi
    layers:
    - state: base_Blue_2
    - state: mag-3
      map: ["enum.GunVisualLayers.Mag"]
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      cell_slot: !type:ContainerSlot
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 825
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    fireRate: 0.5
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/ship_perforator.ogg
      params:
        variation: 0.05
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: Machine
    board: MachineSpaceGunPerforator1
  - type: ItemSlots
    slots:
      cell_slot:
        name: Magazine
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - PowerCage
  - type: HitscanBatteryAmmoProvider
    proto: RedSpaceLaserSpaceGunsSniper
    fireCost: 250

