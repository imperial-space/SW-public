- type: entity
  id: SpaceGunsEXP_1
  parent: [SpaceGunsBase, ConstructibleMachine]
  name: EXP-2100g "Duster"
  suffix: SpaceGuns, Phantom4502
  description: A powerful stationary grenade launcher. A cartridge is required for use.
  components:
  - type: Sprite
    sprite: Imperial/Spaceguns/ALSMM.rsi
    layers:
    - state: base
    - state: mag-3
      map: ["enum.GunVisualLayers.Mag"]
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      ballistic-ammo: !type:Container
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: ["Destruction"]
  - type: Gun
    projectileSpeed: 80
    fireRate: 0.5
    angleDecay: 45
    minAngle: 0
    maxAngle: 15
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/ship_friendship.ogg
      params:
        pitch: 0.8
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - SpaceGunsGrenade
    capacity: 1
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
  - type: Machine
    board: MachineSpaceGunSpaceGunsEXP_1
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false

