# Гермозатворы и прочее

- type: entity
  id: LaserBlastDoor
  parent: BaseShutter
  name: laser blast door
  suffix: Felix
  description: This one says 'LASER DANGER'.
  components:
  - type: PointLight
    radius: 1.4
    energy: 3
    color: "#a53030"
  - type: AccessReader
  - type: Sprite
    sprite: Imperial/Felix/Objects/laserblastdoor/default.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: Door
    occludes: false
    closeTimeOne: 0.4
    closeTimeTwo: 0.4
    openTimeOne: 0.4
    openTimeTwo: 0.4
    openingAnimationTime: 1.0
    closingAnimationTime: 1.0
    canPry: false
    crushDamage:
      types:
        Blunt: 25 # yowch
    openSound:
      path: /Audio/Weapons/ebladeoff.ogg
    closeSound:
      path: /Audio/Weapons/ebladeon.ogg
  - type: Occluder
    enabled: false
  - type: Appearance
  - type: RadiationBlocker
    resistance: 8
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StrongMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 750
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: ContainerFill
    containers:
      board: [ DoorElectronics ]
  - type: Construction
    graph: BlastDoor
    node: blastdoor
    containers:
    - board
  - type: StaticPrice
    price: 500

- type: entity
  id: LaserBlastDoorOpen
  parent: LaserBlastDoor
  suffix: Открыто, Felix
  components:
  - type: Door
    state: Open
  - type: Occluder
    enabled: false
  - type: Physics
    canCollide: false
  - type: Airtight
    airBlocked: false
  - type: RadiationBlocker
    enabled: false

- type: entity
