### HELMET

- type: entity
  parent: ClothingHeadEVAHelmetBase
  id: ClothingHeadHelmetHardsuitFifthEyeStormtrooper
  name: шлем штурмовика
  suffix: 5ОКО
  description: 
  components:
  - type: Sprite
    sprite: Imperial/Felix/Secret/Clothing/helmet/stormtrooper.rsi
  - type: Clothing
    sprite: Imperial/Felix/Secret/Clothing/helmet/stormtrooper.rsi
  - type: ToggleableLightVisuals
  - type: PointLight
    color: "#ff2400"
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    radius: 5
    softness: 20
    autoRot: true
  - type: Appearance
  - type: LightBehaviour
    behaviours:
      - !type:FadeBehaviour
        id: radiating
        interpolate: Linear
        maxDuration: 2.0
        startValue: 3.0
        endValue: 2.0
        isLooped: true
        reverseWhenFinished: true
      - !type:PulseBehaviour
        id: blinking
        interpolate: Nearest
        maxDuration: 1.0
        minValue: 0.1
        maxValue: 2.0
        isLooped: true
  - type: UnpoweredFlashlight
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default


