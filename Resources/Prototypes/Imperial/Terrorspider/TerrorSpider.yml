- type: entity
  name: Rusar terror
  parent: MobRusarSpider
  id: MobRusarSpiderAngrys
  suffix: terror spider
  components:
    - type: NpcFactionMember
      factions:
        - Xeno
    - type: InputMover
    - type: MobMover
    - type: HTN
      rootTask:
        task: SimpleHostileCompound
    - type: GhostRole
      makeSentient: true
      name: spider-terror-name
      description: spider-terror-desc
      raffle:
        settings: short
    - type: GhostTakeoverAvailable
    - type: AutoImplant
      implants:
      - LightImplantSpiderRusar

- type: entity
  parent: LightImplantSpider
  id: LightImplantSpiderRusar
  name: Spawn web
  components:
    - type: SubdermalImplant
      implantAction: ActionSpawnSpiderRusar

- type: entity
  id: ActionSpawnSpiderRusar
  name: Spawn web
  description: it spans the web. A little stronger than usual.
  components:
  - type: WorldTargetAction
    useDelay: 2.5
    range: 1
    itemIconStyle: BigAction
    icon:
      sprite: Objects/Misc/spiderweb.rsi
      state: spider_web_1
    event: !type:WorldSpawnSpellEvent
      prototypes:
      - id: SpiderWebTerrorRusar
        amount: 1
      offset: 0, 1

- type: entity
  name: Rusar terror
  parent: [ SimpleMobBases, MobCombat ]
  id: MobRusarSpider
  description: Fights with the crew, protects other spiders. Due to its stability, it creates free space so that other spiders can expand the nest.
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: terror_red
      sprite: Imperial/TerrorSpider/Spider/rusar.rsi
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 130
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: DamageStateVisuals
    states:
      Alive:
        Base: terror_red
      Dead:
        Base: terror_red_dead
  - type: Butcherable
    spawned:
    - id: FoodMeatSpider
      amount: 2
  - type: CombatMode
  - type: MobThresholds
    thresholds:
      0: Alive
      220: Dead
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcBite
    soundHit:
      path: /Audio/Effects/bite.ogg
    damage:
      types:
        Piercing: 15
        Structural: 60
  - type: SolutionContainerManager
    solutions:
      melee:
        maxVol: 30
  - type: SolutionRegeneration
    solution: melee
    generated:
      reagents:
      - ReagentId: Toxin
        Quantity: 1
  - type: MeleeChemicalInjector
    transferAmount: 0.75
    solution: melee
  - type: InteractionPopup
    successChance: 0.5
    interactSuccessString: petting-success-tarantula
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
  - type: NoSlip
  - type: Spider
    webPrototype: SpiderWebTerrorUwU
    webAction: TerrorWeedsAction
  - type: IgnoreSpiderWeb
  - type: Bloodstream
    bloodMaxVolume: 0
    bloodReagent: CopperBlood
  - type: Speech
    speechVerb: Arachnid
  - type: Tag
    tags:
    - DoorBumpOpener
    - FootstepSound
  - type: MovementSpeedModifier
    baseWalkSpeed : 2
    baseSprintSpeed : 3
  - type: SlowOnDamage
    speedModifierThresholds:
      200: 0.7
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.6
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: PassiveDamage
    allowedStates:
    - Alive
    damageCap: 174
    damage:
      types:
        Poison: -1
      groups:
        Brute: -1
        Burn: -1


