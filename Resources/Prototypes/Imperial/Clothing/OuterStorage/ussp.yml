- type: entity
  parent: ClothingOuterStorageBase
  id: USSPSoldierCoat
  name: Military coat
  description: Military camo coat.
  components:
  - type: Item
    size: Normal
  - type: Sprite
    sprite: Imperial/ussp/soldier/coat.rsi
  - type: Clothing
    sprite: Imperial/ussp/soldier/coat.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.8
        Stamina: 0.8
  - type: ExplosionResistance
    damageCoefficient: 0.8
  - type: ClothingSpeedModifier
    walkModifier: 0.7
    sprintModifier: 0.9
  - type: Tag
    tags:
    - WhitelistChameleon

