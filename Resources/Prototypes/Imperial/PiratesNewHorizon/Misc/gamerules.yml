
- type: entity
  id: PiratesDebug
  components:
  - type: GameRule
    minPlayers: 1
  - type: RandomMetadata #this generates the random operation name cuz it's cool.
    nameSegments:
    - NamesPirateFirst
    - NamesPirateLast
  - type: AntagLoadProfileRule
  - type: RuleGrids
  - type: LoadMapRule
    mapPath: /Maps/Shuttles/pirate_map.yml
  - type: PiratesRule
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ CaptainPirate ]
      fallbackRoles: [ Pirate ]
      startingGear: PirateCaptainGear
      spawnerPrototype: SpawnPointCaptainPirate
      components:
      - type: NpcFactionMember
        factions:
        - Pirate
      - type: RandomMetadata
        nameSegments:
        - NamesPirateFirst
        - NamesPirateLast
      - type: PirateAccent
      mindRoles:
      - MindRoleCaptainPirate
    - prefRoles: [ Pirate ]
      fallbackRoles: [ CaptainPirate ]
      spawnerPrototype: SpawnPointPrivateer
      max: 14
      playerRatio: 1
      startingGear: PirateGear
      components:
      - type: NpcFactionMember
        factions:
        - Pirate
      - type: RandomMetadata
        nameSegments:
        - NamesPirateFirst
        - NamesPirateLast
      - type: PirateAccent
      mindRoles:
      - MindRolePirate

- type: entity
  id: Pirates
  components:
