        - Pirate
      - type: PirateAccent
      - type: RandomMetadata
        nameSegments:
        - NamesPirateFirst
        - NamesPirateLast
      mindRoles:
    - MindRoleCaptainPirate
    - prefRoles: [ Pirate ]
      fallbackRoles: [ CaptainPirate ]
      spawnerPrototype: SpawnPointPrivateer
      max: 14
      playerRatio: 1
      startingGear: PirateGear
      components:
      - type: NpcFactionMember
        factions:
        - Pirate
      - type: PirateAccent
      - type: RandomMetadata
        nameSegments:
        - NamesPirateFirst
        - NamesPirateLast
      mindRoles:
      - MindRolePirate