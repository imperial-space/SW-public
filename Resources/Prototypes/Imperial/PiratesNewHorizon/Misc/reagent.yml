- type: reagent
  id: AlhocolEssence
  parent: BaseAlcohol
  name: reagent-name-alhocolessence
  desc: reagent-description-alhocolessence
  physicalDesc: reagent-physical-desc-enigmatic
  flavor: magical
  color: "#ffffff"
  recognizable: true
  metamorphicSprite:
    sprite: Imperial/PiratesNewHorizon/alhocolessence.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 4
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  pricePerUnit: 1250
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 60
      - !type:ResistChange
        modifiers:
          coefficients:
            Blunt: 0.6
            Piercing: 0.5
            Heat: 0.8
            Shock: 0.7
            Slash: 0.8
      - !type:HealthChange
        conditions:
        damage:
          groups:
            Brute: -1
          types:
            Piercing: -3
            Heat: -3
            Shock: -3
            Slash: -3
      - !type:ModifyBloodLevel
        amount: 30
      - !type:Oxygenate
      - !type:ChemHealEyeDamage
      - !type:CureZombieInfection
    Poison:
      effects:
      - !type:ChemVomit
        probability: 0.005
      - !type:HealthChange
        conditions:
        damage:
          types:
            Poison: 0.1
      - !type:ResistChange
        modifiers:
          coefficients:
            Poison: 2
    Narcotic:
      effects:
      - !type:Jitter
      - !type:Drunk
        boozePower: 15
      - !type:MovespeedModifier
        walkSpeedModifier: 1.4
        sprintSpeedModifier: 1.4