- type: reagent
  id: MuddyHarbour
  name: reagent-name-pirate
  group: Toxins
  desc: reagent-desc-pirate
  physicalDesc: reagent-physical-desc-strong-smelling
  flavor: bitter
  color: "#152332"
  metabolisms:
    Poison:
      metabolismRate : 0.25
      effects:
      - !type:Polymorph
        prototype: AbominationMorph 
        conditions:
        - !type:ReagentThreshold
          min: 5
        - !type:OrganType
          type: Animal
          shouldHave: false
      - !type:PopupMessage
        type: Local
        messages: [ "muddy-harbour-popup" ]
        probability: 0.3
        visualType: Large
      - !type:Emote
        emote: Scream
        probability: 0.3

- type: reagent
  id: WineEssence
  parent: BaseAlcohol
  name: reagent-name-wineessence
  desc: reagent-description-wineessence
  physicalDesc: reagent-physical-desc-roaring
  flavor: chaos
  color: "#4e0105"
  recognizable: true
  metamorphicSprite:
    sprite: Imperial/PiratesNewHorizon/wineessence.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 5
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: true
  pricePerUnit: 250
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 30
      - !type:AdjustReagent
        reagent: Blood
        amount: 1
      - !type:ModifyBloodLevel
        amount: 10

