- type: entity
  parent: [BaseItem, StorePresetPirate]
  name: A ROME SMELLING RADIO WITH PIRATY TOONS GOING ON FOR THE PURPOSE OF DEBUG, MATES! #sorre
  id: BaseUplinkRadioPirateDebug
  suffix: PIRATE, DEBUG
  components:
  - type: Sprite
    sprite: Objects/Devices/communication.rsi
    layers:
    - state: old-radio
  - type: Item
    sprite: Objects/Devices/communication.rsi
    heldPrefix: old-radio
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: Store
    balance:
      Doubloon: 999999
  - type: Clothing
    quickEquip: false
    slots:
    - idcard

- type: entity
  parent: [StorePresetPirate, BaseStructure]
  name: Freebooter
  id: PirateStationaryUplink
  description: The mighty store of pirates, allowing yall to make the mighty purchases.
  suffix: Pirate
  components:
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.35,0.25,0.35"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: InteractionOutline
  - type: Rotatable
  - type: Anchorable
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Electronic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: ApcPowerReceiver
    powerLoad: 200
  - type: ExtensionCableReceiver
  - type: ActivatableUIRequiresPower
  - type: Sprite
    drawdepth: Objects
    sprite: Imperial/PiratesNewHorizon/uplinkstationary.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerScreen"]
      state: screen
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ComputerVisuals.Powered:
        computerLayerScreen:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
  - type: LitOnPowered
  - type: PointLight
    radius: 1.5
    energy: 1.6
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    offset: "0, 0.4" # shine from the top, not bottom of the computer
    castShadows: false
  - type: EmitSoundOnUIOpen
    sound:
      collection: Keyboard
      params:
        volume: -1
        variation: 0.10
        pitch: 1.10  # low pitch keyboard sounds feel kinda weird
    blacklist:
      tags:
      - NoConsoleSound
  - type: ContainerContainer
    containers:
      board: !type:Container
        ents: []
  - type: Electrified
    enabled: false
    usesApcPower: true
  - type: ActivatableUI
    singleUser: true
    key: enum.StoreUiKey.Key
  - type: UserInterface
    interfaces:
        enum.StoreUiKey.Key:
            type: StoreBoundUserInterface
  - type: Store
    balance:
      Doubloon: 5000
  - type: Computer