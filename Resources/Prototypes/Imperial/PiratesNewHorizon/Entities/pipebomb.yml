- type: entity
  parent: [BaseItem, BaseMajorContraband] #Imperial Space Pirates: New Horizon
  id: PipeBombNewRemastered
  name: pipe bomb
  description: An improvised explosive made from pipes and wire.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Bombs/pipebomb.rsi
    layers:
    - state: base
      map: ["enum.TriggerVisualLayers.Base"]
    - state: wires
  - type: RandomTimerTrigger
    min: 1
    max: 10
  - type: TimerTrigger
    delay: 5
    examinable: false
    initialBeepDelay: 0
    beepSound: /Audio/Effects/lightburn.ogg
  - type: ExplodeOnTrigger
    keysIn:
    - timer
  - type: Explosive # Weak explosion in a very small radius. Doesn't break underplating.
    explosionType: Default
    totalIntensity: 50
    intensitySlope: 5
    maxIntensity: 6
    canCreateVacuum: false
  - type: Appearance
  - type: TimerTriggerVisuals
  - type: Construction
    graph: PipeBomb
    node: pipebomb
  - type: GenericVisualizer
  #Imperial Space Pirates: New Horizon; Start
    visuals:
      enum.Trigger.TriggerVisuals.VisualState:
        enum.ConstructionVisuals.Layer:
          Primed: { state: primed }
          Unprimed: { state: icon }
  - type: TriggerOnHeat
    delay: 5
    initialBeepDelay: 0
    beepSound: /Audio/Effects/lightburn.ogg
  #Imperial Space Pirates: New Horizon; End
