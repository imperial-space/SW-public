# Гарнитура и ключи шифрования
- type: entity
  parent: ClothingHeadset
  id: ClothingHeadsetFADAK9M
  suffix: DeadSector
  name: FADAK-9M headset
  description: A headset used by the upper echelons of Nanotrasen.
  components:
  - type: EncryptionKeyHolder
    keySlots: 30
  - type: Sprite
    sprite: Imperial/DeadSector/headset/headset.rsi
  - type: Clothing
    sprite: Imperial/DeadSector/headset/headset.rsi # Гарнитура на 20 слотов

- type: entity
  parent: ClothingHeadset
  id: ClothingHeadsetFADAK9MAdministration
  suffix: Felix
  name: FelixFADAK9MheadsetAdministration
  description: A headset used by the upper echelons of Nanotrasen.
  components:
  - type: EncryptionKeyHolder
    keySlots: 30
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyRadioAdministration
      - EncryptionKeyRadioFelixradioChannelAdministrativeSector
      - EncryptionKeyRadioFelixradioChannelManufacturingSector
      - EncryptionKeyRadioFelixradioChannelFinancialSector
      - EncryptionKeyCommon
      - EncryptionKeyAirGroup
    defaultChannel: EncryptionKeyRadioAdministration
  - type: Sprite
    sprite: Imperial/DeadSector/headset/headset.rsi
  - type: Clothing
    sprite: Imperial/DeadSector/headset/headset.rsi

