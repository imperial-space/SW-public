- type: entity
  id: BulletRPG8
  name: grenade RPG-8
  parent: BaseBulletTrigger
  components:
  - type: AlwaysInFov
  - type: Sprite
    scale: 1, 1
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: grenade
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: RPG8Explosion
    maxIntensity: 4
    intensitySlope: 5
    totalIntensity: 35
    maxTileBreak: 1
  - type: PointLight
    radius: 2.5
    color: orange
    energy: 9.5
  - type: Projectile
    flyByCoverTime: 10

- type: explosion
  id: RPG8Explosion
  damagePerIntensity:
    types:
      Heat: 35
      Blunt: 12
      Piercing: 15
      AntiTank: 30
      AntiLightTank: 35
  tileBreakChance: [ 0, 0.5, 1 ]
  tileBreakIntensity: [ 0, 10, 30 ]
  tileBreakRerollReduction: 20
  lightColor: Orange
  texturePath: /Textures/Effects/fire.rsi
  fireStates: 3

- type: entity
  id: BulletRPG8LargeRadius
  name: grenade RPG-8 (large-radius)
  parent: BaseBulletTrigger
  components:
  - type: Sprite
    scale: 1, 1
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: grenade
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 150
    intensitySlope: 3
    maxIntensity: 8.5

- type: entity
  id: BulletRPG8Flash
  name: flash grenade
  parent: BaseBulletTrigger
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
      - state: grenade
  - type: SmokeOnTrigger
    duration: 30
    spreadAmount: 50
  - type: FlashOnTrigger
    range: 7
  - type: SpawnOnTrigger
    proto: GrenadeFlashEffect
  - type: ActiveTimerTrigger
    timeRemaining: 0.3
  - type: DeleteOnTrigger
  - type: StaminaDamageOnCollide
    damage: 80
