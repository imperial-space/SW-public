- type: entity
  parent: BaseItem
  id: FederationCash1
  name: federation cash
  description: You gotta have money.
  suffix: Elysium Prime, Admin
  components:
  - type: Cash
  - type: Item
    shape:
    - 0,0,1,0
    storedOffset: 0,-2
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      Credit: 5
  - type: StaticPrice
    price: 0
  - type: Stack
    stackType: FederationCredit
    count: 1
    baseLayer: base
    layerStates:
    - cash
    - cash_10
    - cash_100
    - cash_1000
    - cash_2500
    - cash_5000
    - cash_10000
    - cash_20000
    - cash_30000
    - cash_100000
    - cash_1000000
    layerFunction: Threshold
  - type: StackLayerThreshold
    thresholds: [10, 100, 100, 1000, 2500, 5000, 10000, 20000, 30000, 100000, 1000000]
  - type: Sprite
    sprite: Imperial/Other/ElysiumPrime/Objects/Fcash.rsi
    state: cash
    layers:
    - state: cash
      map: ["base"]
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        density: 30
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35,-0.2,0.25,0.1"
        mask:
        - ItemMask
  - type: Appearance
  - type: Currency
    price:
      FederationCash: 1

- type: stack
  id: FederationCredit
  name: federation credit
  icon: { sprite: /Textures/Imperial/Other/ElysiumPrime/Objects/Fcash.rsi, state: cash }
  spawn: FederationCash1

- type: entity
