- type: entity
  parent: BasePDA
  id: PDAblackwhitesquadLeaders
  name: PDA of the black and white squad
  suffix: Phantom4502, Sacerdos
  description: You need to understand your own or someone else 's.
  components:
  - type: Sprite
    sprite: Imperial/sacerdos/PDA_Leaders_sacerdos.rsi
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: "unshaded"
      visible: false
  - type: Item
    size: Small
  - type: Pda
    id: ID_Leaders_sacerdos
  - type: Icon
    sprite: Imperial/sacerdos/PDA_sacerdos.rsi
    state: pda
  - type: PdaBorderColor
    borderColor: "#333333"
    accentVColor: "#f2f2f2"

