      #Sacerdos START
- type: entity
  parent: BaseStructure
  id: BaseUplinl_sacerdos
  name: Uplinl_sacerdos
  description: super Sacerdos uplink
  suffix: Phantom4502, Sacerdos
  components:
  - type: Sprite
    sprite: Imperial/sacerdos/Uplink_sacerdos.rsi
    layers:
    - state: Sprite_sacerdos_2
    - state: Sprite_sacerdos_3
      shader: unshaded
      visible: true
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: ActivatableUI
    singleUser: true
    key: enum.StoreUiKey.Key
  - type: Store
    categories:
    - sacerdosFood
    - sacerdosWeapon
    - sacerdosMelee
    - sacerdosMed
    - sacerdosAmmunition
    - sacerdosArmor
    - sacerdosMisc
    - sacerdosClothing
    - sacerdosStorage
    - sacerdosExplosives
    - sacerdosConstruction
    - sacerdosReinforcements
    currencyWhitelist:
    - Telecrystal_sacerdos
    balance:
      Telecrystal_sacerdos: 0

