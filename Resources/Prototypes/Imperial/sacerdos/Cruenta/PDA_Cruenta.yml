- type: entity
  parent: BasePDA
  id: PDAblackwhitesquadLeadersCruenta
  name: PDA of the black and white squad
  suffix: Phantom4502, Cruenta
  description: You need to understand your own or someone else 's.
  components:
  - type: Sprite
    sprite: Imperial/sacerdos/Cruenta_falcatio/PDA_Cruenta/Cruenta_PDA_Leaders.rsi
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: "unshaded"
      visible: false
  - type: Item
    size: Small
  - type: Pda
    id: ID_Leaders_Cruenta
  - type: Icon
    sprite: Imperial/sacerdos/Cruenta_falcatio/PDA_Cruenta/Cruenta_PDA_Leaders.rsi
    state: pda
  - type: PdaBorderColor
    borderColor: "#541319"
    accentVColor: "#c06822"

