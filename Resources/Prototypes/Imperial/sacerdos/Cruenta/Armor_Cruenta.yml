- type: entity
  parent: [ClothingOuterBaseLarge, AllowSuitStorageClothing]
  id: ArmorRaid_Cruenta
  name: Raid suit
  description: A somewhat flexible and well-armored suit with a powerful shoulder mounted flashlight manufactured in the Gorlex Marauder's iconic blood-red color scheme, it does not protect its wearer from space.
  suffix: Phantom4502, Cruenta
  components:
  - type: Sprite
    sprite: Imperial/sacerdos/Cruenta_falcatio/Armor_Cruenta/Armor_Cruenta_Raid.rsi
    layers:
    - state: Sprite-Armor-1
    - state: Sprite-Armor-6
      visible: false
      shader: unshaded
  - type: Clothing
    sprite: Imperial/sacerdos/Cruenta_falcatio/Armor_Cruenta/Armor_Cruenta_Raid.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.35
        Slash: 0.35
        Piercing: 0.35
        Heat: 0.45
        Caustic: 0.5
        Stamina: 0.5
  - type: ExplosionResistance
    damageCoefficient: 0.35
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: ToggleableLightVisuals
    spriteLayer: light
    clothingVisuals:
      outerClothing:
      - state: Sprite-Armor-5
        shader: unshaded
  - type: Appearance
  - type: HandheldLight
    addPrefix: false
    blinkingBehaviourId: blinking
    radiatingBehaviourId: radiating
  - type: PointLight
    enabled: false
    color: "#963d3d"
    radius: 5
    energy: 2
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    netsync: false
  - type: LightBehaviour
    behaviours:
      - !type:FadeBehaviour
        id: radiating
        interpolate: Linear
        maxDuration: 2.0
        startValue: 3.0
        endValue: 2.0
        isLooped: true
        reverseWhenFinished: true
      - !type:PulseBehaviour
        id: blinking
        interpolate: Nearest
        maxDuration: 1.0
        minValue: 0.1
        maxValue: 2.0
        isLooped: true
  - type: Battery
    maxCharge: 600
    startingCharge: 600
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 2
