- type: entity
  id: BaseShippingContainer_sacerdos
  suffix: Phantom4502
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  - type: SpriteFade
  - type: Clickable
  - type: Sprite
    sprite: Imperial/sacerdos/ShippingContainer_sacerdos.rsi
    netsync: false
    drawdepth: Overdoors
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.5,0,1.5,-1"
        density: 1000
        layer:
        - WallLayer
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 250
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:SpawnEntitiesBehavior
            spawn:
              SheetSteel:
                min: 10
                max: 20
          - !type:PlaySoundBehavior
            sound:
              path: /Audio/Effects/metal_break1.ogg

