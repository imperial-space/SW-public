- type: polymorph
  id: GnomeCluwne
  configuration:
    entity: MobCluwne
    forced: true
    transferName: true
    transferHumanoidAppearance: true
    inventory: None
    revertOnDeath: true
    revertOnCrit: true
    duration: 30

- type: entity
  id: ProjectilePolyboltGnomish
  parent: ProjectilePolyboltBase
  name: gnomish polybolt
  description: Nooo, I don't wanna be clown!
  components:
  - type: PolymorphOnTrigger
    polymorph: GnomeCluwne
  - type: WhitelistTriggerCondition
    whitelist:
      components:
      - Body

- type: entity
  id: ActionBeerClowned
  name: Fireball
  description: Fires an explosive fireball towards the clicked location.
  components:
  - type: Action
    useDelay: 60 #ибо нехуй спамить заклинанием
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Magic/fireball.ogg
    icon:
      sprite: Imperial/DRGbeer/spells.rsi
      state: Reincarnation-Clown
  - type: TargetAction
    checkCanAccess: false
    range: 60
  - type: WorldTargetAction
    event: !type:ProjectileSpellEvent
      prototype: ProjectilePolyboltGnomish

- type: entity
  parent: BaseSubdermalImplant
  id: BeerImplantClowned
  name: absolutelyNothing
  components:
    - type: SubdermalImplant
      implantAction: ActionBeerClowned
    - type: Tag
      tags:
        - SubdermalImplant
        - HideContextMenu
        - Flashlight

- type: entity
  id: ActionBeerGnomespawn
  name: Summon Magicarp
  description: This spell summons three Magi-Carp to your aid! May or may not turn on user.
  components:
  - type: Action
    useDelay: 50
    itemIconStyle: BigAction
    icon:
      sprite: Imperial/DRGbeer/spells.rsi
      state: gnomes
  - type: TargetAction
    range: 4
  - type: WorldTargetAction
    event: !type:WorldSpawnSpellEvent
      prototypes:
      - id: MobGnome
        amount: 3
      offset: 0, 1

- type: entity
  parent: BaseSubdermalImplant
  id: BeerImplantGnomes
  name: absolutelyNothing
  components:
    - type: SubdermalImplant
      implantAction: ActionBeerGnomespawn
    - type: Tag
      tags:
        - SubdermalImplant
        - HideContextMenu
        - Flashlight

- type: entity
  id: ActionBeerSmoke
  name: Summon Magicarp
  description: This spell summons three Magi-Carp to your aid! May or may not turn on user.
  components:
  - type: Action
    useDelay: 50
    itemIconStyle: BigAction
    icon:
      sprite: Imperial/DRGbeer/spells.rsi
      state: Soporificfog
  - type: TargetAction
    range: 4
  - type: WorldTargetAction
    event: !type:WorldSpawnSpellEvent
      prototypes:
      - id: AdminInstantEffectTearGas
        amount: 1
      offset: 0, 1

- type: entity
  parent: BaseSubdermalImplant
  id: BeerImplantSmoke
  name: absolutelyNothing
  components:
    - type: SubdermalImplant
      implantAction: ActionBeerSmoke
    - type: Tag
      tags:
        - SubdermalImplant
        - HideContextMenu
        - Flashlight
