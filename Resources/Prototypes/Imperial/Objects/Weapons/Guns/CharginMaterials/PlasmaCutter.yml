- type: entity
  id: WeaponPlasmaCutterBase
  abstract: true
  parent: [BaseItem, BaseWeaponBatterySmall]
  components:
  - type: Sprite
    sprite: Imperial/Objects/Weapons/Guns/CharginMaterials/PlasmaCutter/base.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Item
    sprite: Imperial/Objects/Weapons/Guns/CharginMaterials/PlasmaCutter/base.rsi
    size: Small
    shape:
    - 0,1, 2,0
    - 2,0, 0,1
  - type: Clothing
    sprite: Imperial/Objects/Weapons/Guns/CharginMaterials/PlasmaCutter/base.rsi
    quickEquip: false
    slots:
    - suitStorage
    - Belt
  - type: Appearance
  - type: AmmoCounter
  - type: Gun
    projectileSpeed: 22.5
    fireRate: 0.35
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Imperial/Lavaland/PlasmaCutter/gun_shoot1.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: BatteryWeaponFireModes
    modeSwitchDelay: 3.5
    fireModes:
    - proto: BulletPlasmaCutter
      fireCost: 50
    - proto: AttackerBulletPlasmaCutter
      fireCost: 100
  - type: ProjectileBatteryAmmoProvider
    proto: BulletPlasmaCutter
    fireCost: 50
  - type: UseDelay
  - type: Battery
    maxCharge: 1500
    startingCharge: 1500
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: MaterialEnergy
    materialWhiteList: [Plasma]
  - type: Tag
    tags:
    - OnlyMaterialEnergy

- type: entity
  name: Plasma cutter
  id: WeaponPlasmaCutter
  parent: [WeaponPlasmaCutterBase, BaseCargoContraband]
  suffix: Full, Lavaland
  description: ...
  components:
  - type: Battery
    maxCharge: 1500
    startingCharge: 1500


- type: entity
  name: Plasma cutter
  id: EmptyWeaponPlasmaCutter
  parent: WeaponPlasmaCutter
  suffix: Empty, Lavaland
  description: ...
  components:
  - type: Battery
    maxCharge: 1500
    startingCharge: 0
