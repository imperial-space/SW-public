- type: entity
  name: gold cross
  description: A cross with an elongated lower part. It looks worn.
  parent: ClothingNeckBase
  id: ChaplainGoldCross
  suffix: Chaplain, Crook
  components:
  - type: Item
    size: Small
  - type: UseDelay
    delay: 10.0
  - type: Bible
    damage:
      groups:
        Brute: -15
        Burn: -15
    damageOnFail:
      groups:
        Brute: 15
        Airloss: 15
    damageOnUntrainedUse: ## What a non-chaplain takes when attempting to heal someone
      groups:
        Burn: 10
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    damage:
      types:
        Holy: 25
        Blunt: 1
  - type: Sprite
    sprite: Imperial/Crook/Chaplain/gold_cross.rsi
    state: icon
  - type: Clothing
    sprite: Imperial/Crook/Chaplain/gold_cross.rsi

