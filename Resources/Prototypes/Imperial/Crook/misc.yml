- type: reagent
  id: LiquidPain
  name: reagent-name-liquidpain
  group: Toxins
  desc: reagent-desc-liquidpain
  flavor: acid
  color: "#b12323"
  recognizable: false
  physicalDesc: reagent-physical-desc-liquidpain
  contrabandSeverity: Major
  plantMetabolism:
  - !type:PlantAdjustToxins
    amount: 10
  - !type:PlantAdjustHealth
    amount: -5
  metabolisms:
    Poison:
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 1
            Cellular: 1
      - !type:PopupMessage
        type: Local
        visualType: MediumCaution
        messages: [ "generic-reagent-effect-burning-insides" ]
        probability: 0.33
      - !type:Emote
        emote: Scream
        probability: 0.2
    Drink:
      effects:
      - !type:SatiateThirst
        factor: -4

- type: reagent
  id: AlmondWater
  name: reagent-name-almondwater
  group: Medicine
  desc: reagent-desc-almondwater
  recognizable: true
  physicalDesc: reagent-physical-desc-almondwater
  flavor: sweet
  color: "#a7def3"
  metabolisms:
    Medicine:
      effects:
      - !type:AdjustReagent
        reagent: Histamine
        amount: -3.0
      - !type:ModifyStatusEffect
        effectProto: StatusEffectDrowsiness
        time: 10
        type: Remove
      - !type:ChemHealEyeDamage
      - !type:EvenHealthChange
        damage:
          Burn: -0.3
          Toxin: -0.3
          Airloss: -0.3
          Brute: -0.3
      - !type:PopupMessage
        visualType: Medium
        messages: ["ethyloxyephedrine-effect-feeling-awake"]
        type: Local
        probability: 0.1
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 2
      - !type:AdjustReagent
        reagent: Nutriment
        amount: 1

