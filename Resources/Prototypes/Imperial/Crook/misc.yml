- type: entity
  name: fancy flippo lighter
  suffix: Crook
  parent: FlippoLighter
  id: FancyFlippoLighter
  description: Will blind any poverty.
  components:
  - type: Sprite
    sprite: Imperial/Crook/Misc/Fancy/zippo.rsi
    layers:
    - state: icon-close
      map: ["base"]
    - state: icon-top
      map: ["top"]
      visible: false
    - state: icon-open
      map: ["open"]
      visible: false
    - state: lighter-flame
      map: ["flame"]
      visible: false
