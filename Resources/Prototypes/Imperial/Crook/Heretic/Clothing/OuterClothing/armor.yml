- type: entity
  parent: [ ClothingOuterStorageBase, AllowSuitStorageClothing ]
  id: ClothingOuterArmorHeretic
  name: ominous armor
  description: A ragged, dusty set of robes. Strange eyes line the inside.
  components:
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodHeretic
    slot: head
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
  - type: Item
    size: Huge
  - type: Sprite
    sprite: Imperial/Crook/Heretic/eldritch_armor.rsi
    state: icon
  - type: Clothing
    sprite: Imperial/Crook/Heretic/eldritch_armor.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.5
        Heat: 0.5
        Caustic: 0.5
        Holy: 1.25
        Stamina: 0.5
  - type: PressureProtection
  - type: ExplosionResistance
    damageCoefficient: 0.25
