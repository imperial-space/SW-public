- type: entity
  id: EldritchInfluence
  name: reality shift
  suffix: Heretic, Crook
  description: Your eyes start to burn just from a single look. Should you delve deeper?
  placement:
    mode: SnapgridCenter
  components:
  - type: EldritchInfluence
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: Imperial/Crook/Heretic/reality_fracture.rsi
    state: icon
  - type: AmbientSound
    range: 3
    volume: -8
    sound:
      path: /Audio/Ambience/anomaly_scary.ogg
  - type: Visibility
    layer: 32

- type: entity
  id: EldritchInfluenceIntermediate
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 30
  - type: SpawnOnDespawn
    prototype: EldritchInfluenceSpent

- type: entity
  id: EldritchInfluenceSpent
  name: reality fracture
  suffix: Heretic, Crook
  description: A reality fracture. Something keeps leaking out of it, should you really be near this thing?
  placement:
    mode: SnapgridCenter
  components:
  - type: InteractionOutline
  - type: Sprite
    sprite: Imperial/Crook/Heretic/reality_fracture.rsi
    state: icon_harvested
  - type: Clickable
  - type: DamageOnInteract
    damage:
      types:
        Slash: 50
    popupText: eldritch-influence-reaction
  - type: AmbientSound
    range: 3
    volume: -8
    sound:
      path: /Audio/Ambience/anomaly_scary.ogg
