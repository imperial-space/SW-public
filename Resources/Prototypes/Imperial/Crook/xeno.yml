- type: entity
  id: XenoStructuralGel
  name: xeno structural gel
  description: A black liquid substance.
  suffix: Felix
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  components:
    - type: MeleeSound
      soundGroups:
        Brute:
          path:
            "/Audio/Weapons/slash.ogg"
    - type: Sprite
      sprite: Imperial/Crook/Xeno/structuralgel.rsi
      drawdepth: WallMountedItems
      layers:
        - state: icon-1
          map: ["spiderWebLayer"]
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.SpiderWebVisuals.Variant:
          spiderWebLayer:
            1:  {state: icon-1}
            2:  {state: icon-3}
    - type: Clickable
    - type: Transform
      anchored: true
    - type: Physics
    - type: Fixtures
      fixtures:
        fix1:
          hard: false
          density: 7
          shape:
            !type:PhysShapeAabb
            bounds: "-0.5,-0.5,0.5,0.5"
          layer:
          - MidImpassable
    - type: Damageable
      damageModifierSet: Wood
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 32
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - type: Temperature
      heatDamage:
        types:
          Heat: 5
      coldDamage: {}
      coldDamageThreshold: 0
    - type: Flammable
      fireSpread: true
      damage:
        types:
          Heat: 10
    - type: Reactive
      groups:
        Flammable: [Touch]
        Extinguish: [Touch]
    - type: SpiderWebObject
    - type: SpeedModifierContacts
      walkSpeedModifier: 0.5
      sprintSpeedModifier: 0.5
      ignoreWhitelist:
        components:
            - IgnoreSpiderWeb

- type: entity
  parent: XenoStructuralGel
  id: XenoStructuralGelAlt
  name: xeno structural gel
  suffix: Felix
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  components:
    - type: Sprite
      sprite: Imperial/Crook/Xeno/structuralgel.rsi
      drawdepth: WallMountedItems
      layers:
        - state: icon-3
          map: ["spiderWebLayer"]
    - type: Appearance
    - type: GenericVisualizer
      visuals:
        enum.SpiderWebVisuals.Variant:
          spiderWebLayer:
            1:  {state: icon-2}
            2:  {state: icon-3}

- type: entity
  name: facehugger
  parent: SimpleSpaceMobBase
  id: MobFacehuggerXeno
  description: Resembles a large scorpion.
  suffix: Felix
  components:
  - type: Insulated
  - type: CombatMode
  - type: InputMover
  - type: MobMover
  - type: HTN
    rootTask:
      task: XenoCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavInteract: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: Reactive
    groups:
      Flammable: [Touch]
      Extinguish: [Touch]
  - type: NpcFactionMember
    factions:
    - Xeno
  - type: Sprite
    drawdepth: SmallMobs
    sprite: Imperial/Crook/Xeno/facehugger.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base", "movement"]
      state: facehugger
  - type: SpriteMovement
    movementLayers:
      movement:
        state: facehugger-moving
    noMovementLayers:
      movement:
        state: facehugger
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 100
        mask:
        - SmallMobMask
        layer:
        - SmallMobLayer
  - type: Deathgasp
  - type: MobStateActions
    actions:
      Critical:
      - ActionCritSuccumb
      - ActionCritFakeDeath
      - ActionCritLastWords
  - type: MovementSpeedModifier
    baseWalkSpeed : 2.8
    baseSprintSpeed : 5.3
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      70: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      25: 0.5
  - type: Stamina
    critThreshold: 200
  - type: Bloodstream
    bloodReagent: FluorosulfuricAcid
    bloodMaxVolume: 350
  - type: MeleeWeapon
    altDisarm: false
    angle: 0
    soundHit:
     collection: AlienClaw
    animation: WeaponArcBite
    damage:
      types:
        Piercing: 2
        Caustic: 10
  - type: Puller
  - type: Butcherable
    spawned:
    - id: FoodMeatXeno
      amount: 2
  - type: TypingIndicator
    proto: alien
  - type: Temperature
    heatDamageThreshold: 360
    coldDamageThreshold: -150
    currentTemperature: 310.15
  - type: Tag
    tags:
      - CannotSuicide
      - DoorBumpOpener
      - FootstepSound
  - type: NoSlip
  - type: Perishable #Ummmm the acid kills a lot of the bacteria or something
    molsPerSecondPerUnitMass: 0.0005
  - type: Speech
    speechVerb: LargeMob

- type: entity
  id: XenoEgg
  parent: [PresentBase, BaseItem]
  name: xeno egg
  description: Holds a something danger.
  suffix: Рандом, Felix
  components:
  - type: Item
    size: Huge
  - type: Sprite
    sprite: Imperial/Crook/Xeno/itemegg.rsi
    layers:
      - state: icon
  - type: SpawnItemsOnUse
    items:
      - id: XenoEggUncovered
      - id: FoodMeatSlime
        orGroup: GiftPool
        prob: .05
      - id: MobFacehuggerXeno
        orGroup: GiftPool
        prob: .01
    sound:
      path: /Audio/Imperial/Crook/uncoveregg.ogg
- type: entity

  id: XenoEggFacehugger
