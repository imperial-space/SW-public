- type: entity
  id: ImperialXxRaayBaseFlag
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    drawdepth: Objects
    sprite: Imperial/XxRaay/flags.rsi
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-1.0,-0.1,-0.6"
        density: 1000
        hard: true
        mask:
        - FullTileMask
        layer:
        - WallLayer
        - Impassable
  - type: Transform
    anchored: true
  - type: FlagCapture
    captureRadius: 2.0
    captureTime: 30
  - type: NpcFactionMember

- type: entity
  parent: ImperialXxRaayBaseFlag
  id: ImperialUSSPFlag
  name: USSP Flag
  description: Флаг Союза Советских Социалистических Планет. Развевается с гордостью.
  suffix: XxRaay, FlagsTDM
  components:
  - type: Sprite
    state: ussp-flag
  - type: NpcFactionMember
    factions:
    - USSP

- type: entity
  parent: ImperialXxRaayBaseFlag
  id: ImperialNTFlag
  name: NT Flag
  description: Корпоративный флаг Nanotrasen. Символ капиталистической империи.
  suffix: XxRaay, FlagsTDM
  components:
  - type: Sprite
    state: NT-flag
  - type: NpcFactionMember
    factions:
    - Nanotrasen

- type: entity
  parent: ImperialXxRaayBaseFlag
  id: ImperialSindiFlag
  name: Syndicate Flag
  description: Флаг Синдиката. Пахнет порохом и революцией.
  suffix: XxRaay, FlagsTDM
  components:
  - type: Sprite
    state: sindi-flag
  - type: NpcFactionMember
    factions:
    - Syndicate

