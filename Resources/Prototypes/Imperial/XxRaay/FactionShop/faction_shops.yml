- type: entity
  id: NTShopConsole
  name: NT Shop Console
  description: Консоль магазина NanoTrasen
  parent: BaseComputer
  components:
  - type: FactionShop
    faction: NTFaction
    pointsInterval: 20.0
    pointsPerFlag: 10
  - type: Store
    name: "NT Faction Shop"
    categories:
    - FactionWeapons
    - FactionAmmo
    - FactionMedical
    - FactionTools
    currencyWhitelist:
    - NTFactionPoints
    balance:
      NTFactionPoints: 0
  - type: ActivatableUI
  - type: PointLight
    color: "#3366FF"
    energy: 0.5
    radius: 2.0

