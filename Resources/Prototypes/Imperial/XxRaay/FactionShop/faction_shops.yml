- type: entity
  id: NTShopConsole
  name: faction-shop-console-nt
  description: faction-shop-console-nt-desc
  parent: BaseFactionShopConsole
  components:
  - type: FactionShop
    faction: NTFaction
    pointsInterval: 20.0
    pointsPerFlag: 10
  - type: Store
    name: faction-store-title-nt
    currencyWhitelist:
    - NTFactionPoints
    balance:
      NTFactionPoints: 0
    whitelist:
      components:
      - FactionShop
  - type: PointLight
    color: "#3366FF"
    energy: 0.5
    radius: 2.0

