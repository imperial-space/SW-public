- type: entity
  id: SyndieBattleRule
  parent: BaseTraitorRule
  components:
  - type: GameRule
    minPlayers: 1
    delay:
      min: 1
      max: 2
  - type: SyndieBattleRule
    giveUplink: true
    giveCodewords: true
    giveBriefing: true
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    definitions:
    - max: 50
      playerRatio: 100
      blacklist:
        components:
        - AntagImmune
      lateJoinAdditional: true
      mindRoles:
      - MindRoleTraitor

- type: gamePreset
  id: SyndieBattle
  alias:
    - syndiebattle
    - sb
  name: preset-syndiebattle-title
  description: preset-syndiebattle-description
  showInVote: false
  rules:
    - SyndieBattleRule
    - BasicStationEventScheduler
    - MeteorSwarmScheduler
    - SpaceTrafficControlEventScheduler
    - BasicRoundstartVariation


