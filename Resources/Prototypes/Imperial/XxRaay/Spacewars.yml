- type: entity
  name: electroenergy sword
  parent: [BaseMeleeWeaponEnergy, BaseMajorContraband]
  id: ElectroEnergySword
  description: A very loud & dangerous sword with a beam made of pure, concentrated plasma.
  suffix: XxRaay
  components:
  - type: Sprite
    sprite: Imperial/XxRaay/electroenergy_sword.rsi
    layers:
    - state: el_sword
    - state: el_sword_blade
      color: "#FFFFFF"
      visible: false
      shader: unshaded
      map: [ "blade" ]
  - type: ItemToggleMeleeWeapon
    activatedDamage:
      types:
        Slash: 23
        Heat: 23
        Structural: 27
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1
    damage:
      types:
        Slash: 23
        Heat: 10
        Structural: 27
  - type: Item
    sprite: Objects/Weapons/Melee/e_sword-inhands.rsi
  - type: StaticPrice
    price: 2500

- type: entity
  name: submachnine Lasergun
  suffix: XxRaay
  parent: BaseWeaponBatterySmall
  id: WeaponLaserAutoPistol
  description: it shoots at almost light speed
  components:
  - type: Sprite
    sprite: Imperial/XxRaay/autolasergun.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: Clothing
    sprite: Imperial/XxRaay/autolasergun.rsi
  - type: Gun
    selectedMode: FullAuto
    fireRate: 2.8
    availableModes:
      - SemiAuto
      - FullAuto
    soundGunshot:
      path: /Audio/Imperial/StarWars/blaster.ogg
  - type: HitscanBatteryAmmoProvider
    proto: LaserRedAutoPistol
    fireCost: 100
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 40
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Appearance
  - type: Tag
    tags:
    - Sidearm
  - type: StaticPrice
    price: 750
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000

- type: hitscan
  id: LaserRedAutoPistol
  damage:
    types:
      Heat: 7
  muzzleFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: muzzle_laser
  travelFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: beam
  impactFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: impact_laser

- type: entity
  id: MagazineGrenadeStation
  name: set of "RS-W6" type grenades
  parent: [ BaseMagazineGrenade, MagazineGrenadeFrag ]
  suffix: XxRaay
  components:
  - type: BallisticAmmoProvider
    proto: GrenadeStation

- type: entity
  id: GrenadeStation
  name: RS-W6 type grenade
  parent: [ BaseGrenade, GrenadeFrag ]
  suffix: XxRaay
  components:
  - type: CartridgeAmmo
    proto: BulletGrenadeStation
  - type: Appearance
  - type: SpentAmmoVisuals
    state: frag

- type: entity
  id: BulletGrenadeStation
  name: frag grenade
  parent: [ BaseBulletTrigger, BulletGrenadeFrag ]
  categories: [ HideSpawnMenu ]
  components:
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    totalIntensity: 3750
    intensitySlope: 1
    maxIntensity: 10
