- type: entity
  id: BaseSmithWorkpiece
  parent: BaseItem
  abstract: true
  name: _
  components:
  - type: DeleteOnLowScoreOnSmithComplete
    threshold: -10
  - type: SmithingWorkpiece
    steps: 20
    nothingTime: 1
    goldTime: 0.5
    stepsSpawnSpeed: 0.8
  - type: DamageOnInteract
    isDamageActive: false
    damage:
      types:
        Heat: 5
    popupText: powered-light-component-burn-hand
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.WorkpieceVisuals.Melted:
        base:
          True: { state: melted }
          False: { state: scrap }
  - type: Sprite
    sprite: Imperial/Medieval/Misc/scrap.rsi
    layers:
    - state: scrap
      map: [ "base" ]

