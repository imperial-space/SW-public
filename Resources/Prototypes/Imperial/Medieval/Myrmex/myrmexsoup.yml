- type: entity
  parent: CP14BaseWorkbench
  id: MedievalMyrmexSoupPlace
  name: myrmexSoupPlace
  description: It produces armor and weapon using leather wood and steel.
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Lathe/MyrmexSoupPlace.rsi
    state: icon
  - type: Appearance
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepWood
  - type: Transform
    anchored: true
  - type: Pullable
  - type: Construction
    graph: MSoupPlace
    node: medievalMyrmexSoupPlace
  - type: ReplaceFloorOnSpawn
    replaceableTiles:
    replacementTiles:
    - MedievalMyrmexFloor2
  - type: CP14Workbench
    craftSound: "/Audio/Imperial/Medieval/blub3.ogg"
    recipes:
    - MedievalSoupResin
    - MedievalSoupYant
    - MedievalSoupRoot
    - MedievalSoupMushroom1

- type: entity
  parent: BaseItem
  id: MedievalSoupResin
  name: soup Resin
  description: Soup.
  components:
  - type: MyrmexStew
    buff:
      damage: 1.05
      health: 1.02
      stamina: 0.98
  - type: Sprite
    sprite: Imperial/Medieval/Myrmex/Soups/resinsoup.rsi
    state: icon
  - type: Item
    size: Normal

