- type: entity
  id: BaseMyrmexPipe
  abstract: true
  name: труба
  placement:
    mode: SnapgridCenter
  components:
    - type: Sprite
      sprite: Imperial/Medieval/Myrmex/Structures/pipes.rsi
      drawdepth: ThickPipe
    - type: Transform
      anchored: true
      noRot: false
    - type: InteractionOutline
    - type: Clickable
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.25,-0.5,0.25,0.5"
    - type: NodeContainer
      nodes:
        power:
          !type:MyrmexPipeNode
          nodeGroupID: HVPower
    - type: MyrmexPipe
      pipeType: Straight
    - type: Physics

- type: entity
  id: SteamMyrmexPipeStraight
  name: прямая паровая труба
  parent: BaseMyrmexPipe
  components:
    - type: Sprite
      state: pipe-s
      color: "#FFFFFF"
    - type: MyrmexPipe
      pipeType: Straight
    - type: NodeContainer
      nodes:
        power:
          !type:MyrmexPipeNode
          nodeGroupID: MVPower
    - type: Construction
      graph: SteamMyrmexPipeStraight
      node: steamMyrmexPipeStraight

- type: entity
  parent: SteamMyrmexPipeStraight
  id: SteamMyrmexPipeCorner
  name: угловая паровая труба
  components:
    - type: Sprite
      state: pipe-c
    - type: MyrmexPipe
      pipeType: Corner
    - type: Construction
      graph: SteamMyrmexPipeCorner
      node: steamMyrmexPipeCorner

