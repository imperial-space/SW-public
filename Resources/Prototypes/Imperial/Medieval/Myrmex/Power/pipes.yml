- type: entity
  parent: BaseMyrmexPipe
  id: MedievalMyrmexPipeValve
  name: труба с вентилем
  hideSpawnMenu: true
  components:
  - type: Sprite
    layers:
    - map: ["base"]
      state: pipe-s
      color: Red
      visible: true
    - map: ["closed"]
      state: pipe-s
      color: CadetBlue
      visible: false
  - type: GenericVisualizer
    visuals:
      enum.MyrmexValveVisuals.State:
        base:
          True:
            visible: true
          False:
            visible: false
        closed:
          True:
            visible: false
          False:
            visible: true
  - type: Appearance
  - type: MyrmexPipe
    pipeType: Straight
  - type: MyrmexValvePipe

- type: constructionGraph
  id: SteamMyrmexPipeStraight
  start: start
  graph:
  - node: start
    actions:
    - !type:DeleteEntity {}
    edges:
    - to: steamMyrmexPipeStraight
      completed:
      - !type:SnapToGrid
      steps:
      - tag: RootItem
        name: корень
        icon:
          sprite: Imperial/Medieval/Chem/Garden/root.rsi
          state: icon
        doAfter: 1
      - tag: RootItem
        name: корень
        icon:
          sprite: Imperial/Medieval/Chem/Garden/root.rsi
          state: icon
        doAfter: 1
  - node: steamMyrmexPipeStraight
