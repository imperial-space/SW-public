- type: entity
  id: MedievalMyrmexBaseSmall
  parent: MedievalBannerBase
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  abstract: true
  components:
  - type: Physics
    bodyType: Static
  - type: ReplaceFloorOnSpawn
    replaceableTiles:
    replacementTiles:
    - MedievalMyrmexFloor2
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
          params:
            volume: -8
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 190
        mask:
        - MachineMask
        layer:
        - Opaque
        - MidImpassable
        - HighImpassable
        - BulletImpassable

