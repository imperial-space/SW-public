- type: entity
  id: MedievalMyrmexSupportingColumn
  name: supporting column
  description: A primitive support column to protect against unexpected falling rocks on your head
  parent: MedievalMyrmexBaseSmall
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Myrmex/Structures/column.rsi
    state: icon
  - type: MyrmexProp
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
          params:
            volume: -8
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: MedievalMyrmexSupportingColumnCraft
    node: MedievalMyrmexSupportingColumnCraft

- type: construction
  id: MedievalMyrmexSupportingColumnCraft
  name: поддерживающая колонна мирмексов
  description: Примитивная поддерживающая колонна, защищающая от неожиданного падения камней на голову
  graph: MedievalMyrmexSupportingColumnCraft
  startNode: start
  targetNode: ready
  category: construction-category-machines
  icon:
    sprite: Imperial/Medieval/Myrmex/Structures/column.rsi
    state: icon
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  conditions:
  - !type:TileNotBlocked ""

- type: constructionGraph
  id: MedievalMyrmexSupportingColumnCraft
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: ready
          completed:
            - !type:SnapToGrid { }
          steps:
             - tag: RootItem
               name: корень # Imperial Recipes Locale
               icon:
                 sprite: Imperial/Medieval/Chem/Garden/root.rsi
                 state: icon
               doAfter: 1
    - node: ready
      entity: MedievalMyrmexSupportingColumn

