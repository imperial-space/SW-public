- type: Tag
  id: MyrmexPoisonImmune

- type: body
  name: "myrmex"
  id: Myrmex
  root: torso
  slots:
    head:
      part: HeadReptilian
      connections:
      - torso
      organs:
        brain: OrganHumanBrain
        eyes: OrganHumanEyes
    torso:
      part: TorsoReptilian
      organs:
        heart: OrganAnimalHeart
        lungs: OrganHumanLungs
        stomach: OrganReptilianStomach
        liver: OrganAnimalLiver
        kidneys: OrganHumanKidneys
      connections:
      - right hand
      - left hand
    right hand:
      part: RightHandReptilian
    left hand:
      part: LeftHandReptilian

