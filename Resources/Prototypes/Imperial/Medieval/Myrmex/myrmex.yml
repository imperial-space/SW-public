      behaviors:
      - !type:TriggerBehavior
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Armable
  - type: StepTrigger
    requiredTriggeredSpeed: 0
    stepOn: true
  placement:
    mode: SnapgridCenter

- type: entity
  parent: MedievalMyrmexTrapBase
  id: MedievalMyrmexTrapFull
  name: myrmex trap
  description: goal
  components:
  - type: Stealth
    maxVisibility: 0.33
    minVisibility: 0.33
    lastVisibility: 0.33
  - type: SmokeOnTrigger
    duration: 25 # Я ЕБНУТЫЙ, БЕГИТЕ
    spreadAmount: 30
    solution:
      reagents:
      - ReagentId: MedievalMyrmexPoison
        Quantity: 30
  - type: SpawnOnDespawn
    prototype: MedievalMyrmexTrapEmpty
  - type: Sprite
    drawdepth: Items
    sprite: /Textures/Imperial/Medieval/Myrmex/Structures/myrmex_trap.rsi
    layers:
    - state: trap
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/Imperial/Medieval/ant_trapreload.ogg
  - type: LandMine
    sound:
        path: /Audio/Imperial/Medieval/ant_stepontrap.ogg
        params:
            maxDistance: 10
  - type: DeleteOnTrigger

- type: entity
  parent: MedievalMyrmexTrapBase
  id: MedievalMyrmexTrapEmpty
  name: myrmex trap (empty)
  description: goal
  components:
  - type: Sprite
    drawdepth: Items
    sprite: /Textures/Imperial/Medieval/Myrmex/Structures/myrmex_trap.rsi
    layers:
    - state: trap-inactive
  - type: TimedDespawn
    lifetime: 60
  - type: Construction
    graph: MMyrmexTrapBase
    node: medievalMyrmexTrapBase
  - type: ReplaceFloorOnSpawn
    replaceableTiles:
    replacementTiles:
    - MedievalMyrmexFloor2
  - type: SpawnOnDespawn
    prototype: MedievalMyrmexTrapFull

