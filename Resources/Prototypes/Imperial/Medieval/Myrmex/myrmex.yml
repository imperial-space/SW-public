    - MedievalMyrmexFloor2

- type: entity
  id: MedievalMyrmexWeb
  name: myrmex web
  description: Sticky and slippy
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  components:
    - type: MeleeSound
      soundGroups:
        Brute:
          path:
            "/Audio/Weapons/slash.ogg"
    - type: Sprite
      sprite: /Textures/Imperial/Medieval/Myrmex/Structures/myrmex_web.rsi
      layers:
        - state: icon
          map: ["spiderWebLayer"]
      drawdepth: WallMountedItems
    - type: Appearance
    - type: Clickable
    - type: Transform
      anchored: true
    - type: Physics
    - type: Fixtures
      fixtures:
        fix1:
          hard: false
          density: 7
          shape:
            !type:PhysShapeAabb
            bounds: "-0.5,-0.5,0.5,0.5"
          layer:
          - MidImpassable
    - type: Damageable
      damageModifierSet: Wood
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 30
        behaviors:
        - !type:SpawnEntitiesBehavior
          spawn:
            MedievalMyrmexFibeStack1:
              min: 1
              max: 1
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - type: Temperature
      heatDamage:
        types:
          Heat: 5
      coldDamage: {}
      coldDamageThreshold: 0
    - type: Flammable
      fireSpread: true
      damage:
        types:
          Heat: 5
    - type: Reactive
      groups:
        Flammable: [Touch]
        Extinguish: [Touch]
    - type: SpiderWebObject
    - type: Construction
      graph: MMyrmexWeb
      node: medievalMyrmexWeb
    - type: ReplaceFloorOnSpawn
      replaceableTiles:
      replacementTiles:
      - MedievalMyrmexFloor2
    - type: SpeedModifierContacts
      walkSpeedModifier: 0.3
      sprintSpeedModifier: 0.3
      ignoreWhitelist:
        components:
            - IgnoreSpiderWeb

- type: reagent
  id: MedievalMyrmexPoison
  name: reagent-name-myrmex-poison
  desc: reagent-desc-myrmex-poison
  physicalDesc: reagent-physical-desc-soapy
  flavor: bitter
  color: "#ff7e00"
  metabolisms:
    Poison:
      effects:
      - !type:HealthChange
        conditions:
        - !type:HasTag
          tag: MyrmexPoisonImmune
          invert: true
        damage:
          types:
            Heat: 1
            Poison: 3.5

- type: entity
  id: MedievalMyrmexTrapBase
  abstract: true
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Pullable
  - type: MovedByPressure
  - type: Physics
    bodyType: Static
    fixedRotation: true
  - type: Fixtures
    fixtures:
      slips:
