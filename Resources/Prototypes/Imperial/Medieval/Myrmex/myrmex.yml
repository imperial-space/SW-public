# ===========================

- type: entity
  id: MedievalMyrmexDoor
  parent: BaseStructure
  name: myrmedon's door
  description: It opens, it closes, and maybe crushes you.
  components:
  - type: Airlock
    autoCloseDelay: 6.0
    denyAnimationTime: 0.4
    powered: true
  - type: DoorBolt
    #boltsDown: True
    boltUpSound:
      path: /Audio/Imperial/Medieval/resin_move1.ogg
    boltDownSound:
      path:/Audio/Imperial/Medieval/resin_move2.ogg
  - type: InteractionOutline
  - type: Sprite
    netsync: false
    sprite: Imperial/Medieval/Myrmex/Structures/Walls/myrmedon_door.rsi
    snapCardinals: true
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
    - state: closed_unlit
      shader: unshaded
      map: ["enum.DoorVisualLayers.BaseUnlit"]
      visible: false
    - state: welded
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: bolted_unlit
      shader: unshaded
      map: ["enum.DoorVisualLayers.BaseBolted"]
    - state: emergency_unlit
      map: ["enum.DoorVisualLayers.BaseEmergencyAccess"]
      shader: unshaded
    - state: panel_open
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
    - state: electrified_ai
      sprite: Interface/Misc/ai_hud.rsi
      shader: unshaded
      visible: false
      map: ["enum.ElectrifiedLayers.HUD"]
    - state: electrified
      sprite: Effects/electricity.rsi
      shader: unshaded
      visible: false
      map: ["enum.ElectrifiedLayers.Sparks"]
  - type: AnimationPlayer
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 100
        mask:
        - FullTileMask
        layer:
        - AirlockLayer
  - type: AccessReader
    access: [["Service"]]
  - type: LockDoor
    accessLists:
    - Service
  - type: Door
    performCollisionCheck: false
    bumpOpen: true
    clickOpen: true
    canCrush: false
    closeTimeOne: 0.2
    closeTimeTwo: 0.6
    openTimeOne: 0.6
    openTimeTwo: 0.2
    pryTime: 11
    openingAnimationTime: 1.2
    closingAnimationTime: 1.2
    openSound:
      path: /Audio/Imperial/Medieval/resin_move2.ogg
    closeSound:
      path: /Audio/Imperial/Medieval/resin_move1.ogg
    denySound:
      path: /Audio/Imperial/Medieval/resin_move1.ogg
  - type: Appearance
  - type: Airtight
    fixVacuum: true
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound: /Audio/Imperial/Medieval/resin_move2.ogg
  - type: IconSmooth
    key: walls
    mode: NoSprite
  - type: Construction
    graph: MMyrmexDoor
    node: medievalMyrmexDoor
  - type: ReplaceFloorOnSpawn
    replaceableTiles:
    replacementTiles:
    - MedievalMyrmexFloor2
  - type: Occluder
  placement:
    mode: SnapgridCenter

- type: entity
  parent: BaseWall
  id: MedievalMyrmexFlimsyWall
  name: myrmedon's flimsy wall
  components:
  - type: Tag
    tags:
      - Wall
      #- RCDDeconstructWhitelist
  - type: Sprite
    sprite: Imperial/Medieval/Myrmex/Structures/Walls/myrmex_flimsy_wall.rsi
  - type: Icon
    sprite: Imperial/Medieval/Myrmex/Structures/Walls/myrmex_flimsy_wall.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IconSmooth
    key: walls
    base: flimsy
  - type: ExplosionResistance
    damageCoefficient: 10
  - type: Construction
    graph: MMyrmexFlimsyWall
    node: medievalMyrmexFlimsyWall
  - type: ReplaceFloorOnSpawn
    replaceableTiles:
    replacementTiles:
    - MedievalMyrmexFloor2

- type: entity
  parent: BaseWall
  id: MedievalMyrmexStrongWall
  name: myrmedon's strong wall
  components:
  - type: Tag
    tags:
      - Wall
      #- RCDDeconstructWhitelist
  - type: Sprite
    sprite: Imperial/Medieval/Myrmex/Structures/Walls/myrmex_strong_wall.rsi
  - type: Icon
