- type: entity
  id: MedievalBarrierRiftBase
  parent: BaseStructure
  name: elemental rift
  description: A tear filled with elemental energy.
  components:
  - type: SpriteFade
  - type: Sprite
    drawdepth: Overdoors
    sprite: Imperial/Medieval/Decor/barrier_curse.rsi
    state: curse
  - type: FloatingVisuals
    offset: 0, 0.15
    animationTime: 2
    ignoreGravity: true
  - type: AmbientSound
    range: 5
    volume: -5
    sound:
      path: /Audio/Ambience/anomaly_drone.ogg
  - type: Physics
    bodyType: Static
    bodyStatus: InAir
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 190
        mask:
        - MachineMask
        layer:
        - Opaque
        - MidImpassable
        - HighImpassable
        - BulletImpassable

- type: entity
  id: MedievalBarrierRiftEarth
  parent: MedievalBarrierRiftBase
  name: earth rift
  components:
  - type: Sprite
    drawdepth: Overdoors
    sprite: Imperial/Medieval/Decor/barrier_rift_earth.rsi
    state: earth-rift
  - type: PointLight
    radius: 4.5
    energy: 15
    color: "#7B5E3B"
    castShadows: false
  - type: MagicBarrierRift
    element: earth
    guardianEntities:
    - MedievalMobWolf
    - MedievalMobWolf
    - MedievalMobWolf
    guardianOffsets:
    - 1,1
    - -1,1
    - -1,0

- type: entity
  id: MedievalBarrierRiftFire
  parent: MedievalBarrierRiftBase
  name: fire rift
  components:
  - type: Sprite
    drawdepth: Overdoors
    sprite: Imperial/Medieval/Decor/barrier_rift_fire.rsi
    state: fire-rift
  - type: PointLight
    radius: 4.5
    energy: 15
    color: orange
    castShadows: false
  - type: MagicBarrierRift
    element: fire
    guardianEntities:
    - MedievalMobSkeletHalberd
    guardianOffsets:
    - 0,0

- type: entity
  id: MedievalBarrierRiftWater
  parent: MedievalBarrierRiftBase
  name: water rift
  components:
