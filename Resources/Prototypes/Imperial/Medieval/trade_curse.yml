- type: alert
  id: TradeCurse
  icons:
  - sprite: /Textures/Imperial/Medieval/Misc/trade_curse.rsi
    state: 0
  - sprite: /Textures/Imperial/Medieval/Misc/trade_curse.rsi
    state: 1
  - sprite: /Textures/Imperial/Medieval/Misc/trade_curse.rsi
    state: 2
  - sprite: /Textures/Imperial/Medieval/Misc/trade_curse.rsi
    state: 3
  - sprite: /Textures/Imperial/Medieval/Misc/trade_curse.rsi
    state: 4
  - sprite: /Textures/Imperial/Medieval/Misc/trade_curse.rsi
    state: 5
  name: Проклятие
  description: Каждый торговец подписал контракт с дьяволом, чтобы получить доступ к торговой дыре, но в замен нужно регулярно посещать ее или пользоваться святой солью. Для использования святой солью возьмите ее в активную руку и кликните по себе ЛКМ.
  minSeverity: 0
  maxSeverity: 5

- type: alert
  id: BadSmell
  icons:
  - sprite: /Textures/Imperial/Medieval/Misc/bad_smell.rsi
    state: 0
  - sprite: /Textures/Imperial/Medieval/Misc/bad_smell.rsi
    state: 1
  - sprite: /Textures/Imperial/Medieval/Misc/bad_smell.rsi
    state: 2
  - sprite: /Textures/Imperial/Medieval/Misc/bad_smell.rsi
    state: 3
  - sprite: /Textures/Imperial/Medieval/Misc/bad_smell.rsi
    state: 4
  name: Вонь
  description: Чем выше уровень вони - тем больше возле вас будут летать мухи и тем больше вы будете вызывать осуждение у окружающих. Снизить уровень вони можно просто искупавшись в воде, но, аккуратно, не захотите глубоко! В воде можно утонуть. Обычная речная или морская вода не поможет вам отмыться до конца, посетите таверну.
  minSeverity: 0
  maxSeverity: 4

