- type: entity
  parent: MarkerBase
  id: AmbientLocationBase
  abstract: true
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
      - state: green
      - sprite: Objects/Fun/Instruments/guitar.rsi
        state: icon
  - type: LocationTrigger
    fixtureId: trigger-collision
  - type: Fixtures
    fixtures:
      trigger-collision:
        shape:
          !type:PhysShapeCircle
          radius: 3.5
        hard: false
        density: 0
        mask:
        - MobMask
        layer:
        - Impassable

- type: entity
  parent: AmbientLocationBase
  id: ImperialAmbient7orest
  name: Imperial Ambient Trigger 7
  description: Desc
  suffix: AUDIO TEST
  components:
  - type: LocationTrigger
    locationId: ambigen7_trigger
    sound:
      path: "/Audio/Ambience/ambigen7.ogg"

- type: entity
  parent: AmbientLocationBase
  id: ImperialAmbient8orest
  name: Imperial Ambient Trigger 8
  description: Desc
  suffix: AUDIO TEST
  components:
  - type: LocationTrigger
    locationId: ambigen8_trigger
    sound:
      path: "/Audio/Ambience/ambigen7.ogg"
    randomSounds:
      - path: "/Audio/Ambience/single/forest_day/crow3.ogg"
    minRandomInterval: 1
    maxRandomInterval: 2

