- type: entity
  parent: Smoke
  id: MedievalEmptySmoke
  name: smoke
  categories: [ HideSpawnMenu ]
  components:
  - type: SolutionContainerManager
    solutions:
      solutionArea:
        maxVol: 0
        canReact: false

- type: entity
  name: kotel
  description: Used to contain a large amount of chemicals or solutions.
  id: MedievalKotel
  parent: BaseItem
  components:
  - type: RDWeight
    value: 4
  - type: MeleeWeapon
    soundNoDamage:
      path: "/Audio/Effects/Fluids/splat.ogg"
    damage:
      types:
        Blunt: 0
  - type: MixableSolution
    solution: beaker
  - type: FitsInDispenser
    solution: beaker
  - type: RefillableSolution
    solution: beaker
  - type: DrainableSolution
    solution: beaker
  - type: ExaminableSolution
    solution: beaker
  - type: DrawableSolution
    solution: beaker
  - type: InjectableSolution
    solution: beaker
  - type: SolutionTransfer
    canChangeTransferAmount: true
  - type: SolutionItemStatus
    solution: beaker
  - type: UserInterface
    interfaces:
      enum.TransferAmountUiKey.Key:
        type: TransferAmountBoundUserInterface
  - type: Edible
    edible: Drink
    solution: beaker
    destroyOnEmpty: false
    utensil: None
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 5
  - type: DamageOnHighSpeedImpact
    minimumSpeed: 2
    damage:
      types:
        Blunt: 5
  - type: DnaSubstanceTrace
  - type: Spillable
    solution: beaker
  - type: Sprite
    sprite: Imperial/Medieval/Chem/kotel.rsi
    layers:
      - state: kotel
      - state: kotel1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    size: Normal
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 100
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 5
    fillBaseName: kotel
  - type: PhysicalComposition
    materialComposition:
      Glass: 100
  - type: StaticPrice
    price: 20


- type: entity
  id: MedievalFirePlate
  name: fireplate
  parent: BaseMachinePowered
  description: "The descendent of the microwaves, our newest invention in beaker heating technology: the hotplate!"
  components:
  - type: Transform
    anchored: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.08,-0.35,0.15,0.25"
        mask:
        - TabletopMachineMask
        layer:
        - Impassable
        - MidImpassable
        - LowImpassable
        hard: false
  - type: ApcPowerReceiver
    needsPower: false
  - type: Appearance
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: Sprite
    sprite: Imperial/Medieval/Chem/fireplate.rsi
    drawdepth: SmallObjects
    snapCardinals: true
    layers:
    - state: icon
    - state: on
      map: ["enum.SolutionHeaterVisuals.IsOn"]
      shader: unshaded
  - type: SolutionHeater
    heatPerSecond: 160
  - type: ItemPlacer
    whitelist:
      components:
      - FitsInDispenser
  - type: PlaceableSurface
    placeCentered: true
    positionOffset: 0, 0.35
  - type: GenericVisualizer
    visuals:
      enum.SolutionHeaterVisuals.IsOn:
        enum.SolutionHeaterVisuals.IsOn:
          True: { visible: true }
          False: { visible: false }


- type: entity
  name: MedievalLoot
  parent: BaseItem
  id: MedievalChemistryRecipe
  description: MedievalLoot
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Chem/recipe.rsi
    state: icon
  - type: Item
    size: Tiny
  - type: MedievalRandomChemistryRecipe
    weights:
      EasyPack: 70
      MediumPack: 30

- type: entity
  name: mortar
  parent: [ BaseItem, BaseStorageItem ]
  id: MedievalMortarNew
  description: Medieval Mortar for crushing herbs and other plant materials.
  components:
    - type: SolutionContainerManager
      solutions:
        beaker:
          maxVol: 150
    - type: Sprite
      sprite: Imperial/Medieval/Chem/mortar.rsi
      layers:
        - state: stupca
        - state: stupca1
          map: [ "enum.SolutionContainerLayers.Fill" ]
          visible: false
    - type: Item
      size: Normal
      sprite: Imperial/Medieval/Chem/mortar.rsi
    - type: MixableSolution
      solution: beaker
    - type: RefillableSolution
      solution: beaker
    - type: DrainableSolution
      solution: beaker
    - type: ExaminableSolution
      solution: beaker
    - type: DrawableSolution
      solution: beaker
    - type: InjectableSolution
      solution: beaker
    - type: SolutionTransfer
      canChangeTransferAmount: true
    - type: SolutionItemStatus
      solution: beaker
    - type: UserInterface
      interfaces:
        enum.TransferAmountUiKey.Key:
          type: TransferAmountBoundUserInterface
        enum.StorageUiKey.Key:
          type: StorageBoundUserInterface
    - type: Edible
      edible: Drink
      solution: beaker
      destroyOnEmpty: false
      utensil: None
    - type: Spillable
      solution: beaker
    - type: Appearance
    - type: SolutionContainerVisuals
      maxFillLevels: 3
      fillBaseName: stupca
    - type: StaticPrice
      price: 60
    - type: DnaSubstanceTrace
    - type: Mortar
    - type: Storage
      storageOpenSound: null
      storageInsertSound: null
      blacklist:
        components:
        - MortarTool
      grid:
      - 0,0,1,1
    - type: Construction
      graph: MedievalMortarNew
      node: ground

- type: entity
  name: mortar tool
  parent: BaseItem
  id: MedievalMortarTool
  description: Medieval Mortar Tool for crushing herbs and other plant materials.
  components:
    - type: Sprite
      sprite: Imperial/Medieval/Chem/mortartool.rsi
      layers:
        - state: icon
    - type: Item
      size: Tiny
      sprite: Imperial/Medieval/Chem/mortartool.rsi
    - type: MortarTool
    - type: Construction
      graph: MedievalMortarTool
      node: ground

- type: entity
  name: recipe book
  parent: BaseItem
  id: MedievalRecipeBook
  description: gooool
  components:
    - type: UserInterface
      interfaces:
        enum.RecipeBookUi.Key:
          type: PotionBookBoundUserInterface
    - type: ActivatableUI
      key: enum.RecipeBookUi.Key
    - type: MedievalRecipeBook
    - type: Sprite
      sprite: Imperial/Medieval/Chem/recipebook.rsi
      layers:
        - state: icon
    - type: Item
      size: Normal
      sprite: Imperial/Medieval/Chem/recipebook.rsi
