- type: entity
  id: Waystone
  name: Waystone
  description: WaystoneDesc
  parent: BaseStructure
  components:
  - type: SpriteFade
  - type: Sprite
    drawdepth: Overdoors
    offset: 0, -0.5
    sprite: Imperial/Medieval/Waystones/waystones.rsi
    state: teleportation_stone
  - type: Physics
    bodyType: Static
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 999999999
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 190
        mask:
        - MachineMask
        layer:
        - MobLayer
        - MidImpassable
        - LowImpassable
  - type: Waystone
  - type: UserInterface
    interfaces:
      enum.WaystoneUiKey.Key:
        type: WaystoneBoundUserInterface
      enum.WaystoneUiKey.AdminKey:
        type: WaystoneBoundUserInterfaceAdmin
  - type: InteractionOutline

- type: decal
  id: WaystoneRedCircle
  sprite:
    sprite: Imperial/Medieval/Waystones/waystones.rsi
    state: teleportation_stone_red

- type: decal
  id: WaystoneYellowCircle
  sprite:
    sprite: Imperial/Medieval/Waystones/waystones.rsi
    state: teleportation_stone_yellow

- type: decal
  id: WaystoneBlueCircle
  sprite:
    sprite: Imperial/Medieval/Waystones/waystones.rsi
    state: teleportation_stone_blue
