- type: entity
  parent: BaseActionPolymorph
  id: MedievalActionPolymorphIceDragon
  name: Dragon Polymorph
  description: Polymorphs you into a Dragon.
  components:
  - type: Action
    icon:
      sprite: /Textures/Imperial/Medieval/EventContent/Scarlatto/some.rsi
      state: polymorph
  - type: InstantAction
    event: !type:PolymorphActionEvent
      protoId: MedievalBossIceDragon

