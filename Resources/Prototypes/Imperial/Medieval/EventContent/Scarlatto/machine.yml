- type: entity
  parent: CP14BaseWorkbench
  id: MedievalSteelWorkbench
  name: foundry
  description: It produces sheets and ingots using ores.
  components:
  - type: Sprite
    sprite: /Textures/Imperial/Medieval/EventContent/Scarlatto/some.rsi
    state: craft
  - type: Appearance
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 180
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Transform
    anchored: true
  - type: Pullable
  - type: CP14Workbench
    craftSpeed: 1
    craftSound: "/Audio/Items/welder2.ogg"
    recipes:
    - SheetGlass10
    - SheetSteel10
    - PartRodMetal5
    - SheetRGlass10
    - SheetRPGlass10
    - SheetUGlass10
    - SheetRUGlass10
    - MedievalWindowCraft
    - MedievalArmWindowCraft
    - MedievalGrilleCraft
    - MedievalComputerFrameCraft
    - MedievalUnfinishedMachineFrameCraft
    - MedievalCombatKnife
    - MedievalTruncheon
    - MedievalClothingOuterArmorStandard
