- type: entity
  parent: BaseStructure
  id: ScarlattoPlatform
  components:
  - type: Sprite
    sprite: Imperial/Medieval/EventContent/Scarlatto/platform.rsi
    state: platform
  - type: Icon
    sprite: Imperial/Medieval/EventContent/Scarlatto/platform.rsi
    state: platform
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.25"
        density: 1000
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          PartRodMetal1:
            min: 0
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: Railing
    node: railing
  - type: Physics
    bodyType: Static
  - type: InteractionOutline
  - type: Repairable
  - type: Climbable
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: FlimsyMetallic

- type: entity
