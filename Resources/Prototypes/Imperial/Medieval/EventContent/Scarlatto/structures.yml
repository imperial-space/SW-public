- type: entity
  parent: WallShuttle
  id: WallShuttleStarCorps
  name: starcorps wall
  suffix: Felix
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5000
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
  - type: Sprite
    sprite: /Textures/Imperial/Medieval/EventContent/Scarlatto/Walls/shuttle.rsi
  - type: Icon
    sprite: /Textures/Imperial/Medieval/EventContent/Scarlatto/Walls/shuttle.rsi

