- type: entity
  parent: BaseWeaponSniper
  id: MedievalCarabine
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Event/Weapons/gun/carabine.rsi
  - type: Item
    size: Ginormous
  - type: Clothing
    sprite: Imperial/Medieval/Event/Weapons/gun/carabine.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: AmmoCounter
  - type: Gun
    fireRate: 0.75
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Imperial/Medieval/Event/fire1.ogg
    minAngle: 25
    maxAngle: 25
    angleDecay: 0
    angleIncrease: 0
  - type: BallisticAmmoProvider
    soundRack:
      path: /Audio/Imperial/Medieval/Event/hammer.ogg
    soundInsert:
      path: /Audio/Imperial/Medieval/Event/powder.ogg
    cartridgeFillDelay: 8
    capacity: 1
    proto: MedievalPowderCartridge
    whitelist:
      tags:
       - Cartridge
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []
  - type: Wieldable
    unwieldOnUse: true
  - type: GunRequiresWield
  - type: UseDelayOnShoot
  - type: UseDelay
    delay: 4
  - type: GunWieldBonus
    minAngle: 0
    maxAngle: 0
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 5

