- type: entity
  id: MedievalPowderCartridge
  parent: BaseCartridgeCaselessRifle
  components:
  - type: Tag
    tags:
      - Cartridge
  - type: CartridgeAmmo
    proto: MedievalBullet
  - type: Sprite
    sprite: Imperial/Medieval/Event/Weapons/ammo.rsi
    layers:
      - state: paper_patron
        map: ["enum.AmmoVisualLayers.Base"]

- type: entity
  id: MedievalBullet
  parent: BaseBullet
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 80
    soundHit:
      path: /Audio/Weapons/Guns/Hits/snap.ogg
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    state: buckshot
  - type: TimedDespawn
    lifetime: 2.5

- type: entity
  id: MedievalPowderCartridgePistole
  parent: BaseCartridgeCaselessRifle
  components:
  - type: Tag
    tags:
      - CartridgeMagnum
  - type: CartridgeAmmo
    proto: MedievalBulletPistole
  - type: Sprite
    sprite: Imperial/Medieval/Event/Weapons/ammo.rsi
    layers:
      - state: paper_patron_pistol
        map: ["enum.AmmoVisualLayers.Base"]

- type: entity
  id: MedievalBulletPistole
  parent: BaseBullet
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 80
    soundHit:
      path: /Audio/Weapons/Guns/Hits/snap.ogg
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    state: buckshot
  - type: TimedDespawn
    lifetime: 0.5
