# ИМПЕРИЯ - ГОТОВЫЕ ПЕРСОНАЖИ

- type: entity
  parent: BaseMobSpeciesOrganic
  id: MobImperialOfficer
  name: Офицер Империи
  suffix: Империя, Ивент
  components:
  - type: Loadout
    prototypes:
      - ImperialOfficer
  - type: GhostRole
    name: Офицер Империи
    description: Командуйте войсками Империи на поле боя.
    rules: >-
      Вы — офицер Великой Империи Териона.
      Ваша задача — командовать войсками Империи.
    raffle:
      settings: default
  - type: GhostTakeoverAvailable
  - type: TakeName

- type: entity
  parent: BaseMobSpeciesOrganic
  id: MobImperialUnterofficer
  name: Унтер-офицер Империи
  suffix: Империя, Ивент
  components:
  - type: Loadout
    prototypes:
      - ImperialUnterofficer
  - type: GhostRole
    name: Унтер-офицер Империи
    description: Помогайте офицерам командовать и следите за порядком.
    rules: >-
      Вы — унтер-офицер Великой Империи Териона.
      Ваша задача — помогать офицерам командовать, следить за дисциплиной и вести солдат в бой.
    raffle:
      settings: default
  - type: GhostTakeoverAvailable
  - type: TakeName

- type: entity
  parent: BaseMobSpeciesOrganic
  id: MobImperialSeniorArtillery
  name: Старший канонир Империи
