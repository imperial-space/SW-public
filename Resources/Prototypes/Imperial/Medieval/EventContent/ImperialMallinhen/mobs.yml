      - ImperialSeniorArtillery
  - type: GhostRole
    name: Старший канонир Империи
    description: Управляйте артиллерией и корректируйте огонь.
    rules: >-
      Вы — старший канонир Великой Империи Териона.
      Ваша задача — управлять артиллерийскими орудиями и корректировать огонь.
    raffle:
      settings: default
  - type: GhostTakeoverAvailable
  - type: TakeName

