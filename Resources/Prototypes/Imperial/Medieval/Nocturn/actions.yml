- type: entity
  id: NocturnDrinkAction
  name: infection
  description: drink blood
  noSpawn: true
  components:
    - type: Action
      itemIconStyle: BigAction
      useDelay: 2.2
      icon:
        sprite: /Textures/Imperial/Medieval/Vampire/actions.rsi
        state: drink
    - type: TargetAction
      interactOnMiss: false
      targetingIndicator: true
      deselectOnMiss: true
      repeat: false
      checkCanAccess: false
    - type: EntityTargetAction
      canTargetSelf: false
      whitelist:
        components:
          - HumanoidAppearance
          - NocturnBadFood
      event: !type:NocturnDrinkActionEvent

- type: entity
  id: NocturnDisguiseAction
  name: Apply a disguise
  description: Use a disguise to take on a human form. If there is a lack of blood, the ability will become unavailable.
  components:
    - type: Action
      itemIconStyle: BigAction
      icon:
        sprite: /Textures/Imperial/Medieval/Vampire/actions.rsi
        state: disguise_off
      iconOn:
        sprite: /Textures/Imperial/Medieval/Vampire/actions.rsi
        state: disguise_on
      useDelay: 30
    - type: InstantAction
      event: !type:NocturnDisguiseActionEvent

