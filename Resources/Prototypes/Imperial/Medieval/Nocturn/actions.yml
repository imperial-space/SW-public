  name: Уровень крови
  description: Шкала, примерно отображающая ваш голод. Если запас крови близок к нулю, идет слабый урон. Если кровь на нуле - сильный урон. Если запас больше половины и полученый урон меньше 70, то идет постепенная слабая регенерация, расход увеличивается в 3 раза. Если запас больше половины и полученый урон от 70 до 100, то регенерация увеличивается в 3 раза, а расход крови в 40 раз.
  minSeverity: 0
  maxSeverity: 18

