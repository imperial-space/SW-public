- type: entity
  id: OrganOrcHeart
  parent: OrganHumanHeart
  name: Orc heart
  components:
  - type: Metabolizer
    metabolizerTypes: [Orc]

- type: entity
  id: OrganOrcLiver
  parent: OrganHumanLiver
  name: Orc liver
  components:
  - type: Metabolizer
    metabolizerTypes: [Orc]

- type: entity
  id: OrganOrcStomach
  parent: OrganHumanStomach
  name: Orc stomach
  components:
  - type: Sprite
    state: stomach
  - type: Organ
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 75
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Stomach
  - type: Metabolizer
    # mm very yummy
    maxReagents: 5
    metabolizerTypes: [Orc]

- type: body
  id: Orc
  name: "Orc"
  root: torso
  slots:
    head:
      part: HeadOrc
      connections:
      - torso
      organs:
        brain: OrganHumanBrain
        eyes: OrganHumanEyes
    torso:
      part: TorsoOrc
      connections:
      - right arm
      - left arm
      - right leg
      - left leg
      organs:
        heart: OrganOrcHeart
        lungs: OrganHumanLungs
        stomach: OrganReptilianStomach
        liver: OrganOrcLiver
        kidneys: OrganHumanKidneys
    right arm:
      part: RightArmOrc
      connections:
      - right hand
    left arm:
      part: LeftArmOrc
      connections:
      - left hand
    right hand:
      part: RightHandOrc
    left hand:
      part: LeftHandOrc
    right leg:
      part: RightLegOrc
      connections:
      - right foot
    left leg:
      part: LeftLegOrc
      connections:
      - left foot
    right foot:
      part: RightFootOrc
    left foot:
      part: LeftFootOrc

- type: metabolizerType
  id: Orc
  name: Orc

- type: entity
  save: false
  name: Урист МакОрк
  parent: BaseMobOrc
  id: MobOrc

- type: entity
  save: false
  name: Urist McHands The Orc
  parent: BaseMobSpeciesOrganic
  id: BaseMobOrc
  abstract: true
  components:
  - type: Hunger
  - type: Thirst
  - type: Icon
    sprite: Mobs/Species/Slime/parts.rsi # It was like this beforehand, no idea why.
    state: full
  - type: Respirator
    damage:
      types:
        Asphyxiation: 0.8
    damageRecovery:
      types:
        Asphyxiation: -1
  - type: Sprite
    noRot: true
    drawdepth: Mobs
  - type: Body
    prototype: Orc
    requiredLegs: 2
  - type: LanguageSpeaker
    languages:
      Common: Speak
      #Goblin: Speak
      #Ancient: Speak
      Tribe: Understand
      Orc: Speak
      #Cursed: Speak
      #Growling: Speak
      #Hissing: Speak
      #Elf: Speak
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 6
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.4
        # they r smaller
        density: 150
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
      medieval-spawner: # imperial medieval start
        shape: !type:PhysShapeCircle
          radius: 0.4
        layer: []
        #layer:
        #- DoorPassable
        mask:
        - MedievalSpawnerLayer
        hard: false # imperial medieval end
  - type: Vocal
    sounds:
      Male: MaleOrc
      Female: FemaleOrc
      Unsexed: MaleOrc
  - type: Speech
    speechSounds: Alto
  - type: HumanoidAppearance
    species: Orc
  - type: Mana
    maxManaRaceModifier: 0
    regenRaceModifier: 0
  - type: OrcAccent
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Imperial/Medieval/Species/Orc/displacement.rsi
            state: jumpsuit-female
  - type: MobThresholds
    thresholds:
      0: Alive
      130: Critical
      220: Dead
  - type: MeleeWeapon
    attackRate: 0.8
    damage:
      types:
        Blunt: 8
  - type: NeedSleep
    sleepLevelPerUpdate: 0.35
  - type: BadSmellRaceModifier
    modifier: 1.15
  - type: Bloodstream
    bloodReagent: OrcBlood

- type: entity
  parent: BaseMobOrc
  id: MobOrcDummy
  noSpawn: true
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Imperial/Medieval/Species/Orc/displacement.rsi
            state: jumpsuit-female

- type: species
  id: Orc
  name: Орк
  roundStart: true
  prototype: MobOrc
  sprites: MobOrcSprites
  markingLimits: MobHumanMarkingLimits
  dollPrototype: MobOrcDummy
  skinColoration: OrcColors

