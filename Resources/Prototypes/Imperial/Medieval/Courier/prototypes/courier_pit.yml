- type: entity
  id: medievalCourierHole
  name: courier pit
  description: A magical pit for receiving courier parcels and salary.
  suffix: Empty
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Misc/mdv_shop.rsi
    layers:
    - state: shop
    netsync: false
  - type: UserInterface
    interfaces:
      enum.courierUiKey.key:
        type: courierBoundUserInterface
  - type: ActivatableUI
    singleUser: true
    key: enum.courierUiKey.key
  - type: courierPitComponent
    guildName: courier-ui-guild-name
    mailLootTable: MailLootTable
    boxMailLootTable: BoxMailLootTable
    minDeliveryPointsReward: 3
    maxDeliveryPointsReward: 4
    minBalanceReward: 30
    maxBalanceReward: 40
    urgentBalanceRewardMultiplier: 3
    boxBalanceRewardMultiplier: 9
    minUrgentMinutes: 30
    maxUrgentMinutes: 40
    offers:
    - productEntity: CourierLetter
      freeMailsCost: 1
      descriptionLoc: courier-ui-offer-free-mail
    - productEntity: CourierLetter
      deliveryPointsCost: 2
      descriptionLoc: courier-ui-offer-reputation-mail
    - productEntity: CourierUrgentLetter
      deliveryPointsCost: 5
      descriptionLoc: courier-ui-offer-urgent-mail
    - productEntity: BoxLetter
      deliveryPointsCost: 15
      balanceCost: 50
      descriptionLoc: courier-ui-offer-box-mail
  - type: TrashDefendArea
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 60
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: Tag
    tags:
      - Structure
  - type: PointLight

