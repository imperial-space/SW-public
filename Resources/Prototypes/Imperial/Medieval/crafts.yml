  startNode: start
  targetNode: MedievalCampfireCraft
  category: construction-category-furniture
  icon:
    sprite: Imperial/Medieval/CraftBosses/stockade.rsi
    state: icon
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  conditions:
  - !type:TileNotBlocked ""

- type: constructionGraph
  id: MedievalCampfireCraft
  start: start
  graph:
  - node: start
    actions:
    - !type:DestroyEntity {}
    edges:
    - to: MedievalCampfireCraft
      completed:
      - !type:SnapToGrid {}
      steps:
      - material: WoodPlank
        amount: 18
        doAfter: 3
  - node: MedievalCampfireCraft
    entity: MedievalCampfireCraft
    edges:
    - to: start
      completed:
      - !type:SpawnPrototype
        prototype: MaterialWoodPlank
        amount: 12
      steps:
      - tool: Prying
        doAfter: 1
  #- type: Damageable
  #- type: Anchorable

