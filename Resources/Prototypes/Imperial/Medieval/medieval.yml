    energy: 5.0
    netsync: false
  - type: IgnitionSource
    temperature: 400
    ignited: false
  - type: LightBehaviour
    behaviours:
      - !type:RandomizeBehaviour # immediately make it bright and flickery
        id: turn_on
        interpolate: Nearest
        minDuration: 0.02
        maxDuration: 0.06
        startValue: 6.0
        endValue: 9.0
        property: Energy
        isLooped: true
      - !type:FadeBehaviour # have the radius start small and get larger as it starts to burn
        id: turn_on
        maxDuration: 8.0
        startValue: 1.0
        endValue: 6.0
      - !type:RandomizeBehaviour # weaker flicker as it fades out
        id: fade_out
        interpolate: Nearest
        minDuration: 0.02
        maxDuration: 0.06
        startValue: 4.0
        endValue: 8.0
        property: Energy
        isLooped: true
      - !type:FadeBehaviour # fade out radius as it burns out
        id: fade_out
        maxDuration: 4.0
        startValue: 6.0
        endValue: 1.0
  - type: Tag
    tags:
    - Torch
  - type: Construction
    graph: MedievalTorch
    node: ground

