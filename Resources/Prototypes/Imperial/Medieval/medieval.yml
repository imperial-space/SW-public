- type: entity
  parent: BaseWall
  id: MedievalStoneBrickWall
  name: stone wall
  components:
  - type: Tag
    tags:
      - Wall
      #- RCDDeconstructWhitelist
  - type: Sprite
    sprite: Imperial/Medieval/Walls/stone_brick.rsi
  - type: Icon
    sprite: Imperial/Medieval/Walls/stone_brick.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 2900
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IconSmooth
    key: walls
    base: brick
  - type: ExplosionResistance
    damageCoefficient: 19

- type: entity
  parent: BarricadeMedieval
  id: MedievalStockade
  name: MedievalStockade
  components:
  - type: Tag
    tags:
      - Wall
      #- RCDDeconstructWhitelist
  - type: Sprite
    sprite: Imperial/Medieval/Walls/wood_wall_light.rsi
    state: wall0
    drawdepth: Walls
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 195
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound: /Audio/Imperial/Medieval/ES_Wood_Break_8_-_SFX_Producer.ogg
  - type: ExplosionResistance
    damageCoefficient: 3
  - type: Appearance
  - type: CableVis
    node: power
  - type: NodeContainer
    nodes:
      power:
        !type:CableNode
        nodeGroupID: MVPower
  - type: CableVisualizer
    statePrefix: wall
  - type: Transform
    anchored: true
    noRot: true
  - type: Climbable
    delay: 22
  - type: Construction
    graph: MedievalStockade
    node: medievalstockade

- type: construction
  id: MedievalStockade
  name: деревянный частокол
  description: На случай, если на стену из дерева не хватает.
  graph: MedievalStockade
  startNode: start
  targetNode: medievalstockade
  category: construction-category-furniture
  icon:
    sprite: Imperial/Medieval/Walls/wood_wall_light.rsi
    state: wall0
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  conditions:
    - !type:TileNotBlocked

- type: constructionGraph
  id: MedievalStockade
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: medievalstockade
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 6
              doAfter: 6
    - node: medievalstockade
      entity: MedievalStockade
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank
              amount: 6
          steps:
            - tool: Prying
              doAfter: 500

- type: entity
  id: MedievalStockadeHigh
  name: MedievalStockadeHigh
  parent: BaseWall
  components:
  - type: Tag
    tags:
      - Wall
  - type: Sprite
    sprite: Imperial/Medieval/Walls/wood_wall_new.rsi
  - type: Icon
    sprite: Imperial/Medieval/Walls/wood_wall_new.rsi
