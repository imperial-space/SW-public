  - type: InteractionOutline
  - type: Sprite
    sprite: Imperial/Medieval/Misc/gussarflag.rsi
    state: icon
    drawdepth: Overdoors
    noRot: true
    offset: 0,0.8
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.4,0.2,0.1"
        density: 1000
        layer:
        - WallLayer
  - type: Damageable
    damageModifierSet: Wood
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 3
            max: 3
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

