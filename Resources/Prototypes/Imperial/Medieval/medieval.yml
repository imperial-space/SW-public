- type: entity
  id: MedievalWaterGenerator
  description: A high efficiency water generator.
  name: water generator
#  parent: [ BaseGenerator, ConstructibleMachine ]
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: PowerSupplier
    supplyRate: 5000
  - type: Sprite
    sprite: Imperial/Medieval/Decor/water.rsi
    state: portgen0_1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/metalbreak.ogg
  - type: Clickable
  - type: InteractionOutline
  - type: Transform
    anchored: true
  - type: Appearance
  - type: Battery
    maxCharge: 500000000
    startingCharge: 500000000
  - type: NodeContainer
    examinable: true
    nodes:
      input:
        !type:CableDeviceNode
        nodeGroupID: MVPower
      output:
        !type:CableDeviceNode
        nodeGroupID: Apc
  - type: Apc
    voltage: Apc
  - type: PowerProvider
    voltage: Apc
  - type: BatteryCharger
    voltage: Medium
  - type: ExtensionCableProvider
#    receptionRange: 7
  - type: PowerNetworkBattery
    maxSupply: 10000
    maxChargeRate: 5000
    supplyRampTolerance: 1000
    supplyRampRate: 500
  - type: StationInfiniteBatteryTarget
  - type: UserInterface
    interfaces:
      enum.ApcUiKey.Key:
        type: ApcBoundUserInterface
  - type: Physics
    bodyType: Dynamic
  - type: Anchorable
  - type: Damageable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 50
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Pullable

