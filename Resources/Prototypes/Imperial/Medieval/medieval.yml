    key: walls # imperial medieval
    base: wood
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 445
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound: /Audio/Imperial/Medieval/ES_Wood_Break_8_-_SFX_Producer.ogg
          - !type:SpawnEntitiesBehavior
            offset: 0.3
            spawn:
              MaterialWoodPlank1:
                min: 3
                max: 6
  - type: ExplosionResistance
