- type: entity
  id: MedievalFactionCommsObelisk
  parent: BaseStructure
  abstract: true
  suffix: medieval
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Earth/Obelisk/spellward.rsi
    layers:
    - state: state-0
      map: ["base"]
  - type: CommsCharger
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 1000
        mask:
        - FullTileMask
        layer:
        - Impassable
        - HighImpassable
        - MidImpassable
        - LowImpassable
        - BulletImpassable
        - InteractImpassable
  - type: ObeliskDestroyable
    baseLayerStates:
    - state-0
    - state-1
    - state-2
    outerLayerState: legion
    destroyedEffect: MedievalSkeletDespawnEffect
    phases:
    - threshold: 2000
      announcement: damaged
    - threshold: 2000
      announcement: critical
    - threshold: 2000
      announcement: destroyed
      destroyOnReached: true

- type: entity
  id: MedievalFactionCommsObeliskLegion
  parent: MedievalFactionCommsObelisk
  suffix: medieval
  components:
  - type: CommsCharger
    faction: "leg"
  - type: ObeliskDestroyable
    faction: Legion
    lockedDepartment: Legion
    announcementLocPrefix: obelisk-destructable-legion-phase
    announcementColor: "#4F8FBA"
    outerLayerState: legion

