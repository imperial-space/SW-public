- type: entity
  id: MedievalCultConductorRod
  parent: BaseItem
  name: Кровавый стержень
  description: Железный стержень выглядящий более кроваво
  components:
    - type: Sprite
      sprite: Imperial/Medieval/Materials/cult.rsi
      state: rod
    - type: Tag
      tags:
        - CultConductorRod
    - type: Meltable
      resourceCount: 2
      resourceName: MedievalBloodIronIngot

- type: entity
  id: MedievalCultConductorRodIron
  parent: BaseItem
  name: Железный стержень
  description: Железно выглядит
  components:
    - type: Sprite
      sprite: Imperial/Medieval/Materials/cult.rsi
      state: rod_iron
    - type: Tag
      tags:
        - CultConductorRod
    - type: BloodMaterial

- type: entity
  id: CultCraftAnimate
  components:
    - type: Sprite
      sprite: Imperial/Medieval/Cult/animations/craft.rsi
      state: main