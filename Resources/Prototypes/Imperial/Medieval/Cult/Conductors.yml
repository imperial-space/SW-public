- type: entity
  id: MedievalCultConductor
  parent: BaseItem
  name: Связка
  description: Связка из ткани и кожи
  components:
    - type: Sprite
      sprite: Imperial/Medieval/Materials/cult.rsi
      state: cult_rod
    - type: Tag
      tags:
        - CultConductor
    - type: Butcherable
      spawned:
        - id: MedievalLeather1
          amount: 10
        - id: MaterialCloth1
          amount: 10
    - type: ContainerContainer
      containers:
        Conductor1: !type:ContainerSlot
        Conductor2: !type:ContainerSlot
        Conductor3: !type:ContainerSlot
        Conductor4: !type:ContainerSlot
        Conductor5: !type:ContainerSlot
    - type: ItemSlots
      slots:
        Conductor1:
          name: Первый стержень
          priority: 2
          ejectOnBreak: true
          whitelist:
            tags:
              - CultConductorRod
        Conductor2:
          name: Второй стержень
          priority: 2
          ejectOnBreak: true
          whitelist:
            tags:
              - CultConductorRod
        Conductor3:
          name: Третий стержень
          priority: 2
          ejectOnBreak: true
          whitelist:
            tags:
              - CultConductorRod
        Conductor4:
          name: Четвёртый стержень
          priority: 2
          ejectOnBreak: true
          whitelist:
            tags:
              - CultConductorRod
        Conductor5:
          name: Пятый стержень
          priority: 2
          ejectOnBreak: true
          whitelist:
            tags:
              - CultConductorRod
    - type: BloodMaterial

