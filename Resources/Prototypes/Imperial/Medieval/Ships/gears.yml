- type: entity
  id: WaterPump
  name: Водная помпа
  parent: WoodenSupportWall
  components:
  - type: WaterPump

- type: entity
  id: SteeringOar
  name: Рулевое весло
  description: Рулевое весло что используется для поворота лодки
  parent: WoodenSupportWall
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Ships/SteeringOar.rsi
    state: base
  - type: SteeringOar

- type: entity
