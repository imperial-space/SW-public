- type: entity
  id: WaterPump
  name: Водная помпа
  parent: WoodenSupportWall
  components:
  - type: WaterPump

- type: entity
  id: SteeringOar
  name: Рулевое весло
  description: Рулевое весло что используется для поворота лодки
  parent: WoodenSupportWall
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Ships/SteeringOar.rsi
    state: base
  - type: SteeringOar

- type: entity
  id: MedievalAnchorUp
  name: якорь
  description: Штука что не даёт двигатся лодке
  parent: WoodenSupportWall
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Ships/Anchor.rsi
    state: up
  - type: MedievalAnchor
    Enabled: false

- type: entity
  id: MedievalAnchorDown
  parent: MedievalAnchorUp
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Ships/Anchor.rsi
    state: down
  - type: MedievalAnchor
    Enabled: true

- type: entity
  id: MedievalSteeringWheel
  name: Steering wheel
  parent: WoodenSupportWall
  description: Hold on tight, sailors! We're going to make a sharp turn! Grrrr!
  components:
    - type: Sprite
      sprite: Imperial/Medieval/Decor/steeringwheel.rsi
      state: wheel
    - type: Helm
    - type: Rotatable
      RotateWhileAnchored: true
      Increment: 5