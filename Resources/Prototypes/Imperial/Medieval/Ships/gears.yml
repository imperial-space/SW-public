- type: entity
  id: MedievalAnchorUp
  name: якорь
  description: Старое, но надежное железо для фиксации корабля.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Sprite
    sprite: Imperial/Medieval/Ships/Anchor.rsi
    layers:
    - state: up
      map: ["base"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.MedievalAnchorVisuals.Enabled:
        base:
          True: {state: down}
          False: {state: up}
  - type: MedievalAnchor
    Enabled: false

- type: entity
  id: WaterPump
  name: водяная помпа
  description: используйте это, чтобы выкачать воду прочь из вашего корабля
  parent: WoodenSupportWall
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Ships/WaterPump.rsi
    state: icon
  - type: WaterPump

- type: entity
  id: SteeringOar
  name: рулевое весло
  description: Рулевое весло, помогающее держать курс корабля.
  parent: WoodenSupportWall
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Ships/SteeringOar.rsi
    state: base
  - type: SteeringOar

- type: entity
  id: MedievalSteeringWheel
  name: Steering wheel
  parent: WoodenSupportWall
  description: Hold on tight, sailors! We're going to make a sharp turn! Grrrr!
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Ships/SteeringWheel.rsi
    state: wheel
  - type: Helm

- type: entity
  id: MedievalCompass
  name: compass
  description: A compass whose needle always points north.
  parent: BaseItem
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Ships/Compass/medieval_compass.rsi
    layers:
    - state: compass-n
      map: ["enum.MedievalCompassLayers.Base"]
  - type: Icon
    sprite: Imperial/Medieval/Ships/Compass/medieval_compass.rsi
    state: compass-n
  - type: Item
    sprite: Objects/Devices/pinpointer.rsi
    inhandVisuals:
      left:
      - state: inhand-left-base
        color: "#606060"
      - state: inhand-left-stripe
        color: "#606060"
      - state: inhand-left-top
      right:
      - state: inhand-right-base
        color: "#606060"
      - state: inhand-right-stripe
        color: "#606060"
      - state: inhand-right-top
  - type: MedievalCompass
