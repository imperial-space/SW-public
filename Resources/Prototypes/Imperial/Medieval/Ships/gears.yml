- type: entity
  id: MedievalAnchorUp
  name: якорь
  description: Старое, но надежное железо для фиксации корабля.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Sprite
    sprite: Imperial/Medieval/Ships/Anchor.rsi
    layers:
    - state: up
      map: ["enum.MedievalAnchorVisualLayers.Base"]
  - type: Appearance
  - type: MedievalAnchor
    Enabled: false

- type: entity
  id: WaterPump
  name: водяная помпа
  description: используйте это, чтобы выкачать воду прочь из вашего корабля
  parent: WoodenSupportWall
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Ships/WaterPump.rsi
    state: icon
  - type: WaterPump

- type: entity
  id: SteeringOar
  name: рулевое весло
  description: Рулевое весло, помогающее держать курс корабля.
  parent: WoodenSupportWall
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Ships/SteeringOar.rsi
    state: base
  - type: SteeringOar

- type: entity
  id: MedievalSteeringWheel
  name: Steering wheel
  parent: WoodenSupportWall
  description: Hold on tight, sailors! We're going to make a sharp turn! Grrrr!
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Ships/SteeringWheel.rsi
    state: wheel
  - type: Helm
