# Blood

- type: reagent
  id: DrouBlood
  parent: Blood
  name: reagent-name-drou-blood
  slipData: null
  desc: reagent-desc-drou-blood
  evaporationSpeed: 0.3
  absorbent: true
  physicalDesc: reagent-physical-desc-drou-blood
  color: "#02000f"
  flavor: droublood

- type: flavor
  id: droublood
  flavorType: Complex
  description: flavor-complex-drou-blood

- type: entity
  id: PartDrou
  parent: [BaseItem, BasePart]
  name: Часть от ноктюрна
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: DrouBlood
        Quantity: 10

- type: entity
  id: TorsoDrou
  name: Туловище ноктюрна
