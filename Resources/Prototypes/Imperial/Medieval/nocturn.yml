  components:
  - type: Sprite
    sprite: Imperial/Medieval/Species/Drou/parts.rsi
    state: "torso_m"
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: DrouBlood
        Quantity: 20

- type: entity
  id: HeadDrou
