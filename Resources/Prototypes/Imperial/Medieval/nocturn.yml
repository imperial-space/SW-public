#2
- type: damageModifierSet
  id: Drou
  coefficients:
    Poison: 0.7

- type: body
  name: Ноктюрн
  id: Drou
  root: torso
  slots:
    head:
      part: HeadDrou
      connections:
      - torso
      organs:
        brain: OrganHumanBrain
        eyes: OrganHumanEyes
    torso:
      part: TorsoDrou
      organs:
        heart: OrganArachnidHeart
        lungs: OrganHumanLungs
        stomach: OrganAnimalStomach
        liver: OrganAnimalLiver
        kidneys: OrganHumanKidneys
      connections:
      - right arm
      - left arm
      - right leg
      - left leg
    right arm:
      part: RightArmDrou
      connections:
      - right hand
    left arm:
      part: LeftArmDrou
      connections:
      - left hand
    right hand:
      part: RightHandDrou
    left hand:
      part: LeftHandDrou
    right leg:
      part: RightLegDrou
      connections:
      - right foot
    left leg:
      part: LeftLegDrou
      connections:
      - left foot
    right foot:
      part: RightFootDrou
    left foot:
      part: LeftFootDrou

# 3

- type: typingIndicator
  id: drou
  typingState: drou
  idleState: drou
  offset: 0, 0.0625

- type: entity
  save: false
  name: Урист Ноктюрн'Хендс
  parent: BaseMobSpeciesOrganic
  id: BaseMobDrou
  abstract: true
  components:
  - type: HumanoidAppearance
    species: Drou
    hideLayersOnEquip:
    - Hair
    - Snout
  - type: Hunger
    baseDecayRate: 0
    actualDecayRate: 0
  - type: Puller
    #needsHands: false
  - type: Thirst
    baseDecayRate: 0
    actualDecayRate: 0
  - type: Icon
    sprite: Imperial/Medieval/Species/Drou/parts.rsi
    state: full
  - type: Body
    prototype: Drou
    requiredLegs: 2
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatLizard
      amount: 5
  - type: Speech
  - type: TypingIndicator
    proto: drou
  - type: Vocal
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Drou
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Imperial/Medieval/Species/Tifling/displacement.rsi
            state: jumpsuit-female
  - type: LanguageSpeaker
    languages:
      Common: Speak
      #Goblin: Speak
      Ancient: Speak
      #Tribe: Speak
      #Orc: Speak
      #Cursed: Speak
      #Growling: Speak
      #Hissing: Speak
      #Elf: Speak
  #- type: Reactive
  #  reactions:
  #  - reagents: [Blood]
  #    methods: [Ingestion, Injection]
  #    effects:
  #    - !type:HealthChange
  #      scaleByQuantity: true
  #      damage:
  #        types:
  #          Piercing: -0.8
  #          Blunt: -0.8
  #          Brute: -0.8
  #          Slash: -0.8
  #  - reagents: [CopperBlood]
  #    methods: [Ingestion, Injection]
  #    effects:
  #    - !type:HealthChange
  #      scaleByQuantity: true
  #      damage:
  #        types:
  #          Piercing: -1
  #          Blunt: -1
  #          Brute: -1
  #          Slash: -1
  - type: NeedSleep
    sleepLevelPerUpdate: 0.195
  - type: MobThresholds
    thresholds:
      0: Alive
      95: Critical
      180: Dead
  - type: Mana
    maxManaRaceModifier: 0.95
    regenRaceModifier: 0.95
  - type: Nocturn
  - type: LocalLight
    energy: 0.4
    radius: 4.5
  #- type: Thieving
  #  stripTimeReduction: 1.5
  #  stealthy: false
  - type: Bloodstream
    bloodReagent: DrouBlood

- type: entity
  parent: BaseSpeciesDummy
  id: MobDrouDummy
  categories: [ HideSpawnMenu ]
  description: A dummy Drou meant to be used in character setup.
  components:
  - type: HumanoidAppearance
    species: Drou
    hideLayersOnEquip:
    - HeadTop
    - HeadSide
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Imperial/Medieval/Species/Tifling/displacement.rsi
            state: jumpsuit-female

- type: entity
  save: false
  name: Урист Ноктюрн'Хендс
  suffix: Средневековье
