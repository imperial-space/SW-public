- type: typingIndicator
  id: tifling
  typingState: tifling
  idleState: tifling
  offset: 0, 0.0625

- type: entity
  save: false
  name: Урист ИнфернХэндс
  parent: BaseMobSpeciesOrganic
  id: BaseMobTifling
  abstract: true
  components:
  - type: HumanoidAppearance
    species: Tifling
    hideLayersOnEquip:
    - Hair
    - Snout
  - type: Hunger
  - type: Puller
    needsHands: false
  - type: Thirst
  - type: Icon
    sprite: Imperial/Medieval/Species/Tifling/parts.rsi
    state: full
  - type: Body
    prototype: Tifling
    requiredLegs: 2
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatGoliath
      amount: 5
  - type: Speech
  - type: TypingIndicator
    proto: tifling
  - type: Vocal
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Tifling
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Temperature
    heatDamageThreshold: 500
    coldDamageThreshold: 285
    currentTemperature: 350.15
    specificHeat: 42
    coldDamage:
      types:
        Cold : 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 1.0 #per second, scales with temperature & other constants
  - type: LanguageSpeaker
    languages:
      Common: Speak
      #Goblin: Speak
      Ancient: Speak
      #Tribe: Speak
      #Orc: Speak
      #Cursed: Speak
      #Growling: Speak
      #Hissing: Speak
      #Elf: Speak
  - type: TemperatureSpeed
    thresholds:
      301: 0.8
      295: 0.6
      285: 0.4
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Imperial/Medieval/Species/Tifling/displacement.rsi
            state: jumpsuit-female
  - type: Bloodstream
    bloodReagent: DemonsBlood
  - type: Reactive
    reactions:
    - reagents: [Ethanol]
      methods: [Ingestion, Injection]
      effects:
      - !type:HealthChange
        scaleByQuantity: true
        damage:
          types:
            Poison: 1
  - type: ReplacementAccent
    accent: tifling
  - type: Mana
    maxManaRaceModifier: 1.07
    regenRaceModifier: 1.07
  - type: NeedSleep
    sleepLevelPerUpdate: 0.32
  - type: Wagging
  - type: AddActionOnSpawn
    actions:
      - MedievalActionSparkBeginner

