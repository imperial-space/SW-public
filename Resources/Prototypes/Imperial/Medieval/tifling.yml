    Blunt: 1.1
    Piercing: 1.1
    Slash: 1.1
    Heat: 0.8

- type: body
  name: Инферн
  id: Tifling
  root: torso
  slots:
    head:
      part: HeadTifling
      connections:
      - torso
      organs:
        brain: OrganHumanBrain
        eyes: OrganHumanEyes
    torso:
      part: TorsoTifling
      organs:
        heart: OrganHumanHeart
        lungs: OrganHumanLungs
        stomach: OrganHumanStomach
        liver: OrganHumanLiver
        kidneys: OrganHumanKidneys
      connections:
      - right arm
      - left arm
      - right leg
      - left leg
    right arm:
      part: RightArmTifling
      connections:
      - right hand
    left arm:
      part: LeftArmTifling
      connections:
      - left hand
    right hand:
      part: RightHandTifling
    left hand:
      part: LeftHandTifling
    right leg:
      part: RightLegTifling
      connections:
      - right foot
    left leg:
      part: LeftLegTifling
      connections:
      - left foot
    right foot:
      part: RightFootTifling
    left foot:
      part: LeftFootTifling

