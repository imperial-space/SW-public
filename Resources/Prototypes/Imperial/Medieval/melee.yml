- type: entity
  name: bone spear
  parent:
  - BaseItem
  - BaseSpearCharged
  id: SpearBone
  description: A spear made of bones.
  components:
  - type: Spear
  - type: RDWeight
    value: 4
  - type: Sprite
    sprite: Objects/Weapons/Melee/bone_spear.rsi
    layers:
    - state: spear
    - state: spear1
      map:
      - "enum.SolutionContainerLayers.Fill"
      visible: false
  - type: Construction
    node: spear
    graph: SpearBone
  - type: Sharp
  - type: MeleeWeapon
    wideAnimationRotation: -140
    attackRate: 0.5
    range: 2.15
    damage:
      types:
        Piercing: 9
    angle: 0
    #animation: WeaponArcThrust
    animation: CP14WeaponArcThrust
    wideAnimation: CP14WeaponArcSlash
    cPSwingBeverage: false
    cPAnimationOffset: 1.8
  - type: Item
    size: Huge
  - type: Clothing
    quickEquip: false
    slots:
    - back
  - type: Wieldable
    #wieldTime: 0.5
  - type: IncreaseDamageOnWield
    damage:
      types:
        Piercing: 8
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 21
    #- type: EmbeddableProjectile
    #offset: 0.15,0.15
  - type: ThrowingAngle
    angle: 225
  - type: Tag
    tags:
    - Spear
  - type: LandAtCursor
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
          - -0.40,-0.30
          - -0.30,-0.40
          - 0.40,0.30
          - 0.30,0.40
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: MeleeThrowOnHit
    distance: 0.5
    speed: 5

