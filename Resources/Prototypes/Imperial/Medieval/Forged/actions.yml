- type: entity
  id: BloodEyesAction
  name: Кровавый взор
  description: Выделяет живых существ
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 1
    sound: /Audio/Effects/card_drag.ogg
    icon:
      sprite: Imperial/Medieval/Forged/abilities.rsi #
      state: ability_bloody_eyes_off
    iconOn:
      sprite: Imperial/Medieval/Forged/abilities.rsi
      state: ability_bloody_eyes
  - type: InstantAction
    event: !type:ForgedBloodEyesActionEvent

- type: entity
  id: BoostAction
  name: Ускорение
  description: Увеличивает вашу скорость, взамен делает вас хрупким
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 30
    sound: /Audio/Effects/card_drag.ogg
    icon:
      sprite: Imperial/Medieval/Forged/abilities.rsi #
      state: ability_speed_off
    iconOn:
      sprite: Imperial/Medieval/Forged/abilities.rsi
      state: ability_speed
  - type: InstantAction
    event: !type:ForgedBoostActionEvent

- type: entity
  id: SilaAction
  name: Усиление
  description: Увеличивает вашу силу, взамен делает вас медленным
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 30
    sound: /Audio/Effects/card_drag.ogg
    icon:
      sprite: Imperial/Medieval/Forged/abilities.rsi #
      state: ability_gain_off
    iconOn:
      sprite: Imperial/Medieval/Forged/abilities.rsi
      state: ability_gain
  - type: InstantAction
    event: !type:ForgedSilaActionEvent

- type: entity
  id: RepairAction
  name: Восстановление
  description: Восстанавливает часть повреждений, но делает вас недееспособным некоторое время
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 60
    sound: /Audio/Effects/card_drag.ogg
    icon:
      sprite: Imperial/Medieval/Forged/abilities.rsi #
      state: ability_gold_regeneration
  - type: InstantAction
    event: !type:ForgedRepairActionEvent
