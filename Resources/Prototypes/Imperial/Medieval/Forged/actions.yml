- type: entity
  id: BloodEyesAction
  name: Кровавый взор
  description: Выделяет живых существ кровавым окрасом
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: Imperial/Medieval/Forged/abilities.rsi #
      state: blood_eyes_off
    iconOn:
      sprite: Imperial/Medieval/Forged/abilities.rsi
      state: blood_eyes_on
  - type: InstantAction
    event: !type:ForgedBloodEyesActionEvent

- type: entity
  id: BoostAction
  name: Ускорение
  description: Увеличивает вашу скорость, взамен делает вас хрупким
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 30
    icon:
      sprite: Imperial/Medieval/Forged/abilities.rsi #
      state: golden_leg_off
    iconOn:
      sprite: Imperial/Medieval/Forged/abilities.rsi
      state: golden_leg_on
  - type: InstantAction
    event: !type:ForgedBoostActionEvent

- type: entity
  id: SilaAction
  name: Усиление
  description: Увеличивает вашу силу, взамен делает вас медленным
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 30
    icon:
      sprite: Imperial/Medieval/Forged/abilities.rsi #
      state: golden_arm_off
    iconOn:
      sprite: Imperial/Medieval/Forged/abilities.rsi
      state: golden_arm_on
  - type: InstantAction
    event: !type:ForgedSilaActionEvent

- type: entity
  id: RepairAction
  name: Восстановление
  description: Восстанавливает часть повреждений, но делает вас недееспособным некоторое время
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 60
    icon:
      sprite: Imperial/Medieval/Forged/abilities.rsi #
      state: golden_torso
  - type: InstantAction
    event: !type:ForgedRepairActionEvent
