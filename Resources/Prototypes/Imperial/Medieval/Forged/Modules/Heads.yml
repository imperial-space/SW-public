    sprite: Imperial/Medieval/Forged/torsos.rsi
    state: TorsoBase
  - type: ForgedModule
    partSlot: head
    layerState: HeadBase #
    rsiPath: Imperial/Medieval/Forged/torsos.rsi
    resistanceModifier: 0.01
    speedModifier: -0.03

- type: entity
  id: ForgedIronHead
  name: ForgedIronHead
  parent: ForgedHeadBase
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Forged/heads.rsi
    state: TorsoBase
  - type: ForgedModule
    partSlot: head
    layerState: HeadBase #
    rsiPath: Imperial/Medieval/Forged/heads.rsi
