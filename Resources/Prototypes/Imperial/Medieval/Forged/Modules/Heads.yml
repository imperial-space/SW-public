- type: entity
  id: ForgedHeadBase # Базовый торс-родитель для других торсов.
  name: ForgedHeadBase
  parent: BaseItem
  abstract: true
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Clothing/Mask/brass_skull.rsi
    state: icon
    drawdepth: Items
  - type: ForgedModule
    partSlot: head
    layerState: HeadBase
    rsiPath: Imperial/Medieval/Forged/heads.rsi

- type: entity
  id: ForgedWoodenHead
  name: ForgedWoodenHead
  parent: ForgedHeadBase
