- type: entity
  id: ForgedWoodenHead
  name: ForgedWoodenHead
  parent: ForgedHeadBase
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Forged/wooden.rsi
    state: wooden_head_icon
  - type: ForgedModule
    partSlot: head
    layerState: wooden_head
    rsiPath: Imperial/Medieval/Forged/wooden.rsi
    resistanceModifier: -0.03
    speedModifier: -0.02

- type: entity
  id: ForgedWoodenTorso
  name: ForgedWoodenTorso
  parent: ForgedTorsoBase
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Forged/wooden.rsi
    layers:
    - state: wooden_torso
      map: ["torso"]
    - state: blank
      map: ["head"]
    - state: blank
      map: ["eyes"]
    - state: blank
      map: ["right_arm"]
    - state: blank
      map: ["left_arm"]
    - state: blank
      map: ["right_hand"]
    - state: blank
      map: ["left_hand"]
    - state: blank
      map: ["core"]
      offset: 0, -0.1
    - state: blank
      map: ["right_leg"]
    - state: blank
      map: ["left_leg"]
    - state: blank
      map: ["right_foot"]
    - state: blank
      map: ["left_foot"]
    - state: blank
      map : ["crown"]
    - state: blank
      map : ["torso_upgrade"]
  - type: ForgedAssembly
    torso: ForgedWoodenTorso
  - type: ForgedModule
    partSlot: torso
    layerState: wooden_torso
    rsiPath: Imperial/Medieval/Forged/wooden.rsi
    resistanceModifier: -0.12
    speedModifier: -0.10

