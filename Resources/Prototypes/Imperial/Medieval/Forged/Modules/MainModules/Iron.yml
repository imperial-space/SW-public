- type: entity
  id: ForgedIronHead
  name: ForgedIronHead
  parent: ForgedHeadBase
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Forged/iron.rsi
    state: iron_head_icon
  - type: ForgedModule
    partSlot: head
    layerState: iron_head
    rsiPath: Imperial/Medieval/Forged/iron.rsi
    resistanceModifier: 0.03
    speedModifier: -0.04

- type: entity
  id: ForgedIronTorso
  name: ForgedIronTorso
  parent: ForgedTorsoBase
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Forged/iron.rsi
    state: iron_torso
    layers:
    - state: iron_torso
      map: ["torso"]
    - state: blank
      map: ["head"]
    - state: blank
      map: ["eyes"]
    - state: blank
      map: ["right_arm"]
    - state: blank
      map: ["left_arm"]
    - state: blank
      map: ["right_hand"]
    - state: blank
      map: ["left_hand"]
    - state: blank
      map: ["core"]
      offset: 0, -0.1
    - state: blank
      map: ["right_leg"]
    - state: blank
      map: ["left_leg"]
    - state: blank
      map: ["right_foot"]
    - state: blank
      map: ["left_foot"]
    - state: blank
      map : ["upgrade1"]
  - type: ForgedAssembly
    torso: ForgedIronTorso
  - type: ForgedModule
    partSlot: torso
    layerState: iron_torso
    rsiPath: Imperial/Medieval/Forged/iron.rsi
    resistanceModifier: 0.12
    speedModifier: -0.15

