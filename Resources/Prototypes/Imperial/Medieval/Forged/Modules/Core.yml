- type: entity
  id: ForgedCoreSerdolic
  name: ForgedCoreSerdolic
  parent: BaseItem
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Forged/cores.rsi
    state: CoreBase
    drawdepth: Items
  - type: ForgedModule
    partSlot: core
    layerState: CoreBase
    rsiPath: Imperial/Medieval/Forged/cores.rsi
  - type: Organ
  - type: Stomach
    specialDigestible:
      tags:
      - MedievalFireSerdolick
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
  - type: Metabolizer
    maxReagents: 6
    removeEmpty: true
    groups:
      - id: Food

