- type: entity
  id: ForgedCoreBase
  name: ForgedCoreBase
  parent: BaseHumanOrgan
  abstract: true
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Forged/cores.rsi
    state: base_core
    drawdepth: Items
  - type: ForgedModule
    partSlot: core
    layerState: base_core
    rsiPath: Imperial/Medieval/Forged/cores.rsi
  - type: Organ
  - type: Stomach
    #specialDigestible:
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
        canReact: false
  - type: Metabolizer
    solution: stomach
    solutionOnBody: false
    maxReagents: 2
    removeEmpty: true
    metabolizerTypes: [ Forged ]
    groups:
      - id: Food

- type: entity
  id: ForgedCoreSerdolic
  name: ForgedCoreSerdolic
  parent: ForgedCoreBase
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Forged/cores.rsi
    state: serdolic_core_icon
    drawdepth: Items
  - type: ForgedModule
    partSlot: core
    layerState: serdolic_core
    rsiPath: Imperial/Medieval/Forged/cores.rsi
  - type: Stomach
    specialDigestible:
      tags:
      - MedievalFireSerdolick

