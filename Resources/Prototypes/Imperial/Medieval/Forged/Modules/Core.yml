- type: entity
  id: ForgedCoreBase # Базовый торс-родитель для других торсов.
  name: ForgedCoreBase
  parent: BaseItem
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Forged/cores.rsi
    state: CoreBase
    drawdepth: Items
  - type: ForgedModule
    partSlot: core
    layerState: CoreBase
    rsiPath: Imperial/Medieval/Forged/cores.rsi
  - type: Organ
  - type: Stomach
    specialDigestible:
      tags:
      - MedievalFireSerdolick
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
  - type: Metabolizer
    maxReagents: 6
    metabolizerTypes: [ Android ]
    removeEmpty: true
    groups:
      - id: Food
      - id: Drink
      - id: Medicine
      - id: Poison
      - id: Narcotic
      - id: Alcohol
        rateModifier: 0.25

