    sprite: Imperial/Medieval/Forged/sprites.rsi # Путь к твоему спрайту
    state: TorsoBase
    drawdepth: Items
    layers:
    - state: TorsoBase
      map: ["torso"]
    - state: blank
      map: ["head"]
    - state: blank
      map: ["r_arm"]
    - state: blank
