- type: entity
  id: ForgedTorsoBase # Базовый торс-родитель для других торсов.
  name: ForgedTorsoBase
  abstract: true
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Forged/torsos.rsi
    state: TorsoBase
    drawdepth: Items
    layers:
    - state: TorsoBase
      map: ["torso"]
    - state: blank
      map: ["head"]
    - state: blank
      map: ["eyes"]
    - state: blank
      map: ["right_arm"]
    - state: blank
      map: ["left_arm"]
    - state: blank
      map: ["right_hand"]
    - state: blank
      map: ["left_hand"]
    - state: blank
      map: ["core"]
      offset: 0, -0.1
    - state: blank
      map: ["right_leg"]
    - state: blank
      map: ["left_leg"]
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 150
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Pullable
  - type: Appearance
  - type: ForgedAssembly
    torso: ForgedTorsoBase
    requiredSlots: [ "head", "eyes", "right_arm", "left_arm", "core", "right_leg", "left_leg" ]
  - type: ForgedModule
    partSlot: torso
    layerState: TorsoBase
    rsiPath: Imperial/Medieval/Forged/torsos.rsi

- type: entity
  id: ForgedWoodenTorso
  name: ForgedWoodenTorso
  parent: ForgedTorsoBase
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Forged/torsos.rsi
    state: TorsoBase
  - type: ForgedModule
    partSlot: torso
    layerState: TorsoBase
    rsiPath: Imperial/Medieval/Forged/torsos.rsi
    resistanceModifier: 0.04
    speedModifier: -0.1

- type: entity
  id: ForgedIronTorso
  name: ForgedIronTorso
  parent: ForgedTorsoBase
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Forged/torsos.rsi
    state: TorsoBase
  - type: ForgedModule
    partSlot: torso
    layerState: TorsoBase
    rsiPath: Imperial/Medieval/Forged/torsos.rsi
    resistanceModifier: 0.08
    speedModifier: -0.2
