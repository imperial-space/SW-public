- type: entity
  save: false
  name: Forged
  parent:
  - MobFlammable
  - BaseMobSpecies
  id: ForgedPerson
  components:
  - type: Sprite
    layers:
    - map: [ "enum.HumanoidVisualLayers.Chest" ]
    - map: [ "core" ]
      offset: 0, -0.1
    - map: [ "enum.HumanoidVisualLayers.Head" ]
    - map: [ "enum.HumanoidVisualLayers.Snout" ]
    - map: [ "enum.HumanoidVisualLayers.Eyes" ]
    - map: [ "enum.HumanoidVisualLayers.RArm" ]
    - map: [ "enum.HumanoidVisualLayers.LArm" ]
    - map: [ "enum.HumanoidVisualLayers.RLeg" ]
    - map: [ "enum.HumanoidVisualLayers.LLeg" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentBottom" ]
    - map: [ "enum.HumanoidVisualLayers.UndergarmentTop" ]
    - map: ["jumpsuit"]
    - map: ["enum.HumanoidVisualLayers.LFoot"]
    - map: ["enum.HumanoidVisualLayers.RFoot"]
    - map: ["enum.HumanoidVisualLayers.LHand"]
    - map: ["enum.HumanoidVisualLayers.RHand"]
# Imperial Medieval BadSmell Begin
    - map: [ "badsmell" ]
      sprite: Imperial/Medieval/BadSmell/species.rsi
      visible: false
      state: dirty1
# Imperial Medieval BadSmell End
    - map: [ "gloves" ]
    - map: [ "shoes" ]
    - map: [ "ears" ]
    - map: [ "outerClothing" ] # Imperial Space для корректного отображения РПС
    - map: [ "eyes" ]
    - map: [ "belt" ]
    - map: [ "id" ]
    # - map: [ "outerClothing" ]
    - map: [ "back" ]
    - map: [ "neck" ]
    - map: [ "enum.HumanoidVisualLayers.SnoutCover" ]
    - map: [ "enum.HumanoidVisualLayers.FacialHair" ]
    - map: [ "enum.HumanoidVisualLayers.Hair" ]
    - map: [ "enum.HumanoidVisualLayers.HeadSide" ]
    - map: [ "enum.HumanoidVisualLayers.HeadTop" ]
    - map: [ "enum.HumanoidVisualLayers.Tail" ]
    - map: [ "mask" ]
    - map: [ "head" ]
    - map: [ "pocket1" ]
    - map: [ "pocket2" ]
    - map: ["enum.HumanoidVisualLayers.Handcuffs"]
      color: "#ffffff"
      sprite: Objects/Misc/handcuffs.rsi
      state: body-overlay-2
      visible: false
    - map: [ "clownedon" ] # Dynamically generated
      sprite: "Effects/creampie.rsi"
      state: "creampie_human"
      visible: false
# Imperial Medieval Surrender Begin
    - map: [ "surrender" ]
      sprite: Imperial/Medieval/Surrender/flag.rsi
      state: flag
      visible: false
# Imperial Medieval Surrender End
  - type: Appearance
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Skeleton
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#555555AA"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: MobState
  - type: MobThresholds # Изменить относительно модулей!!!
    thresholds:
      0: Alive
      110: Critical # Imperial Medieval
      111: Dead # Imperial Medieval
  - type: Destructible # Изменить относительно модулей!!!
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 110 # Imperial Medieval
      behaviors:
      - !type:GoSSDBehavior { } # Imperial Medieval
      - !type:GibBehavior { }
  - type: Speech
    speechVerb: Skeleton
  - type: ZombieImmune
  - type: Vocal
    sounds:
      Male: Forged
      Female: Forged
      Unsexed: Forged
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 130
        restitution: 0.0
        mask:
          - MobMask
        layer:
          - MobLayer
      medieval-spawner:
        shape: !type:PhysShapeCircle
          radius: 0.4
        layer: []
        mask:
        - MedievalSpawnerLayer
        hard: false
  - type: LanguageSpeaker
    languages:
      Common: Speak
      #Goblin: Speak
      #Ancient: Speak
      #Tribe: Speak
      #Orc: Speak
      #Cursed: Speak
      #Growling: Speak
      #Hissing: Speak
      #Elf: Speak
      # Imperial Medieval End
  - type: FireVisuals
    alternateState: Standing
  - type: FlashImmunity
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: GhostTakeoverAvailable
  - type: GhostRole
    makeSentient: true
    name: ghost-role-information-forged-name
    description: ghost-role-information-forged-description
    rules: ghost-role-information-forged-rules
  - type: Body
    prototype: Forged
    requiredLegs: 2
  - type: Forged
