
- type: entity
  name: MedievalMagicDust
  description: Пыль из магических камней
  parent: BaseItem
  id: MedievalMagicDust
  components:
    - type: Sprite
      sprite: Imperial/Medieval/Forged/items.rsi
      state: magicDust
    - type: Stack
      stackType: MedievalMagicDust
      count: 1
    - type: Material

- type: stack
  id: MedievalMagicDust
  name: materials-magic-dust
  icon: { sprite: Imperial/Medieval/Forged/items.rsi, state: magicDust }
  spawn: MedievalMagicDust
  maxCount: 30

- type: material
  id: MedievalMagicDust
  stackEntity: MedievalMagicDust
  name: materials-magic-dust
  icon: { sprite: Imperial/Medieval/Forged/items.rsi, state: magicDust }
  color: "#d9d9d9"
  price: 0.1

- type: entity
  name: MedievalMagicGlina
  description: Глина перемешанная с магической пылью.
  parent: BaseHealingItem
  id: MedievalMagicGlina
  components:
    - type: Tag
      tags:
        - ForgedHealItem
    - type: Sprite
      sprite: Imperial/Medieval/Forged/items.rsi
      state: magicGlina
    - type: Healing
      plagueProgressionDecayPerUse: 1
      damageContainers: [Forged]
      damage:
        groups:
          Brute: -25
          Burn: -25
      healingBeginSound:
        path: "/Audio/Items/Medical/brutepack_begin.ogg"
      healingEndSound:
        path: "/Audio/Items/Medical/brutepack_end.ogg"
    - type: Stack
      stackType: MedievalMagicGlina
      count: 1
    - type: Construction
      graph: MedievalMagicGlina
      node: ground
    - type: Material

- type: stack
  id: MedievalMagicGlina
  name: materials-magic-glina
  icon: { sprite: Imperial/Medieval/Forged/items.rsi, state: magicGlina }
  spawn: MedievalMagicGlina
  maxCount: 30

- type: material
  id: MedievalMagicGlina
  stackEntity: MedievalMagicGlina
  name: materials-magic-glina
  icon: { sprite: Imperial/Medieval/Forged/items.rsi, state: magicGlina }
  color: "#d9d9d9"
  price: 0.1

- type: reagent
  id: MedievalMagicCrystallReagent # Он мгновенно превращается в пыль, игрок не может напрямую увидеть его
  name: reagent-name-medieval-magic-crystall
  slipData: null
  desc: Очень сильно истолченные магические камни.
  evaporationSpeed: 1
  absorbent: true
  color: "#ffffff"
  physicalDesc: Переливается странной радугой.
  flavor: Неописуем
  metabolisms:
    Food:
      effects:
      - !type:HealthChange
        damage:
          types:
            Blunt: -1
      - !type:SatiateHunger

- type: Tag
  id: ForgedHealItem

- type: reaction
  id: CreateMagicDust
  impact: Low
  quantized: true
  conserveEnergy: false
  reactants:
    MedievalMagicCrystallReagent:
      amount: 1
  effects:
    - !type:CreateEntityReactionEffect
      entity: MedievalMagicDust

- type: entity
  name: ForgedArmBlade
  parent: [ BaseItem, BaseOneHandedCharged ]
  id: ForgedArmBlade
  description: An ancient war blade.
  components:
  - type: Sharp
  - type: Sprite
    sprite: Imperial/Medieval/Forged/upgrades.rsi
    state: iron_arm_blade_item
  - type: MeleeParry
    parryChanse: 0.5
  - type: MeleeWeapon
    clickDamageModifier: 1.5
    wideAnimationRotation: -140
    attackRate: 0.7
    animation: CP14WeaponArcThrust
    wideAnimation: CP14WeaponArcSlash
    cPSwingBeverage: true
    resetOnHandSelected: false
    cPAnimationOffset: 1
    damage:
      types:
        Slash: 20
        ParryAble: 1
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
    soundSwing:
      path: /Audio/Imperial/Medieval/sword_swing.ogg
  - type: Item
    size: Normal
  - type: DisarmMalus
    malus: 1
  - type: StaminaDamageOnHit
    damage: 4 #2 dagger, 5 spear, 4 sword, 5 mace, 8 halberd, 6 sekir, 18 hammer
  - type: Unremoveable

- type: entity
  name: ForgedArmCrossbow
  id: ForgedArmCrossbow
  parent: BaseItem
  description: tra-ta-ta-ta-ta ya grajdansky ya grajdansky tra-ta-ta-ta.
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Forged/upgrades.rsi
    state: iron_arm_crossbow_item
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - Bolt
    capacity: 5
    proto: MedievalBolt
    autoCycle: true
    soundInsert:
      path: /Audio/Imperial/Medieval/ES_Crossbow_Fire_10_-_SFX_Producer.ogg
  - type: Gun
    resetOnHandSelected: false
    fireRate: 0.4
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Imperial/Medieval/ES_Arrow_Release_1_-_SFX_Producer.ogg
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []
  - type: Unremoveable
  - type: Tag
    tags:
      - ForgedArmCrossbow

- type: Tag
  id: ForgedArmCrossbow
