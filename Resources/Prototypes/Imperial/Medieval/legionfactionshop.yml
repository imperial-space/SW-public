- type: entity
  parent: BaseStructure
  id: MedievalShopHoleLegion
  name: MedievalShopHole
  description: Suspiciously looking old radio...
  suffix: Empty
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Misc/mdv_shop.rsi
    layers:
    - state: eagle
    netsync: false
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: ActivatableUI
    singleUser: true
    key: enum.StoreUiKey.Key
  - type: Store
    categories:
    - MedievalLegionWeapon
    - MedievalLegionArmor
    - MedievalLegionTransport
    currencyWhitelist:
    - MedalLegion
    balance:
      MedalLegion: 0
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [["Atmospherics"]]

- type: storeCategory
  id: MedievalLegionWeapon
  name: medieval-category-weapon
  priority: 0

- type: storeCategory
  id: MedievalLegionArmor
  name: medieval-category-armor
  priority: 1

- type: storeCategory
  id: MedievalLegionTransport
  name: medieval-category-transport
  priority: 2

- type: currency
  id: MedalLegion
  displayName: store-currency-display-medal
  cash:
    1: MedievalMedalLegion
  canWithdraw: true

- type: entity
  name: MedievalMedalLegion
  parent: BaseItem
  id: MedievalMedalLegion
  description: furry :)
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Materials/mdv.rsi
    layers:
    - state: medal_legion
      map: ["base"]
  - type: Tag
    tags:
    - RawMaterial
    - MedalLegion
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      MedalLegion: 1
  - type: Stack
    stackType: MedalLegion
    count: 1
  - type: Currency
    price:
      MedalLegion: 1

- type: material
  id: MedalLegion
  stackEntity: MedievalMedalLegion
  name: materials-medal
  icon: { sprite: Imperial/Medieval/Materials/mdv.rsi, state: medal_legion }
  color: "#d9d9d9"
  price: 1

- type: stack
  id: MedalLegion
  name: MedalLegion
  icon: { sprite: Imperial/Medieval/Materials/mdv.rsi, state: medal_legion }
  spawn: MedievalMedalLegion
  maxCount: 100

