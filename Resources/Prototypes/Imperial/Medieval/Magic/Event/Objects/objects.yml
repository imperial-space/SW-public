- type: entity
  parent: FlaskBase
  id: MedievalFlaskImperial
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: Water
          Quantity: 50
  - type: Sprite
    sprite: Imperial/Medieval/Event/Objects/flask_imperial.rsi

- type: entity
  parent: FlaskBase
  id: MedievalFlaskMallin
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: Water
          Quantity: 50
  - type: Sprite
    sprite: Imperial/Medieval/Event/Objects/flask_mallin.rsi

- type: entity
  parent: BaseItem
  id: MedievalTrumpet
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: Imperial/Medieval/Event/Objects/trumpet.rsi
    state: icon
  - type: EmitSoundOnUse
    sound:
      path: /Audio/Imperial/Medieval/Misk/cavalry_charge.ogg
      params:
        volume: 1
        maxDistance: 50
  - type: UseDelay
    delay: 10

- type: entity
  id: MedievalFlagpoleEmpty
  parent: BaseStructure
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Event/Objects/flagpole_imp_mall.rsi
    state: empty
    offset: 0, 0.5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.05,-0.05,0.05,0.05"
        density: 1000
        layer:
        - WallLayer

