- type: entity
  id: MedievalTent
  name: Tent
  parent: BaseStructure
  description: A small tent made of thick fabric
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Event/Objects/tent.rsi
    state: tent
    drawdepth: Overdoors
    offset: 0, 0.4
  - type: SpriteFade

- type: entity
  parent: BaseItem
  id: SurgicalKit
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Event/Objects/surgical_kit.rsi
    state: icon
  - type: Item
    sprite: Imperial/Medieval/Event/Objects/surgical_kit.rsi
    size: Normal
  - type: Healing
    damage:
      types:
        Blunt: -200
        Slash: -200
        Piercing: -200
        Heat: -200
        Shock: -200
        Cold: -200
        Poison: -200
        Asphyxiation: -200
        Bloodloss: -200
    damageContainers:
      - Biological
    delay: 30.0
    bloodlossModifier: -1.5
    consumeOnUse: false
  - type: UseDelay
    delay: 5.0
