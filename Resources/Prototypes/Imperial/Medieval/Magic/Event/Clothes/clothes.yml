- type: entity
  id: MedievalBagSheath
  parent: ClothingBeltBase
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Event/Clothes/common/bag_sheath.rsi
    state: sheath
  - type: Clothing
    sprite: Imperial/Medieval/Event/Clothes/common/bag_sheath.rsi
  - type: Item
    size: Ginormous
  - type: ItemSlots
    slots:
      item:
        name: Sabre
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - CaptainSabre
  - type: ItemMapper
    mapLayers:
      sheath-sabre:
        whitelist:
          tags:
          - CaptainSabre
  - type: Storage
    grid:
    - 0,0,9,2
  - type: Appearance
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: UseDelay
    delay: 0.5

