# Middle

- type: entity
  id: MedievalActionCriticalMassMiddle
  parent: MedievalActionCriticalMassBeginner
  name: medieval-store-spells-fire-critical-mass-middle-name
  description: medieval-store-spells-fire-critical-mass-middle-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0008
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalFire: 1
        bonusEssences:
          MagicMedievalFire: 1
  - type: ManaDrainSpell
    manaDrain: 35
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 19
  - type: SpellCastEffect
    effectProto: CriticalMassSpellCastEffectMiddle
  - type: MedievalTargetSpell
  - type: Action
    useDelay: 20
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_healing.ogg
    icon:
      sprite: Imperial/Medieval/Magic/Fire/CriticalMass/icons.rsi
      state: middle-nova
  - type: TargetAction
    checkCanAccess: false
    range: 5
  - type: WorldTargetAction
    event: !type:MedievalSpawnSpellEvent
      spawnedEntityPrototype: MedievalEffectCriticalMassMiddle
      spawnType: SpawnOnMousePosition
      speechPoints:
        0:
          speech: medieval-spell-speach-critical-mass
          color: "#FF5400"
          hideChat: true
  - type: ShowSpawnedEntity
    sprites:
      - drawedSprite:
          sprite: Imperial/Medieval/Magic/Fire/CriticalMass/projectiles.rsi
          state: supermass2
        alwaysRender: true
        mixColor: 0.1
        inRangeColor: "#FF5400"
        range: 5
    rotationPerClick: 0

