# Middle

- type: entity
  id: MedievalActionDiffusionMiddle
  parent: MedievalActionCriticalMassBeginner
  name: medieval-store-spells-fire-diffusion-middle-name
  description: medieval-store-spells-fire-diffusion-middle-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.8
        addedEssences:
          MagicMedievalFire1: 1
  - type: ManaDrainSpell
    manaDrain: 40
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 19
  - type: MedievalTargetSpell
  - type: WorldTargetAction
    useDelay: 18
    itemIconStyle: BigAction
    checkCanAccess: false
    range: 5
    sound: !type:SoundPathSpecifier
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_healing.ogg
    icon:
      sprite: Imperial/Medieval/Magic/nova.rsi
      state: diffusion
    event: !type:MedievalSpawnSpellEvent
      spawnedEntityPrototype: MedievalEffectDiffusionMiddle
      spawnType: SpawnOnMousePosition
      speechPoints:
        0:
          speech: medieval-spell-speach-diffusion
          color: "#FF0062"
          hideChat: true
  - type: ShowSpawnedEntity
    sprites:
      - drawedSprite:
          sprite: Imperial/Medieval/Magic/nova.rsi
          state: diffusion
        alwaysRender: true
        mixColor: 0.1
        inRangeColor: "#FF0062"
        range: 5
    rotationPerClick: 45

