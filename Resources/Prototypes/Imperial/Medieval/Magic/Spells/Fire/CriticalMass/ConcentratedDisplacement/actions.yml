# Middle

- type: entity
  id: MedievalActionConcentratedDisplacementMiddle
  parent: MedievalActionCriticalMassBeginner
  name: medieval-store-spells-fire-concentrated-displacement-middle-name
  description: medieval-store-spells-fire-concentrated-displacement-middle-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.8
        addedEssences:
          MagicMedievalFire1: 1
  - type: ManaDrainSpell
    manaDrain: 40
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 19
  - type: MedievalTargetSpell
  - type: WorldTargetAction
    useDelay: 16
    itemIconStyle: BigAction
    checkCanAccess: false
    range: 2
    sound: !type:SoundPathSpecifier
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_healing.ogg
    icon:
      sprite: Imperial/Medieval/Magic/nova.rsi
      state: concentrated_displacement
    event: !type:MedievalSpawnSpellEvent
      spawnedEntityPrototype: MedievalEffectConcentratedDisplacementMiddle
      spawnType: SpawnOnMousePosition
      speechPoints:
        0:
          speech: medieval-spell-speach-concentrated-displacement
          color: "#764ADB"
          hideChat: true
  - type: ShowSpawnedEntity
    sprites:
      - drawedSprite:
          sprite: Imperial/Medieval/Magic/nova.rsi
          state: concentrated_displacement
        alwaysRender: true
        mixColor: 0.1
        inRangeColor: "#C12AFF"
        range: 2
    rotationPerClick: 45

