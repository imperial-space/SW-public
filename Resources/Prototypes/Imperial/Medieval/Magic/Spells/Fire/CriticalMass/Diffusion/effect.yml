# Middle

- type: entity
  id: MedievalEffectDiffusionMiddle
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: Imperial/Medieval/Magic/MultiCurrency/WeakeningWave/icons.rsi
    state: senior
  - type: MedievalParticles
    color: "#FF0062"
    speed: 2.0
    particlesCount: 16
    gravity: 0
    inverted: true
    collapseOnMinDistance: true
  - type: Physics
  - type: Fixtures
  - type: Brarrier
    spawnedEntity: MedievalProjectileDiffusionMiddle
    barrierLength: 5
    lookupRadius: 0.45
    barrierSpawnTime: 0.3
    permissibleIntersectionsPercentage: 0.3
    spawnRelativePosition: 1,1
  - type: TimedDespawn
    lifetime: 1.25

- type: entity
  id: DiffusionSpellCastEffectMiddle
  components:
  - type: Sprite
    sprite: Imperial/Medieval/SpellCastEffects/fire/nova.rsi
    color: "#FF0062"
    noRot: true
    layers:
      - state: beginner
        shader: unshaded
  - type: PointLight
    radius: 3
    energy: 2
    color: "#FF0062"
  - type: TimedDespawn
    lifetime: 0.5

