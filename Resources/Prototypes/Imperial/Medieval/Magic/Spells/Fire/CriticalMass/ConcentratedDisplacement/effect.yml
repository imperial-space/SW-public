# Middle

- type: entity
  id: MedievalEffectConcentratedDisplacementMiddle
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/MultiCurrency/WeakeningWave/icons.rsi
    state: senior
  - type: MedievalParticles
    color: "#764ADB"
    speed: 2.0
    particlesCount: 16
    gravity: 0
    inverted: true
    collapseOnMinDistance: true
  - type: Physics
  - type: Fixtures
  - type: Brarrier
    spawnedEntity: MedievalProjectileConcentratedDisplacementMiddle
    barrierLength: 5
    lookupRadius: 0.45
    barrierSpawnTime: 0.3
    permissibleIntersectionsPercentage: 0.3
    spawnRelativePosition: 1,1
    onlyOneSide: true
  - type: TimedDespawn
    lifetime: 1.25

- type: entity
  id: ConcentratedDisplacementSpellCastEffectMiddle
  components:
  - type: Sprite
    sprite: Imperial/Medieval/SpellCastEffects/fire/nova.rsi
    color: "#764ADB"
    noRot: true
    layers:
      - state: beginner
        shader: unshaded
  - type: PointLight
    radius: 3
    energy: 2
    color: "#764ADB"
  - type: TimedDespawn
    lifetime: 0.5

