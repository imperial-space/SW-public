#Beginner

- type: entity
  id: FireWallSpellCastEffectBeginner
  components:
  - type: Sprite
    sprite: Imperial/Medieval/SpellCastEffects/fire/wall.rsi
    color: "#ff9c24"
    noRot: true
    layers:
      - state: beginner
        shader: unshaded
  - type: PointLight
    radius: 3
    energy: 2
    color: "#ff9c24"
  - type: TimedDespawn
    lifetime: 2.5

