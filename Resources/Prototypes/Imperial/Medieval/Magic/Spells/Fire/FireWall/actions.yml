# Beginner

- type: entity
  id: MedievalActionFireWallBeginner
  name: medieval-store-spells-fire-wall-beginner-name
  description: medieval-store-spells-fire-wall-beginner-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0007
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalFire: 1
        bonusEssences:
          MagicMedievalFire: 1
  - type: ManaDrainSpell
    manaDrain: 30
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 18
  - type: SpellCastEffect
    effectProto: FireWallSpellcastEffectBeginner
  - type: MedievalTargetSpell
  - type: WorldTargetAction
    useDelay: 22
    itemIconStyle: BigAction
    checkCanAccess: false
    targetingIndicator: false
    range: 5
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/fireball_cast.ogg
    icon:
      sprite: Imperial/Medieval/Magic/firewall.rsi
      state: firewall1
    event: !type:MedievalSpawnSpellEvent
      spawnedEntityPrototype: MedievalFireWallBeginner
      spawnType: SpawnOnMousePosition
      spellCastDoAfter:
        delay: 2.5
        breakOnDropItem: false
        breakOnWeightlessMove: false
        breakOnMove: false
        needHand: true
        speedModifier: 0.3
      speechPoints:
        0:
          speech: medieval-spell-speach-fire-wall
          color: "#ff9c24"
          hideChat: true
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionFireWallMiddle
      3: MedievalActionFireWallSenior
  - type: ShowSpawnedEntity
    sprites:
      - drawedSprite:
          sprite: Imperial/Medieval/Magic/firewall.rsi
          state: firewall1
        alwaysRender: true
        spriteColor: "#47f8ff"
        inRangeColor: "#CC00AF"
        outOfRangeColor: "#CC0000"
        range: 5
    rotationPerClick: 45
  - type: CheckInitialBarrier

