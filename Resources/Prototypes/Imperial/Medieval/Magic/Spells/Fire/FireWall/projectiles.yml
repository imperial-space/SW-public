# Base

- type: entity
  id: MedievalFireWall
  name: Fire Wall
  abstract: true
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Fire/FireWall/projectiles.rsi
    state: beginner
    drawdepth: Mobs
    noRot: true
  - type: Clickable
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 60
        mask:
          - MachineMask
        layer:
          - MidImpassable
          - LowImpassable
          - BulletImpassable
          - Opaque
        hard: false
  - type: PointLight
    radius: 3
    energy: 3
    color: "#ff9c24"
  - type: DamageContacts
    damage:
      types:
        Heat: 20
  - type: IgniteOnCollide
    fixtureId: fix1
    fireStacks: 2

# Beginner

- type: entity
  id: MedievalFireWallBeginner
  parent: MedievalFireWall
  name: Fire Wall
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Fire/FireWall/projectiles.rsi
    state: beginner
  - type: TimedDespawn
    lifetime: 8
  - type: Brarrier
    spawnedEntity: MedievalFireWallBeginnerClone
    spawnedOnInvalidLocation: MedievalFireWallBeginnerInvalidPosition
    barrierLength: 1
    lookupRadius: 0.45
    barrierSpawnTime: 0.3
    permissibleIntersectionsPercentage: 0.3
    spawnRelativePosition: 1,1
    layersBlackList:
      - Impassable

- type: entity
  id: MedievalFireWallBeginnerClone
  parent: MedievalFireWall
  name: Fire Wall
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Fire/FireWall/projectiles.rsi
