      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 60
        hard: false
  - type: Brarrier
    spawnedEntity: MedievalFireWallBeginnerClone
    barrierLength: 1
    lookupRadius: 0.45
    barrierSpawnTime: 0.3
    permissibleIntersectionsPercentage: 0.3
    spawnRelativePosition: 1,1
