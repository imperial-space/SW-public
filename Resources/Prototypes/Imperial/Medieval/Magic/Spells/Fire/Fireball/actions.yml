# Beginner

- type: entity
  id: MedievalActionFireballBeginner
  name: medieval-store-spells-fire-fireball-beginner-name
  description: medieval-store-spells-fire-fireball-beginner-desc
  components:
  - type: MedievalTargetSpell
  - type: WorldTargetAction
    useDelay: 180
    itemIconStyle: BigAction
    checkCanAccess: false
    range: 60
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/fireball_cast.ogg
    icon:
      sprite: Imperial/Medieval/Gun/Charmer/fireball.rsi
      state: 1
    event: !type:MedievalProjectileSpellEvent
      projectilePrototype:
        0: MedievalProjectileFireballBeginner
      targetSpellType: TargetOnCurrentMousePosition
      spellCastDoAfter:
        delay: 3
        breakOnDropItem: false
        breakOnWeightlessMove: false
        breakOnMove: false
        needHand: true
        speedModifier: 0.3
      speechPoints:
        0:
          speech: medieval-spell-speach-fireball
          color: "#FF5900"
          hideChat: true
  - type: ManaDrainSpell
    manaDrain: 70
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 27
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 1
        addedEssences:
          MagicMedievalFire1: 1
  - type: DamageTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 1
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: TrainingTarget
        addedEssences:
          MagicMedievalFire1: 2
      - !type:AddMagicEssence
        probability: 1
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: MobState
          - !type:MagicTargetMobStateCondition
            allowedState: Alive
        addedEssences:
          MagicMedievalFire1: 3
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionFireballMiddle
      3: MedievalActionFireballSenior

