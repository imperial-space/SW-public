# Beginner

- type: entity
  id: MedievalProjectileFireballBeginner
  parent: BulletRocket
  name: fireball
  description: You better GITTAH WEIGH.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: fireball
  - type: Explosive
    explosionType: Default
    maxIntensity: 1.1
    intensitySlope: 8
    totalIntensity: 36
    maxTileBreak: 0
  - type: IgniteOnCollide
    fireStacks: 2
  - type: SpawnEntityOnTrigger
    spawnedEntitiesPrototype:
      - FireballShockWaveEffect
  - type: FireballDistortion
  - type: SingularityDistortion
    falloffPower: 3
    intensity: 100
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
      blackHoleExplode:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.15,0.15,0.15"
        density: 0
        layer:
        - Impassable
        hard: false
  - type: AmbientSound
    volume: -3
    range: 6
    sound:
      path: /Audio/Imperial/Medieval/fireball_inflight.ogg

