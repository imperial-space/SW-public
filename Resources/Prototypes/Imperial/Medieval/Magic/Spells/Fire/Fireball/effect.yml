- type: entity
  id: FireballShockWaveEffect
  components:
  - type: ShockWave
    speed: 2
  - type: ShockWaveDistortion
    speed: 2
    thikness: 0.1
    distortion: 0.05
    maxDistance: 1.3
    disappearDistancePercentage: 0
  - type: TimedDespawn
    lifetime: 0.8
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/Imperial/Medieval/fireball_blast.ogg
      params:
        variation: 0.2

- type: entity
  id: FireballSpellcastEffectBeginner
  components:
  - type: Sprite
    sprite: Imperial/Medieval/SpellCastEffects/fireball.rsi
    state: beginner
    color: "#FF7300"
    noRot: true
  - type: TimedDespawn
    lifetime: 3.0

- type: entity
  id: FireballSpellcastEffectMiddle
  components:
  - type: Sprite
    sprite: Imperial/Medieval/SpellCastEffects/fireball.rsi
    state: middle
    color: "#FF7300"
    noRot: true
  - type: TimedDespawn
    lifetime: 2.5

- type: entity
  id: FireballSpellcastEffectSenior
  components:
  - type: Sprite
    sprite: Imperial/Medieval/SpellCastEffects/fireball.rsi
    state: senior
    color: "#FF7300"
    noRot: true
  - type: TimedDespawn
    lifetime: 3.5
