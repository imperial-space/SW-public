# Beginner

- type: entity
  id: MedievalActionBoostBeginner
  name: medieval-store-spells-light-boost-beginner-name
  description: medieval-store-spells-light-boost-beginner-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0001
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalFire: 1
        bonusEssences:
          MagicMedievalFire: 1
  - type: MedievalInstantSpell
  - type: Action
    useDelay: 90
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/touch_summon.ogg
    icon:
      sprite: Imperial/Medieval/Magic/Fire/Boost/icons.rsi
      state: beginner
  - type: InstantAction
    event: !type:MedievalSpawnInHandSpellEvent
      spawnedEntityPrototype: BoostBeginner
      spellCastDoAfter:
        delay: 0.5
        breakOnDropItem: false
        breakOnWeightlessMove: false
        breakOnMove: false
        needHand: true
        breakOnDamage: true
        speedModifier: 1
      speechPoints:
        0:
          speech: medieval-spell-speach-boost
          color: "#820509"
          hideChat: true
  - type: MedievalSpawnOnlyInFreeHands
  - type: ManaDrainSpell
    manaDrain: 50
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 19
  - type: SpellCastEffect
    effectProto: BoostSpellCastEffectBeginner
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionBoostMiddle
      3: MedievalActionBoostSenior

