# Beginner

- type: entity
  id: MedievalProjectileMagicArrowCursorFolloverBeginner
  parent: BulletRocket
  name: fireball
  description: You better GITTAH WEIGH.
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Gun/Charmer/arrow.rsi
    layers:
    - state: proto
      shader: unshaded
  - type: StaminaDamageOnCollide
    damage: 3
  - type: Explosive
    explosionType: Cryo
    maxIntensity: 1
    intensitySlope: 1
    totalIntensity: 1
    maxTileBreak: 0
  - type: ProjectileCursorFollower
    relativeAngle: 90
    linearVelocityIntensy: 0.1
  - type: Projectile
    damage:
      types:
        Blunt: 16

