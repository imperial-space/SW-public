# Beginner

- type: entity
  id: MedievalActionMagicArrowPlayerFolloverBeginner
  parent: MedievalActionMagicArrowBeginner
  name: medieval-store-spells-fire-magic-arrow-player-follover-beginner-name
  description: medieval-store-spells-fire-magic-arrow-player-follover-beginner-desc
  components:
  - type: MedievalTargetSpell
  - type: Action
    useDelay: 8
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/arrow_cast.ogg
    icon:
      sprite: Imperial/Medieval/Magic/Fire/MagicArrow/icons.rsi
      state: beginner-aim
  - type: TargetAction
    checkCanAccess: false
    range: 60
  - type: WorldTargetAction
    event: !type:MedievalHomingProjectilesSpellEvent
      projectilePrototype: MedievalProjectileMagicArrowPlayerFolloverBeginner
      relativeAngle: 90
      projectileSpeed: 7
      spread: 180
      linearVelocityIntensy: 0.25
      speechPoints:
        0:
          speech: medieval-spell-speach-magic-arrow-player-follover
          color: "#5B6EE1"
          hideChat: true
  - type: MedievalTargetOverlayOnAiming
    maxTargetCount: 1
    whiteListComponents:
      - type: Damageable
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.00035
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalFire: 1
        bonusEssences:
          MagicMedievalFire: 1
  - type: DamageTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.00025
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: TrainingTarget
        addedEssences:
          MagicMedievalFire1: 1
      - !type:AddMagicEssence
        probability: 0.0003
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: MobState
          - !type:MagicTargetMobStateCondition
            allowedState: Alive
        addedEssences:
          MagicMedievalFire1: 1
  - type: ManaDrainSpell
    manaDrain: 25
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 15

