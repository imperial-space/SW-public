# Beginner

- type: entity
  id: MedievalActionMagicArrowCursorFolloverBeginner
  parent: MedievalActionMagicArrowBeginner
  name: medieval-store-spells-fire-magic-arrow-cursor-follover-beginner-name
  description: medieval-store-spells-fire-magic-arrow-cursor-follover-beginner-desc
  components:
  - type: ManaDrainSpell
    manaDrain: 25
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 15
  - type: MedievalTargetSpell
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0003
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalFire: 1
        bonusEssences:
          MagicMedievalFire: 1
  - type: DamageTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.0003
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: TrainingTarget
        addedEssences:
          MagicMedievalFire1: 1
      - !type:AddMagicEssence
        probability: 0.00045
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: MobState
          - !type:MagicTargetMobStateCondition
            allowedState: Alive
        addedEssences:
          MagicMedievalFire1: 1
  - type: WorldTargetAction
    useDelay: 8
    itemIconStyle: BigAction
    checkCanAccess: false
    range: 60
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/arrow_cast.ogg
    icon:
      sprite: Imperial/Medieval/Gun/Charmer/arrow.rsi
      state: 1
    event: !type:MedievalProjectileSpellEvent
      projectilePrototype:
        0: MedievalProjectileMagicArrowCursorFolloverBeginner
      projectileSpeed: 4
      speechPoints:
        0:
          speech: medieval-spell-speach-magic-arrow-cursor-follover
          color: "#5B6EE1"
          hideChat: true


