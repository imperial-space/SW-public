# Beginner

- type: entity
  id: MedievalActionMagicArrowKunaiBeginner
  parent: MedievalActionMagicArrowBeginner
  name: medieval-store-spells-fire-magic-arrow-kunai-beginner-name
  description: medieval-store-spells-fire-magic-arrow-kunai-beginner-desc
  components:
  - type: ManaDrainSpell
    manaDrain: 20
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 15
  - type: MedievalTargetSpell
  - type: Action
    useDelay: 4
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/arrow_cast.ogg
    icon:
      sprite: Imperial/Medieval/Magic/Fire/MagicArrow/icons.rsi
      state: beginner-kunai
  - type: TargetAction
    checkCanAccess: false
    range: 60
  - type: WorldTargetAction
    event: !type:MedievalEntityTargetProjectileSpellEvent
      projectilePrototype: MedievalProjectileMagicArrowKunaiBeginner
      speechPoints:
        0:
          speech: medieval-spell-speach-magic-arrow
          color: "#5B6EE1"
          hideChat: true
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.00035
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalFire: 1
        bonusEssences:
          MagicMedievalFire: 1
  - type: DamageTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.0003
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: TrainingTarget
        addedEssences:
          MagicMedievalFire1: 1
      - !type:AddMagicEssence
        probability: 0.00035
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: MobState
          - !type:MagicTargetMobStateCondition
            allowedState: Alive
        addedEssences:
          MagicMedievalFire1: 1
  - type: MedievalTargetOverlayOnAiming
    maxTargetCount: 2
    whiteListComponents:
      - type: Damageable

