# Beginner

- type: entity
  id: MedievalActionMagicArrowBeginner
  name: medieval-store-spells-fire-magic-arrow-beginner-name
  description: medieval-store-spells-fire-magic-arrow-beginner-desc
  components:
  - type: ManaDrainSpell
    manaDrain: 15
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 5
  - type: MedievalTargetSpell
  - type: WorldTargetAction
    useDelay: 4
    itemIconStyle: BigAction
    checkCanAccess: false
    range: 60
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/arrow_cast.ogg
    icon:
      sprite: Imperial/Medieval/Gun/Charmer/arrow.rsi
      state: 1
    event: !type:MedievalProjectileSpellEvent
      projectilePrototype:
        0: MedievalProjectileMagicArrowBeginner
      speechPoints:
        0:
          speech: medieval-spell-speach-magic-arrow
          color: "#5B6EE1"
          hideChat: true
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.2
        addedEssences:
          MagicMedievalFire1: 1
  - type: DamageTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.9
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: TrainingTarget
        addedEssences:
          MagicMedievalFire1: 1
      - !type:AddMagicEssence
        probability: 0.7
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: MobState
          - !type:MagicTargetMobStateCondition
            allowedState: Alive
        addedEssences:
          MagicMedievalFire1: 1
  - type: ActionUpgrade
    effectedLevels:
      # Cursor Follover
      2: MedievalActionMagicArrowCursorFolloverBeginner
      3: MedievalActionMagicArrowCursorFolloverMiddle
      4: MedievalActionMagicArrowCursorFolloverSenior
      # Player Follover
      5: MedievalActionMagicArrowPlayerFolloverBeginner
      6: MedievalActionMagicArrowPlayerFolloverMiddle
      7: MedievalActionMagicArrowPlayerFolloverSenior
      # Kunai
      8: MedievalActionMagicArrowKunaiBeginner
      9: MedievalActionMagicArrowKunaiMiddle
      10: MedievalActionMagicArrowKunaiSenior
