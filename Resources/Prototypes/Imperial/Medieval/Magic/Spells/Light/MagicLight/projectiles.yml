# Beginner

- type: entity
  id: MedievalProjectileLightFollower
  components:
    - type: CargoSellBlacklist
    - type: Sprite
      sprite: Objects/Fun/toys.rsi
      state: orb
    - type: MedievalParticles
      color: cyan
      speed: 2.0
      particlesCount: 32
      gravity: 0
      inverted: true
      collapseOnMinDistance: true
    - type: PointLight
      color: cyan
      energy: 2
      radius: 3.8
    - type: ContentEye
      maxZoom: 1.44,1.44
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.35
          density: 15
          mask:
          - GhostImpassable
    - type: Eye
      drawFov: false
    - type: Input
      context: "ghost"
    - type: Examiner
      skipChecks: true
    - type: GhostHearing
    - type: MovementSpeedModifier
      baseSprintSpeed: 4.6
      baseWalkSpeed: 2.2
    - type: MovementIgnoreGravity
    - type: IntrinsicRadioReceiver
    - type: ActiveRadio
      receiveAllChannels: true
      globalReceive: true
    - type: Physics
      bodyType: KinematicController
      bodyStatus: InAir
    - type: CanMoveInAir
    - type: Tag
      tags:
      - BypassInteractionRangeChecks
      - LightningBlacklist
    - type: InputMover
    - type: MobMover
    - type: HTN # Паттерн поведения обычного нейтрального моба
      rootTask:
        task: FollowCompound
      blackboard:
        FollowCloseRange: !type:Single
          0.5
        FollowRange: !type:Single
          0.0
    - type: MedievalProjectilePlayerFollower
      activateTime: 0.3
    - type: TimedDespawn
      lifetime: 120
    - type: SpawnOnDespawn
      prototype: MedievalLightSphereDespawnEffect

- type: entity
  id: MedievalLightSphereDespawnEffect
  components:
  - type: TimedDespawn
    lifetime: 5
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/Imperial/Medieval/lightsphere_discharge.ogg
      params:
        variation: 0.2
