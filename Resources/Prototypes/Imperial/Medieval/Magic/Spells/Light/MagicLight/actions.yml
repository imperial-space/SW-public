# Beginner

- type: entity
  id: MedievalActionMagicLightBeginner
  name: medieval-store-spells-magic-light-flash-beginner-name
  description: medieval-store-spells-light-magic-light-beginner-desc
  components:
  - type: MedievalInstantSpell
  - type: Action
    useDelay: 20
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/lightsphere_cast.ogg
    icon:
      sprite: Imperial/Medieval/Magic/Light/MagicLight/icons.rsi
      state: beginner
  - type: InstantAction
    event: !type:MedievalInstantSpawnEvent
      spawnedEntityPrototype: MedievalProjectileLightFollower
      speechPoints:
        0:
          speech: medieval-spell-speach-magic-light
          color: "#FFE57E"
          hideChat: true
  - type: MedievalSpellRandomRelativeSpawn
    maxSpawnRadius: 2
    minSpawnRadius: 1
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0004
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalLight: 1
        bonusEssences:
          MagicMedievalLight: 1
  - type: ManaDrainSpell
    manaDrain: 25
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 5
  - type: SpellCastEffect
    effectProto: MagicLightSpellCastEffectBeginner
