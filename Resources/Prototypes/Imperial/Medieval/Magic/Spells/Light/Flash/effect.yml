- type: entity
  id: FlashWaveEffect
  components:
  - type: ShockWave
    speed: 0.95
    effects:
    - !type:ImperialFlashReactionEffect
      maxRange: 1
      maxDuration: 3
      slowTo: 0.5
      slowOnlyTarget: true
  - type: ShockWaveDistortion
    speed: 1
    thikness: 0.001
    distortion: 2
    maxDistance: 0.25
    disappearDistancePercentage: 0.0
  - type: TimedDespawn
    lifetime: 0.4
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/Imperial/Medieval/flashbang_blast.ogg
      params:
        variation: 0.2
