# Beginner

- type: entity
  id: MedievalProjectileFlashBeginner
  name: Flash
  description: You my sunshine
  parent: BulletRocket
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Gun/Charmer/flash.rsi
    layers:
    - state: proto
      shader: unshaded
  - type: StaminaDamageOnCollide
    damage: 16
  - type: Explosive
    explosionType: Cryo
    maxIntensity: 1
    intensitySlope: 1
    totalIntensity: 0
    maxTileBreak: 0
  - type: Projectile
    damage:
      types:
        Caustic: 1
  - type: FlashOnTrigger
    range: 1
    duration: 4.2

