# Beginner

- type: entity
  id: MedievalActionFlashBeginner
  name: medieval-store-spells-light-flash-beginner-name
  description: medieval-store-spells-light-flash-beginner-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.45
        addedEssences:
          MagicMedievalLight1: 1
  - type: ManaDrainSpell
    manaDrain: 25
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 10
  - type: MedievalTargetSpell
  - type: Action
    useDelay: 17
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/flashbang_cast.ogg
    icon:
      sprite: Imperial/Medieval/Gun/Charmer/flash.rsi
      state: 1
  - type: TargetAction
    checkCanAccess: false
    range: 60
  - type: WorldTargetAction
    event: !type:MedievalProjectileSpellEvent
      projectilePrototype:
        0: MedievalProjectileFlashBeginner
      speechPoints:
        0:
          speech: medieval-spell-speach-flash
          color: "#FFE57E"
          hideChat: true
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionFlashMiddle

# Middle

- type: entity
  id: MedievalActionFlashMiddle
  parent: MedievalActionFlashBeginner
  name: medieval-store-spells-light-flash-middle-name
  description: medieval-store-spells-light-flash-middle-desc
  components:
  - type: ManaDrainSpell
    manaDrain: 35
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 10
  - type: MedievalTargetSpell
  - type: Action
    useDelay: 12
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/flashbang_cast.ogg
    icon:
      sprite: Imperial/Medieval/Gun/Charmer/flash.rsi
      state: 2
  - type: TargetAction
    checkCanAccess: false
    range: 60
  - type: WorldTargetAction
    event: !type:MedievalProjectileSpellEvent
      projectilePrototype:
        0: MedievalProjectileFlashMiddle
      speechPoints:
        0:
          speech: medieval-spell-speach-flash
          color: "#FFE57E"
          hideChat: true
