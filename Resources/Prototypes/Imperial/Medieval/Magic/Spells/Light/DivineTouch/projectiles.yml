# Beginner

- type: entity
  id: DivineTouchBeginner
  parent: BaseItem
  name: Health Touch
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Melee/hand.rsi
    state: poison
  - type: Unremoveable
  - type: MedievalMeleeResource
    resource: 1
    maxResource: 1
    resourceWaste: 1
    effectSoundOnBreak: /Audio/Imperial/Medieval/heal_cast.ogg
    effectSoundOnRepair: /Audio/Imperial/Medieval/heal_cast.ogg
  - type: MeleeWeapon
    wideAnimationRotation: 0
    clickDamageModifier: 0.5
    animation: WeaponArcThrust
    attackRate: 1
    angle: 0
    damage:
      groups:
        Brute: -20
        Burn: -20
        Airloss: -20
        Toxin: -20
      types:
        Bloodloss: -10
        Cellular: -10
    resistanceBypass: true
    soundHit:
      path: /Audio/Imperial/Medieval/heal_cast.ogg
  - type: MedievalSpellOnInteract
    soundOnInteract:
      path: /Audio/Imperial/Medieval/heal_cast.ogg
    effects:
      - !type:HealthChange
        damage:
          groups:
            Brute: -20
            Burn: -20
            Airloss: -20
            Toxin: -20
          types:
            Bloodloss: -10
            Cellular: -10
    selfUseEffects:
      - !type:HealthChange
        damage:
          groups:
            Brute: -10
            Burn: -10
            Airloss: -10
            Toxin: -10
          types:
            Bloodloss: -5
            Cellular: -5

