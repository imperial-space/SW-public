# Beginner

- type: entity
  id: MedievalActionShelterSenior
  name: medieval-store-spells-earth-shelter-senior-name
  description: medieval-store-spells-earth-shelter-senior-desc
  components:
  - type: MedievalInstantSpell
  - type: Action
    useDelay: 20
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/mob_spawn_effect.ogg
    icon:
      sprite: Imperial/Medieval/Magic/Earth/Shelter/icons.rsi
      state: senior
  - type: InstantAction
    event: !type:MedievalInstantSpawnEvent
      spawnedEntityPrototype: MedievalShelterSenior
      spellCastDoAfter:
        delay: 1
        breakOnDropItem: false
        breakOnWeightlessMove: false
        breakOnMove: false
        needHand: true
        speedModifier: 0.3
      speechPoints:
        0:
          speech: medieval-spell-speach-shelter
          color: "#804128"
          hideChat: true
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0004
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalEarth: 1
        bonusEssences:
          MagicMedievalEarth: 1
  - type: ManaDrainSpell
    manaDrain: 25
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 5
  - type: SpellCastEffect
    effectProto: MagicLightSpellCastEffectBeginner
