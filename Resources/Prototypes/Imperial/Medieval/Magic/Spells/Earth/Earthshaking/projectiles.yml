- type: entity
  id: MedievalProjectileInactiveEarthshaking
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Earth/Spikes/projectiles.rsi
    state: beginner-spawn
    drawdepth: FloorTiles
  - type: TimedDespawn
    lifetime: 1
  - type: SpawnOnDespawn
    prototype: MedievalProjectileActiveEarthshaking
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 100


- type: entity
  id: MedievalProjectileActiveEarthshaking
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Earth/Spikes/projectiles.rsi
    state: beginner
    drawdepth: FloorTiles
  - type: TimedDespawn
    lifetime: 1.5
  - type: Clickable
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 60
        mask:
          - MachineMask
        layer:
          - MidImpassable
          - LowImpassable
          - BulletImpassable
          - Opaque
        hard: false
  - type: MedievalNotAllowDash
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.5
    sprintSpeedModifier: 0.5
  - type: DamageContacts
    damage:
      types:
        Piercing: 10

# Beginner

- type: entity
  id: MedievalEarthshakingBeginner
  components:
  - type: TriggerOnSpawn
  - type: RepeatingTrigger
    delay: 3.5
  - type: VectoredSpawnOnTrigger
    spawnedEntityID: MedievalProjectileInactiveEarthshaking
    spawnPositions: ["0, 0", "-1, 0", "1, 0", "0, 1", "0, -1"]
  - type: TimedDespawn
    lifetime: 9

# Middle

- type: entity
