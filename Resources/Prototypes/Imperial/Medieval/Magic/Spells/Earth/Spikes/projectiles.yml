- type: entity
  id: MedievalProjectileInactiveSpikesBeginner
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Earth/Spikes/projectiles.rsi
    state: beginner-spawn
    drawdepth: FloorTiles
  - type: TimedDespawn
    lifetime: 1
  - type: SpawnOnDespawn
    prototype: MedievalProjectileActiveSpikeBeginner
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 60
        mask:
          - MachineMask
        layer:
          - MidImpassable
          - LowImpassable
          - BulletImpassable
          - Opaque
        hard: false

- type: entity
  id: MedievalProjectileActiveSpikeBeginner
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Earth/Spikes/projectiles.rsi
    state: beginner
    drawdepth: FloorTiles
  - type: TimedDespawn
    lifetime: 1.5
  - type: Clickable
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 60
        mask:
          - MachineMask
        layer:
          - MidImpassable
          - LowImpassable
          - BulletImpassable
          - Opaque
        hard: false
  - type: MedievalNotAllowDash
