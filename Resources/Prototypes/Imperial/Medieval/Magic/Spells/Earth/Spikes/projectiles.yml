    walkSpeedModifier: 0.2
    sprintSpeedModifier: 0.2
  - type: DamageContacts
    damage:
      types:
        Piercing: 10

- type: entity
  id: MedievalSpikesLineBeginner
  components:
  - type: Physics
  - type: Fixtures
  - type: Brarrier
    spawnedEntity: MedievalProjectileInactiveSpikesBeginner
    barrierLength: 5
    lookupRadius: 0.45
    barrierSpawnTime: 0.2
    permissibleIntersectionsPercentage: 0.3
    spawnRelativePosition: 1,1
    onlyOneSide: true
  - type: TimedDespawn
    lifetime: 5

