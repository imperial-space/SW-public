# Beginner

- type: entity
  id: MedievalActionSmokeBeginner
  name: medieval-store-spells-vodka-smoke-beginner-name
  description: medieval-store-spells-vodka-smoke-beginner-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0007
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalVodka: 1
        bonusEssences:
          MagicMedievalVodka: 1
  - type: ManaDrainSpell
    manaDrain: 25
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 15
  - type: SpellCastEffect
    effectProto: SmokeSpellCastEffectBeginner
  - type: MedievalTargetSpell
  - type: Action
    useDelay: 42
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/smoke_cast.ogg
    icon:
      sprite: Imperial/Medieval/Magic/Vodka/Smoke/icons.rsi
      state: beginner
  - type: TargetAction
    checkCanAccess: false
    targetingIndicator: false
    range: 60
  - type: WorldTargetAction
    event: !type:MedievalSpawnSpellEvent
      spawnedEntityPrototype: MedievalSmokeBeginner
      spawnType: SpawnOnMousePosition
      speechPoints:
        0:
          speech: medieval-spell-speach-smoke
          color: "#646464"
          hideChat: true
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionSmokeMiddle
      3: MedievalActionSmokeSenior
  - type: ShowSpawnedEntity
    sprites:
      - drawedSprite:
          sprite: Fluids/puddle.rsi
          state: splat0
        alwaysRender: true
        inRangeColor: "#646464"
        range: 60

