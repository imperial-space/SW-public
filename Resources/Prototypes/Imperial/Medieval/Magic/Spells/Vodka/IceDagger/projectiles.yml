#Beginner

- type: entity
  name: IceDagger
  parent: BaseKnife
  id: IceDaggerBeginner
  description: Hurry up! It will melt soon
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Melee/ice_dagger_beginner.rsi
    state: icon
  - type: Item
    size: Small
    sprite: Imperial/Medieval/Melee/ice_dagger_beginner.rsi
  - type: MeleeParry
    parryChanse: 0.10
  - type: MeleeWeapon
    attackRate: 1.34
    clickDamageModifier: 1.33
    range: 1
    damage:
      types:
        Slash: 7
        ParryAble: 1
    resetOnHandSelected: false
  - type: EmbeddableProjectile
    offset: 0.15,0.15
    removalTime: 2
  - type: ThrowingAngle
    angle: 225
  - type: Tag
    tags:
    - Knife
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 12
  - type: MeleeThrowOnHit
    distance: 0.3
    speed: 5
  - type: StaminaDamageOnHit
    damage: 2 #2 dagger, 5 spear, 4 sword, 5 mace, 8 halberd, 6 sekir, 18 hammer
  - type: TimedDespawn
    lifetime: 15
  - type: SpawnOnDespawn
    prototype: IceBarrierParticles

