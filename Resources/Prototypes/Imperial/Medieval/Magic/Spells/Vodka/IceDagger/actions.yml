#Beginner

- type: entity
  id: MedievalActionIceDaggerBeginner
  name: medieval-store-spells-vodka-ice-dagger-beginner-name
  description: medieval-store-spells-vodka-ice-dagger-beginner-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0001
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalVodka: 1
        bonusEssences:
          MagicMedievalVodka: 1
  - type: MedievalInstantSpell
  - type: Action
    useDelay: 4
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/icewall_cast.ogg
    icon:
      sprite: Imperial/Medieval/Magic/Vodka/IceDagger/icons.rsi
      state: beginner
  - type: InstantAction
    event: !type:MedievalSpawnInHandSpellEvent
      spawnedEntityPrototype: IceDaggerBeginner
      spellCastDoAfter:
        delay: 0.5
        breakOnDropItem: false
        breakOnWeightlessMove: false
        breakOnMove: false
        needHand: true
        breakOnDamage: false
        speedModifier: 1
      speechPoints:
        0:
          speech: medieval-spell-speach-ice-dagger
          color: "#78C6ED"
          hideChat: true
  - type: MedievalSpawnOnlyInFreeHands
  - type: ManaDrainSpell
    manaDrain: 12
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 5
  - type: SpellCastEffect
    effectProto: IceDaggerSpellCastEffectBeginner
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionIceDaggerMiddle
      3: MedievalActionIceDaggerSenior

