# Beginner

- type: entity
  id: MedievalActionWaterSphereBeginner
  name: medieval-store-spells-vodka-water-sphere-beginner-name
  description: medieval-store-spells-vodka-water-sphere-beginner-desc
  components:
  - type: MedievalTargetSpell
  - type: Action
    useDelay: 42
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/icebeam_cast.ogg
    icon:
      sprite: Imperial/Medieval/Magic/Vodka/WaterSphere/icons.rsi
      state: beginner
  - type: TargetAction
    checkCanAccess: false
    targetingIndicator: false
    range: 60
  - type: WorldTargetAction
    event: !type:MedievalSpawnAimingEntityEvent
      spawnedEntity: MedievalEffectWaterSphereBeginner
      speechPoints:
        0:
          speech: medieval-spell-speach-water-sphere
          color: "#646464"
          hideChat: true
  - type: MedievalSpellRandomRelativeSpawn
    maxSpawnRadius: 2
    minSpawnRadius: 1
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0007
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalVodka: 1
        bonusEssences:
          MagicMedievalVodka: 1
  - type: ManaDrainSpell
    manaDrain: 25
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 15
  - type: SpellCastEffect
    effectProto: WaterSphereSpellCastEffectBeginner
  - type: MedievalTargetOverlayOnAiming
    maxTargetCount: 1
    whiteListComponents:
      - type: Damageable
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionWaterSphereMiddle
      3: MedievalActionWaterSphereSenior

