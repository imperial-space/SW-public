# Beginner

- type: entity
  id: MedievalEffectWaterSphereBeginner
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Gun/Charmer/disabler.rsi
    state: 3
  - type: PointLight
    color: cyan
    energy: 2
    radius: 3.8
  - type: MedievalParticles
    color: "#0CBFE9"
    speed: 2.0
    particlesCount: 32
    gravity: 0
    inverted: true
    collapseOnMinDistance: true
  - type: Gun
    selectedMode: FullAuto
    fireRate: 1.1
    availableModes:
      - FullAuto
    soundGunshot:
      path: /Audio/Imperial/Medieval/icebeam_shot.ogg
  - type: MedievalShootAfterSpawn
    shootRate: 1
  - type: HitscanBatteryAmmoProvider
    proto: MedievalProjectileWaterSphereBeginner
    fireCost: 1000
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: SpawnEntityOnNullSpaceTeleport
    spawn: MedievalEffectWaterSphereBeginnerDespawn
  - type: TimedDespawn
    lifetime: 2

- type: entity
  id: MedievalEffectWaterSphereBeginnerDespawn
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Gun/Charmer/disabler.rsi
    state: 3
  - type: MedievalParticles
    color: "#0CBFE9"
  - type: TimedDespawn
    lifetime: 5

