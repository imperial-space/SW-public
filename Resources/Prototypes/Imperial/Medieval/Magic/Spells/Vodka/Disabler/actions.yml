# Beginner

- type: entity
  id: MedievalActionDisablerBeginner
  name: medieval-store-spells-vodka-disabler-beginner-name
  description: medieval-store-spells-vodka-disabler-beginner-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.44
        addedEssences:
          MagicMedievalVodka1: 1
  - type: ManaDrainSpell
    manaDrain: 28
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 18
  - type: MedievalTargetSpell
  - type: Action
    useDelay: 3
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/stun_cast.ogg
    icon:
      sprite: Imperial/Medieval/Gun/Charmer/disabler.rsi
      state: 1
  - type: TargetAction
    checkCanAccess: false
    range: 60
  - type: WorldTargetAction
    event: !type:MedievalProjectileSpellEvent
      projectilePrototype:
        0: MedievalProjectileDisablerBeginner
      speechPoints:
        0:
          speech: medieval-spell-speach-disabler
          color: "#4AF1FE"
          hideChat: true
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionDisablerMiddle

