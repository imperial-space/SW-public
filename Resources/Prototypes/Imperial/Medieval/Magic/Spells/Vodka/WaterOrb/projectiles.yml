# Beginner

- type: entity
  parent: BaseItem
  id: WaterOrbBeginner
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Vodka/WaterOrb/projectiles.rsi
    state: beginner
  - type: TimedDespawn
    lifetime: 5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.15
        density: 10
        mask:
        - ItemMask
        restitution: 0
        friction: 1
  - type: ThrowingAngle
    angle: 0
  - type: Item
    size: Ginormous
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: SolutionContainerManager
    solutions:
      waterorb:
        maxVol: 5
        reagents:
        - ReagentId: Water
          Quantity: 5
  - type: Spillable
    solution: waterorb
  - type: SpillWhenWorn
    solution: waterorb
  - type: MeleeWeapon
    soundNoDamage:
      path: "/Audio/Effects/Fluids/splat.ogg"
    damage:
      types:
        Blunt: 0
  - type: DrainableSolution
    solution: waterorb
  - type: DrawableSolution
    solution: waterorb
  - type: SolutionItemStatus
    solution: waterorb
  - type: SolutionTransfer
    canChangeTransferAmount: true
  - type: UserInterface
    destroyOnEmpty: true
    interfaces:
      enum.TransferAmountUiKey.Key:
        type: TransferAmountBoundUserInterface
  - type: Edible
    edible: Drink
    solution: waterorb
    destroyOnEmpty: true
    utensil: None
  - type: Damageable
    damageContainer: Inorganic
  - type: DamageOnHit
    damage:
      types:
        Blunt: 10
  - type: DamageOnLand
    damage:
      types:
        Blunt: 10
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -10
      - !type:SpillBehavior { }
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Timer
