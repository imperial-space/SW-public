#Beginner

- type: entity
  id: MedievalActionWaterOrbBeginner
  name: medieval-store-spells-vodka-water-orb-beginner-name
  description: medieval-store-spells-vodka-water-orb-beginner-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0001
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalVodka: 1
        bonusEssences:
          MagicMedievalVodka: 1
  - type: MedievalInstantSpell
  - type: Action
    useDelay: 1
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/icewall_cast.ogg #Change sound?
    icon:
      sprite: Imperial/Medieval/Magic/Vodka/WaterOrb/icons.rsi
      state: beginner
  - type: InstantAction
    event: !type:MedievalSpawnInHandSpellEvent
      spawnedEntityPrototype: WaterOrbBeginner
      spellCastDoAfter:
        delay: 0.5
        breakOnDropItem: false
        breakOnWeightlessMove: false
        breakOnMove: false
        needHand: true
        breakOnDamage: true
        speedModifier: 1
      speechPoints:
        0:
          speech: medieval-spell-speach-water-orb #Change speech +
          color: "#78C6ED"
          hideChat: true
  - type: MedievalSpawnOnlyInFreeHands
  - type: ManaDrainSpell
    manaDrain: 5
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 3
  - type: SpellCastEffect
    effectProto: IceDaggerSpellCastEffectBeginner #Change effect!
