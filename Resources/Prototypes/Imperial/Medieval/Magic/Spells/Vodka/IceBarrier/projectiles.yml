# Base

- type: entity
  id: MedievalIceBarrier
  name: Ice Barrier
  abstract: true
  components:
  - type: Sprite
    sprite: Structures/Decoration/crystal.rsi
    state: crystal_grey
    drawdepth: Mobs
    noRot: true
  - type: Reflect
    reflectProb: 0.5
    reflects:
    - Energy
    spread: 75
  - type: Clickable
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 60
        mask:
          - MachineMask
        layer:
          - MidImpassable
          - LowImpassable
          - BulletImpassable
          - Opaque
  - type: PointLight
    radius: 3
    energy: 3
    color: "#47f8ff"
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Glass
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 20
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: GlassBreak
          - !type:DoActsBehavior
             acts: [ "Destruction" ]

# Beginner

- type: entity
  id: MedievalIceBarrierBeginner
  parent: MedievalIceBarrier
  name: Ice Barrier
  components:
  - type: Sprite
    sprite: Structures/Decoration/crystal.rsi
    state: crystal_grey
    color: "#47f8ff"
  - type: TimedDespawn
    lifetime: 8
  - type: Brarrier
    spawnedEntity: MedievalIceBarrierBeginnerClone
    spawnedOnInvalidLocation: MedievalIceBarrierBeginnerInvalidPosition
    barrierLength: 1
    lookupRadius: 0.45
    barrierSpawnTime: 0.1
    permissibleIntersectionsPercentage: 0.3
    spawnRelativePosition: 1,1
    layersBlackList:
      - Impassable
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 20
        behaviors:
          - !type:PlaySoundBehavior
            sound:
