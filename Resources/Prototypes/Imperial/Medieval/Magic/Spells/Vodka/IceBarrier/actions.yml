# Beginner

- type: entity
  id: MedievalActionIceBarrierBeginner
  name: medieval-store-spells-vodka-ice-barrier-beginner-name
  description: medieval-store-spells-vodka-ice-barrier-beginner-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.7
        addedEssences:
          MagicMedievalVodka1: 1
  - type: ManaDrainSpell
    manaDrain: 28
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 18
  - type: MedievalTargetSpell
  - type: WorldTargetAction
    useDelay: 22
    itemIconStyle: BigAction
    checkCanAccess: false
    targetingIndicator: false
    range: 5
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/icewall_cast.ogg
    icon:
      sprite: Imperial/Medieval/Gun/Charmer/barrier.rsi
      state: 1
    event: !type:MedievalSpawnSpellEvent
      spawnedEntityPrototype: MedievalIceBarrierBeginner
      spawnType: SpawnOnMousePosition
      speechPoints:
        0:
          speech: medieval-spell-speach-ice-barrier
          color: "#78C6ED"
          hideChat: true
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionIceBarrierMiddle
      3: MedievalActionIceBarrierSenior
  - type: ShowSpawnedEntity
    sprites:
      - drawedSprite:
          sprite: Structures/Decoration/crystal.rsi
          state: crystal_grey
        alwaysRender: true
        spriteColor: "#47f8ff"
        inRangeColor: "#CC00AF"
        outOfRangeColor: "#CC0000"
        range: 5
    rotationPerClick: 45
  - type: CheckInitialBarrier

