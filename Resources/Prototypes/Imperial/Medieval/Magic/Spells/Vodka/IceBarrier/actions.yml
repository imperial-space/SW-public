# Beginner

- type: entity
  id: MedievalActionIceBarrierBeginner
  name: medieval-store-spells-vodka-ice-barrier-beginner-name
  description: medieval-store-spells-vodka-ice-barrier-beginner-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0007
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalVodka: 1
        bonusEssences:
          MagicMedievalVodka: 1
  - type: ManaDrainSpell
    manaDrain: 28
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 18
  - type: SpellCastEffect
    effectProto: IceBarrierSpellCastEffectBeginner
  - type: MedievalTargetSpell
  - type: Action
    useDelay: 22
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/icewall_cast.ogg
    icon:
      sprite: Imperial/Medieval/Magic/Vodka/IceBarrier/icons.rsi
      state: beginner
  - type: TargetAction
    checkCanAccess: false
    targetingIndicator: false
    range: 5
  - type: WorldTargetAction
    event: !type:MedievalSpawnSpellEvent
      spawnedEntityPrototype: MedievalIceBarrierBeginner
      spawnType: SpawnOnMousePosition
      speechPoints:
        0:
          speech: medieval-spell-speach-ice-barrier
          color: "#78C6ED"
          hideChat: true
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionIceBarrierMiddle
      3: MedievalActionIceBarrierSenior
  - type: ShowSpawnedEntity
    sprites:
      - drawedSprite:
          sprite: Imperial/Medieval/Magic/Vodka/IceBarrier/projectiles.rsi
          state: beginner
        alwaysRender: true
        spriteColor: "#47f8ff"
        inRangeColor: "#CC00AF"
        outOfRangeColor: "#CC0000"
        range: 5
    rotationPerClick: 45
  - type: CheckInitialBarrier

