# Base

- type: entity
  id: MedievalTentacles
  name: Tentacles
  abstract: true
  components:
  - type: Clickable
  - type: Physics
    bodyType: Static
  - type: MeleeSound
    soundGroups:
      Brute:
        path: "/Audio/Weapons/slash.ogg"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 60
        mask:
          - MachineMask
        layer:
          - MidImpassable
          - LowImpassable
          - BulletImpassable
          - Opaque
        hard: false
  - type: Damageable
  - type: MedievalNotAllowDash

# Beginner

- type: entity
  id: MedievalTentaclesBeginner
  parent: MedievalTentacles
  name: Tentacles
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Darkness/Tentacles/projectiles.rsi
    state: beginner
    drawdepth: FloorTiles
    noRot: true
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 35
        behaviors:
          - !type:DoActsBehavior
             acts: [ "Destruction" ]
  - type: TimedDespawn
    lifetime: 10
  - type: TriggerOnSpawn
  - type: VectoredSpawnOnTrigger
    spawnedEntityID: MedievalTentaclesBeginnerClone
    spawnPositions: ["-1, -1", "1, -1", "-1, 1", "1, 1"]
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.3
    sprintSpeedModifier: 0.3


- type: entity
  id: MedievalTentaclesBeginnerClone
  parent: MedievalTentacles
  name: Tentacles
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Darkness/Tentacles/projectiles.rsi
    state: beginner
    drawdepth: FloorTiles
    noRot: true
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 35
        behaviors:
          - !type:DoActsBehavior
             acts: [ "Destruction" ]
  - type: TimedDespawn
    lifetime: 10
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.3
    sprintSpeedModifier: 0.3

