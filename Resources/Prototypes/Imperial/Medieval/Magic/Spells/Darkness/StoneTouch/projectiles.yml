# Beginner

- type: entity
  id: StoneTouchBeginner
  parent: BaseItem
  name: Health Touch
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Melee/hand.rsi
    state: stone
  - type: Unremoveable
  - type: MedievalMeleeResource
    resource: 1
    maxResource: 1
    resourceWaste: 1
  - type: MeleeWeapon
    wideAnimationRotation: 0
    clickDamageModifier: 1
    animation: WeaponArcThrust
    attackRate: 1
    angle: 0
    damage:
      types:
        Blunt: 5
    resistanceBypass: true
    soundHit:
      path: /Audio/Imperial/Medieval/stone_cast.ogg
  - type: MedievalAddComponentOnInteract
    components:
    - type: TurnedToStone
      lifeTime: 10
    selfUseComponents:
    - type: TurnedToStone
      lifeTime: 5
    whiteListComponents:
    - MobThresholds
  - type: MedievalAddComponentOnAttack
    components:
    - type: TurnedToStone
      lifeTime: 10
    selfUseComponents:
    - type: TurnedToStone
      lifeTime: 5
    whiteListComponents:
    - MobThresholds

