# Beginner

- type: entity
  id: MedievalActionBlackHoleBeginner
  name: medieval-store-spells-darkness-black-hole-beginner-name
  description: medieval-store-spells-darkness-black-hole-beginner-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.85
        addedEssences:
          MagicMedievalDarkness1: 1
  - type: MedievalTargetSpell
  - type: WorldTargetAction
    useDelay: 60
    itemIconStyle: BigAction
    checkCanAccess: false
    range: 60
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/blackhole_cast.ogg
    icon:
      sprite: Imperial/Medieval/Gun/Charmer/blood.rsi
      state: 1
    event: !type:MedievalProjectileSpellEvent
      projectilePrototype:
        0: MedievalProjectileBlackHoleBeginner
      projectileSpeed: 10
      spellCastDoAfter:
        delay: 1
        breakOnDropItem: false
        breakOnWeightlessMove: false
        breakOnMove: false
        needHand: true
        speedModifier: 0.3
      speechPoints:
        0:
          speech: medieval-spell-speach-black-hole
          color: "#B277FF"
          hideChat: true
        0.5:
          speech: medieval-spell-speach-black-hole2
          color: "#B277FF"
          hideChat: true
  - type: ManaDrainSpell
    manaDrain: 50
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 19
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionBlackHoleMiddle
      3: MedievalActionBlackHoleSenior

