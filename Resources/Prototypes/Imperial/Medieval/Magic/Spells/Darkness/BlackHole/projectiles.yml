# Beginner

- type: entity
  id: MedievalProjectileBlackHoleBeginner
  parent: BaseBullet
  name: BlackHole
  description: You better GITTAH WEIGH.
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Darkness/BlackHole/projectiles.rsi
    layers:
    - state: icon
      shader: unshaded
  - type: PointLight
    enabled: true
    color: "#B000FF"
    energy: 8
    radius: 6
    softness: 1
    offset: "0, 0"
  - type: Projectile
    deleteOnCollide: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 3.2
      blackHoleExplode:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.26,-0.26,0.26,0.26"
        density: 20
        mask:
        - Impassable
        hard: false
  - type: SingularityDistortion
    intensity: 130
    falloffPower: 2
  - type: GravityWell
    maxRange: 2
    minRange: 0.2
    baseRadialAcceleration: 25
    baseTangentialAcceleration: 6
    gravPulsePeriod: 0.14
  - type: ProjectileCursorFollower
  - type: TriggerOnSimilarFixtureCollide
    fixtureID: blackHoleExplode
  - type: MedievalBlackHoleExplosion
    explodeTime: 4
    explodeUpdateRate: 0.01
    blackHoleSizePerTick: 0.005
    blackHoleLightRangePerTick: 5
    blackHoleLightEnergyPerTick: 5
  - type: Explosive
    explosionType: Cryo
    maxIntensity: 40
    intensitySlope: 4
    totalIntensity: 200
    canCreateVacuum: false
  - type: AmbientSound
    volume: -3
    range: 6
    sound:
      path: /Audio/Imperial/Medieval/blackhole_static.ogg

