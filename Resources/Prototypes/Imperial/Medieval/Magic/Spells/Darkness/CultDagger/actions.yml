- type: entity
  id: MedievalActionCultDagger
  name: medieval-store-spells-darkness-cult-dagger-name
  description: medieval-store-spells-darkness-cult-dagger-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0001
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalDarkness: 1
        bonusEssences:
          MagicMedievalDarkness: 1
  - type: MedievalInstantSpell
  - type: InstantAction
    useDelay: 4
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/stone_cast.ogg
    icon:
      sprite: Imperial/Medieval/Gun/Charmer/cult_dagger.rsi
      state: 1
    event: !type:MedievalSpawnInHandSpellEvent
      spawnedEntityPrototype: MedievalMagicDaggerCult
      spellCastDoAfter:
        delay: 0.5
        breakOnDropItem: false
        breakOnWeightlessMove: false
        breakOnMove: false
        needHand: true
        breakOnDamage: true
        speedModifier: 1
      speechPoints:
        0:
          speech: medieval-spell-speach-cult-dagger
          color: "#420d0d"
          hideChat: true
  - type: MedievalSpawnOnlyInFreeHands
  - type: ManaDrainSpell
    manaDrain: 12
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-darkness-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 5
