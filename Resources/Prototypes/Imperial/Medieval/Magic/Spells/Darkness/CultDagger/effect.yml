- type: entity
  id: CultDaggerParticles
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Gun/Charmer/disabler.rsi
    state: 3
  - type: MedievalParticles
    color: "#420d0d"
  - type: TimedDespawn
    lifetime: 5
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/Imperial/Medieval/stone_release.ogg

- type: entity
  id: CultDaggerSpellcastEffectBeginner
  components:
  - type: Sprite
    sprite: Imperial/Medieval/SpellCastEffects/darkness/dagger.rsi
    state: beginner
    color: "#420d0d"
    noRot: true
    shader: unshaded
  - type: PointLight
    radius: 2
    energy: 2
    color: "#420d0d"
  - type: TimedDespawn
    lifetime: 0.5
