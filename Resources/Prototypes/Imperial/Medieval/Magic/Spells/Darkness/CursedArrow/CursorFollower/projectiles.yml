# Beginner

- type: entity
  id: MedievalProjectileCursedArrowCursorFolloverBeginner
  parent: BulletRocket
  name: fireball
  description: You better GITTAH WEIGH.
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Darkness/CursedArrow/projectiles.rsi
    layers:
    - state: cursor
      shader: unshaded
  - type: StaminaDamageOnCollide
    damage: 3
  - type: Explosive
    explosionType: Cryo
    maxIntensity: 1
    intensitySlope: 1
    totalIntensity: 0
    maxTileBreak: 0
  - type: ProjectileCursorFollower
    relativeAngle: 90
    linearVelocityIntensy: 0.1
  - type: Projectile
    damage:
      types:
        Blunt: 11
        Bloodloss: 5

