# Beginner

- type: entity
  id: MedievalActionCursedArrowPlayerFolloverBeginner
  parent: MedievalActionCursedArrowBeginner
  name: medieval-store-spells-darkness-cursed-arrow-player-follover-beginner-name
  description: medieval-store-spells-darkness-cursed-arrow-player-follover-beginner-desc
  components:
  - type: ManaDrainSpell
    manaDrain: 25
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 15
  - type: MedievalTargetSpell
  - type: WorldTargetAction
    useDelay: 8
    itemIconStyle: BigAction
    checkCanAccess: false
    range: 60
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/arrow_cast.ogg
    icon:
      sprite: Imperial/Medieval/Gun/Charmer/blood.rsi
      state: 3
    event: !type:MedievalHomingProjectilesSpellEvent
      projectilePrototype: MedievalProjectileCursedArrowPlayerFolloverBeginner
      relativeAngle: 90
      projectileSpeed: 7
      spread: 180
      linearVelocityIntensy: 0.1
      speechPoints:
        0:
          speech: medieval-spell-speach-cursed-arrow-player-follover
          color: "#B600FF"
          hideChat: true
        0.5:
          speech: medieval-spell-speach-cursed-arrow-player-follover2
          color: "#B600FF"
          hideChat: true
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.35
        addedEssences:
          MagicMedievalDarkness1: 1
  - type: DamageTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.23
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: TrainingTarget
        addedEssences:
          MagicMedievalDarkness1: 1
      - !type:AddMagicEssence
        probability: 0.3
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: MobState
          - !type:MagicTargetMobStateCondition
            allowedState: Alive
        addedEssences:
          MagicMedievalDarkness1: 1
  - type: MedievalTargetOverlayOnAiming
    maxTargetCount: 1
    whiteListComponents:
      - type: Damageable

