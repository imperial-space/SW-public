# Beginner

- type: entity
  id: MedievalActionCursedArrowKunaiBeginner
  parent: MedievalActionCursedArrowBeginner
  name: medieval-store-spells-darkness-cursed-arrow-kunai-beginner-name
  description: medieval-store-spells-darkness-cursed-arrow-kunai-beginner-desc
  components:
  - type: ManaDrainSpell
    manaDrain: 20
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 15
  - type: MedievalTargetSpell
  - type: WorldTargetAction
    useDelay: 4
    itemIconStyle: BigAction
    checkCanAccess: false
    range: 60
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/arrow_cast.ogg
    icon:
      sprite: Imperial/Medieval/Gun/Charmer/blood.rsi
      state: 2
    event: !type:MedievalEntityTargetProjectileSpellEvent
      projectilePrototype: MedievalProjectileCursedArrowKunaiBeginner
      speechPoints:
        0:
          speech: medieval-spell-speach-cursed-arrow
          color: "#B600FF"
          hideChat: true
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.35
        addedEssences:
          MagicMedievalDarkness1: 1
  - type: DamageTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.25
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: TrainingTarget
        addedEssences:
          MagicMedievalDarkness1: 1
      - !type:AddMagicEssence
        probability: 0.25
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: MobState
          - !type:MagicTargetMobStateCondition
            allowedState: Alive
        addedEssences:
          MagicMedievalDarkness1: 1
  - type: MedievalTargetOverlayOnAiming
    maxTargetCount: 2
    whiteListComponents:
      - type: Damageable

