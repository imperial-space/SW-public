# Beginner

- type: entity
  id: MedievalActionCursedArrowCursorFolloverBeginner
  parent: MedievalActionCursedArrowBeginner
  name: medieval-store-spells-darkness-cursed-arrow-cursor-follover-beginner-name
  description: medieval-store-spells-darkness-cursed-arrow-cursor-follover-beginner-desc
  components:
  - type: ManaDrainSpell
    manaDrain: 25
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 15
  - type: MedievalTargetSpell
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0003
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalDarkness: 1
        bonusEssences:
          MagicMedievalDarkness: 1
  - type: DamageTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.0003
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: TrainingTarget
        addedEssences:
          MagicMedievalDarkness1: 1
      - !type:AddMagicEssence
        probability: 0.0005
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: MobState
          - !type:MagicTargetMobStateCondition
            allowedState: Alive
        addedEssences:
          MagicMedievalDarkness1: 1
  - type: Action
    useDelay: 8
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/arrow_cast.ogg
    icon:
      sprite: Imperial/Medieval/Magic/Darkness/CursedArrow/icons.rsi
      state: beginner-cursor
  - type: TargetAction
    checkCanAccess: false
    range: 60
  - type: WorldTargetAction
    event: !type:MedievalProjectileSpellEvent
      projectilePrototype:
        0: MedievalProjectileCursedArrowCursorFolloverBeginner
      projectileSpeed: 3.4
      speechPoints:
        0:
          speech: medieval-spell-speach-cursed-arrow-cursor-follover
          color: "#B600FF"
          hideChat: true
        0.5:
          speech: medieval-spell-speach-cursed-arrow-cursor-follover2
          color: "#B600FF"
          hideChat: true


