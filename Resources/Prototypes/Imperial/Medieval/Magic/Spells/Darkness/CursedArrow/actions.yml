# Beginner

- type: entity
  id: MedievalActionCursedArrowBeginner
  name: medieval-store-spells-darkness-cursed-arrow-beginner-name
  description: medieval-store-spells-darkness-cursed-arrow-beginner-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.3
        addedEssences:
          MagicMedievalDarkness1: 1
  - type: DamageTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.4
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: TrainingTarget
        addedEssences:
          MagicMedievalDarkness1: 1
      - !type:AddMagicEssence
        probability: 0.4
        conditions:
          - !type:TargetContainsComponentsCondition
            componentsWhitelist:
              - type: MobState
          - !type:MagicTargetMobStateCondition
            allowedState: Alive
        addedEssences:
          MagicMedievalDarkness1: 1
  - type: ManaDrainSpell
    manaDrain: 25
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 5
  - type: MedievalTargetSpell
  - type: WorldTargetAction
    useDelay: 5
    itemIconStyle: BigAction
    checkCanAccess: false
    range: 60
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/arrow_cast.ogg
    icon:
      sprite: Imperial/Medieval/Gun/Charmer/blood.rsi
      state: 1
    event: !type:MedievalProjectileSpellEvent
      projectilePrototype:
        0: MedievalProjectileCursedArrow
      speechPoints:
        0:
          speech: medieval-spell-speach-cursed-arrow
          color: "#B600FF"
          hideChat: true
  - type: ActionUpgrade
    effectedLevels:
      # Cursor Follover
      2: MedievalActionCursedArrowCursorFolloverBeginner
      3: MedievalActionCursedArrowCursorFolloverMiddle
      4: MedievalActionCursedArrowCursorFolloverSenior
      # Player Follover
      5: MedievalActionCursedArrowPlayerFolloverBeginner
      6: MedievalActionCursedArrowPlayerFolloverMiddle
      7: MedievalActionCursedArrowPlayerFolloverSenior
      # Kunai
      8: MedievalActionCursedArrowKunaiBeginner
      9: MedievalActionCursedArrowKunaiMiddle
      10: MedievalActionCursedArrowKunaiSenior
