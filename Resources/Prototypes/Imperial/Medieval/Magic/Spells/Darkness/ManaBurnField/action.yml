# Beginner

- type: entity
  id: MedievalActionManaBurnFieldBeginner
  name: medieval-store-spells-darkness-mana-burn-field-beginner-name
  description: medieval-store-spells-darkness-mana-burn-field-beginner-desc
  components:
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionManaBurnFieldMiddle
      3: MedievalActionManaBurnFieldSenior
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0007
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalDarkness: 1
        bonusEssences:
          MagicMedievalDarkness: 1
  - type: ManaDrainSpell
    manaDrain: 30
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 18
  - type: SpellCastEffect
    effectProto: ManaBurnFieldSpellCastEffectBeginner
  - type: MedievalTargetSpell
  - type: Action
    useDelay: 40
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/fireball_cast.ogg
    icon:
      sprite: Imperial/Medieval/Magic/Darkness/ManaBurnField/icons.rsi
      state: beginner
  - type: TargetAction
    checkCanAccess: false
    range: 8
    targetingIndicator: false
  - type: WorldTargetAction
    event: !type:MedievalSpawnSpellEvent
      spawnedEntityPrototype: MedievalManaBurnFieldSpawnBeginner
      spawnType: SpawnOnMousePosition
      spellCastDoAfter:
        delay: 2.5
        breakOnDropItem: false
        breakOnWeightlessMove: false
        breakOnMove: false
        needHand: true
        speedModifier: 0.3
      speechPoints:
        0:
          speech: medieval-spell-speach-mana-burn-field
          color: "#B000FF"
          hideChat: true
  - type: CheckInitialBarrier

