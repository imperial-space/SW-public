- type: entity
  id: MedievalManaBurnField
  name: Mana Burn Field
  abstract: true
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Darkness/ManaBurnField/projectiles.rsi
    state: beginner
    drawdepth: FloorTiles
    noRot: true
    shader: unshaded
  - type: Clickable
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 60
        mask:
          - MachineMask
        layer:
          - MidImpassable
          - LowImpassable
          - BulletImpassable
          - Opaque
        hard: false
  - type: ManaBurnField
    burnPopup: medieval-mana-burn-field-popup

# Beginner

- type: entity
  id: MedievalManaBurnFieldSpawnBeginner
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Darkness/ManaBurnField/projectiles/beginner.rsi
    state: beginner-spawn
    noRot: true
  - type: TimedDespawn
    lifetime: 0.4
  - type: PointLight
    radius: 4
    energy: 8
    color: "#B000FF"
  - type: SpawnOnDespawn
    prototype: MedievalManaBurnFieldBeginner


- type: entity
  id: MedievalManaBurnFieldBeginner
  parent: MedievalManaBurnField
  name: Mana Burn Field
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/Darkness/ManaBurnField/projectiles/beginner.rsi
    state: beginner
    drawdepth: FloorTiles
    noRot: true
  - type: TimedDespawn
    lifetime: 12
  - type: PointLight
    radius: 4
    energy: 8
    color: "#B000FF"
  - type: ManaBurnField
    radius: 2.5
    burnQuantity: 15
    burnDelay: 1
  - type: AmbientSound
    volume: -3
    range: 6
    sound:
      path: /Audio/Imperial/Medieval/lightning_strike_weak.ogg

