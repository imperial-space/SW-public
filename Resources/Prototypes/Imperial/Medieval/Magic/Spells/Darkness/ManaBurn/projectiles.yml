- type: entity
  id: MedievalManaBurn
  name: Mana Burn Field
  abstract: true
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/mana_burn.rsi
    state: beginner
    noRot: true
    shader: unshaded
  - type: Clickable
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 60
        mask:
          - MachineMask
        layer:
          - MidImpassable
          - LowImpassable
          - BulletImpassable
          - Opaque
        hard: false
  - type: ManaBurnField
    burnPopup: medieval-mana-burn-field-popup

# Beginner

- type: entity
  id: MedievalManaBurnBeginner
  parent: MedievalManaBurn
  name: Mana Burn Field
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Magic/mana_burn.rsi
    state: beginner
  - type: TimedDespawn
    lifetime: 20
  - type: PointLight
    radius: 4
    energy: 8
    color: "#B000FF"
  - type: ManaBurnField
    radius: 3
    burnQuantity: 5
