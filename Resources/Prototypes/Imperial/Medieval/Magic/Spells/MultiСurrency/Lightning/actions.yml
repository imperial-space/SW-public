# Middle

- type: entity
  id: MedievalActionLightningMiddle
  name: medieval-store-spells-light-lightning-middle-name
  description: medieval-store-spells-light-lightning-middle-desc
  components:
  - type: MedievalTargetSpell
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.00065
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalLight: 1
        bonusEssences:
          MagicMedievalLight: 1
  - type: Action
    useDelay: 22
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/lightning_cast.ogg
    icon:
      sprite: Imperial/Medieval/Magic/MultiCurrency/Lightning/icons.rsi
      state: middle-light
  - type: TargetAction
    checkCanAccess: false
    range: 60
  - type: WorldTargetAction
    event: !type:MedievalLightningSpellEvent
      spawnedEffectPrototype: MedievalLightningExplosion
      amplitude: 0.4
      offset: 0.5,0.0
      lightningCollideEffects:
        - !type:HealthChange
          damage:
            types:
              Shock: 14
              Heat: 12
        - !type:ImperialFlashReactionEffect
          maxRange: 2
          maxDuration: 1
          slowTo: 1
      spellCastDoAfter:
        delay: 2
        breakOnDropItem: false
        breakOnWeightlessMove: false
        breakOnMove: false
        needHand: true
        speedModifier: 0.3
      speechPoints:
        0:
          speech: medieval-spell-speach-lightning
          color: "#A5C2F3"
          hideChat: true
  - type: MedievalTargetOverlayOnAiming
    maxTargetCount: 1
    whiteListComponents:
      - type: Damageable
  - type: ManaDrainSpell
    manaDrain: 65
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 22
  - type: SpellCastEffect
    effectProto: LightningSpellCastEffectMiddle
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionLightningSenior
      # # Fire Lightning
      # 3: MedievalActionFireLightningMiddle # Remove this lines, to return spell in Grimoire
      # 4: MedievalActionFireLightningSenior

