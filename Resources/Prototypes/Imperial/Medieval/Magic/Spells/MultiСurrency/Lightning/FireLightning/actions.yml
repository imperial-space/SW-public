# Middle

- type: entity
  id: MedievalActionFireLightningMiddle
  name: medieval-store-spells-light-lightning-middle-fire-name
  description: medieval-store-spells-light-lightning-middle-fire-desc
  parent: MedievalActionLightningMiddle
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        probability: 0.65
        addedEssences:
          MagicMedievalLight1: 1
  - type: MedievalTargetSpell
  - type: WorldTargetAction
    useDelay: 35
    itemIconStyle: BigAction
    checkCanAccess: false
    range: 60
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/lightning_cast.ogg
    icon:
      sprite: Imperial/Medieval/Magic/lightning.rsi
      state: fire-mid
    event: !type:MedievalLightningSpellEvent
      spawnedEffectPrototype: MedievalFireLightningExplosionMiddle
      amplitude: 0.4
      offset: 0.5,0.0
      lightningColor: "#F33900"
      lightningCollideEffects:
        - !type:FlammableReaction
          multiplier: 2
        - !type:Ignite
        - !type:HealthChange
          damage:
            types:
              Heat: 30
        - !type:ImperialFlashReactionEffect
          maxRange: 2
          maxDuration: 1
          slowTo: 1
      spellCastDoAfter:
        delay: 3
        breakOnDropItem: false
        breakOnWeightlessMove: false
        breakOnMove: false
        needHand: true
        speedModifier: 0.3
      speechPoints:
        0:
          speech: medieval-spell-speach-fire-lightning
          color: "#F37500"
          hideChat: true
  - type: MedievalTargetOverlayOnAiming
    maxTargetCount: 1
    whiteListComponents:
      - type: Damageable
  - type: ManaDrainSpell
    manaDrain: 67
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 22

