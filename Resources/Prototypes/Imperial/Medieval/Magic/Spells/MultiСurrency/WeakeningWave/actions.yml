# Senior

- type: entity
  id: MedievalActionWeakeningWaveSenior
  name: medieval-store-spells-multi-currency-weakening-wave-senior-name
  description: medieval-store-spells-multi-currency-weakening-wave-senior-desc
  components:
  - type: MedievalInstantSpell
  - type: Action
    useDelay: 185
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_healing.ogg
    icon:
      sprite: Imperial/Medieval/Magic/MultiCurrency/WeakeningWave/icons.rsi
      state: senior
  - type: InstantAction
    event: !type:MedievalInstantSpawnEvent
      spawnedEntityPrototype: WeakeningWave
      spellCastDoAfter:
        delay: 1.5
        breakOnDropItem: false
        breakOnWeightlessMove: false
        breakOnMove: false
        needHand: true
        hidden: true
        speedModifier: 0.0
      speechPoints:
        0:
          speech: medieval-spell-emote-weakening-wave
          speechType: Emote
  - type: PlayAudioAfterSpellCast
    sound:
      path: /Audio/Imperial/Medieval/Magic/Spells/shockwave.ogg
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0001
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalLight: 2
        bonusEssences:
          MagicMedievalLight: 1
      - !type:AddMagicEssence
        essenceAddProbability: 0.0001
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalVodka: 2
        bonusEssences:
          MagicMedievalVodka: 1
  - type: ManaDrainSpell
    manaDrain: 95
    canUseWithoutMana: true
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 30
  - type: SpellCastEffect
    effectProto: WeakeningWaveSpellCastEffectBeginner
