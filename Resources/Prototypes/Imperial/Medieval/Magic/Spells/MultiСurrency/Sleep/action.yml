# Middle

- type: entity
  id: MedievalActionSleepMiddle
  name: medieval-store-spells-multi-currency-sleep-middle-name
  description: medieval-store-spells-multi-currency-sleep-middle-desc
  components:
  - type: CastTraining
    trainingResults:
      - !type:AddMagicEssence
        essenceAddProbability: 0.0001
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalLight: 1
        bonusEssences:
          MagicMedievalLight: 1
      - !type:AddMagicEssence
        essenceAddProbability: 0.0001
        bonusAddProbability: 1
        addedEssences:
          MagicMedievalVodka: 1
        bonusEssences:
          MagicMedievalVodka: 1
  - type: ManaDrainSpell
    manaDrain: 80
    canUseWithoutMana: false
    manaLowMessage: medieval-spell-speach-not-enough-mana-fire-spell
    damageOnUseWithoutMana:
      groups:
        Burn: 18
  - type: MedievalTargetSpell
  - type: Action
    useDelay: 145
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Imperial/Medieval/sedation_cast.ogg
    icon:
      sprite: Imperial/Medieval/Magic/MultiCurrency/Sleep/icons.rsi
      state: middle
  - type: TargetAction
    checkCanAccess: false
    range: 60
  - type: WorldTargetAction
    event: !type:MedievalProjectileSpellEvent
      projectilePrototype:
        0: MedievalProjectileSleepMiddle
      speechPoints:
        0:
          speech: medieval-spell-speach-sleep
          color: "#AC8AA2"
          hideChat: true
  - type: ActionUpgrade
    effectedLevels:
      2: MedievalActionSleepSenior

