- type: construction
  id: FishingRodT1Construction
  name: construction-recipe-fishing-rod
  description: construction-recipe-fishing-rod-desc
  graph: FishingRodT1Construction
  startNode: start
  targetNode: FishingRodT1
  category: construction-category-misc
  icon: { sprite: Imperial/Medieval/Fishing/Objects/FishingRod/T1/rod.rsi, state: icon }
  objectType: Item

- type: constructionGraph
  id: FishingRodT1Construction
  start: start
  graph:
    - node: start
      edges:
        - to: FishingRodT1
          steps:
            - material: WoodPlank
              amount: 5
              doAfter: 2
            - material: MedievalGrass
              amount: 5
    - node: FishingRodT1
      entity: FishingRodT1

