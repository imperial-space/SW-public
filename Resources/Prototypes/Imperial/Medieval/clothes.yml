- type: entity
  parent: MedievalClothingHeadHelmetShapel
  id: MedievalSteampunkHat
  name: Steampunk Hat
  description: A pretty old inventor's hat with a flashlight on it. Quite a valuable artifact for a person interested in it.
  components:
    - type: Sprite
      sprite: Imperial/Medieval/Clothing/Head/steampunk-hat.rsi
    - type: Clothing
      sprite: Imperial/Medieval/Clothing/Head/steampunk-hat.rsi
    - type: PointLight
      color: "#a0f1e8"
      enabled: false
      mask: /Textures/Effects/LightMasks/cone.png
      radius: 5
      softness: 20
      autoRot: true
    - type: UnpoweredFlashlight
    - type: PowerCellSlot
      cellSlotId: cell_slot
    - type: ContainerContainer
      containers:
        cell_slot: !type:ContainerSlot
    - type: ItemSlots
      slots:
        cell_slot:
          name: power-cell-slot-component-slot-name-default
    - type: LightBehaviour
      behaviours:
      - !type:FadeBehaviour
        id: radiating
        interpolate: Linear
        maxDuration: 2.0
        startValue: 3.0
        endValue: 2.0
        isLooped: true
        reverseWhenFinished: true
      - !type:PulseBehaviour
        id: blinking
        interpolate: Nearest
        maxDuration: 1.0
        minValue: 0.1
        maxValue: 2.0
        isLooped: true
    - type: HideLayerClothing
      layers:
        Hair: HEAD
