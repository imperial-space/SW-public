- type: entity
  name: rabbit
  parent: SimpleMobBaseNoFood
  id: MedievalMobGhostRespawnDefence
  description: They're a golem.
  components:
    - type: Temperature
      heatDamageThreshold: 325
      coldDamageThreshold: 260
      currentTemperature: 310.15
      specificHeat: 42
      coldDamage:
        types:
          Cold: 0.01 #per second, scales with temperature & other constants
      heatDamage:
        types:
          Heat: 0.01
    - type: TimedDespawn
      lifetime: 180
    - type: Sprite
      drawdepth: Mobs
      sprite: Imperial/Medieval/Mobs/Respawn/angry.rsi
      layers:
        - map: ["enum.DamageStateVisualLayers.Base"]
          state: ghost
    - type: Physics
    - type: Fixtures
      fixtures:
        fix1:
          shape: !type:PhysShapeCircle
            radius: 0.45
          density: 50
          mask:
            - MobMask
          layer:
            - MobLayer
    - type: Appearance
    - type: Bloodstream
      bloodMaxVolume: 0
    - type: Puller
    - type: MobThresholds
      thresholds:
        0: Alive
        12: Critical
        13: Dead
    - type: Damageable
      damageModifierSet: MedievalRespawn
    - type: MovementSpeedModifier
      baseWalkSpeed: 3.7
      baseSprintSpeed: 3.7
    - type: PointLight
      color: red
      energy: 2
      radius: 1.5
    - type: NpcFactionMember
      factions:
        - Xeno
    - type: InputMover
    - type: MobMover
    - type: SlowOnDamage
      speedModifierThresholds:
        10: 1
        30: 0.8
        50: 0.7
        70: 0.6
    - type: IgnoreSpiderWeb
    - type: Thirst
      baseDecayRate: 0
    - type: Hunger
      baseDecayRate: 0
    - type: Destructible
      thresholds:
        - trigger: !type:DamageTrigger
            damage: 12
          behaviors:
            # - !type:SpawnEntitiesBehavior
            #   spawn:
            #     MedievalEssence:
            #       min: 1
            #       max: 1
            - !type:DoActsBehavior
              acts: ["Destruction"]
    - type: HTN
      rootTask:
        task: SimpleRangedHostileCompound
    - type: RechargeBasicEntityAmmo
      rechargeCooldown: 1.2
    - type: BasicEntityAmmoProvider
      proto: MedievalBulletUnholly
      capacity: 1
      count: 1
    - type: Gun
      projectileSpeed: 7
      fireRate: 1
      useKey: false
      selectedMode: FullAuto
      availableModes:
        - FullAuto
      soundGunshot: /Audio/Magic/blink.ogg
    - type: KillReviveGoal

