- type: entity
  name: Urist GigaResp
  id: MedievalMobPlayerRespawn
  parent: [SimpleMobBase, StripableInventoryBase]
  description: New church of neo-darwinists actually believe that EVERY animal evolved from a resp. Tastes like pork, and killing them is both fun and relaxing.
  components:
    - type: AreaMarkerInvoker
    - type: Damageable
      damageModifierSet: MedievalRespawnPlayer
    - type: CombatMode
    - type: MedievalMobTrigger
      fixtureId: "medieval-spawner"
    - type: TDMNaming
    - type: Inventory
      templateId: goblin
    - type: InventorySlots
    - type: Cuffable
    - type: RotationVisuals
      defaultRotation: 90
      horizontalRotation: 90
    - type: Fixtures
      fixtures:
        fix1:
          shape: !type:PhysShapeCircle
            radius: 0.35
          density: 80
          mask:
            - MobMask
          layer:
            - MobLayer
        medieval-spawner: # imperial medieval start
          shape: !type:PhysShapeCircle
            radius: 0.4
          layer: []
          #layer:
          #- DoorPassable
          mask:
            - MedievalSpawnerLayer
          hard: false # imperial medieval end
    - type: Stripping
    - type: Strippable
    - type: UserInterface
      interfaces:
        enum.StrippingUiKey.Key:
          type: StrippableBoundUserInterface
    - type: Sprite
      drawdepth: Mobs
      layers:
        - map: ["enum.DamageStateVisualLayers.Base"]
          state: player
          sprite: Imperial/Medieval/Mobs/Respawn/player.rsi
        - map: ["jumpsuit"]
        - map: ["id"]
        - map: ["gloves"]
        - map: ["shoes"]
        - map: ["ears"]
        - map: ["outerClothing"]
        - map: ["eyes"]
        - map: ["belt"]
        - map: ["neck"]
        - map: ["back"]
        - map: ["mask"]
        - map: ["head"]
        - map: ["pocket1"]
        - map: ["pocket2"]
        - map: ["enum.HumanoidVisualLayers.Handcuffs"]
          color: "#ffffff"
          sprite: Objects/Misc/handcuffs.rsi
          state: body-overlay-2
          visible: false
        - map: ["clownedon"]
          sprite: "Effects/creampie.rsi"
          state: "creampie_human"
          visible: false
    - type: Hands
    - type: GenericVisualizer
      visuals:
        enum.CreamPiedVisuals.Creamed:
          clownedon:
            True: { visible: true }
            False: { visible: false }
    - type: Speech
      speechVerb: Ghost
    - type: Body
      prototype: Reptilian
      requiredLegs: 2
    - type: CreamPied
    - type: FireVisuals
      sprite: Mobs/Effects/onfire.rsi
      normalState: Standing
    - type: Puller
    - type: CanHostGuardian
    - type: NPCRetaliation
      attackMemoryLength: 40
    - type: FactionException
    - type: ComplexInteraction
    - type: NpcFactionMember
      factions:
        - Passive
    - type: HTN
      rootTask:
        task: SimpleHostileCompound
    - type: GhostRole
      prob: 1
      makeSentient: true
      name: Перерождение
      description: Пройдите испытание для респавна
      rules: Выбейте необходимое количество магической эссенции из злых духов вокруг и купите за нее магический ключ. После чего кликните ключом по особой двери и отправьтесь на респавн. Учтите, [color=red]ЗАХОДИТЬ ЗА ТОГО ЖЕ ПЕРСОНАЖА НЕЛЬЗЯ[/color]!!
      raffle:
        settings: default
    - type: GhostTakeoverAvailable
    #- type: IdExaminable
    - type: SlowOnDamage
      speedModifierThresholds:
        150: 0.7
        255: 0.5
    - type: MeleeWeapon
      hidden: true
      soundHit:
        collection: Punch
      angle: 30
      animation: WeaponArcFist
      attackRate: 1
      damage:
        types:
          Blunt: 28
    - type: MobThresholds
      thresholds:
        0: Alive
        500: Critical
        501: Dead
    - type: Bloodstream
      bloodMaxVolume: 0
    - type: Destructible
      thresholds:
        - trigger: !type:DamageTrigger
            damage: 501
          behaviors:
            - !type:DoActsBehavior
              acts: ["Destruction"]
    - type: Loadout
      prototypes: [MedievalRespawnPlayer]
    - type: Mana
      maxMana: 150
      regen: 8
    - type: PassiveDamage # Slight passive regen. Assuming one damage type, comes out to about 4 damage a minute.
      allowedStates:
        - Alive
      damageCap: 500
      damage:
        types:
          Heat: -9
        groups:
          Brute: -8
    - type: Thirst
      baseDecayRate: 0
    - type: Hunger
      baseDecayRate: 0
    - type: TriggerOnSpawn
    - type: SpawnOnTrigger
      proto: SpawnPointMedievalMobPlayerRespawn
    - type: AddActionOnSpawn
      actions:
        - MedievalActionMagicArrowCursorFolloverBeginner
        - MedievalActionDivineTouchBeginner
    - type: NrpIgnore
    - type: KillsUntilRevive

- type: startingGear
  id: MedievalRespawnPlayer
  equipment:
    #pocket1: MedievalSpellbookArrowRespawn
    #pocket2: MedievalSpellbookSelfHealSoul
