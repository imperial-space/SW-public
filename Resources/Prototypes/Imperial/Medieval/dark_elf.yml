- type: entity
  id: OrganDarkElfHeart
  parent: OrganHumanHeart
  name: DarkElf heart
  components:
  - type: Metabolizer
    metabolizerTypes: [DarkElf]

- type: entity
  id: OrganDarkElfLiver
  parent: OrganHumanLiver
  name: DarkElf liver
  components:
  - type: Metabolizer
    metabolizerTypes: [DarkElf]

- type: entity
  id: OrganDarkElfStomach
  parent: OrganHumanStomach
  name: DarkElf stomach
  components:
  - type: Sprite
    state: stomach
  - type: Organ
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 75
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Stomach
  - type: Metabolizer
    # mm very yummy
    maxReagents: 5
    metabolizerTypes: [DarkElf]

- type: body
  id: DarkElf
  name: "darkElf"
  root: torso
  slots:
    head:
      part: HeadDarkElf
      connections:
      - torso
      organs:
        brain: OrganHumanBrain
        eyes: OrganHumanEyes
    torso:
      part: TorsoDarkElf
      connections:
      - right arm
      - left arm
      - right leg
      - left leg
      organs:
        heart: OrganDarkElfHeart
        lungs: OrganHumanLungs
        stomach: OrganDarkElfStomach
        liver: OrganDarkElfLiver
        kidneys: OrganHumanKidneys
    right arm:
      part: RightArmDarkElf
      connections:
      - right hand
    left arm:
      part: LeftArmDarkElf
      connections:
      - left hand
    right hand:
      part: RightHandDarkElf
    left hand:
      part: LeftHandDarkElf
    right leg:
      part: RightLegDarkElf
      connections:
      - right foot
    left leg:
      part: LeftLegDarkElf
      connections:
      - left foot
    right foot:
      part: RightFootDarkElf
    left foot:
      part: LeftFootDarkElf

- type: metabolizerType
  id: DarkElf
  name: DarkElf

- type: entity
  save: false
  name: Урист МакДаркЭльф
  parent: BaseMobDarkElf
  id: MobDarkElf

- type: entity
  save: false
  name: Urist McHands The DarkElf
  parent: BaseMobSpeciesOrganic
  id: BaseMobDarkElf
  abstract: true
  components:
  - type: Hunger
  - type: Thirst
  - type: Icon
    sprite: Imperial/Medieval/Species/Slime/parts.rsi # It was like this beforehand, no idea why.
    state: full
  - type: Respirator
    damage:
      types:
        Asphyxiation: 1.7
    damageRecovery:
      types:
        Asphyxiation: -0.7
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    scale: 0.97, 1.03
  - type: Body
    prototype: DarkElf
    requiredLegs: 2
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 6
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.4
        # they r smaller
        density: 150
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
      medieval-spawner: # imperial medieval start
        shape: !type:PhysShapeCircle
          radius: 0.4
        #layer:
        #- DoorPassable
        mask:
        - MedievalSpawnerLayer
        hard: false # imperial medieval end
  - type: LanguageSpeaker
    languages:
      Common: Speak
      #Goblin: Speak
      Ancient: Understand
      #Tribe: Speak
      #Orc: Speak
      #Cursed: Speak
      #Growling: Speak
      #Hissing: Speak
      Elf: Speak
  - type: Vocal
    sounds:
      Male: MaleHuman
      Female: FemaleHuman
      Unsexed: MaleHuman
  - type: Speech
    speechSounds: Alto
  - type:  HumanoidAppearance
    species: DarkElf
  - type: Mana
    maxManaRaceModifier: 1.25
    regenRaceModifier: 1.25
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Imperial/Medieval/Species/DarkElf/displacement.rsi
            state: jumpsuit-female
  - type: MobThresholds
    thresholds:
      0: Alive
      105: Critical
      180: Dead
  - type: NeedSleep
    sleepLevelPerUpdate: 0.21
  - type: LocalLight
    energy: 0.2
    radius: 2.8
  - type: Bloodstream
    bloodReagent: DarkElvishBlood

- type: entity
  parent: BaseMobDarkElf
  id: MobDarkElfDummy
  noSpawn: true
  components:
  - type: Sprite
    scale: 0.97, 1.03
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Imperial/Medieval/Species/DarkElf/displacement.rsi
            state: jumpsuit-female
  - type: MobThresholds
    thresholds:
      0: Alive
      105: Critical
      180: Dead
  - type: Mana
    maxManaRaceModifier: 1.5
    regenRaceModifier: 1.5
  - type: Respirator
    damage:
      types:
        Asphyxiation: 1.7
    damageRecovery:
      types:
        Asphyxiation: -0.7


