- type: entity
  parent: BaseStructureDynamic
  id: MedievalDecorBardBase
  abstract: true
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Clothing/BardClothes/bard_decorations.rsi
    no_rotation: true
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/poster_broken.ogg
  - type: Item
    size: Huge

- type: entity
  parent: MedievalDecorBardBase
  id: MedievalDecorBardDragon
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Clothing/BardClothes/bard_decorations.rsi
    state: dragon

