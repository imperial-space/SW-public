- type: entity
  id: MedievalLateMobSpawnerBase
  name: late mob spawn test
  parent: MarkerBase
  components:
  - type: Sprite
    sprite: Imperial/Other/ErtCall/imperial_jobs.rsi
    layers:
    #- state: black
    - sprite: Imperial/Other/ErtCall/imperial_jobs.rsi
      state: cburn
  - type: SlowMobSpawn
    spawnEffect: MedievalLateMobSpawnEffect
    spawnMob: MobMonkey
    soundEffect: "/Audio/Imperial/Medieval/mob_spawn_effect.ogg"
  - type: TimedDespawn
    lifetime: 10

