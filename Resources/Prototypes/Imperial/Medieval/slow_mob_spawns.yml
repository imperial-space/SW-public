- type: entity
  name: lightning
  id: MedievalLateMobSpawnEffect
  noSpawn: true
  components:
  - type: Sprite
    drawdepth: FloorTiles
    sprite: /Textures/Imperial/Medieval/Misc/spawneffect.rsi
    layers:
    - state: "effect"
  - type: Physics
    canCollide: false
  - type: TimedDespawn
    lifetime: 30
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  name: lightning
  id: MedievalAnglerMobSlowSpawner
  noSpawn: true
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: /Textures/Imperial/Medieval/Misc/anglerspawneffect.rsi
    layers:
    - state: "effect"
  - type: Physics
    canCollide: false
  - type: MedievalTimedDespawn
    lifetime: 10
  - type: Tag
    tags:
    - HideContextMenu
  - type: SpawnOnDespawn
    prototype: MedievalMobAngler
  - type: AmbientSound
    sound: /Audio/Imperial/Medieval/footstep_hunter.ogg
    volume: 10
    range: 5


