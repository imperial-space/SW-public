- type: entity
  parent: BookBase
  id: BookMedievalBarrier
  name: Some
  description: There are endless illegible notes scribbled in the margins. Most of the text is covered in handwritten question marks.
  components:
  - type: Sprite
    layers:
    - state: paper
    - state: cover_old
      color: "#4d2e0d"
    - state: decor_bottom
      color: "#4d2e0d"
    - state: icon_eye
  - type: Paper
    content: book-text-medieval-barrier

