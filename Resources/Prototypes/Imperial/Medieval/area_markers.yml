- type: entity
  id: BaseAreaMarker
  parent: MarkerBase
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: AreaMarker
    areaName: area-placeholder-name
  - type: Sprite
    layers:
    - state: location
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        hard: false

- type: entity
  id: AreaMarkerPortNearby
  parent: BaseAreaMarker
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: AreaMarker
    areaName: area-map1-port-nearby
    audioPath:
      path: /Audio/Imperial/Medieval/area_markers/legbels.ogg

