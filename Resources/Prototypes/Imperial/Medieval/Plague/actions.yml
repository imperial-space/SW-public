- type: entity
  id: OpenPlagueMenuAction
  name: Plague menu
  description: queueueueueueueue
  categories: [ HideSpawnMenu ]
  components:
    - type: InstantAction
      itemIconStyle: BigAction
      icon:
        sprite: /Textures/Imperial/Medieval/Interface/Plague/actions.rsi
        state: shop
      event: !type:OpenPlagueEvolutionMenuActionEvent
      useDelay: 30

