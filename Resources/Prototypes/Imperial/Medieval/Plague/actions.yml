  name: Plague menu
  description: queueueueueueueue
  categories: [ HideSpawnMenu ]
  components:
    - type: Action
      itemIconStyle: BigAction
      icon:
        sprite: /Textures/Imperial/Medieval/Interface/Plague/actions.rsi
        state: shop
      useDelay: 30
    - type: InstantAction
