  - /Audio/Imperial/Medieval/resin_move2.ogg
  - /Audio/Imperial/Medieval/resin_move1.ogg

- type: soundCollection
  id: MyrmexAttack
  files:
  - /Audio/Imperial/Medieval/ant_attack1.ogg
  - /Audio/Imperial/Medieval/ant_attack2.ogg
  - /Audio/Imperial/Medieval/ant_attack3.ogg

- type: soundCollection
  id: MyrmexFootsteps
  files:
  - /Audio/Imperial/Medieval/ant_footstep1.ogg
  - /Audio/Imperial/Medieval/ant_footstep2.ogg
  - /Audio/Imperial/Medieval/ant_footstep3.ogg

- type: tile
  id: MedievalMyrmexFloor
  name: смола мирмексов
  sprite: /Textures/Imperial/Medieval/Myrmex/Structures/myrmex_tiles.png
  variants: 4
  placementVariants:
  - 1.0
  - 1.0
  - 1.0
  - 1.0
  baseTurf: FloorCave
  isSubfloor: false
  ##deconstructTools: [ Prying ]
  footstepSounds:
    collection: MyrmexFootsteps
  itemDrop: FloorTileItemWoodLarge
  heatCapacity: 99910000
  badSmellMod: 0.75

# ===========================

- type: entity
  id: MedievalMyrmexDoor
  parent: BaseStructure
  name: myrmedon's door
  description: It opens, it closes, and maybe crushes you.
  components:
  - type: DoorBolt
    #boltsDown: True
    boltUpSound:
      path: /Audio/Imperial/Medieval/resin_move1.ogg
    boltDownSound:
      path:/Audio/Imperial/Medieval/resin_move2.ogg
  - type: InteractionOutline
  - type: Sprite
    netsync: false
    sprite: /Textures/Imperial/Medieval/Myrmex/Structures/Walls/myrmedon_door.rsi
    snapCardinals: true
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: AnimationPlayer
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 100
        mask:
        - FullTileMask
        layer:
        - AirlockLayer
  - type: Door
    performCollisionCheck: false
    bumpOpen: false
    clickOpen: true
    canCrush: false
    closeTimeOne: 0.2
    closeTimeTwo: 0.6
    openTimeOne: 0.6
    openTimeTwo: 0.2
    pryTime: 11
    openingAnimationTime: 1.2
    closingAnimationTime: 1.2
    openSound:
      path: /Audio/Imperial/Medieval/resin_move2.ogg
    closeSound:
      path: /Audio/Imperial/Medieval/resin_move1.ogg
    denySound:
      path: /Audio/Imperial/Medieval/resin_move1.ogg
  - type: Appearance
  - type: Airtight
    fixVacuum: true
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound: /Audio/Imperial/Medieval/resin_move2.ogg
  - type: IconSmooth
    key: walls
    mode: NoSprite
  - type: Occluder
  placement:
    mode: SnapgridCenter

- type: entity
  parent: BaseWall
  id: MedievalMyrmexFlimsyWall
  name: myrmedon's flimsy wall
  components:
  - type: Tag
    tags:
      - Wall
      #- RCDDeconstructWhitelist
  - type: Sprite
    sprite: /Textures/Imperial/Medieval/Myrmex/Structures/Walls/myrmex_flimsy_wall.rsi
  - type: Icon
    sprite: /Textures/Imperial/Medieval/Myrmex/Structures/Walls/myrmex_flimsy_wall.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IconSmooth
    key: walls
    base: flimsy
  - type: ExplosionResistance
    damageCoefficient: 10

- type: entity
  parent: BaseWall
  id: MedievalMyrmexStrongWall
  name: myrmedon's strong wall
  components:
  - type: Tag
    tags:
      - Wall
      #- RCDDeconstructWhitelist
  - type: Sprite
    sprite: /Textures/Imperial/Medieval/Myrmex/Structures/Walls/myrmex_strong_wall.rsi
  - type: Icon
    sprite: /Textures/Imperial/Medieval/Myrmex/Structures/Walls/myrmex_strong_wall.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 800
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IconSmooth
    key: walls
    base: strong
  - type: ExplosionResistance
    damageCoefficient: 20

