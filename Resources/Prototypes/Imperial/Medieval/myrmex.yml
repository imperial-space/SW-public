- type: entity
  abstract: true
  parent: SimpleMobBaseNoFood
  id: MedievalMyrmexBase
  components:
  - type: DamageStateVisuals
    states:
      Alive:
        Base: base
      Critical:
        Base: crit
      Dead:
        Base: dead
  - type: Tag
    tags:
    - CannotSuicide
    - DoorBumpOpener
    - FootstepSound
  - type: NpcFactionMember
    factions:
    - Xeno
  - type: IgnoreSpiderWeb
  - type: Bloodstream
    bloodReagent: CopperBlood
    bloodMaxVolume: 100
  - type: Puller
  - type: Appearance
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.45
        density: 50
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: GhostTakeoverAvailable
  - type: FootstepModifier
    footstepSoundCollection:
      collection: MyrmexFootsteps
      params:
        variation: 0.125
        volume: -5
  - type: MobMover
  - type: LanguageSpeaker
    languages:
      #Common: Understand
