- type: entity
  id: MedievalMyrmexTrap
  name: trap
  description: it's a trap!
  components:
  - type: SpriteFade
  - type: Clickable
  - type: Sprite
    noRot: true
    sprite: /Textures/Imperial/Medieval/Myrmex/Structures/myrmex_trap.rsi
    drawdepth: Mobs
    offset: 0,0.3
    layers:
      - state: barrierwire1
        map: ["random"]
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35,-0.35,0.35,0.35"
        density: 1000
        layer:
        - WallLayer
  - type: Damageable
    damageContainer: Biological
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Imperial/Medieval/resin_move2.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.30
    sprintSpeedModifier: 0.20
  - type: TriggerOnCollide
    fixtureID: fix1

