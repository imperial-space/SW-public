- type: entity
  id: PartOrc
  parent: [BaseItem, BasePart]
  name: "Orc body part"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: OrcBlood
        Quantity: 10

- type: entity
  id: TorsoOrc
  name: "Orc torso"
  parent: [PartOrc, BaseTorso]
