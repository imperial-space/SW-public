# Blood

- type: reagent
  id: OrcBlood
  parent: Blood
  name: reagent-name-orc-blood
  slipData: null
  desc: reagent-desc-orc-blood
  evaporationSpeed: 0.3
  absorbent: true
  physicalDesc: reagent-physical-desc-orc-blood
  flavor: orcblood

- type: flavor
  id: orcblood
  flavorType: Complex
  description: flavor-complex-orc-blood

