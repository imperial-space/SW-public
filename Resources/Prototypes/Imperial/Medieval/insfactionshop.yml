- type: entity
  parent: BaseStructure
  id: MedievalShopHoleIns
  name: MedievalShopHole
  description: Suspiciously looking old radio...
  suffix: Empty
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Misc/mdv_shop.rsi
    layers:
    - state: ins
    netsync: false
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: ActivatableUI
    singleUser: true
    key: enum.StoreUiKey.Key
  - type: Store
    categories:
    - MedievalInsWeapon
    - MedievalInsArmor
    - MedievalInsTransport
    currencyWhitelist:
    - MedalIns
    balance:
      MedalIns: 0
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [["Medical"]]


- type: storeCategory
  id: MedievalInsWeapon
  name: medieval-category-weapon
  priority: 0

- type: storeCategory
  id: MedievalInsArmor
  name: medieval-category-armor
  priority: 1

- type: storeCategory
  id: MedievalInsTransport
  name: medieval-category-transport
  priority: 2

- type: currency
  id: MedalIns
  displayName: store-currency-display-medal
  cash:
    1: MedievalMedalIns
  canWithdraw: true

- type: entity
  name: MedievalMedalIns
  parent: BaseItem
  id: MedievalMedalIns
  description: furry :)
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Materials/mdv.rsi
    layers:
    - state: medal_ins
      map: ["base"]
  - type: Tag
    tags:
    - RawMaterial
    - MedievalMedalIns
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      MedalIns: 1
  - type: Stack
    stackType: MedalIns
    count: 1
  - type: Currency
    price:
      MedalIns: 1

- type: material
  id: MedalIns
  stackEntity: MedievalMedalIns
  name: materials-medal
  icon: { sprite: Imperial/Medieval/Materials/mdv.rsi, state: medal_ins }
  color: "#d9d9d9"
  price: 1

- type: stack
  id: MedalIns
  name: MedalIns
  icon: { sprite: Imperial/Medieval/Materials/mdv.rsi, state: medal_ins }
  spawn: MedievalMedalIns
  maxCount: 100

