- type: achievement
  id: AchievementPickupAnyDragonTablet
  name: "Древняя скрижаль"
  description: "Овладейте древней скрижалью, способной призвать дракона."
  roundOnly: true
  icon:
    sprite: Imperial/Medieval/Mobs/Bosses/Dragons/items.rsi
    state: icetablet
  conditions:
  - !type:CollectAnyItemsCondition
    progressKey: anyDragonTabletProgression
    requiredCount: 1
    itemPrototypes:
    - MedievalThunderDragonTablet
    - MedievalAcidDragonTablet
    - MedievalFireDragonTablet
    - MedievalIceDragonTablet

- type: achievement
  id: MedievalMasterOfCommunication
  name: "Связист"
  description: "Ни один чих на острове не остаётся без вашего внимания."
  roundOnly: true
  icon:
    sprite: Imperial/Medieval/Misc/comms.rsi
    state: leg
  hidden: true
  conditions:
  - !type:CollectAllItemsCondition
    progressKey: commscrystals # прогресс кей для каждого предмета генерится автоматом в формате ProgressKey:ProtoId(commscrystals:MedievalCommsCrystallLeg)
    itemPrototypes:
      MedievalCommsCrystallLeg: 1
      MedievalCommsCrystallMine: 1
      MedievalCommsCrystallBand: 1
      MedievalCommsCrystallIns: 1
      MedievalCommsCrystallMerc: 1
      MedievalCommsCrystallColl: 1
