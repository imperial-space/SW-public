  name: "Драконоборец"
  description: "Победите любого дракона в бою."
  roundOnly: true
  icon:
    sprite: Imperial/Medieval/Mobs/Bosses/Dragons/aciddragon.rsi
    state: alive # TODO NORMALNAYA ICONKA SUKA SSSSSSSSSSSSSSSSSSSSSSSSSSSSS
  conditions:
  - !type:KillMobCondition
    progressKey: killAnyDragonProgression
    targetMobPrototypes:
