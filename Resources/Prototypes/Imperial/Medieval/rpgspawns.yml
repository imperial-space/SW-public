- type: entity
  id: MedievalOreIron
  parent: BannerBase
  name: nanotrasen banner
  description: A banner displaying the Nanotrasen logo. It looks rather cheap.
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Decor/medieval_decor.rsi
    state: ore_iron
  - type: Physics
    bodyType: Static
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 95
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        offset: 0.35
        spawn:
          SteelOre1:
            min: 11
            max: 17
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.35
        density: 190
        mask:
        - MachineMask
        layer:
        - Opaque
        - MidImpassable
        - HighImpassable
        - BulletImpassable
  - type: TimedDespawn
    lifetime: 500
  - type: MedievalDiggAble
  - type: MedievalMeleeBadTarget # imperial medieval
    safeToHitGroup: ore # imperial medieval
    breakMultiplier: 10

