- type: entity
  id: OrganZveresHeart
  parent: OrganHumanHeart
  name: Zveres heart
  components:
  - type: Metabolizer
    metabolizerTypes: [Zveres]

- type: entity
  id: OrganZveresLiver
  parent: OrganHumanLiver
  name: Zveres liver
  components:
  - type: Metabolizer
    metabolizerTypes: [Zveres]

- type: entity
  id: OrganZveresStomach
  parent: OrganHumanStomach
  name: Zveres stomach
  components:
  - type: Sprite
    state: stomach
  - type: Organ
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 75
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Stomach
  - type: Metabolizer
    # mm very yummy
    maxReagents: 5
    metabolizerTypes: [Zveres]

- type: body
  id: Zveres
  name: "Zveres"
  root: torso
  slots:
    head:
      part: HeadZveres
      connections:
      - torso
      organs:
        brain: OrganHumanBrain
        eyes: OrganHumanEyes
    torso:
      part: TorsoZveres
      connections:
      - right arm
      - left arm
      - right leg
      - left leg
      organs:
        heart: OrganZveresHeart
        lungs: OrganHumanLungs
        stomach: OrganReptilianStomach
        liver: OrganZveresLiver
        kidneys: OrganHumanKidneys
    right arm:
      part: RightArmZveres
      connections:
      - right hand
    left arm:
      part: LeftArmZveres
      connections:
      - left hand
    right hand:
      part: RightHandZveres
    left hand:
      part: LeftHandZveres
    right leg:
      part: RightLegZveres
      connections:
      - right foot
    left leg:
      part: LeftLegZveres
      connections:
      - left foot
    right foot:
      part: RightFootZveres
    left foot:
      part: LeftFootZveres

