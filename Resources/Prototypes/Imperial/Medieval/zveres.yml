- type: entity
  save: false
  name: Urist McHands The Zveres
  parent: BaseMobSpeciesOrganic
  id: BaseMobZveres
  abstract: true
  components:
  - type: Hunger
  - type: Thirst
  - type: Icon
    sprite: Mobs/Species/Slime/parts.rsi # It was like this beforehand, no idea why.
    state: full
  - type: Respirator
    damage:
      types:
        Asphyxiation: 0.7
    damageRecovery:
      types:
        Asphyxiation: -1.3
  - type: Sprite
    noRot: true
    drawdepth: Mobs
  - type: Body
    prototype: Zveres
    requiredLegs: 2
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.4
        # they r smaller
        density: 150
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
      medieval-spawner: # imperial medieval start
        shape: !type:PhysShapeCircle
          radius: 0.4
        layer: []
        #layer:
        #- DoorPassable
        mask:
        - MedievalSpawnerLayer
        hard: false # imperial medieval end
  - type: Vocal
    sounds:
      Male: MaleZveres
      Female: FemaleZveres
      Unsexed: MaleZveres
  - type: LanguageSpeaker
    languages:
      Common: Speak
      #Goblin: Speak
      #Ancient: Speak
      #Tribe: Speak
      #Orc: Speak
      #Cursed: Speak
      Growling: Speak
      #Hissing: Speak
      #Elf: Speak
  - type: Speech
    speechSounds: Alto
  - type: HumanoidAppearance
    species: Zveres
  - type: Mana
    maxManaRaceModifier: 1.1
    regenRaceModifier: 1.1
  - type: MedievalZveresHeat
  - type: ZveresAccent
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Imperial/Medieval/Species/displacement.rsi
            state: jumpsuit-female
  - type: ZveresScream
  - type: MobThresholds
    thresholds:
      0: Alive
      120: Critical
      190: Dead
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: NeedSleep
    sleepLevelPerUpdate: 0.36
  - type: BadSmellRaceModifier
    modifier: 1.35
  - type: Wagging
  - type: Damageable
    damageModifierSet: Zveres
  - type: LocalLight
    energy: 0.2
    radius: 2
  - type: TypingIndicator
    proto: wolf
  - type: Bloodstream
    bloodReagent: ZveresBlood

- type: damageModifierSet
  id: Zveres
  coefficients:
    Heat: 1.2

