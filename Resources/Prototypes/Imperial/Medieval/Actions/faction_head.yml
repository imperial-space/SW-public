- type: entity
  id: BaseFactionMenuAction
  categories: [ HideSpawnMenu ]
  name: Меню фракции
  description: Откройте меню фракции со списком всех ваших товарищей.
  components:
  - type: InstantAction
    event: !type:OpenFactionMenuActionEvent
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions_mecha.rsi
      state: mech_cycle_equip_on
    useDelay: 0.5

- type: entity
  id: BanditFactionMenuAction
  parent: BaseFactionMenuAction
  components:
  - type: Action
    icon:
      sprite: Imperial/Medieval/Interface/Actions/faction-menu.rsi
      state: bandit

