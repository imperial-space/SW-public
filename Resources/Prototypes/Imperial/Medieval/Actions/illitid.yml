- type: entity
  id: MedievalActionIllitidThought
  name: Шёпот
  description: placeholder
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: Imperial/Medieval/Interface/Actions/illitid.rsi
      state: thought
    itemIconStyle: BigAction
  - type: TargetAction
    interactOnMiss: false
    range: 15
    checkCanAccess: false
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      requireAll: true
      components:
      - MobThresholds
    event: !type:IllitidThoughtActionEvent

