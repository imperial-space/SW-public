# просто действия, которые не подходят ни под одну группу, и скорее всего по одиночке

- type: entity
  id: HideHairAction
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions_mecha.rsi
      state: mech_cycle_equip_on
    useDelay: 0.5
  - type: InstantAction
    event: !type:HideHairToggleEvent

- type: entity
  id: FightForLifeAction
  parent: BaseAction
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions.rsi
      state: syringe
    useDelay: 1.0
    checkCanInteract: false
    enabled: true
  - type: InstantAction
    event: !type:FightForLifeActionEvent
