- type: entity
  save: false
  name: Urist McSkelly
  parent: MobSkeletonPerson
  id: MedievalMobSkeletonNecro
  noSpawn: false
  description: A dummy skeleton meant to be used in character setup.
  components:
  - type: HumanoidAppearance
    species: Skeleton
  - type: NpcFactionMember
    factions:
      - Syndicate
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: RadiationBlocker
  - type: Damageable
    damageContainer: SkeletonNecro
    damageModifierSet: SkeletonNecro
  - type: MedievalSpikeTarget # imperial medieval
    enabled: false
  - type: Mana
    maxManaRaceModifier: 1.5
    regenRaceModifier: 1.5
  - type: PointLight
    color: red
    energy: 1.8
    radius: 2.5
    netsync: true
    enabled: true
  - type: HealCurse
  - type: LanguageSpeaker
    languages:
      Common: Understand
      #Goblin: Speak
      #Ancient: Speak
      #Tribe: Speak
      #Orc: Speak
      Cursed: Speak
      #Growling: Speak
      #Hissing: Speak
      #Elf: Speak
  - type: AffectRoundStats

- type: damageContainer
  id: SkeletonNecro
  supportedGroups:
    - Brute
    - Burn

- type: damageModifierSet
  id: SkeletonNecro
  coefficients:
    Blunt: 0.1
    Slash: 0.1
    Piercing: 0.1
    Cold: 1.1
    Poison: 0.0
    Radiation: 0.0
    Asphyxiation: 0.0
    Bloodloss: 0.0
    Cellular: 0.0
  flatReductions:
    #Blunt: 1
    Slash: 2
    Piercing: 3

