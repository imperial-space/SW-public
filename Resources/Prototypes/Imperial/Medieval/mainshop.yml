
# генерируемое имя для гильдии
- type: guildName
  id: TestName
  # количество частей в имени
  partCount: 3

  # как разделяются эти части
  # к примеру, "-" превратит части 1, 2, 3 в 1-2-3
  split: ""

  # сами части имени
  parts:
  - text: "Те" # текст части
    max: 1     # максимальная позиция этой части
               # здесь указано 1 - часть будет только в начале
               # то есть после позиции 1 (начинается с 1, не с 0) она не будет генерироваться
               # аналогично для минимальной позиции
  - text: "То"
    max: 1
  - text: "тес"
    min: 2
    max: 2
  - text: "тос"
    min: 2
    max: 2
  - text: "-"
    min: 2
    max: 2
  - text: "ты"
    min: 3
  - text: "мы"
    min: 3
  - text: "сты"
    min: 3


# иконка гильдии
- type: guildIcon
  id: Deprecated

  # пусть до png
  texturePath: "/Textures/deprecated.rsi/deprecated.png"

- type: guildIcon
  id: Test2
  texturePath: "/Textures/Interface/pray.svg.png"

# сам тип гильдии
- type: guildType
  id: TestType2

  # прототип имени гильдии (см. выше)
  name: TestName

  # максимальное число гильдий, которые сгенерируются по этому прототипу
  maximumGuilds: 15

  # валюта гильдии
  # Revent по умолчанию, можно не указывать
  currency: Revent

  # продающиеся предметы в гильдии
  items:
  - productEntity: FoodPizzaPineapple

    # минимальное кол-во репутации для покупки
    # по умолчанию 0
    minReputation: 10

    # цена предмета
    cost: 10
  - productEntity: FoodBurgerBacon
    cost: 5

    # на какой позиции в рейтинге гильдии
    # должен находиться игрок, чтобы купить
    # по умолчанию 0 - на любом месте
    minReputationPlace: 1

    # сколько дают репутации за покупку этого предмета
    # по умолчанию 2
    reputationForBuying: 0.2

    # в квесте нужно указать reputationReward: ...
  - productEntity: MedievalQuestContractLegionMelee
    cost: 0

    # позволяет "отделить" северных торговцев от южных
    # можно указать какой ActionId должен быть
    # в компоненте MedievalJobSpawnComponent
    spawnOnActionWhitelist: ActionSpellwardSpawnTradeLegion

    # если не указывать, то будут использоваться имя и описание предмета
    name: тест квеста
    description: тесты
  - productEntity: FoodBurgerBacon
    cost: 10
  - productEntity: DrinkColaCan
    cost: 2
  - productEntity: IngotGold
    cost: 3

- type: entity
  id: MedievalShopHole
  name: MedievalShopHole
  description: Suspiciously looking old radio...
  suffix: Empty
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Misc/mdv_shop.rsi
    layers:
    - state: shop
    netsync: false
  - type: UserInterface
    interfaces:
      enum.TradingUiKey.Key:
        type: TradingBoundUserInterface
  - type: ActivatableUI
    singleUser: true
    key: enum.TradingUiKey.Key
    # трейдинг указывать здесь
  - type: Trading
    # прототипы гильдий, которые находятся
    # в данном магазине
    guildTypes:
    - MagicGuild
    - WeaponGuild
    - ArmorGuild
    - FoodGuild
    - ClothGuild
    - BuilderGuild
    # прототип валюты, которая используется в магазине
    # по умолчанию Revent
    # должно совпадать с currency во всех guildTypes
    currency: Revent
    balance: 0
    # может ли эту дыру открывать только её владелец
    # сейчас включено, при необходимости выключить
    # нужно создать прототип личной торговой дыры (?)
    # все остальные ограничения по типу дыры для легиона настраиваются также, как раньше
    ownerOnly: true
  - type: TradingPitCollect
  - type: TrashDefendArea
  - type: Transform
    anchored: true
  - type: Clickable
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 60
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: Tag
    tags:
      - Structure
  - type: PointLight

