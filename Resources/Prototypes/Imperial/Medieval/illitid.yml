- type: entity
  id: OrganIllitidHeart
  parent: OrganHumanHeart
  name: Illitid heart
  components:
  - type: Metabolizer
    metabolizerTypes: [Illitid]

- type: entity
  id: OrganIllitidLiver
  parent: OrganHumanLiver
  name: Illitid liver
  components:
  - type: Metabolizer
    metabolizerTypes: [Illitid]

- type: entity
  id: OrganIllitidStomach
  parent: OrganHumanStomach
  name: Illitid stomach
  components:
  - type: Sprite
    state: stomach
  - type: Organ
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 75
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Stomach
  - type: Metabolizer
    # mm very yummy
    maxReagents: 5
    metabolizerTypes: [Illitid]

- type: body
  id: Illitid
  name: "Illitid"
  root: torso
  slots:
    head:
      part: HeadIllitid
      connections:
      - torso
      organs:
        brain: OrganHumanBrain
        eyes: OrganHumanEyes
    torso:
      part: TorsoIllitid
      connections:
      - right arm
      - left arm
      - right leg
      - left leg
      organs:
        heart: OrganIllitidHeart
        lungs: OrganHumanLungs
        stomach: OrganReptilianStomach
        liver: OrganIllitidLiver
        kidneys: OrganHumanKidneys
    right arm:
      part: RightArmIllitid
      connections:
      - right hand
    left arm:
      part: LeftArmIllitid
      connections:
      - left hand
    right hand:
      part: RightHandIllitid
    left hand:
      part: LeftHandIllitid
    right leg:
      part: RightLegIllitid
      connections:
      - right foot
    left leg:
      part: LeftLegIllitid
      connections:
      - left foot
    right foot:
      part: RightFootIllitid
    left foot:
      part: LeftFootIllitid

- type: metabolizerType
  id: Illitid
  name: Illitid

- type: entity
  save: false
  name: Урист МакРезонат
  parent: BaseMobIllitid
  id: MobIllitid

- type: entity
  save: false
  name: Urist McHands The Resonat
  parent: BaseMobSpeciesOrganic
  id: BaseMobIllitid
  abstract: true
  components:
  - type: Hunger
  - type: Thirst
  - type: Icon
    sprite: Mobs/Species/Slime/parts.rsi # It was like this beforehand, no idea why.
    state: full
  - type: Respirator
    damage:
      types:
        Asphyxiation: 0.6
    damageRecovery:
      types:
        Asphyxiation: -1.3
  - type: Sprite
    noRot: true
    drawdepth: Mobs
  - type: Body
    prototype: Illitid
    requiredLegs: 2
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: LanguageSpeaker
    languages:
      Common: Understand
      Resonat: Speak
      #Goblin: Speak
      Ancient: Understand
      #Tribe: Speak
      #Orc: Speak
      Cursed: Understand
      #Growling: Speak
      #Hissing: Speak
      #Elf: Speak
  - type: HumanoidAppearance
    species: Illitid
  - type: Mana
    maxManaRaceModifier: 1.1
    regenRaceModifier: 1.1
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Imperial/Medieval/Species/displacement.rsi
            state: jumpsuit-female
  - type: MobThresholds
    thresholds:
      0: Alive
      90: Critical
      190: Dead
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: NeedSleep
    sleepLevelPerUpdate: 0.25
  - type: BadSmellRaceModifier
    modifier: 1.15
  - type: Damageable
    damageModifierSet: Illitid
  - type: Illitid
  - type: Bloodstream
    bloodReagent: IllitidBlood

- type: damageModifierSet
  id: Illitid
  coefficients:
    Blunt: 1.1

- type: entity
  parent: BaseMobIllitid
  id: MobIllitidDummy
  noSpawn: true
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Imperial/Medieval/Species/displacement.rsi
            state: jumpsuit-female

