        type: Local
        visualType: Medium
        messages: [ "ammonia-smell" ]
        probability: 0.1
        conditions:
        - !type:ReagentThreshold
          reagent: Ammonia
          min: 0.25
      - !type:HealthChange
        conditions:
        - !type:OrganType
          type: Rat
        - !type:ReagentThreshold
