- type: entity
  parent: BookBase
  id: MedievalBookCultGuide
  name: книга ритуалов культа истины
  description: The book is in good condition
  components:
    - type: Sprite
      sprite: Imperial/Medieval/Misc/cult.rsi
      layers:
        - state: book
    - type: Paper
      content: >-
        [italic]
        Книга ритуалов культа истины.
        Автор - Т. В.
        Слава истине! Барьер падёт!
        Для начала вашего пути скажите заветные фразы:
        Ave (пауза)
        The (пауза)
        Truth
        Произнести их надо чётко, с растановкой, грамотно, не слишком быстро и не слишком медленно и без ошибок.
        Магия не терпит ошибок особенно в произнесении.
        Ритуал свершится лишь в том случае если, Заклинатель пред произнесением последней фразы окрапит себя кровью.
    - type: Currency
      price:
        Revent: 60
    - type: MedievalCurrency
      price:
        Revent: 60
    - type: PointLight
      color: red
      radius: 1.5
      energy: 3
    - type: TrashClear # imperial medieval
      safe: true # imperial medieval
    - type: CurseItem
      cult: true

- type: entity
  parent: MedievalBookCultGuide
  id: MedievalBookCultGuide2
  components:
    - type: CurseItem
      cult: true
    - type: Sprite
      sprite: Imperial/Medieval/Misc/cult.rsi
      layers:
        - state: book
    - type: Paper
      content: >-
        [italic]
        Книга ритуалов культа истины.
        Автор - Т. В.
        Редакция 2 - Архимаг Крови M. S.

        Для начала ритуала необходимо начертить правильную руну, загрузить в каменную статую волка  необходимое для ритуала количество алых и кровавых кристаллов и связку с проводниками, после чего погладить статую.

        При любом ритуале использующем камни, проводник будет изнашиватся. Новые проводники могут быть изготовлены кузнецом, портной же может сделать для них крепление.
        Отработанные стержни, можно расплавить на плавильне в прекрасный кровавый метал, отработавшая связка может быть распорота на кровавую кожу.

        Если культист находится в секторе, в который не проведён портал, он постепенно умирает.

        Кредо культа истинны не позволяет без причины убивать жертв. Лучше всего провести над ними ритуал связи, ведь принесёт больше пользы для культа

        Глава 1 Большие ритуалы
        Все большие ритуалы проводятся на специально подготовленном месте.

        Крест - ритуал связи с жертвой:

        ░░██░░░░░░██░░░░██░░
        ██░░░░░░██████░░░░██
        ░░░░░░░░░░██░░░░░░░░
        ░░░░██████████████░░
        ░░░░░░░░░░████░░░░░░
        ░░░░░░░░░░██░░██░░░░
        ░░░░░░░░░░████░░░░░░
        ░░░░░░░░████░░░░░░░░
        ██░░░░██░░██░░░░░░██
        ░░██░░░░████░░░░██░░

        Необходимое количество культистов - 2.

        Для проведения ритуала над жертвой необходимо поймать её, пустить кровь, начертить руну и поместить жертву в центр руны. Ритуал установит связь между культом и жертвой. Если жертва будет приносить кровь к сосудам, культ получит алые кристаллы, а жертва магическую регенерацию здоровья. Если жертва не будет приносить кровь к сосудам, она лишится магической регенерации, затем постепенно будет получать урон. Если жертва это переживёт, то она разрывает связь с культом.

        Руна, переводящая три алых кристалла в один кровавый:

        ░░░░░░░░████░░░░░░░░
        ░░██░░░░████░░░░██░░
        ░░░░░░████████░░░░░░
        ░░░░██░░████░░██░░░░
        ░░██░░██░░░░██░░██░░
        ░░██░░██░░░░██░░██░░
        ░░██░░░░████░░░░██░░
        ██░░██░░░░░░░░██░░██
        ░░░░░░████████░░░░░░
        ░░░░██░░░░░░░░██░░░░



        Необходимое количество культистов - 1.

        Руны, открывающие портал в сектора:

        Цена разблокировки секторов:
        Первые два бесплатно
        Третий - 1 кровавых кристаллов
        Четвертый - 2 кровавых
        Пятый - 2 кровавых
        Шестой - 3 кровавых
        Седьмой - 3 кровавых

