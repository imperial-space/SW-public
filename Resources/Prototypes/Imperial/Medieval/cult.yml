        袗胁褌芯褉 - 孝. 袙.
        小谢邪胁邪 懈褋褌懈薪械! 袘邪褉褜械褉 锌邪写褢褌!
        袛谢褟 薪邪褔邪谢邪 胁邪褕械谐芯 锌褍褌懈 褋泻邪卸懈褌械 蟹邪胁械褌薪褘械 褎褉邪蟹褘:
        Ave (锌邪褍蟹邪)
        The (锌邪褍蟹邪)
        Truth
        袩褉芯懈蟹薪械褋褌懈 懈褏 薪邪写芯 褔褢褌泻芯, 褋 褉邪褋褌邪薪芯胁泻芯泄, 谐褉邪屑芯褌薪芯, 薪械 褋谢懈褕泻芯屑 斜褘褋褌褉芯 懈 薪械 褋谢懈褕泻芯屑 屑械写谢械薪薪芯 懈 斜械蟹 芯褕懈斜芯泻.
        袦邪谐懈褟 薪械 褌械褉锌懈褌 芯褕懈斜芯泻 芯褋芯斜械薪薪芯 胁 锌褉芯懈蟹薪械褋械薪懈懈.
        袪懈褌褍邪谢 褋胁械褉褕懈褌褋褟 谢懈褕褜 胁 褌芯屑 褋谢褍褔邪械 械褋谢懈, 袟邪泻谢懈薪邪褌械谢褜 锌褉械写 锌褉芯懈蟹薪械褋械薪懈械屑 锌芯褋谢械写薪械泄 褎褉邪蟹褘 芯泻褉邪锌懈褌 褋械斜褟 泻褉芯胁褜褞.
