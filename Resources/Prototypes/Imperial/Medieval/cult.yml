- type: entity
  parent: MedievalBookCultGuide
  id: MedievalBookCultGuide2
  components:
    - type: CurseItem
      cult: true
    - type: Sprite
      sprite: Imperial/Medieval/Misc/cult.rsi
      layers:
        - state: book
    - type: Paper
      content: >-
        [italic]
        袣薪懈谐邪 褉懈褌褍邪谢芯胁 泻褍谢褜褌邪 懈褋褌懈薪褘.
        袗胁褌芯褉 - 孝. 袙.
        袪械写邪泻褑懈褟 2 - 袗褉褏懈屑邪谐 袣褉芯胁懈 M. S.

        袛谢褟 薪邪褔邪谢邪 褉懈褌褍邪谢邪 薪械芯斜褏芯写懈屑芯 薪邪褔械褉褌懈褌褜 锌褉邪胁懈谢褜薪褍褞 褉褍薪褍, 蟹邪谐褉褍蟹懈褌褜 胁 泻邪屑械薪薪褍褞 褋褌邪褌褍褞 胁芯谢泻邪  薪械芯斜褏芯写懈屑芯械 写谢褟 褉懈褌褍邪谢邪 泻芯谢懈褔械褋褌胁芯 邪谢褘褏 懈 泻褉芯胁邪胁褘褏 泻褉懈褋褌邪谢谢芯胁 懈 褋胁褟蟹泻褍 褋 锌褉芯胁芯写薪懈泻邪屑懈, 锌芯褋谢械 褔械谐芯 锌芯谐谢邪写懈褌褜 褋褌邪褌褍褞.

        袩褉懈 谢褞斜芯屑 褉懈褌褍邪谢械 懈褋锌芯谢褜蟹褍褞褖械屑 泻邪屑薪懈, 锌褉芯胁芯写薪懈泻 斜褍写械褌 懈蟹薪邪褕懈胁邪褌褋褟. 袧芯胁褘械 锌褉芯胁芯写薪懈泻懈 屑芯谐褍褌 斜褘褌褜 懈蟹谐芯褌芯胁谢械薪褘 泻褍蟹薪械褑芯屑, 锌芯褉褌薪芯泄 卸械 屑芯卸械褌 褋写械谢邪褌褜 写谢褟 薪懈褏 泻褉械锌谢械薪懈械.
        袨褌褉邪斜芯褌邪薪薪褘械 褋褌械褉卸薪懈, 屑芯卸薪芯 褉邪褋锌谢邪胁懈褌褜 薪邪 锌谢邪胁懈谢褜薪械 胁 锌褉械泻褉邪褋薪褘泄 泻褉芯胁邪胁褘泄 屑械褌邪谢, 芯褌褉邪斜芯褌邪胁褕邪褟 褋胁褟蟹泻邪 屑芯卸械褌 斜褘褌褜 褉邪褋锌芯褉芯褌邪 薪邪 泻褉芯胁邪胁褍褞 泻芯卸褍.

        袝褋谢懈 泻褍谢褜褌懈褋褌 薪邪褏芯写懈褌褋褟 胁 褋械泻褌芯褉械, 胁 泻芯褌芯褉褘泄 薪械 锌褉芯胁械写褢薪 锌芯褉褌邪谢, 芯薪 锌芯褋褌械锌械薪薪芯 褍屑懈褉邪械褌.

        袣褉械写芯 泻褍谢褜褌邪 懈褋褌懈薪薪褘 薪械 锌芯蟹胁芯谢褟械褌 斜械蟹 锌褉懈褔懈薪褘 褍斜懈胁邪褌褜 卸械褉褌胁. 袥褍褔褕械 胁褋械谐芯 锌褉芯胁械褋褌懈 薪邪写 薪懈屑懈 褉懈褌褍邪谢 褋胁褟蟹懈, 胁械写褜 锌褉懈薪械褋褢褌 斜芯谢褜褕械 锌芯谢褜蟹褘 写谢褟 泻褍谢褜褌邪

        袚谢邪胁邪 1 袘芯谢褜褕懈械 褉懈褌褍邪谢褘
        袙褋械 斜芯谢褜褕懈械 褉懈褌褍邪谢褘 锌褉芯胁芯写褟褌褋褟 薪邪 褋锌械褑懈邪谢褜薪芯 锌芯写谐芯褌芯胁谢械薪薪芯屑 屑械褋褌械.

        袣褉械褋褌 - 褉懈褌褍邪谢 褋胁褟蟹懈 褋 卸械褉褌胁芯泄:

