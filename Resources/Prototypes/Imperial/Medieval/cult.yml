        袛谢褟 锌褉芯胁械写械薪懈褟 褉懈褌褍邪谢邪 薪邪写 卸械褉褌胁芯泄 薪械芯斜褏芯写懈屑芯 锌芯泄屑邪褌褜 械褢, 锌褍褋褌懈褌褜 泻褉芯胁褜, 薪邪褔械褉褌懈褌褜 褉褍薪褍 懈 锌芯屑械褋褌懈褌褜 卸械褉褌胁褍 胁 褑械薪褌褉 褉褍薪褘. 袪懈褌褍邪谢 褍褋褌邪薪芯胁懈褌 褋胁褟蟹褜 屑械卸写褍 泻褍谢褜褌芯屑 懈 卸械褉褌胁芯泄. 袝褋谢懈 卸械褉褌胁邪 斜褍写械褌 锌褉懈薪芯褋懈褌褜 泻褉芯胁褜 泻 褋芯褋褍写邪屑, 泻褍谢褜褌 锌芯谢褍褔懈褌 邪谢褘械 泻褉懈褋褌邪谢谢褘, 邪 卸械褉褌胁邪 屑邪谐懈褔械褋泻褍褞 褉械谐械薪械褉邪褑懈褞 蟹写芯褉芯胁褜褟. 袝褋谢懈 卸械褉褌胁邪 薪械 斜褍写械褌 锌褉懈薪芯褋懈褌褜 泻褉芯胁褜 泻 褋芯褋褍写邪屑, 芯薪邪 谢懈褕懈褌褋褟 屑邪谐懈褔械褋泻芯泄 褉械谐械薪械褉邪褑懈懈, 蟹邪褌械屑 锌芯褋褌械锌械薪薪芯 斜褍写械褌 锌芯谢褍褔邪褌褜 褍褉芯薪. 袝褋谢懈 卸械褉褌胁邪 褝褌芯 锌械褉械卸懈胁褢褌, 褌芯 芯薪邪 褉邪蟹褉褘胁邪械褌 褋胁褟蟹褜 褋 泻褍谢褜褌芯屑.

