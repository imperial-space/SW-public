  id: MedievalBookCultGuide
  name: book
  description: The book is in good condition
  components:
    - type: Sprite
      sprite: Imperial/Medieval/Misc/cult.rsi
      layers:
        - state: book
    - type: Paper
      content: >-
        [italic]
        袣薪懈谐邪 褉懈褌褍邪谢芯胁 泻褍谢褜褌邪 懈褋褌懈薪褘.
        袗胁褌芯褉 - 孝. 袙.

        袛谢褟 薪邪褔邪谢邪 褉懈褌褍邪谢邪 薪械芯斜褏芯写懈屑芯 薪邪褔械褉褌懈褌褜 锌褉邪胁懈谢褜薪褍褞 褉褍薪褍, 蟹邪谐褉褍蟹懈褌褜 胁 泻邪屑械薪薪褍褞 褋褌邪褌褍褞 胁芯谢泻邪  薪械芯斜褏芯写懈屑芯械 写谢褟 褉懈褌褍邪谢邪 泻芯谢懈褔械褋褌胁芯 邪谢褘褏 懈 泻褉芯胁邪胁褘褏 泻褉懈褋褌邪谢谢芯胁, 锌芯褋谢械 褔械谐芯 锌芯谐谢邪写懈褌褜 褋褌邪褌褍褞.

        袝褋谢懈 泻褍谢褜褌懈褋褌 薪邪褏芯写懈褌褋褟 胁 褋械泻褌芯褉械, 胁 泻芯褌芯褉褘泄 薪械 锌褉芯胁械写褢薪 锌芯褉褌邪谢, 芯薪 锌芯褋褌械锌械薪薪芯 褍屑懈褉邪械褌.

        袣褉械写芯 泻褍谢褜褌邪 懈褋褌懈薪薪褘 薪械 锌芯蟹胁芯谢褟械褌 斜械蟹 锌褉懈褔懈薪褘 褍斜懈胁邪褌褜 卸械褉褌胁. 袥褍褔褕械 胁褋械谐芯 锌褉芯胁械褋褌懈 薪邪写 薪懈屑懈 褉懈褌褍邪谢 褋胁褟蟹懈, 胁械写褜 锌褉懈薪械褋褢褌 斜芯谢褜褕械 锌芯谢褜蟹褘 写谢褟 泻褍谢褜褌邪

