        Малые ритуалы это направление ритуалистики использующей в качестве заклинания звук.
        Поэтому требующяя максимальной чёткости произношения и собьлюдения времени произнесения.

        Между каждой фразой должно пройти не менее одного мига.
        Произнесение всей фразы же не должно занять более 5.

