- type: entity
  id: MedievalAirlock
  parent: BaseStructure
  placement:
    mode: SnapgridCenter
  name: airlock
  description: It opens, it closes, and maybe crushes you.
  components:
  - type: DoorBolt
    #boltsDown: True
    boltUpSound:
      path: /Audio/Imperial/Medieval/door_lock1.ogg
    boltDownSound:
      path: /Audio/Imperial/Medieval/door_lock2.ogg
  - type: InteractionOutline
  - type: Sprite
    netsync: false
    sprite: Imperial/Medieval/Walls/medieval_door.rsi
    snapCardinals: true
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: AnimationPlayer
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 100
        mask:
        - FullTileMask
        layer:
        - AirlockLayer
  - type: ExplosionResistance
    damageCoefficient: 3
  - type: Door
    performCollisionCheck: false
    bumpOpen: false
    clickOpen: true
    canCrush: false
    closeTimeOne: 0.2
    closeTimeTwo: 0.6
    openTimeOne: 0.6
    openTimeTwo: 0.2
    openingAnimationTime: 1.2
    closingAnimationTime: 1.2
    openSound:
      path: /Audio/Imperial/Medieval/derevyannuyu-dver-zakryili.ogg
    closeSound:
      path: /Audio/Imperial/Medieval/otkryili-steklyannuyu-dver.ogg
    denySound:
      path: /Audio/Imperial/Medieval/lyazg-visyaschego-zamka-na-zakryitoy-dveri.ogg
  - type: Appearance
  - type: Airtight
    fixVacuum: true
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound: /Audio/Imperial/Medieval/zvuk-vyibivaniya-dveri-24274.ogg
  - type: IconSmooth
    key: walls
    mode: NoSprite
  - type: Occluder
  - type: Construction
    graph: MedievalAirlock
    node: medievalairlock
  - type: DoorHackable
    minNumber: 0
    maxNumber: 6
    numberCount: 3

- type: construction
  id: MedievalAirlock
  name: деревянная дверь
  description: Простая деревянная дверь.
  graph: MedievalAirlock
  startNode: start
  targetNode: medievalairlock
  category: construction-category-furniture
  icon:
    sprite: Imperial/Medieval/Walls/medieval_door.rsi
    state: closed
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  conditions:
    - !type:TileNotBlocked

- type: constructionGraph
  id: MedievalAirlock
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: medievalairlock
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 24
              doAfter: 25
    - node: medievalairlock
      entity: MedievalAirlock
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank
              amount: 10
          steps:
            - tool: MedievalBlacksmithing
              doAfter: 150

