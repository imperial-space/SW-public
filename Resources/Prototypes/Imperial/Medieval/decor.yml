  id: Mattress
  name: Спальник
  description: На нем можно отоспаться
  graph: Mattress
  startNode: start
  targetNode: Mattress
  category: construction-category-furniture
  icon:
    sprite: Structures/Furniture/furniture.rsi
    state: mattress
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  conditions:
    - !type:TileNotBlocked

- type: constructionGraph
  id: Mattress
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: Mattress
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: Cloth
              amount: 8
              doAfter: 4
    - node: Mattress
      entity: Mattress
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialCloth1
              amount: 6
          steps:
            - tool: Prying
              doAfter: 500

# railing recipes

- type: constructionGraph
  id: WoodRailing
  start: start
  graph:
    - node: start
      edges:
        - to: woodrailing
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 1
              doAfter: 2
        - to: woodrailingCorner
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 2.5
        - to: woodrailingCornerSmall
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 1
              doAfter: 2
        - to: woodrailingRound
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 2

    - node: railing
      entity: WoodRailing
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 1
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 0.25

    - node: railingCorner
      entity: WoodRailingCorner
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 2
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 0.5

    - node: railingCornerSmall
      entity: WoodRailingCornerSmall
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 1
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 0.25

    - node: railingRound
      entity: WoodRailingRound
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 2
            - !type:DeleteEntity
          steps:
            - tool: Screwing
              doAfter: 0.5

