  description: Самый простой сундук.
  graph: MedievalChest4
  startNode: start
  targetNode: MedievalChest4
  category: construction-category-furniture
  icon:
    sprite: Imperial/Medieval/Decor/chest4.rsi
    state: base
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  conditions:
    - !type:TileNotBlocked

- type: constructionGraph
  id: MedievalChest4
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: MedievalChest4
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 5
              doAfter: 12
    - node: MedievalChest4
      entity: MedievalChest4
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank
              amount: 5
          steps:
            - tool: Prying
              doAfter: 500


