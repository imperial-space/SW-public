  - type: Appearance
  - type: NpcFactionMember
    factions:
    - Xeno
  - type: InputMover
  - type: MobMover
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: DamageStateVisuals
    states:
      Alive:
        Base: ant
      Dead:
        Base: ant_dead
  - type: Butcherable
    spawned:
    - id: MedievalLootAnt
      amount: 1
    - id: MedievalMagicStoneRandom
      amount: 1
      prob: 0.01
  - type: Bloodstream
    bloodMaxVolume: 0
  #- type: ReplacementAccent
  #  accent: xeno
  - type: MeleeWeapon
    hidden: true
    angle: 0
    soundHit:
      collection: AlienClaw
    animation: WeaponArcBite
    damage:
      groups:
        Brute: 1.5
      types:
        ParryAble: 1
  - type: Puller
  - type: MobThresholds
    thresholds:
      0: Alive
      6: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      10: 1
      25: 0.8
      35: 0.5
  - type: LanguageSpeaker
    languages:
      #Common: Understand
      #Goblin: Speak
      #Ancient: Speak
      #Tribe: Speak
      #Orc: Speak
      #Cursed: Speak
      #Growling: Speak
      Hissing: Speak
      #Elf: Speak
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt
        damage: 1000
      behaviors:
      - !type:GoSSDBehavior { }
      - !type:GibBehavior { }
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 1500
      behaviors:
      - !type:GoSSDBehavior { }
      - !type:SpawnEntitiesBehavior
        spawnInContainer: true
        spawn:
          Ash:
            min: 1
            max: 1
      - !type:BurnBodyBehavior { }
      - !type:PlaySoundBehavior
        sound:
          collection: MeatLaserImpact
    - trigger:
        !type:DamageTypeTrigger
        damageType: Caustic
        damage: 1
      behaviors:
      - !type:GoSSDBehavior { }
      - !type:SpawnEntitiesBehavior
        spawn:
          MedievalLootAnt:
            min: 1
            max: 1
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/lightburn.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]


