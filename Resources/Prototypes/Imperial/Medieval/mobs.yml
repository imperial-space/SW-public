- type: entity
  id: MedievalHorse
  parent: SimpleMobBaseNoFood
  name: horse
  description: Brrr
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Mobs/horse.rsi
    layers:
    - state: vehicle
    netsync: false
    noRot: true
  #- type: Strap
  #  buckleOffset: "0, 0"
  #  maxBuckleDistance: 1
  - type: MovementSpeedModifier
    acceleration: 1
    friction: 1
    baseWalkSpeed: 4.5
    baseSprintSpeed: 6
  #- type: ReplacementAccent
  #  accent: xeno
  - type: MeleeWeapon
    hidden: true
    angle: 0
    soundHit:
      collection: AlienClaw
    animation: WeaponArcBite
    damage:
      groups:
        Brute: 5
      types:
        ParryAble: 1
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Critical
      480: Dead
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 2
    - id: MedievalLeather1
      amount: 4
  - type: SlowOnDamage
    speedModifierThresholds:
      30: 1
      70: 0.8
      100: 0.7
      150: 0.5
      175: 0.25
  - type: GhostTakeoverAvailable
  - type: GhostRole
    makeSentient: true
    name: ghost-role-information-horse-name
    description: ghost-role-information-horse-description
    rules: Ведите себя как лошадь. Слушайте людей.
  - type: Hunger # probably should be prototyped
    thresholds:
      Overfed: 200
      Okay: 150
      Peckish: 100
      Starving: 50
      Dead: 0
    baseDecayRate: 0.1
  - type: Thirst
    thresholds:
      OverHydrated: 600
      Okay: 450
      Thirsty: 300
      Parched: 150
      Dead: 0
    baseDecayRate: 0.1
  - type: Bloodstream
    bloodMaxVolume: 140
  - type: NocturnBadFood

- type: entity
