- type: entity
  id: MedievalMortar
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  name: mortar
  description: From BlenderTech. Will It Blend? Let's find out!
  components:
  - type: ApcPowerReceiver
    needsPower: false
  - type: Transform
    anchored: true
  - type: ReagentGrinder
  - type: ActivatableUI
    key: enum.ReagentGrinderUiKey.Key
  - type: UserInterface
    interfaces:
      enum.ReagentGrinderUiKey.Key:
        type: ReagentGrinderBoundUserInterface
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ReagentGrinderVisualState.BeakerAttached:
        grinder:
          True: { state: "juicer1" }
          False: { state: "juicer0" }
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeAabb
          bounds: "-0.08,-0.35,0.15,0.25"
        density: 190
        mask:
        - TabletopMachineMask
        layer:
        - TabletopMachineLayer
  - type: Sprite
    netsync: false
    sprite: Imperial/Medieval/Lathe/mortar.rsi
    drawdepth: SmallObjects
    snapCardinals: true
    layers:
    - map: [ "grinder" ]
      state: "juicer0"
  #- type: UpgradePowerDraw
  #  powerDrawMultiplier: 0.75
  #  scaling: Exponential
  - type: ItemSlots
    slots:
      beakerSlot:
        whitelist:
          components:
          - FitsInDispenser
  - type: Machine
    board: ReagentGrinderMachineCircuitboard
  - type: ContainerContainer
    containers:
      beakerSlot: !type:ContainerSlot ""
      inputContainer: !type:Container ""
      machine_board: !type:Container ""
      machine_parts:

        !type:Container ""
- type: entity
  id: Medievalalchem_dispenser
  name: alchemical dispenser
  noSpawn: true
  description: An medieval alchemick desktop.
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  placement:
    mode: SnapgridCenter
  components:
  - type: ApcPowerReceiver
    needsPower: false
  - type: Sprite
    sprite: Imperial/Medieval/Lathe/alchem.rsi
    netsync: false
    snapCardinals: true
    layers:
    - state: mixer_empty
    - state: mixer_screens
      shader: unshaded
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]
  - type: Icon
    sprite: Imperial/Medieval/Lathe/alchem.rsi
    state: mixer_loaded
  - type: ChemMaster
    pillDosageLimit: 50
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: ExplosionResistance
    damageCoefficient: 0.2
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: ActivatableUI
    key: enum.ChemMasterUiKey.Key
  - type: UserInterface
    interfaces:
      enum.ChemMasterUiKey.Key:
        type: ChemMasterBoundUserInterface
  - type: Appearance
  - type: Machine
    board: ChemMasterMachineCircuitboard
  - type: ContainerContainer
    containers:
      beakerSlot: !type:ContainerSlot ""
      outputSlot: !type:ContainerSlot ""
      machine_board: !type:Container ""
      machine_parts: !type:Container ""
  - type: ItemSlots
    slots:
      beakerSlot:
        whitelist:
          components:
          - FitsInDispenser
      outputSlot:
        whitelistFailPopup: chem-master-component-cannot-put-entity-message
        whitelist:
          tags:
          - Bottle
          - PillCanister
  - type: SolutionContainerManager
    solutions:
      buffer: {}
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: PointLight
    color: orange
    energy: 2
    radius: 2

- type: entity
  id: MedievalCampfire
