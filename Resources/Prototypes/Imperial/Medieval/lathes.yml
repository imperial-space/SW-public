  name: campfire
  description: It's fire.
  components:
  - type: ApcPowerReceiver
    needsPower: false
  - type: Microwave
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.VisualState:
        enum.MicrowaveVisualizerLayers.Base:
          Idle: { state: "mw" }
