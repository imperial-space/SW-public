      kayot:
        whitelist:
          tags:
          - KayotKey
      fox:
        whitelist:
          tags:
          - RebelKey
      legion:
        whitelist:
          tags:
          - LegionnaireKey
      mage:
        whitelist:
          tags:
          - WizardKey
      mercenaries:
        whitelist:
          tags:
          - MercenaryKey
      necro:
        whitelist:
          tags:
          - NecromancerKey
      tribe:
        whitelist:
          tags:
          - TribalKey
      wood:
        whitelist:
          tags:
          - MinerKey
      king:
        whitelist:
          tags:
          - CultOfTruthKey

    sprite: Imperial/Medieval/Misc/key_storage.rsi
