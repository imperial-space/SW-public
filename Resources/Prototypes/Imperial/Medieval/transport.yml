- type: Tag
  id: HorseWearable

- type: entity
  parent: ClothingOuterBase
  id: MedievalClothingOuterHorseArmorLeather
  name: leather armor
  description: An armored vest with fur plates to protect against melee weapons.
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Clothing/Horse/leatherarmor.rsi
  - type: Clothing
    equipDelay: 4
    unequipDelay: 4
    sprite: Imperial/Medieval/Clothing/Horse/leatherarmor.rsi
  - type: WhitelistClothing
    whitelistState: clothing
  - type: Tag
    tags:
    - HorseWearable
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.65
        Slash: 0.55
        Piercing: 0.8
        Heat: 0.65
  - type: Item
    size: Huge

- type: entity
  parent: ClothingOuterBase
  id: MedievalClothingOuterHorseArmorChainMail
  name: leather armor
  description: An armored vest with fur plates to protect against melee weapons.
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Clothing/Horse/chainmailarmor.rsi
