- type: entity
  parent: SimpleMobBase
  id: MedievalHorseTransport
  name: horse
  description: MedievalHorseTransport
  components:
  - type: Sprite
    drawdepth: Objects
    sprite: Imperial/Medieval/Transport/horse.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: horse
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 30
        mask:
        - SmallMobMask
        layer:
        - SmallMobMask
  - type: InventorySlots
  - type: Inventory
    speciesId: horse
    templateId: horse
    displacements:
      outerclothing:
        sizeMaps:
          32:
            sprite: Mobs/Animals/mothroach/displacement.rsi
            state: outerclothing
      shoes1:
        sizeMaps:
          32:
            sprite: Mobs/Animals/mothroach/displacement.rsi
            state: shoes
      shoes2:
        sizeMaps:
          32:
            sprite: Mobs/Animals/mothroach/displacement.rsi
            state: shoes
      shoes3:
        sizeMaps:
          32:
            sprite: Mobs/Animals/mothroach/displacement.rsi
            state: shoes
      shoes4:
        sizeMaps:
          32:
            sprite: Mobs/Animals/mothroach/displacement.rsi
            state: shoes
  - type: Appearance
  - type: Strippable
  - type: Tag
    tags:
    - CannotSuicide
    - FootstepSound
  - type: WhitelistClothing
    whitelist: HorseWearable
    whitelistState: clothing
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: MobState
    allowedStates:
    - Alive
    - Critical
    - Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 4
    baseSprintSpeed: 3
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      150: Dead
  - type: DamageStateVisuals
    states:
      Alive:
        Base: horse
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 4
  - type: Strap
    position: Stand
    buckleOffset: "-0.00, 0.00"
    buckleTime: 1
    maxBuckleDistance: 1
  - type: Rideable
  - type: RideableSprint

