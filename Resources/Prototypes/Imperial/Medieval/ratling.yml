- type: entity
  id: OrganRatlingHeart
  parent: OrganHumanHeart
  name: Ratling heart
  components:
  - type: Metabolizer
    metabolizerTypes: [Ratling]

- type: entity
  id: OrganRatlingLiver
  parent: OrganHumanLiver
  name: Ratling liver
  components:
  - type: Metabolizer
    metabolizerTypes: [Ratling]

- type: entity
  id: OrganRatlingStomach
  parent: OrganHumanStomach
  name: Ratling stomach
  components:
  - type: Sprite
    state: stomach
  - type: Organ
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 75
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Stomach
  - type: Metabolizer
    # mm very yummy
    maxReagents: 5
    metabolizerTypes: [Ratling]

- type: body
  id: Ratling
  name: "Ratling"
  root: torso
  slots:
    head:
      part: HeadRatling
      connections:
      - torso
      organs:
        brain: OrganHumanBrain
        eyes: OrganHumanEyes
    torso:
      part: TorsoRatling
      connections:
      - right arm
      - left arm
      - right leg
      - left leg
      organs:
        heart: OrganRatlingHeart
        lungs: OrganHumanLungs
        stomach: OrganReptilianStomach
        liver: OrganRatlingLiver
        kidneys: OrganHumanKidneys
    right arm:
      part: RightArmRatling
      connections:
      - right hand
    left arm:
      part: LeftArmRatling
      connections:
      - left hand
    right hand:
      part: RightHandRatling
    left hand:
      part: LeftHandRatling
    right leg:
      part: RightLegRatling
      connections:
      - right foot
    left leg:
      part: LeftLegRatling
      connections:
      - left foot
    right foot:
      part: RightFootRatling
    left foot:
      part: LeftFootRatling

- type: metabolizerType
  id: Ratling
  name: Ratling

- type: entity
  save: false
  name: Урист МакРатлинг
  parent: BaseMobRatling
  id: MobRatling

- type: entity
  save: false
  name: Urist McHands The Ratling
  parent: BaseMobSpeciesOrganic
  id: BaseMobRatling
  abstract: true
  components:
  - type: CanSmellFood
  - type: Hunger
  - type: Thirst
  - type: Icon
    sprite: Mobs/Species/Slime/parts.rsi # It was like this beforehand, no idea why.
    state: full
  - type: Respirator
    damage:
      types:
        Asphyxiation: 0.7
    damageRecovery:
      types:
        Asphyxiation: -1.3
  - type: Sprite
    noRot: true
    drawdepth: Mobs
  - type: Body
    prototype: Ratling
    requiredLegs: 2
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: LanguageSpeaker
    languages:
      Common: Speak
      Goblin: Speak
      #Ancient: Speak
      #Tribe: Speak
      #Orc: Speak
      #Cursed: Speak
      #Growling: Speak
      #Hissing: Speak
      #Elf: Speak
  - type: Mana
    maxManaRaceModifier: 1
    regenRaceModifier: 1
  - type: Inventory
    templateId: ratling
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Imperial/Medieval/Species/displacement.rsi
            state: jumpsuit-female
  - type: MobThresholds
    thresholds:
      0: Alive
      95: Critical
      190: Dead
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: NeedSleep
    sleepLevelPerUpdate: 0.36
  - type: BadSmellRaceModifier
    modifier: 100
  - type: Damageable
    damageModifierSet: Ratling
  - type: LocalLight
    energy: 0.2
    radius: 4.2
  - type: TypingIndicator
    proto: wolf
  - type: Bloodstream
    bloodReagent: RatlingBlood
  - type: Puller
    needsHands: false
  - type: HumanoidAppearance
    species: Ratling
  - type: BadSmellVision
    smellThreshold: 80.0
    radius: 8
  - type: Speech
    speechSounds: Alto
  - type: Vocal
    sounds:
      Male: Mouse
      Female: Mouse
      Unsexed: Mouse
  - type: ReplacementAccent
    accent: ratling

- type: damageModifierSet
  id: Ratling
  coefficients:
    Heat: 1.2

