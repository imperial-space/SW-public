- type: entity
  id: PartLamian
  parent: [BaseItem, BasePart]
  name: "Lamian body part"
  abstract: true
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: LamianBlood
        Quantity: 10

