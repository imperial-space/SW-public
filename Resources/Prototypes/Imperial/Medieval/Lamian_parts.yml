# Blood

- type: reagent
  id: LamianBlood
  parent: Blood
  name: reagent-name-lamian-blood
  slipData: null
  desc: reagent-desc-lamian-blood
  evaporationSpeed: 0.3
  absorbent: true
  physicalDesc: reagent-physical-desc-lamian-blood
  color: "#00a7a7"
  flavor: lamianblood

- type: flavor
  id: lamianblood
  flavorType: Complex
  description: flavor-complex-lamian-blood

