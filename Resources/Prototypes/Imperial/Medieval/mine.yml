- type: entity
  id: MedievalWallRockMine
  parent: BaseStructure
  name: rock
  components:
    - type: Damageable
      damageContainer: Inorganic
      damageModifierSet: Metallic
    - type: MedievalDiggAble
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 80
          behaviors:
            - !type:DoActsBehavior
              acts: ["Destruction"]
            - !type:SpawnEntitiesBehavior
              spawn:
                MedievalSpawnMineCaveAfterStoneDestroy:
                  min: 1
                  max: 1
            - !type:SpawnEntitiesBehavior
              spawn:
                MedievalRockfallWait:
                  min: 1
                  max: 1
            - !type:PlaySoundBehavior
              sound:
                path: /Audio/Effects/break_stone.ogg
                params:
                  volume: -6
    - type: ExplosionResistance
      damageCoefficient: 0.3
    - type: Occluder
    - type: Airtight
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.5,-0.5,0.5,0.5"
          density: 100
          mask:
            - FullTileMask
          layer:
            - WallLayer
    - type: IconSmooth
      key: walls
      mode: NoSprite
    - type: SmoothEdge
    - type: Sprite
      sprite: Imperial/Medieval/Walls/rock.rsi
      netsync: false
      layers:
        - state: rock
        - map: [ "enum.EdgeLayer.South" ]
          state: rock_south
        - map: [ "enum.EdgeLayer.East" ]
          state: rock_east
        - map: [ "enum.EdgeLayer.North" ]
          state: rock_north
        - map: [ "enum.EdgeLayer.West" ]
          state: rock_west
    - type: MedievalMeleeBadTarget # imperial medieval
      safeToHitGroup: ore # imperial medieval
    - type: MineCaveStone

