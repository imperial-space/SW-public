- type: entity
  id: MedievalCatapultAmmoBarrelStone
  parent: BaseItem
  name: moon battlemap
  description: A battlemap for your epic moon exploring to begin, pieces not included!
  components:
    - type: RDWeight
      value: 5
    - type: Sprite
