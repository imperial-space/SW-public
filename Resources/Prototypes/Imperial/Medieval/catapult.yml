- type: entity
  id: MedievalHitMarkerBarrel
  parent: BaseItem
  components:
    - type: RandomSpawner
      prototypes:
        - MedievalHitMarkerBarrel2
      chance: 1
      offset: 1.5

- type: entity
  id: MedievalHitMarkerBarrel2
  components:
    - type: EmitSoundOnSpawn
      sound:
        path: /Audio/Imperial/Medieval/Siege/catapult_land.ogg
    - type: TimedDespawn
      lifetime: 1
    - type: SpawnOnDespawn
      prototype: MedievalExplodeBarrel
    - type: Sprite
      sprite: Imperial/Medieval/Decor/catapult_hit.rsi
      state: barrel

- type: entity
  id: MedievalExplodeBarrel
  components:
  - type: TriggerOnSpawn
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 2.3
    intensitySlope: 1
    totalIntensity: 10
    canCreateVacuum: false
  - type: SpawnOnTrigger
    proto: ShockWaveEffect

- type: entity
  id: MedievalHitMarkerGunpowder
  parent: BaseItem
  components:
    - type: RandomSpawner
      prototypes:
        - MedievalHitMarkerGunpowder2
      chance: 1
      offset: 1.3

- type: entity
  id: MedievalHitMarkerGunpowder2
  components:
    - type: EmitSoundOnSpawn
