- type: entity
  id: MedievalExplodeStone
  components:
  - type: TriggerOnSpawn
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: CatapultSone
    maxIntensity: 7
    intensitySlope: 5
    totalIntensity: 40
    canCreateVacuum: false
  - type: SpawnOnTrigger
    proto: ShockWaveEffect

- type: explosion
  id: CatapultSone
  damagePerIntensity:
    types:
      Blunt: 5
      Piercing: 5
      Structural: 65 # imperial medieval
  tileBreakChance: [0, 0.5, 1]
  tileBreakIntensity: [0, 10, 30]
  tileBreakRerollReduction: 20
  lightColor: Gray
  texturePath: /Textures/Effects/fire.rsi
  fireStates: 3
  fireColor: Gray
