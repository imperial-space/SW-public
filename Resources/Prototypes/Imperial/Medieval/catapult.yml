  - type: TriggerOnSpawn
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: MedievalDemolitionCharge
    maxIntensity: 12
    intensitySlope: 10
    totalIntensity: 110
    canCreateVacuum: false
  - type: SpawnOnTrigger
    proto: MedievalExplosionEffect

- type: entity
  id: MedievalHitMarkerStone
