    - type: Sprite
      sprite: Imperial/Medieval/Decor/catapult_hit.rsi
      state: gunpowder

- type: entity
  id: MedievalExplodeGunpowder
  components:
  - type: TriggerOnSpawn
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 10
    intensitySlope: 1
    totalIntensity: 140
    canCreateVacuum: false
  - type: SpawnOnTrigger
    proto: ShockWaveEffect

- type: entity
  id: MedievalHitMarkerAp
  parent: BaseItem
  components:
    - type: RandomSpawner
      prototypes:
        - MedievalHitMarkerAp2
      chance: 1
      offset: 0.1

- type: entity
  id: MedievalHitMarkerAp2
  components:
    - type: EmitSoundOnSpawn
