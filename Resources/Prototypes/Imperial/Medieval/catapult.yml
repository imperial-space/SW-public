- type: entity
  id: MedievalCatapult
  parent: BaseStructureDynamic
  name: nanotrasen banner
  description: A banner displaying the Nanotrasen logo. It looks rather cheap.
  components:
  - type: RDWeight
    value: 55
  - type: Sprite
    sprite: Imperial/Medieval/Decor/catapult.rsi
    layers:
      - state: ready
        map: ["enum.CatapultVisualKey.Ready"]
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 750
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Imperial/Medieval/ES_Wood_Break_8_-_SFX_Producer.ogg
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 15
            max: 20
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.66
        density: 100
        mask:
        - SmallMobMask
        layer:
        - MachineLayer
  - type: SiegeWeapon
  - type: Clickable
  - type: InteractionOutline
  - type: Appearance

- type: entity
  id: MedievalCatapultAmmoBarrel
  parent: BaseItem
  name: moon battlemap
  description: A battlemap for your epic moon exploring to begin, pieces not included!
  components:
    - type: RDWeight
      value: 1.5
    - type: Sprite
      sprite: Imperial/Medieval/Decor/catapult_ammo.rsi
      state: barrel
    - type: SiegeAmmo
      ammoType: barrel
    - type: Item
      size: Normal
    - type: MultiHandedItem

- type: entity
  id: MedievalCatapultAmmoBarrelGunpowder
  parent: BaseItem
  name: moon battlemap
  description: A battlemap for your epic moon exploring to begin, pieces not included!
  components:
    - type: RDWeight
      value: 3
    - type: Sprite
      sprite: Imperial/Medieval/Decor/catapult_ammo.rsi
      state: gunpowder
    - type: SiegeAmmo
      ammoType: gunpowder
    - type: Item
      size: Normal
    - type: MultiHandedItem

- type: entity
