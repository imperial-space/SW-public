- type: speechSounds
  id: MedievalDragon
  saySound:
    path: /Audio/Imperial/Medieval/dragon_say.ogg
  askSound:
    path: /Audio/Imperial/Medieval/dragon_ask.ogg
  exclaimSound:
    path: /Audio/Imperial/Medieval/dragon_exclaim.ogg

- type: entity
  name: dragon
  abstract: true
  parent: SimpleMobBaseNoFood
  id: MedievalBossBaseDragon
  description: big dragon
  components:
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTypeTrigger
          damageType: Blunt
          damage: 100000
        behaviors:
        - !type:GoSSDBehavior { }
        - !type:GibBehavior { }
    - type: Flammable
      firestackFade: -1
      canResistFire: true
    - type: Fixtures
      fixtures:
        fix1:
          shape: !type:PhysShapeCircle
            radius: 1.2
          density: 50
          mask:
          - MobMask
          layer:
          - MobLayer
    - type: LocalLight
      energy: 1
      radius: 5
    - type: PointLight
      netsync: false
      enabled: false
    - type: DamageStateVisuals
      states:
        Alive:
          Base: alive
        Dead:
          Base: dead
    - type: MobThresholds
      thresholds:
        0: Alive
        1500: Dead
    - type: SlowOnDamage
      speedModifierThresholds:
        500: 0.9
        1000: 0.8
        1500: 0.7
    - type: Tag
      tags:
      - FootstepSound
    - type: Bloodstream
      bloodMaxVolume: 0
    - type: Appearance
    - type: NpcFactionMember
      factions:
      - Xeno
    - type: InputMover
    - type: MobMover
    - type: HTN
      rootTask:
        task: SimpleHostileCompound
    - type: LanguageSpeaker
      languages:
        Common: Speak
        Goblin: Speak
        Ancient: Speak
        Tribe: Speak
        Orc: Speak
        Cursed: Speak
        Growling: Speak
        Hissing: Speak
        Elf: Speak
    - type: MeleeWeapon
      hidden: true
      angle: 0
      animation: WeaponArcPunch
      soundHit:
        path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
      damage:
        groups:
          Brute: 38
        types:
          Structural: 600
      range: 2.5
      attackRate: 0.5
    - type: StaminaDamageOnHit
      damage: 50
    - type: Stamina
      critThreshold: 500
    - type: MedievalUnthrowable
    - type: MeleeThrowOnHit
      distance: 7
      speed: 9
    - type: FootstepModifier
      footstepSoundCollection:
        path: /Audio/Imperial/Witchers/FootstepWitchersVendigo.ogg
        params:
          volume: -4
    - type: NoSlip
    - type: Speech
      speechVerb: LargeMob
      speechSounds: MedievalDragon
    - type: MovementSpeedModifier
      baseWalkSpeed: 3.3
      baseSprintSpeed: 2
    - type: GhostTakeoverAvailable
    - type: GhostRole
      makeSentient: true
      name: ghost-role-information-dragon-name
      description: ghost-role-information-dragon-description
      rules: ghost-role-information-dragon-rules
      mindRoles:
      - MindRoleGhostRoleSoloAntagonist
      raffle:
        settings: short
    - type: Devourer
      foodPreferenceWhitelist:
        components:
        - HumanoidAppearance
      stomachStorageWhitelist:
        components:
        - MobState
      chemical: Ichor
      healRate: 5
      whitelist:
        components:
        - MobState
        #- Door
        #tags:
        #- Wall
    - type: AchievementTarget

- type: entity
  name: dragon
  parent: MedievalBossBaseDragon
  id: MedievalBossIceDragonNoAnnouncement
  description: big dragon
  components:
    - type: Sprite
      drawdepth: Mobs
      layers:
      - map: ["enum.DamageStateVisualLayers.Base"]
        state: alive
      sprite: Imperial/Medieval/Mobs/Bosses/Dragons/icedragon.rsi
    - type: HitscanBatteryAmmoProvider
      proto: MedievalProjectileWaterSphereBeginner
      fireCost: 1
    - type: Battery
      maxCharge: 10000
      startingCharge: 10000
    - type: Gun
      projectileSpeed: 8
      fireRate: 1.3
      useKey: false
      selectedMode: SemiAuto
      availableModes:
      - SemiAuto
      soundGunshot: /Audio/Imperial/Medieval/icebeam_shot.ogg
    - type: Butcherable
      spawned:
      - id: MedievalDragonLootIcescale
        amount: 8
      - id: MedievalDragonLootBones
        amount: 5
      - id: FoodMeat
        amount: 5
      - id: MedievalLeather1
        amount: 3
      - id: MedievalDragonLootTrueWaterEssence
        amount: 1

- type: entity
  name: dragon
  parent: MedievalBossIceDragonNoAnnouncement
  id: MedievalBossIceDragon
  description: big dragon
  components:
    - type: AnnounceOnSpawn
      message: dragon-spawn-announcement
      color: "yellow"
      sender: ancient-entity
      sound:
        path: /Audio/Imperial/Medieval/dragon_summon.ogg
        volume: -2

