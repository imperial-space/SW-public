- type: entity
  parent: Smoke
  id: SummonSmoke
  name: smoke
  categories: [ HideSpawnMenu ]
  components:
  - type: Smoke
    duration: 6
    spreadAmount: 5

- type: entity
  parent: BaseItem
  id: MedievalIceDragonTablet
  name: tablet
  description: summon dragon
  components:
  - type: Appearance
  - type: Sprite
    sprite: Imperial/Medieval/Mobs/Bosses/Dragons/items.rsi
    layers:
      - state: icetablet
      - state: icetablet-unshaded
        shader: unshaded
  - type: Item
    size: Normal
  - type: MedievalSummonOnUse
    entitySummoned: MedievalBossIceDragon
    sound:
      path: /Audio/Imperial/Medieval/Effects/crystal.ogg

