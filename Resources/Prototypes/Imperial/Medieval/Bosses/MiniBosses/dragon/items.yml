- type: entity
  name: the nuclear option
  description: Please don't throw it, think of the children.
  parent: NuclearGrenade
  id: MedievalDragonQuantEssence
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Mobs/Bosses/Dragons/quantessence.rsi
    layers:
    - state: icon
      map: ["enum.TriggerVisualLayers.Base"]
      shader: unshaded
  - type: TimerTrigger
    beepSound:
      path: "/Audio/Imperial/Medieval/Effects/crystal.ogg"
    delay: 10
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Imperial/Medieval/quant_readiness.ogg
  - type: AmbientSound
    volume: -15
    range: 2
    sound:
      path: /Audio/Ambience/Objects/light_hum.ogg
  - type: Explosive
    explosionType: Default
    totalIntensity: 400000 # ~15 tile radius.
    intensitySlope: 5
    maxIntensity: 1000
