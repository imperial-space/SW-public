- type: entity
  id: SkeletonSkullStand
  name: пьедестал
  description: На нём выкладываются части зловещего черепа.
  placement:
    mode: AlignTileAny
  components:
  - type: Sprite
    snapCardinals: true
    sprite: Imperial/Medieval/Structures/skull-stand.rsi
    layers:
    - state: stand
    - map: [ "1" ]
      state: null
      visible: false
    - map: [ "2" ]
      state: null
      visible: false
    - map: [ "3" ]
      state: null
      visible: false
    - map: [ "4" ]
      state: null
      visible: false
    - map: [ "5" ]
      state: null
      visible: false
    - map: [ "6" ]
      state: null
      visible: false
    - map: [ "7" ]
      state: null
      visible: false
    - map: [ "8" ]
      state: null
      visible: false
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1,-1,1,1"
        density: 50
        mask:
        - LargeMobMask
        layer:
        - WallLayer
  - type: Appearance
  - type: Clickable
  - type: InteractionOutline
  - type: DoAfter
  - type: StatusEffects
    allowed:
    - Jitter
  - type: SkullBossStand
    attachSound: /Audio/Imperial/Medieval/Effects/skull-part-attach.ogg
    completeSound: /Audio/Imperial/Medieval/Effects/skull-part-attach.ogg
    announcements:
      1: "Кости, что помнят рассвет мира, очищены священным пеплом и готовы принять форму. Сегодня была начата Великая Сборка. Слушайте тишину — скоро Он заговорит с нами через нее."
      4: "Челюсти сомкнулись, и мир содрогнулся. Мы слышим Его мысли — не словами, но дрожью в костях. Каждый, кто трудится над сборкой, видит во снах падение звезд и рождение гор. Готовьте сосуды для Его глаз, ибо скоро Он узрит наш мир снова."

- type: entity
  id: BaseSkeletonSkullPart
  parent: BaseItem
  name: кусок черепа
  description: Нечто, что ни в коем случае не должно попасть в не те руки.
  abstract: true
  components:
  - type: Item
    size: Huge
  - type: MultiHandedItem
  - type: Sprite
    sprite: Imperial/Medieval/Misc/skull-stand-parts.rsi
  - type: SkullBossStandPart
  - type: RDWeight
    value: 12

- type: entity
  id: SkeletonSkullPart1
  parent: BaseSkeletonSkullPart
  components:
  - type: Item
    inhandVisuals:
      left:
      - state: skull1-inhand-left
      right:
      - state: skull1-inhand-right
  - type: Sprite
    layers:
    - state: skull1
      map: [ "base" ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SkullStandPartAppearance.Key:
        base:
          True: { state: holy-skull1 }
          False: { state: skull1 }
  - type: SkullBossStandPart
    idx: 1

