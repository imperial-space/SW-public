- type: entity
  id: SkeletonSkullStand
  name: пьедестал
  description: ы
  placement:
    mode: AlignTileAny
  components:
  - type: Sprite
    snapCardinals: true
    sprite: Imperial/Medieval/Structures/skull-stand.rsi
    layers:
    - state: stand
    - map: [ "1" ]
      state: null
      visible: false
    - map: [ "2" ]
      state: null
      visible: false
    - map: [ "3" ]
      state: null
      visible: false
    - map: [ "4" ]
      state: null
      visible: false
    - map: [ "5" ]
      state: null
      visible: false
    - map: [ "6" ]
      state: null
      visible: false
    - map: [ "7" ]
      state: null
      visible: false
    - map: [ "8" ]
      state: null
      visible: false
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1,-1,1,1"
        density: 50
        mask:
        - LargeMobMask
        layer:
        - WallLayer
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SkullStandAppearance.Key:
        "1":
          -1: {state: skull1, visible: true}
          1: {state: holy-skull1, visible: true}
        "2":
          -2: {state: skull2, visible: true}
          2: {state: holy-skull2, visible: true}
        "3":
          -3: {state: skull3, visible: true}
          3: {state: holy-skull3, visible: true}
        "4":
          -4: {state: skull4, visible: true}
          4: {state: holy-skull4, visible: true}
        "5":
          -5: {state: skull5, visible: true}
          5: {state: holy-skull5, visible: true}
        "6":
          -6: {state: skull6, visible: true}
          6: {state: holy-skull6, visible: true}
        "7":
          -7: {state: skull7, visible: true}
          7: {state: holy-skull7, visible: true}
        "8":
          -8: {state: skull8, visible: true}
          8: {state: holy-skull8, visible: true}
  - type: Clickable
  - type: InteractionOutline
  - type: DoAfter
  - type: StatusEffects
    allowed:
    - Jitter
  - type: SkullBossStand
    attachSound: /Audio/Imperial/Medieval/Effects/skull-part-attach.ogg
    completeSound: /Audio/Imperial/Medieval/Effects/skull-part-attach.ogg
    announcements:
      1: "одын"
      4: "половына"

- type: entity
  id: BaseSkeletonSkullPart
  parent: BaseItem
  name: кусок черепа
  description: Нечто, что ни в коем случае не должно попасть в не те руки.
  abstract: true
  components:
  - type: Item
    size: Huge
  - type: MultiHandedItem
  - type: Sprite
    sprite: Imperial/Medieval/Misc/skull-stand-parts.rsi
  - type: SkullBossStandPart
  - type: RDWeight
    value: 12

- type: entity
  id: SkeletonSkullPart1
  parent: BaseSkeletonSkullPart
  components:
  - type: Item
    inhandVisuals:
      left:
      - state: skull1-inhand-left
      right:
      - state: skull1-inhand-right
  - type: Sprite
    layers:
    - state: skull1
      map: [ "base" ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SkullStandPartAppearance.Key:
        base:
          True: { state: holy-skull1 }
          False: { state: skull1 }
  - type: SkullBossStandPart
    idx: 1

