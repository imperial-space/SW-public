  id: BossSpikesSpawnMarkerChess
  parent: MarkerBase
  suffix: шахматы
  components:
  - type: Sprite
    layers:
    - state: green
  - type: SpikeAttackMarker
    proto: EffectSkullBossSpikesSpawn
    positions:
      0:
        - -2,1
        - 0,1
        - 2,1
        - -1,0
        - 1,0
        - -2,-1
        - 0,-1
        - 2,-1
      1:
        - -1,1
        - 1,1
        - -2,0
        - 0,0
        - 2,0
        - -1,-1
        - 1,-1
  - type: TimedDespawn
    lifetime: 2

