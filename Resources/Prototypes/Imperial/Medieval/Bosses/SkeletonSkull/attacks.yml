- type: entity
  id: BoneSpikeBig
  parent: BaseStructure
  name: костяной шип
  description: Изнутри слышен скрежет.
  components:
  - type: Anchorable
  - type: Transform
    anchored: true
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Skeleton
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Sprite
    snapCardinals: true
    sprite: Imperial/Medieval/Structures/bone_spike_big.rsi
    state: icon
  - type: Clickable
  - type: InteractionOutline
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 450
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: gib
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageBossOnDestruction
    damageAmount: 100
  - type: TimedDespawn
    lifetime: 30
  - type: SpawnOnDespawn
    prototype: MobSkullBossSkeleton

- type: entity
  name: черепушка
  description: Что-то с ней не так...
  id: MobBossHealingSkull
  parent: BaseStructure
  components:
  - type: Physics
    bodyType: Dynamic
  - type: RandomWalk
    maxSpeed: 3.5
    minSpeed: 2
  - type: Sprite
    drawdepth: Mobs
    sprite: Imperial/Medieval/Mobs/Bosses/SkeletonSkull/minion.rsi
    layers:
    - state: minion
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: gib
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Skeleton
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 50
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Clickable
  - type: InteractionOutline
  - type: TimedBossHeal
    healAmount: 45
  - type: TimedDespawn
    lifetime: 15.1
  - type: DoAfter
  - type: TriggerOnSpawn
  - type: SpawnOnTrigger
    proto: ShockWaveEffect

- type: entity
  name: проклятая руна
  description: Что если на неё встать?
  id: SkullBossExplosionRune
  parent: CollideRune
  components:
  - type: Sprite
    scale: 2, 2
    sprite: Imperial/Medieval/Mobs/Bosses/SkeletonSkull/runes.rsi
    layers:
    - state: skull
      color: "#65007e"
  - type: Fixtures
    fixtures:
      rune:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.9,-0.9,0.9,0.9"
        hard: false
        mask:
          - ItemMask
        layer:
          - SlipLayer
  - type: Clickable
  - type: PhysAwakeOnSpawn
  - type: PurifyableExplosionRune
  - type: PointLight
    energy: 6
    color: "#65007e"

- type: entity
  id: CursedMarkPseudoEntity
  name: e
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Effects/cursed-mark.rsi
    state: mark
    noRot: true
  - type: PointLight
    energy: 7
    softness: 3
  - type: Tag
    tags:
    - HideContextMenu

# Spikes
- type: entity
  id: SkullBossSpikes
  name: шипы
  components:
  - type: Transform
    anchored: True
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: InteractionOutline
  - type: Sprite
    sprite: Imperial/Medieval/Structures/bone_spikes.rsi
    layers:
    - state: spikes
  - type: StunOnContact
    duration: 0.8
    blacklist:
      tags:
      - Goliath
  - type: Fixtures
    fixtures:
      fix:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35,-0.35,0.35,0.35"
        mask:
        - Impassable
        layer:
        - Impassable
        hard: false
  - type: TimedDespawn #do this shit by hand because of fucking course.
    lifetime: 0.4
  - type: PhysAwakeOnSpawn
  - type: DamageOnContact
    damage:
      types:
        Piercing: 9
  - type: EmitSoundOnSpawn
    positional: true
    sound:
      path: /Audio/Imperial/Medieval/Effects/blade.ogg

