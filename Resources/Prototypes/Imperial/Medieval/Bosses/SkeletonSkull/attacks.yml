# Spikes
- type: entity
  id: SkullBossSpikes
  name: шипы
  components:
  - type: Transform
    anchored: True
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: InteractionOutline
  - type: Sprite
    sprite: Imperial/Medieval/Structures/bone_spikes.rsi
    layers:
    - state: spikes
  - type: StunOnContact
    blacklist:
      tags:
      - Goliath
  - type: Fixtures
    fixtures:
      fix:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        mask:
        - Impassable
        layer:
        - Impassable
        hard: false
  - type: TimedDespawn #do this shit by hand because of fucking course.
    lifetime: 0.4
  - type: PhysAwakeOnSpawn
  - type: DamageOnContact
    damage:
      types:
        Piercing: 24
  - type: EmitSoundOnSpawn
    positional: true
    sound:
      path: /Audio/Imperial/Medieval/Effects/blade.ogg

- type: entity
  id: EffectSkullBossSpikesSpawn
  categories: [ HideSpawnMenu ]
