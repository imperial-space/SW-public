- type: entity
  id: BoneSpikeBig
  parent: BaseStructure
  name: костяной шип
  description: Изнутри слышен скрежет.
  components:
  - type: Anchorable
  - type: Transform
    anchored: true
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Skeleton
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 40
        mask: #mouse can pass under, but I think this is can understandable by logic
        - TableMask
        layer:
        - TableLayer
  - type: Sprite
    snapCardinals: true
    sprite: Imperial/Medieval/Structures/bone_spike_big.rsi
    state: icon
  - type: Clickable
  - type: InteractionOutline
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: gib
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageBossOnDestruction
    damageAmount: 3
  - type: TimedDespawn
    lifetime: 60
  - type: SpawnOnDespawn
    prototype: MobSkullBossSkeleton

- type: entity
  name: черепушка
  description: Что-то с ней не так...
  id: MobBossHealingSkull
  parent: BaseStructure
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: Imperial/Medieval/Mobs/Bosses/SkeletonSkull/minion.rsi
    layers:
    - state: minion
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: gib
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Skeleton
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 40
        mask: #mouse can pass under, but I think this is can understandable by logic
        - TableMask
        layer:
        - TableLayer
  - type: Clickable
  - type: InteractionOutline
  - type: TimedBossHeal
    healAmount: 4
  - type: TimedDespawn
    lifetime: 15.1
  - type: DoAfter
  - type: TriggerOnSpawn
  - type: SpawnOnTrigger
    proto: ShockWaveEffect

- type: entity
  name: проклятая руна
  description: Что если на неё встать?
  id: SkullBossExplosionRune
  parent: CollideRune
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Mobs/Bosses/SkeletonSkull/runes.rsi
    layers:
    - state: skull
      color: "#65007e"
  - type: Clickable
  - type: PhysAwakeOnSpawn
  - type: PurifyableExplosionRune
  - type: PointLight
    energy: 2
    color: "#65007e"

# Spikes
- type: entity
  id: SkullBossSpikes
  name: шипы
  components:
  - type: Transform
    anchored: True
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: InteractionOutline
  - type: Sprite
    sprite: Imperial/Medieval/Structures/bone_spikes.rsi
    layers:
    - state: spikes
  - type: StunOnContact
    blacklist:
      tags:
      - Goliath
  - type: Fixtures
    fixtures:
      fix:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        mask:
        - Impassable
        layer:
        - Impassable
        hard: false
  - type: TimedDespawn #do this shit by hand because of fucking course.
    lifetime: 0.4
  - type: PhysAwakeOnSpawn
  - type: DamageOnContact
    damage:
      types:
        Piercing: 24
  - type: EmitSoundOnSpawn
    positional: true
    sound:
      path: /Audio/Imperial/Medieval/Effects/blade.ogg

- type: entity
  id: EffectSkullBossSpikesSpawn
  categories: [ HideSpawnMenu ]
  name: шипы
  components:
  - type: Transform
    anchored: True
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    sprite: Imperial/Medieval/Structures/bone_spikes.rsi
    layers:
    - state: spawn
  - type: InteractionOutline
  - type: TimedDespawn
    lifetime: 1
  - type: SpawnOnDespawn
    prototype: SkullBossSpikes

- type: entity
