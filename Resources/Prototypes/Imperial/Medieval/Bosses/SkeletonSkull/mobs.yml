- type: entity
  name: MobSkullBossSkeleton
  parent: [ SimpleSpaceMobBase, MobCombat ]
  id: MobSkullBossSkeleton
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: Imperial/Medieval/Mobs/Bosses/SkeletonSkull/clawed-skeleton.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: skeleton
  - type: NpcFactionMember
    factions:
      - Syndicate
  - type: InputMover
  - type: MobMover
  - type: HTN
    rootTask:
      task: SimpleHumanoidHostileCompound
  - type: MovementSpeedModifier
    baseWalkSpeed : 2
    baseSprintSpeed : 2.7
  - type: MobThresholds
    thresholds:
      0: Alive
      70: Dead
  - type: TransferMindOnGib
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 70
      behaviors:
      - !type:GibBehavior { }
  - type: MeleeWeapon
    range: 1.25
    attackRate: 1
    damage:
      Slash: 10
