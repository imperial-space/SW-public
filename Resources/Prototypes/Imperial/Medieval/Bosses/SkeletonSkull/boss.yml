- type: entity
  id: SkeletonSkullBoss
  name: древний череп
  description: Оно живое!
  placement:
    mode: AlignTileAny
  components:
  - type: Sprite
    snapCardinals: true
    sprite: Imperial/Medieval/Mobs/Bosses/SkeletonSkull/skeleton-skull.rsi
    layers:
    - map: [ "enum.BossStageVisuals.Layer" ]
      state: skull
    - map: [ "enum.AdditionalBossVisuals.Layer" ]
      state: null
      visible: false
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1,-1,1,1"
        density: 50
        mask:
        - LargeMobMask
        layer:
        - WallLayer
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.BossStageVisuals.Stage:
        enum.BossStageVisuals.Layer:
          1: {state: skull}
          2: {state: skull-1}
          3: {state: skull-2}
      enum.AdditionalBossVisuals.State:
        enum.AdditionalBossVisuals.Layer:
          "none": {state: null, visible: false}
          "healing": {state: healing, visible: true}
          "red": {state: redglow, visible: true}
          "purple": {state: purpleglow, visible: true}
          "green": {state: greenglow, visible: true}
  - type: Clickable
  - type: InteractionOutline
  - type: DoAfter
  - type: StatusEffects
    allowed:
    - Jitter
  - type: Boss
    song:
      path: /Audio/Imperial/Medieval/Laststandofspellward.ogg
      params:
        volume: -9
    health: 100
    componentsOnDefeat:
    - type: ExplosionDefeatedBoss
    stages:
      1:
        stageDelay: 6
        threshold: 100
        attacks:
        - !type:MarkerTargetedAttack
          markerTag: BoneSpikeSpawnPosition
          countLimits: [1, 1]
          cooldown: 30
          actions:
          - !type:SpawnAtPosition
            prototypes: BoneSpikeBig
            randomDistance: 1
            spawnCount: 4
          - !type:PlaySound
            sound:
              path: /Audio/Imperial/Medieval/Effects/spike-spawn.ogg
            soundType: Position
        - !type:PlayerTargetedAttack
          countLimits: [2, 4]
          cooldown: 30
          actions:
          - !type:AddComponent
            components:
            - type: CursedMark
          - !type:PlaySound
            sound:
              path: /Audio/Imperial/Medieval/Effects/cursed-mark.ogg
            soundType: Player
          - !type:BossAppearance
              state: green
              duration: 1.9
        - !type:MarkerTargetedAttack
          markerTag: BossSpikesSpawnPosition
          countLimits: [2, 4]
          priority: 2
          actions:
          - !type:SpawnAtPosition
            prototypes: [BossSpikesSpawnMarkerWaveRight, BossSpikesSpawnMarkerWaveLeft]
            randomDistance: 2
            spawnCount: 1
      2:
        stageDelay: 5
        threshold: 60
        sound:
          path: /Audio/Imperial/Medieval/Effects/boss-stage-2.ogg
        attacks:
        - !type:MarkerTargetedAttack
          markerTag: HealingSkullSpawnPosition
          countLimits: [2, 3]
          cooldown: 30
          priority: 1.25
          actions:
          - !type:SpawnAtPosition
            prototypes: MobBossHealingSkull
            randomDistance: 1
            spawnCount: 2
          - !type:PlaySound
            sound:
              path: /Audio/Imperial/Medieval/Effects/heal-skulls-spawn.ogg
            soundType: BossPvs
        - !type:MarkerTargetedAttack
          markerTag: BossRuneSpawnPosition
          countLimits: [2, 3]
          cooldown: 50
          priority: 1.25
          actions:
          - !type:AddComponent
            toBoss: true
            components:
            - type: ChargingRuneExplosion
          - !type:SpawnAtPosition
            prototypes: SkullBossExplosionRune
            randomDistance: 2
            spawnCount: 2
          - !type:PlaySound
            sound:
              path: /Audio/Imperial/Medieval/Effects/rune-spawn.ogg
            soundType: BossPvs
          - !type:BossAppearance
              state: purple
              duration: 1.9
        - !type:MarkerTargetedAttack
          markerTag: BossSpikesSpawnPosition
          countLimits: [2, 4]
          priority: 1.25
          actions:
          - !type:SpawnAtPosition
            prototypes: [BossSpikesSpawnMarkerChess, BossSpikesSpawnMarkerBox]
            randomDistance: 2
            spawnCount: 1
        - !type:GridTargetedAttack
          cooldown: 50
          priority: 1.25
          actions:
          - !type:AddComponent
            components:
            - type: SpikedGrid
              targetIndex: 16
              spikeProto: EffectSkullBossSpikesSpawn
      3:
        stageDelay: 4
        threshold: 30
        attacksPerTime: [1,2]
        sound:
          path: /Audio/Imperial/Medieval/Effects/boss-stage-3.ogg
        attacks:
        - !type:MarkerTargetedAttack
          markerTag: BossRuneSpawnPosition
          countLimits: [2, 3]
          cooldown: 20
          priority: 1.25
          actions:
          - !type:AddComponent
            toBoss: true
            components:
            - type: BossBullethellSource
              weaponProto: WeaponSkullBossBHell
              delay: 0.25
              degreesPerShot: 5
              shots: 25
          - !type:BossAppearance
              state: red
              duration: 1.9
        - !type:MarkerTargetedAttack
          markerTag: BossRuneSpawnPosition
          countLimits: [1, 1]
          cooldown: 50
          priority: 2
          actions:
          - !type:SpawnAtPosition
            prototypes: SkullBossCrystalTrap
            randomDistance: 2
            spawnCount: 1
          - !type:PlaySound
            sound:
              path: /Audio/Imperial/Medieval/Effects/crystal.ogg
            soundType: Position
          - !type:BossAppearance
              state: purple
              duration: 1.9
