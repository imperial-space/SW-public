- type: entity
  name: papr
  parent: Paper
  id: MedievalPaperEnvelopeBasic
  description: "e."
  components:
  - type: Sprite
    sprite: Imperial/Medieval/Objects/Envelope/basic.rsi
    layers:
    - state: icon
    - state: icon
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: icon
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: Item
    left:
    - state: inhand-left
    right:
    - state: inhand-right
  - type: PaperVisuals
    backgroundModulate: "#fff4d7"
  - type: BlockStamping

