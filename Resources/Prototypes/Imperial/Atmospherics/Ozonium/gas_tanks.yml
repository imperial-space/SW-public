- type: entity
  parent: ExtendedEmergencyOxygenTank
  id: DoubleEmergencyOzoniumTank
  name: double emergency ozonium tank
  description: A high-grade dual-tank emergency life support container. It holds a decent amount of ozonium for its small size. It can hold 2.5 L of gas.
  components:
  - type: Sprite
    sprite: Imperial/Gases/Ozonium/emergency_double.rsi
  - type: Item
    sprite: Imperial/Gases/Ozonium/emergency_double.rsi
  - type: GasTank
    air:
      volume: 2.5
      temperature: 293.15
  - type: Clothing
    sprite: Imperial/Gases/Ozonium/emergency_double.rsi
  - type: MeleeWeapon
    attackRate: 0.9
    damage:
      types:
        Blunt: 7.5

- type: entity
  parent: GasTankBase
  id: GasTankBaseOzonium
  name: ozonium tank
  description: Contains dangerous ozonium. Do not inhale. Extremely flammable. It can hold 5 L of gas.
  components:
  - type: Sprite
    sprite: Imperial/Gases/Ozonium/tank.rsi
    state: icon
  - type: Item
    size: Normal
    sprite: Imperial/Gases/Ozonium/tank.rsi
  - type: Tag
    tags:
    - GasTank
  - type: Clothing
    quickEquip: false
    sprite: Imperial/Gases/Ozonium/tank.rsi
    slots:
    - Back
    - suitStorage
  - type: UseDelay
    delays:
      gasTank:
        length: 1.0
  - type: ActivatableUI
    key: enum.SharedGasTankUiKey.Key
  - type: UserInterface
    interfaces:
      enum.SharedGasTankUiKey.Key:
        type: GasTankBoundUserInterface
  - type: GasTank
    outputPressure: 21.3
    air:
      # If gas tank volume is changed, adjust MinimumTritiumOxyburnEnergy in Atmospherics.cs by the same proportions
      volume: 5
      temperature: 293.15
    tankLowPressure: 30.0
  - type: MeleeWeapon
    wideAnimationRotation: 45
    attackRate: 0.8
    damage:
      types:
        Blunt: 10
  - type: PhysicalComposition
    materialComposition:
      Steel: 185
  - type: StaticPrice
    price: 30

- type: entity
  parent: GasTankRoundBase
  id: EmergencyOzoniumTank
  name: emergency ozonium tank
  description: An easily portable tank for emergencies. Contains very little ozonium, rated for survival use only. It can hold 0.66 L of gas.
  components:
  - type: Sprite
    sprite: Imperial/Gases/Ozonium/emergency.rsi
  - type: Item
    size: Small
    sprite: Imperial/Gases/Ozonium/emergency.rsi
  - type: GasTank
    air:
      volume: 0.66
      temperature: 293.15
  - type: Clothing
    sprite: Imperial/Gases/Ozonium/emergency.rsi
    slots:
    - Pocket
    - Belt
    - suitStorage
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
  - type: PhysicalComposition
    materialComposition:
      Steel: 100

- type: entity
  id: EmergencyOzoniumTankFilled
  parent: EmergencyOzoniumTank
  suffix: Filled
  components:
  - type: GasTank
    outputPressure: 21.3
    air:
      # 4 minutes
      volume: 0.66
      moles:
        - 0     # oxygen
        - 0     # nitrogen
        - 0     # carbon dioxide
        - 0     # plasma
        - 0     # tritium
        - 0     # vapor
        - 0     # ammonia
        - 0     # n2o
        - 0     # frezon
        - 0     # thermonium
        - 0     # phazonium
        - 0.270782035 # ozonium
      temperature: 293.15

