- type: entity
  parent: GasCanister
  id: HydrogenCanister
  name: Hydrogen canister
  description: A canister that can contain any type of gas. This one is supposed to contain Hydrogen. It can be attached to connector ports using a wrench.
  components:
    - type: Sprite
      sprite: /Textures/Imperial/Gases/Hydrogen/hydrogenCanister.rsi
      noRot: true
      layers:
        - state: hydrogen
    - type: GasCanister
      gasTankSlot:
        name: comp-gas-canister-slot-name-gas-tank
        ejectOnBreak: true
        whitelist:
          components:
            - GasTank
      gasMixture:
        volume: 1500
        moles:
          Hydrogen: 2769.36 # Hydrogen
        temperature: 293.15
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 600
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 300
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: MetalBreak
          - !type:SpawnEntitiesBehavior
            spawn:
              HydrogenCanisterBroken:
                min: 1
                max: 1
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:DumpCanisterBehavior

- type: entity
  parent: GasCanisterBrokenBase
  id: HydrogenCanisterBroken
  categories: [ HideSpawnMenu ]
  name: broken gas canister
  description: A broken gas canister. Not useless yet, as it can be salvaged for high quality materials.
  components:
    - type: Sprite
      sprite: /Textures/Imperial/Gases/Hydrogen/hydrogenCanister.rsi
      state: hydrogen-1
