- type: entity
  parent: [ClothingOuterBase, GeigerCounterClothing, AllowSuitStorageClothing]
  id: ElderAtmosianHardsuit
  name: elder atmos hardsuit
  description: A special suit that protects against hazardous, low pressure environments. Has thermal shielding.
  components:
  - type: Sprite
    sprite: Imperial/Gases/Clothing/ElderAtmosianHardsuit/Suit.rsi
    state: icon
  - type: Clothing
    sprite: Imperial/Gases/Clothing/ElderAtmosianHardsuit/Suit.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.0000001
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.0001
    coolingCoefficient: 0.0001
  - type: FireProtection
    reduction: 0.95
  - type: Item
    size: Ginormous
  - type: Armor
    modifiers:
      coefficients:
        Heat: 0.6
        Cold: 0.6
  - type: ClothingSpeedModifier
    walkModifier: 0.85
    sprintModifier: 0.85
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetElderAtmosianHardsuit
  - type: Tag
    tags:
    - WhitelistChameleon
  - type: Inject # imperial hardsuit injection
  - type: ItemSlots # imperial hardsuit injection
    slots: # imperial hardsuit injection
      beakerSlot: # imperial hardsuit injection
        whitelist: # imperial hardsuit injection
          tags: # imperial hardsuit injection
          - FitsHardsuit # imperial hardsuit injection
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}
      beakerSlot: !type:ContainerSlot # imperial hardsuit injection
  - type: GroupExamine
  - type: ProtectedFromStepTriggers
    slots: WITHOUT_POCKET
  - type: DamageOnInteractProtection
    damageProtection:
      flatReductions:
        Heat: 10 # the average lightbulb only does around four damage!
    slots: OUTERCLOTHING
  - type: Construction
    graph: ElderHardsuit
    node: elderHardsuit

- type: entity
  parent: [ ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase ]
  id: ClothingHeadHelmetElderAtmosianHardsuit
  name: elder atmos hardsuit helmet
  description: A special hardsuit helmet designed for working in low-pressure, high thermal environments.
  components:
  - type: Sprite
    sprite: Imperial/Gases/Clothing/ElderAtmosianHardsuit/Helmet.rsi
    layers:
    - state: icon
  - type: HandheldLight
    addPrefix: false
  - type: ToggleableVisuals
  - type: Armor
    modifiers:
      coefficients:
        Heat: 0.8
        Cold: 0.8
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-HELMET
  - type: PointLight
    color: "#adffe6"
  - type: PressureProtection
    highPressureMultiplier: 0.0000001
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.005
    coolingCoefficient: 0.005
  - type: FireProtection
    reduction: 0.2
  - type: Tag
    tags:
    - CorgiWearable
    - WhitelistChameleon

- type: Tag
  id: AtmosianHardsuit
