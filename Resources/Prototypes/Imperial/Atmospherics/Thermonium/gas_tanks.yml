- type: entity
  id: ThermoniumTankFilled
  parent: GasTankBaseThermonium
  suffix: Filled
  components:
  - type: GasTank
    outputPressure: 101.3
    air:
      # 6 minutes due to output pressure
      volume: 5
      moles:
        - 0     # oxygen
        - 0     # nitrogen
