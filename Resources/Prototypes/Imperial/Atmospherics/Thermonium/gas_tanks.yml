- type: entity
  parent: ExtendedEmergencyOxygenTank
  id: DoubleEmergencyThermoniumTank
  name: double emergency Thermonium tank
  description: A high-grade dual-tank emergency life support container. It holds a decent amount of thermonium for its small size. It can hold 2.5 L of gas.
  components:
  - type: Sprite
    sprite: Imperial/Gases/Thermonium/emergency_double.rsi
  - type: Item
    sprite: Imperial/Gases/Thermonium/emergency_double.rsi
  - type: GasTank
    air:
      volume: 2.5
      temperature: 293.15
  - type: Clothing
    sprite: Imperial/Gases/Thermonium/emergency_double.rsi
  - type: MeleeWeapon
    attackRate: 0.9
    damage:
      types:
        Blunt: 7.5

- type: entity
  parent: GasTankBase
  id: GasTankBaseThermonium
  name: thermonium tank
  description: Contains dangerous thermonium. Do not inhale. Extremely flammable. It can hold 5 L of gas.
  components:
  - type: Sprite
    sprite: Imperial/Gases/Thermonium/generic.rsi
    state: icon
  - type: Item
    size: Normal
    sprite: Imperial/Gases/Thermonium/generic.rsi
  - type: Tag
    tags:
    - GasTank
  - type: Clothing
    quickEquip: false
    sprite: Imperial/Gases/Thermonium/generic.rsi
    slots:
    - Back
    - suitStorage
  - type: UseDelay
    delays:
      gasTank:
        length: 1.0
  - type: ActivatableUI
    key: enum.SharedGasTankUiKey.Key
  - type: UserInterface
    interfaces:
      enum.SharedGasTankUiKey.Key:
        type: GasTankBoundUserInterface
  - type: GasTank
    outputPressure: 21.3
    air:
      # If gas tank volume is changed, adjust MinimumTritiumOxyburnEnergy in Atmospherics.cs by the same proportions
      volume: 5
      temperature: 293.15
    tankLowPressure: 30.0
  - type: MeleeWeapon
    wideAnimationRotation: 45
    attackRate: 0.8
    damage:
      types:
        Blunt: 10
  - type: PhysicalComposition
    materialComposition:
      Steel: 185
  - type: StaticPrice
    price: 30

- type: entity
  parent: GasTankRoundBase
  id: EmergencyThermoniumTank
  name: emergency thermonium tank
  description: An easily portable tank for emergencies. Contains very little thermonium, rated for survival use only. It can hold 0.66 L of gas.
  components:
  - type: Sprite
    sprite: Imperial/Gases/Thermonium/emergency.rsi
  - type: Item
    size: Small
    sprite: Imperial/Gases/Thermonium/emergency.rsi
  - type: GasTank
    air:
      volume: 0.66
      temperature: 293.15
  - type: Clothing
    sprite: Imperial/Gases/Thermonium/emergency.rsi
    slots:
    - Pocket
    - Belt
    - suitStorage
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
  - type: PhysicalComposition
    materialComposition:
      Steel: 100

- type: entity
  id: EmergencyThermoniumTankFilled
  parent: EmergencyThermoniumTank
  suffix: Filled
  components:
  - type: GasTank
    outputPressure: 21.3
    air:
      # 4 minutes
      volume: 0.66
      moles:
        - 0     # oxygen
        - 0     # nitrogen
        - 0     # carbon dioxide
        - 0     # plasma
        - 0     # tritium
        - 0     # vapor
        - 0     # ammonia
        - 0     # n2o
        - 0     # frezon
        - 0.270782035  # thermonium
      temperature: 293.15

- type: entity
  id: DoubleEmergencyThermoniumTankFilled
  parent: DoubleEmergencyThermoniumTank
  suffix: Filled
  components:
  - type: GasTank
    outputPressure: 21.3
    air:
      # 15 minutes
      volume: 2.5
