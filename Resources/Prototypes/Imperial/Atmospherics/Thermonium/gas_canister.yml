- type: entity
  id: ThermoniumCanister
  name: Thermonium canister
  description: A canister that can contain any type of gas. This one is supposed to contain Thermonium. It can be attached to connector ports using a wrench.
  components:
  - type: Sprite
    sprite: /Textures/Imperial/Gases/Thermonium/thermoniumCanister.rsi
    layers:
    - state: thermonium
  - type: GasCanister
    gasMixture:
      volume: 1500
      moles:
      - 0 # oxygen
      - 0 # nitrogen
      - 0 # CO2
      - 0 # Plasma
      - 0 # Tritium
      - 0 # Water vapor
      - 0 # Ammonia
      - 0 # N2O
      - 0 # Frezon
      - 2769.36 # Thermonium
      temperature: 293.15
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          ThermoniumCanisterBroken:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:DumpCanisterBehavior
  - type: Lock
    locked: true

- type: entity
  id: ThermoniumCanisterBroken
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: /Textures/Imperial/Gases/Thermonium/thermoniumCanister.rsi
    state: thermonium-1
