#коронер
- type: entity
  id: LockerCoroner
  parent: LockerBase
  name: coroner locker
  description: le morgue.
  components:
  - type: Sprite
    sprite: Imperial/Roles/Medical/Coroner/closet.rsi
  - type: Appearance
  - type: EntityStorageVisuals
    stateBaseClosed: coroner
    stateDoorOpen: coroner_open
    stateDoorClosed: coroner_door
  - type: AccessReader
    access: [ [ "Medical" ] ]

