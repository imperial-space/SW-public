  description: The hallmark of the CBURN detachment. A massive tank with thickened fuel, durable hoses, and a reliable burner. It is excellent at cleaning rooms from unwanted flora and fauna. Borg edition
  components:
  - type: Sprite
    sprite: Imperial/Flamethrower/flamethrower.rsi
    layers:
    - state: icon
    - state: fire
      shader: unshaded
      visible: false
      map: ["enum.ToggleableVisuals.Layer"]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { visible: true }
          False: { visible: false }
