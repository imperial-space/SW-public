# Предметы киборга уборщика
- type: entity
  parent: AdvMopItem
  name: borg mop
  id: BorgMopItem ## Швабра борга уборщика от Imperial Space
  description: Motorized mop that has a bigger reservoir and quickly replaces reagents inside with water. Automatic Clown Countermeasure not included.
  components:
    - type: Sprite
      sprite: Imperial/Roles/Synthetics/Janitorial/mop.rsi
      layers:
      - state: base
    - type: SolutionRegeneration
      solution: absorbed
      generated:
        reagents:
          - ReagentId: Water
            Quantity: 5
    - type: SolutionPurge
      solution: absorbed
      preserve:
        - Water
      quantity: 20
    - type: SolutionContainerManager
      solutions:
        absorbed:
          maxVol: 200

- type: entity
  name: borg trash bag
  id: TrashBagBorg # Мусорный пакет повышенной емкости для борга уборщика
  parent: TrashBag
  components:
  - type: Sprite
    sprite: Imperial/Roles/Synthetics/Janitorial/trashbag.rsi
    layers:
      - state: icon-0
        map: ["enum.StorageFillLayers.Fill"]
  - type: Storage
    quickInsert: true
    areaInsert: true
    storageOpenSound:
      collection: trashBagRustle
    storageInsertSound:
      collection: trashBagRustle
    whitelist:
      tags:
        - Cartridge
        - Trash

# Предметы медицинского борга
- type: entity
  name: borg hypospray # Кастомный гипоспрей медицинского борга
  parent: BaseItem
  description: A sterile injector for rapid administration of drugs to patients.
  id: HyposprayBorg
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/hypospray.rsi
    state: borghypo
  - type: Item
    sprite: Objects/Specific/Medical/hypospray.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 30
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
  - type: Hypospray
    onlyAffectsMobs: false
  - type: UseDelay
    delay: 0.5
  - type: StaticPrice
    price: 750
  - type: BorgHypo
    solutions:
      - reagents:
        - reagentId: Bicaridine
          quantity: 1
          sprite: /Textures/Imperial/Other/BorgHypoIcons/brutekit.png
      - reagents:
        - reagentId: Dermaline
          quantity: 1
          sprite: /Textures/Imperial/Other/BorgHypoIcons/burnkit.png
      - reagents:
        - reagentId: Dexalin
          quantity: 1
          sprite: /Textures/Imperial/Other/BorgHypoIcons/o2kit.png
      - reagents:
        - reagentId: Inaprovaline
          quantity: 1
          sprite: /Textures/Imperial/Other/BorgHypoIcons/firstaid.png
      - reagents:
        - reagentId: Hyronalin
          quantity: 1
          sprite: /Textures/Imperial/Other/BorgHypoIcons/radkit.png
      - reagents:
        - reagentId: Dylovene
          quantity: 1
          sprite: /Textures/Imperial/Other/BorgHypoIcons/toxinkit.png
  - type: SolutionRegeneration
    solution: hypospray
    generated:
      reagents:
        - ReagentId: Bicaridine
          Quantity: 1

- type: entity
  id: ChangeReagent
  name: action-name-change-reagent
  description: action-description-change-reagent
