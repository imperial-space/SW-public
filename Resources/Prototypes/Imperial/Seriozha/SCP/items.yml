# Stamps
- type: entity
  name: Nedra stamp
  parent: RubberStampMime
  id: RubberStampNedra
  suffix: seriozha, Недра
  components:
    - type: Stamp
      stampedName: stamp-nedra-name
      stampState: paper_stamp-generic
      stampedColor: "#FFA500"
    - type: Sprite
      sprite: Imperial/ussp/stamp.rsi
      state: stamp-ussp

- type: entity
  name: Nedra command stamp
  parent: RubberStampNedra
