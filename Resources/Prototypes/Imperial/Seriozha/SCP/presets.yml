- type: entity
  abstract: true
  parent: MobHuman
  id: ImperialSCPBasePreset
  components:
    - type: AntagImmune
    - type: RandomHumanoidAppearance
      randomizeName: false
    - type: CrewSkills
      skills:
        - skillBotany #Base
        - skillBaseMed
        - skillBaseConstraction
        - skillCooking  #Easy
        - skillBartending
        - skillHacking
        - skillInstrumentation #Medium
        - skillMaintenance
        - skillMediumConstruction
        - skillMediumBotany
        - skillBasicAtmos
        - skillMedicalEquipment
        - skillPharmacology
        - skillPiloting #Hard
        - skillAtmos
        - skillHardInstrumentation
        - skillRobotics
        - skillResearch
        - skillPharmaceuticals
        - skillShooting
        - skillSurgery
        - skillNeuroSurgery

- type: entity
  parent: ImperialSCPBasePreset
  id: PresetSCPDClass
  name: Preset
  suffix: seriozha, Недра, GhostRole
  components:
    - type: Loadout
      prototypes: [ DClassGear ]
    - type: GhostRole
      makeSentient: true
      name: ghost-role-information-dclass-name
      description: ghost-role-information-dclass-desc
      rules: ghost-role-information-rules-team-antagonist
      mindRoles:
      - MindRoleGhostRoleTeamAntagonist
      raffle:
        settings: short
    - type: GhostTakeoverAvailable

