- type: entity
  abstract: true
  parent: MobHuman
  id: ImperialSCPBasePreset
  components:
    - type: AntagImmune
    - type: RandomHumanoidAppearance
      randomizeName: false
    - type: CrewSkills
      skills:
        - skillBotany #Base
        - skillBaseMed
        - skillBaseConstraction
        - skillCooking  #Easy
        - skillBartending
        - skillHacking
        - skillInstrumentation #Medium
        - skillMaintenance
        - skillMediumConstruction
        - skillMediumBotany
        - skillBasicAtmos
        - skillMedicalEquipment
        - skillPharmacology
        - skillPiloting #Hard
        - skillAtmos
        - skillHardInstrumentation
        - skillRobotics
        - skillResearch
        - skillPharmaceuticals
        - skillShooting
        - skillSurgery
        - skillNeuroSurgery

- type: entity
