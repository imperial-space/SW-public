- type: entity
  parent: BaseWall
  id: WallBrickHRP
  name: hrp test
  suffix: seriozha, Недра
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Imperial/Seriozha/SCP/structures/light.rsi
  - type: Icon
    sprite: Imperial/Seriozha/SCP/structures/light.rsi
  - type: RCDDeconstructable
    cost: 6
    delay: 12
    fx: EffectRCDDeconstruct8
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          Girder:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IconSmooth
    key: walls
    base: light

#lathe
- type: entity
  id: AmmoTechFabNedra
  parent: BaseLatheLube
  name: ammo techfab
  suffix: seriozha, Недра
  description: Prints the bare minimum of bullets that any budget military or armory could need. Nothing fancy.
  components:
    - type: Sprite
      sprite: Imperial/Seriozha/SCP/structures/techfab.rsi
      layers:
        - state: icon
          map: ["enum.LatheVisualLayers.IsRunning"]
        - state: unlit
          shader: unshaded
          map: ["enum.PowerDeviceVisualLayers.Powered"]
        - state: inserting
          map: ["enum.MaterialStorageVisualLayers.Inserting"]
        - state: panel
          map: ["enum.WiresVisualLayers.MaintenancePanel"]
    - type: Machine
      board: AmmoTechFabNedraCircuitboard
    - type: Lathe
      idleState: icon
      runningState: icon
      staticPacks:
      - NedraTechFab
    - type: MaterialStorage
      whitelist:
        tags:
          - Sheet
          - RawMaterial
          - Ingot
    - type: OreSiloClient

- type: entity
  id: AmmoTechFabNedraCircuitboard
  parent: BaseMachineCircuitboard
  name: ammo techfab circuit board
  categories: [ HideSpawnMenu ]
  description: A machine printed circuit board for an ammo techfab.
  components:
    - type: Sprite
      state: security
    - type: MachineBoard
      prototype: AmmoTechFabNedra
      stackRequirements:
        Manipulator: 2
