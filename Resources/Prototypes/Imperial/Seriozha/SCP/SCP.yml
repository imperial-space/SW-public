- type: entity
  abstract: true
  parent: SimpleSpaceMobBase
  id: ImperialSCPBase
  suffix: AI
  components:
    - type: Tag
      tags:
      - SCP
    - type: TriggerOnMobstateChange
      mobState:
      - Dead
    - type: SmokeOnTrigger
      duration: 15
      spreadAmount: 3
    - type: TimerTriggerVisuals
      primingSound:
        path: /Audio/Effects/Smoke-grenade.ogg
    - type: NoSlip
    - type: MovementIgnoreGravity
    - type: SlowOnDamage
      enabled: false
    - type: ZombieImmune
    - type: NonSpreaderZombie
    - type: Clumsy
    - type: Damageable
      damageModifierSet: SCPStandart
    - type: Body
      prototype: Human
    - type: Bloodstream
      bloodMaxVolume: 0
    - type: NpcFactionMember
      factions:
      - Xeno
    - type: IntrinsicRadioReceiver
    - type: ActiveRadio
      channels:
      - SCPconnection
    - type: IntrinsicRadioTransmitter
      channels:
      - SCPconnection
    - type: FlashImmunity
    - type: Grammar
      attributes:
        gender: male

- type: entity
  name: Ded
  suffix: seriozha, Недра
  parent: ImperialSCPBase
  id: ImperialSCPDed
  description: Pray.
  components:
    - type: Sprite
      drawdepth: Mobs
      layers:
      - map: ["enum.DamageStateVisualLayers.Base"]
        state: alive
        sprite: Imperial/Seriozha/SCP/objects/Ded.rsi
    - type: DamageStateVisuals
      states:
        Alive:
          Base: alive
        Dead:
          Base: alive
    - type: MobThresholds
      thresholds:
        0: Alive
        4000: Dead
    - type: MeleeWeapon
      hidden: true
      altDisarm: false
      soundHit:
        path: /Audio/Weapons/punch3.ogg
      angle: 0
      animation: WeaponArcPunch
      damage:
        types:
          Blunt: 80
      resistanceBypass: true
    - type: Speech
      speechVerb: LargeMob
      allowedEmotes: ['Scream', 'Laugh']
    - type: MovementSpeedModifier
      baseWalkSpeed: 2
      baseSprintSpeed: 1.8
    - type: Vocal
      sounds:
        Male: DedVoice
        Unsexed: DedVoice
        Female: DedVoice
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.4
          density: 280
          hard: false
          mask:
          - MobMask
          layer:
          - GhostImpassable
          - MobLayer

