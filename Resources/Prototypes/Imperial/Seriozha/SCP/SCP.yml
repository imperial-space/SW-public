- type: entity
  abstract: true
  parent: SimpleSpaceMobBase
  id: ImperialSCPBase
  suffix: AI
  components:
    - type: Tag
      tags:
      - SCP
    - type: TriggerOnMobstateChange
      mobState:
      - Dead
    - type: SmokeOnTrigger
      duration: 15
      spreadAmount: 3
    - type: TimerTriggerVisuals
      primingSound:
        path: /Audio/Effects/Smoke-grenade.ogg
    - type: NoSlip
    - type: MovementIgnoreGravity
    - type: SlowOnDamage
      enabled: false
    - type: ZombieImmune
    - type: NonSpreaderZombie
    - type: Clumsy
    - type: Damageable
      damageModifierSet: SCPStandart
    - type: Body
      prototype: Human
    - type: Bloodstream
      bloodMaxVolume: 0
    - type: NpcFactionMember
      factions:
      - NDA
    - type: IntrinsicRadioReceiver
    - type: ActiveRadio
      channels:
      - SCPconnection
    - type: IntrinsicRadioTransmitter
      channels:
      - SCPconnection
    - type: FlashImmunity
    - type: Grammar
      attributes:
        gender: male
    - type: StaminaResistance
      damageCoefficient: 0.3

- type: entity
  name: Ded
  suffix: seriozha, Недра
  parent: ImperialSCPBase
  id: ImperialSCPDed
  description: Pray.
  components:
    - type: Sprite
      drawdepth: Mobs
      layers:
      - map: ["enum.DamageStateVisualLayers.Base"]
        state: alive
        sprite: Imperial/Seriozha/SCP/objects/Ded.rsi
    - type: DamageStateVisuals
      states:
        Alive:
          Base: alive
        Dead:
          Base: alive
    - type: MobThresholds
      thresholds:
        0: Alive
        4000: Dead
    - type: MeleeWeapon
      hidden: true
      altDisarm: false
      soundHit:
        path: /Audio/Weapons/punch3.ogg
      angle: 0
      animation: WeaponArcPunch
      damage:
        types:
          Blunt: 80
      resistanceBypass: true
    - type: Speech
      speechVerb: LargeMob
      allowedEmotes: ['Scream', 'Laugh']
    - type: MovementSpeedModifier
      baseWalkSpeed: 2
      baseSprintSpeed: 1.8
    - type: Vocal
      sounds:
        Male: SCP106
        Unsexed: SCP106
        Female: SCP106
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.4
          density: 280
          hard: false
          mask:
          - MobMask
          layer:
          - GhostImpassable
          - MobLayer
    - type: ItemToggle
      predictable: false
      onUse: false
    - type: ItemToggleActiveSound
      activeSound:
        path: /Audio/Imperial/Seriozha/SCP/chase/chase4.ogg
        params:
          volume: -2
          range: 10
    - type: UseDelay
      delay: 1.0
    - type: ToggleClothing
      action: ActionToggleSCPMusic
      mustEquip: false
      sprite: /Textures/Interface/Misc/job_icons.rsi
      state: Musician

- type: entity
  name: Fireman
  suffix: seriozha, Недра
  parent: ImperialSCPBase
  id: ImperialSCPFireMan
  description: Pray.
  components:
    - type: Sprite
      drawdepth: Mobs
      layers:
      - map: ["enum.DamageStateVisualLayers.Base"]
        state: alive
        sprite: Imperial/Seriozha/SCP/objects/Fireman.rsi
    - type: DamageStateVisuals
      states:
        Alive:
          Base: alive
        Dead:
          Base: alive
    - type: MobThresholds
      thresholds:
        0: Alive
        2500: Dead
    - type: Damageable
      damageModifierSet: SCPFireMan
    - type: MeleeWeapon
      hidden: true
      altDisarm: false
      soundHit:
        path: /Audio/Weapons/punch3.ogg
      angle: 0
      animation: WeaponArcPunch
      damage:
        types:
          Structural: 60
          Heat: 24
      resistanceBypass: true
    - type: IgniteOnMeleeHit
      fireStacks: 4
    - type: Speech
      speechVerb: LargeMob
    - type: MovementSpeedModifier
      baseWalkSpeed: 2.5
      baseSprintSpeed: 3
    - type: Tag
      tags:
      - DoorBumpOpener
    - type: Access
      tags:
      - SCPAccesOne
      - SCPAccesTwo
      - SCPAccesThree
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.4
          density: 300
          mask:
          - MobMask
          layer:
          - MobLayer
    - type: ItemToggle
      predictable: false
      onUse: false
    - type: ItemToggleActiveSound
      activeSound:
        path: /Audio/Imperial/Seriozha/SCP/chase/chase3.ogg
        params:
          volume: -2
          range: 10
    - type: UseDelay
      delay: 1.0
    - type: ToggleClothing
      action: ActionToggleSCPMusic
      mustEquip: false
    - type: Reactive
      groups:
        Flammable: [ Touch ]
        Extinguish: [ Touch ]
      reactions:
      - reagents: [ Water, SpaceCleaner ]
        methods: [ Touch ]
        effects:
        - !type:WashCreamPieReaction
      - reagents: [ Water ]
        methods: [ Touch ]
        effects:
        - !type:HealthChange
          scaleByQuantity: true
          damage:
            types:
              Heat: 1.3
        - !type:PopupMessage
          type: Local
          visualType: Large
          messages: [ "slime-hurt-by-water-popup" ]
          probability: 0.25

