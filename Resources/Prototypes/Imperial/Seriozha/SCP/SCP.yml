- type: entity
  name: Katana
  suffix: seriozha, Недра
  parent: [ BaseSword, BaseMajorContraband ]
  id: ImperialSCPKatana
  description: An ancient war blade.
  components:
  - type: Sprite
    sprite: Imperial/Seriozha/SCP/objects/Katana.rsi
  - type: Item
    size: Ginormous
    sprite: Imperial/Seriozha/SCP/objects/Katana.rsi
  - type: Clothing
    sprite: Imperial/Seriozha/SCP/objects/Katana.rsi
    slots:
    - Belt
  - type: MeleeWeapon
    attackRate: 1.25
    damage:
      types:
        Structural: 90
        Slash: 60
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Reflect
    reflectProb: 0.15
    spread: 60
  - type: DisarmMalus

- type: entity
  parent: [ ClothingHeadHelmetArmoredBase, BaseMajorContraband]
  id: ImperialSCPMask
  name: Mask
  suffix: seriozha, Недра
  description: idc
  components:
  - type: Sprite
    sprite: Imperial/Seriozha/SCP/objects/Mask.rsi
  - type: Clothing
    sprite: Imperial/Seriozha/SCP/objects/Mask.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.45
        Slash: 0.45
        Piercing: 0.45
        Cold: 0.45
        Heat: 0.45
        Poison: 0.45
        Radiation: 0.45
        Caustic: 0.45
  # Imperial Space Stamina Resistance Start
  - type: StaminaResistance
    damageCoefficient: 0.4
  # Imperial Space Stamina Resistance End
  - type: ExplosionResistance
    damageCoefficient: 0.0

