    - type: DeviceNetwork
      deviceNetId: Wireless
    - type: WirelessNetworkConnection
      range: 1000
    - type: DeviceLinkSource
      range: 1000
      ports:
        - SignalMetalDetector
    - type: Construction
      graph: ImperialMetalDetector
      node: detector
    - type: ContainerFill
      containers:
        board: [ MetalDetectorCircuitboard ]
        powercell: [ PowerCellSmall ]
    - type: ContainerContainer
      containers:
        board: !type:Container
        powercell: !type:Container
    - type: WiresPanel
    - type: WiresPanelSecurity
    - type: WiresVisuals
    - type: Wires
      layoutId: MetalDetector
      boardName: wires-board-name-metal-detector
    - type: Fixtures
      fixtures:
        metalDetector:
          shape: !type:PhysShapeAabb
            bounds: "-0.45,-0.45,0.45,0.45"
          hard: false
          density: 1500
          mask:
            - DoorPassable
          layer:
            - AirlockLayer
    - type: Destructible
      thresholds:
        - trigger: !type:DamageTrigger
            damage: 150
          behaviors:
            - !type:PlaySoundBehavior
              sound:
                collection: MetalBreak
            - !type:ChangeConstructionNodeBehavior
              node: frame
            - !type:DoActsBehavior
              acts: ["Destruction"]
    - type: UserInterface
      interfaces:
        enum.WiresUiKey.Key:
          type: WiresBoundUserInterface

- type: entity
  parent: ImperialMetalDetector
  id: MetalDetectorNonAccess
  suffix: NonAccess, Crook
  components:
    - type: MetalDetector
      allowedAccess: []

- type: entity
  parent: ImperialMetalDetector
  id: MetalDetectorSyndicate
  suffix: Syndicate, Crook
  components:
    - type: MetalDetector
      allowedAccess: ["SyndicateAgent", "NuclearOperative"]

- type: entity
  parent: ImperialMetalDetector
  id: MetalDetectorSecure
  suffix: Secure, Crook
  components:
    - type: Construction
      graph: ImperialMetalDetector
      node: panelReinforced
    - type: WiresPanelSecurity
      securityLevel: panelReinforced
      examine: wires-panel-component-on-examine-security-level2
      wiresAccessible: false

- type: entity
  id: MetalDetectorFrame
  name: metal detector frame
  placement:
    mode: SnapgridCenter
  components:
    - type: Clickable
    - type: InteractionOutline
    - type: Transform
    - type: Sprite
      noRot: true
      drawdepth: Overdoors
      sprite: Imperial/MetalDetector/machine.rsi
      state: frame
    - type: Physics
      bodyType: Static
    - type: Anchorable
    - type: Pullable
    - type: Rotatable
    - type: Fixtures
      fixtures:
        fix1:
          shape: !type:PhysShapeAabb
            bounds: "-0.45,-0.45,0.45,0.45"
          hard: false
          density: 1500
          mask:
            - DoorPassable
          layer:
            - AirlockLayer
    - type: Construction
      graph: ImperialMetalDetector
      node: frame

- type: Tag
  id: MetalDetectorTag

- type: entity
  id: MetalDetectorCircuitboard
  parent: BaseElectronics
  name: metal detector electronics
  description: An electronics board used in metal detector.
  components:
    - type: Tag
      tags:
        - MetalDetectorTag
    - type: Sprite
      sprite: Objects/Misc/module.rsi
      state: security
    - type: StaticPrice
      price: 15

