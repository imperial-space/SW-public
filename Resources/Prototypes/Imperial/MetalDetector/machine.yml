### Recipe

- type: construction
  hide: true # imperial medieval craft disable
  id: ImperialMetalDetector
  graph: ImperialMetalDetector
  category: construction-category-machines
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: false
  startNode: start
  targetNode: detector

- type: constructionGraph
  id: ImperialMetalDetector
  start: start
  graph:
    - node: start
      edges:
        - to: frame
          steps:
            - material: Steel
              amount: 5
              doAfter: 2

    - node: frame
      entity: MetalDetectorFrame
      edges:
        - to: start
          steps:
            - tool: Welding
              doAfter: 4
          completed:
            - !type:GivePrototype
              prototype: SheetSteel1
              amount: 5
            - !type:DeleteEntity {}
        - to: parts
          steps:
            - material: Cable
              amount: 5
              doAfter: 0.5
            - tool: Screwing
              doAfter: 2

    - node: parts
      entity: MetalDetectorFrame
      edges:
        - to: electronics
          steps:
            - tag: MetalDetectorTag
              store: board
              name: микросхема металлоискателя # Imperial Recipes Locale
              icon:
                sprite: "Objects/Misc/module.rsi"
                state: "security"
              doAfter: 0.5
            - anyTags:
                - PowerCell
                - PowerCellSmall
              store: powercell
              name: любая батарейка # Imperial Recipes Locale
              icon:
                sprite: "Objects/Power/power_cells.rsi"
                state: "medium"
              doAfter: 0.5
        - to: frame
          completed:
            - !type:GivePrototype
              prototype: CableApcStack1
              amount: 5
          steps:
            - tool: Cutting
              doAfter: 1

    - node: electronics
      edges:
        - to: detector
          steps:
            - tool: Screwing
              doAfter: 2

    - node: detector
      entity: ImperialMetalDetector
      edges:
        - to: parts
          conditions:
            - !type:WirePanel {}
            - !type:AllWiresCut {}
            - !type:ContainerNotEmpty
              container: board
          completed:
            - !type:EmptyAllContainers
              pickup: true
              emptyAtUser: true
          steps:
            - tool: Prying
              doAfter: 1

    - node: reinforced
      edges:
        - to: panelReinforced
          steps:
            - tool: Welding
              doAfter: 4

    - node: panelReinforced
      entity: MetalDetectorSecure
      edges:
        - to: detector
          steps:
            - tool: Welding
              doAfter: 4
            - tool: Prying
              doAfter: 2
          completed:
            - !type:GivePrototype
              prototype: SheetPlasteel1
              amount: 5
