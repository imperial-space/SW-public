- type: entity
  parent: BaseStructure
  id: BasePlatformImperialUSSP
  abstract: true
  name: railing
  description: Basic railing meant to protect idiots like you from falling.
  components:
  - type: Sprite
    drawdepth: SmallObjects
    sprite: Imperial/ussp/urbandeco/objects.rsi
  - type: Icon
    sprite: Imperial/ussp/urbandeco/objects.rsi
  - type: Physics
    bodyType: Static
  - type: InteractionOutline
  - type: Repairable
  - type: Damageable
    damageContainer: StructuralInorganic
  - type: Climbable

- type: entity
  parent: BasePlatformImperialUSSP
  id: PlatformImperialUSSP
  components:
  - type: Sprite
    state: side
  - type: Icon
    state: side
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.25"
        density: 1000
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 120
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:ChangeConstructionNodeBehavior
        node: platformBroken
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: PlatformImperialUSSPdestructable
    node: start

- type: entity
  parent: BasePlatformImperialUSSP
  id: PlatformCornerImperialUSSP
