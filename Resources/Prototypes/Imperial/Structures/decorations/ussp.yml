- type: constructionGraph
  id: PlatformImperialUSSPdestructable
  start: start
  graph:
  - node: start

  - node: platformBroken
    entity: PlatformBrokenImperialUSSP

- type: entity
  parent: PlatformImperialUSSP
  id: PlatformBrokenImperialUSSP
  components:
