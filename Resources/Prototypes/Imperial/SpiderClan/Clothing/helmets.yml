- type: entity
  parent: [ClothingHeadBase, BaseMajorContraband]
  id: RedAltHelmetSpaceNinja
  name: space ninja mask
  suffix: Crook, SpiderClan
  description: A nano-weave mask based on the Spider Clan's most advanced technology, capable of protecting against depressurisation despite its openness. It glows with a red light.
  components:
  - type: Sprite
    sprite: Imperial/SpiderClan/Clothing/Alternative/Helmets/redninja.rsi
  - type: Clothing
    sprite: Imperial/SpiderClan/Clothing/Alternative/Helmets/redninja.rsi
  - type: Tag
    tags:
    - WhitelistChameleon
  - type: IngestionBlocker
  - type: IdentityBlocker
  - type: PressureProtection
    highPressureMultiplier: 0.6
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.2
    coolingCoefficient: 0.2
