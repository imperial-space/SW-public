# Space Ninja

- type: entity
  name: Space Ninja
  suffix: ЦЕЛЕЙ НЕТ, Crook, SpiderClan
  parent: MobHuman
  id: GreenSpaceNinja
  components:
  - type: RandomMetadata
    nameSegments:
    - NamesNinjaTitle
    - NamesNinja
  - type: Sprite
    netsync: false
