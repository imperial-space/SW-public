- type: entity
  id: BorgModuleAbduct
  parent: [ BaseBorgModule, BaseProviderBorgModule, BaseSyndicateContraband ]
  name: Cyborg Abductor Module
  description: Sheep sheep it's time to sleep...
  components:
    - type: Sprite
      layers:
      - state: syndicate
      - state: icon-syndicate
    - type: ItemBorgModule
      hands:
        - item: SyndiBorgHypo
        - item: HandedHandcuffer
    - type: BorgModuleIcon
      icon: { sprite: Imperial/SyndieBorg/interface.rsi, state: abduct-module }

- type: entity
  id: BorgModuleCombatAdvanced
  parent: [ BaseBorgModule, BaseProviderBorgModule, BaseSyndicateContraband ]
  name: Cyborg Advanced Combat Module
  description: Makes cyborg a killing machine
  components:
    - type: Sprite
      layers:
      - state: syndicate
      - state: icon-syndicate
    - type: ItemBorgModule
      hands:
        - item: WeaponSubmachinec220v
        - item: CyborgEnergyShield
        - item: EnergySword
    - type: BorgModuleIcon
      icon: { sprite: Imperial/SyndieBorg/interface.rsi, state: advanced-fiting-module }

- type: entity
  id: BorgModuleGuardianAngel
  parent: [ BaseBorgModule, BaseProviderBorgModule, BaseSyndicateContraband ]
  name: Guardian Angel Module
  description: Put your life into your cyborg buddy's hands.
  components:
    - type: Sprite
      layers:
      - state: syndicate
      - state: icon-syndicate
    - type: ItemBorgModule
      hands:
        - item: SyndiBorgEpinephrineInjector
        - item: HandheldHealthAnalyzerUnpowered
        - item: DefibrillatorSyndicateAgentCyborg
        - item: Gauze
          hand:
            emptyLabel: borg-slot-topicals-empty
            emptyRepresentative: Gauze
            whitelist:
              components:
              - Healing
        - item: Brutepack
          hand:
            emptyLabel: borg-slot-topicals-empty
            emptyRepresentative: Brutepack
            whitelist:
              components:
              - Healing
        - item: Ointment
          hand:
            emptyLabel: borg-slot-topicals-empty
            emptyRepresentative: Ointment
            whitelist:
              components:
              - Healing
        - item: Bloodpack
          hand:
            emptyLabel: borg-slot-topicals-empty
            emptyRepresentative: Bloodpack
            whitelist:
              components:
              - Healing
    - type: BorgModuleIcon
      icon: { sprite: Imperial/SyndieBorg/interface.rsi, state: guardian-angel-module }

