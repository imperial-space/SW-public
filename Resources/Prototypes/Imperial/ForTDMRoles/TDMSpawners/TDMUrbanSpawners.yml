# Спавнеры для стороны синдикека

- type: entity
  id: TDMUrbanRiflemanSpawner_S
  name: ghost role spawn point
  suffix: TDM
  parent: MarkerBase
  components:
    - type: GhostRole
      name: tdm-urbanrifleman-name
      description: tdm-urbanrifleman-desc
      rules: tdm-urbanrifleman-rules
      raffle:
        settings: short
    - type: GhostRoleMobSpawner
      prototype: TDMUrbanRiflemanPreset_S
    - type: Sprite
      sprite: Markers/jobs.rsi
      layers:
        - state: green
        - sprite: Markers/jobs.rsi
          state: ertleadereva

