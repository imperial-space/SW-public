- type: entity
  id: TDMUrbanSpawner
  name: ghost role spawn point
  suffix: TDM
  parent: MarkerBase
  components:
    - type: GhostRole
      name: tdm-urban-name
      description: tdm-urban-desc
      rules: tdm-urban-rules
      raffle:
        settings: short
    - type: GhostRoleMobSpawner
      prototype: TDMUrbanPreset
    - type: Sprite
      sprite: Markers/jobs.rsi
      layers:
        - state: green
        - sprite: Markers/jobs.rsi
          state: ertleadereva

