# Спавнеры для стороны синдикека

- type: entity
  id: TDMForestRiflemanSpawner_S
  name: ghost role spawn point
  suffix: TDM
  parent: MarkerBase
  components:
    - type: GhostRole
      name: tdm-forestrifleman_s-name
      description: tdm-forestrifleman_s-desc
      rules: tdm-forestrifleman_s-rules
      raffle:
        settings: short
    - type: GhostRoleMobSpawner
      prototype: TDMForestRiflemanPreset_S
    - type: Sprite
      sprite: Markers/jobs.rsi
      layers:
        - state: green
        - sprite: Markers/jobs.rsi
          state: ertleadereva

