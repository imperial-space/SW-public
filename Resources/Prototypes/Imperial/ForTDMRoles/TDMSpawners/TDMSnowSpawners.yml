# Спавнеры для стороны синдикека

- type: entity
  id: TDMSnowRiflemanSpawner_S
  name: ghost role spawn point
  suffix: TDM
  parent: MarkerBase
  components:
    - type: GhostRole
      name: tdm-snowrifleman-name
      description: tdm-snowrifleman-desc
      rules: tdm-snowrifleman-rules
      raffle:
        settings: short
    - type: GhostRoleMobSpawner
      prototype: TDMSnowRiflemanPreset_S
    - type: Sprite
      sprite: Markers/jobs.rsi
      layers:
        - state: green
        - sprite: Markers/jobs.rsi
          state: ertleadereva

