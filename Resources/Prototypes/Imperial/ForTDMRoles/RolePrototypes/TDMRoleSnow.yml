#Прототипы для стороны синдикека

- type: entity
  parent: MobHuman
  id: TDMSnowRiflemanPreset_S
  name: SnowRiflemanPreset_S
  suffix: TDM
  components:
    - type: NpcFactionMember
      factions:
      - Syndicate
    - type: NukeOperative
    - type: AntagImmune
    - type: RandomMetadata
      nameSegments:
      - NamesMilitaryFirst
      - NamesMilitaryLast
    - type: Sprite
      netsync: false
      sprite: Markers/jobs.rsi
      state: ertleadereva
    - type: Loadout
      prototypes: [ TDMSnowRiflemanGear_S ]
    - type: RandomHumanoidAppearance
      randomizeName: false
    - type: AutoImplant
      implants:
      - DeathAcidifierImplant
    - type: CrewSkills
      skills:
        - skillBotany
        - skillBaseMed
        - skillBaseConstraction
        - skillHacking
        - skillInstrumentation
        - skillMaintenance
        - skillMedicalEquipment
        - skillPharmacology
        - skillPiloting
        - skillShooting
        - skillSurgery

