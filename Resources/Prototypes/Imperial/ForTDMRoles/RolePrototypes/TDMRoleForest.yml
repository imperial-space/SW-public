#Прототипы для стороны синдикека

- type: entity
  parent: MobHuman
  id: TDMForestRiflemanPreset_S
  name: ForestRiflemanPreset_S
  suffix: TDM
  components:
    - type: NpcFactionMember
      factions:
      - Syndicate
    - type: NukeOperative
    - type: AntagImmune
    - type: RandomMetadata
      nameSegments:
      - NamesMilitaryFirst
      - NamesMilitaryLast
    - type: Sprite
      netsync: false
      sprite: Markers/jobs.rsi
      state: ertleadereva
    - type: Loadout
      prototypes: [ TDMForestRiflemanGear_S ]
    - type: RandomHumanoidAppearance
      randomizeName: false
    - type: AutoImplant
      implants:
      - DeathAcidifierImplant
    - type: CrewSkills
      skills:
        - skillBotany
        - skillBaseMed
        - skillBaseConstraction
        - skillHacking
        - skillInstrumentation
        - skillMaintenance
        - skillMedicalEquipment
        - skillPharmacology
        - skillPiloting
        - skillShooting
        - skillSurgery

