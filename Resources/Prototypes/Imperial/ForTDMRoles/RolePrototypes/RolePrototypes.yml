- type: entity
  parent: MobHuman
  id: TDMUrbanPreset
  name: UrbanPreset
  suffix: TDM
  components:
    - type: AntagImmune
    - type: RandomMetadata
      nameSegments:
      - NamesMilitaryFirst
      - NamesMilitaryLast
      nameFormat: name-format-ert
    - type: Sprite
      netsync: false
      sprite: Markers/jobs.rsi
      state: ertleadereva
    - type: Loadout
      prototypes: [ TDMUrbanGear ]
    - type: RandomHumanoidAppearance
      randomizeName: false
    - type: AutoImplant
      implants:
      - DeathAcidifierImplant
    - type: CrewSkills
      skills:
        - skillBotany
        - skillBaseMed
        - skillBaseConstraction
        - skillHacking
        - skillInstrumentation
        - skillMaintenance
        - skillMedicalEquipment
        - skillPharmacology
        - skillPiloting
        - skillShooting
        - skillSurgery

