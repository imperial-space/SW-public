#Прототипы для стороны синдикека

- type: entity
  parent: MobHuman
  id: TDMUrbanRiflemanPreset_S
  name: UrbanRiflemanPreset_S
  suffix: TDM
  components:
    - type: NpcFactionMember
      factions:
      - Syndicate
    - type: MindShield
    - type: AntagImmune
    - type: RandomMetadata
      nameSegments:
      - NamesMilitaryFirst
      - NamesMilitaryLast
      nameFormat: name-format-ert
    - type: Sprite
      netsync: false
      sprite: Markers/jobs.rsi
      state: ertleadereva
    - type: Loadout
      prototypes: [ TDMUrbanRiflemanGear_S ]
    - type: RandomHumanoidAppearance
      randomizeName: false
    - type: AutoImplant
      implants:
      - DeathAcidifierImplant
    - type: CrewSkills
      skills:
        - skillBotany
        - skillBaseMed
        - skillBaseConstraction
        - skillHacking
        - skillInstrumentation
        - skillMaintenance
        - skillMedicalEquipment
        - skillPharmacology
        - skillPiloting
        - skillShooting
        - skillSurgery

