# regular steak
- type: constructionGraph
  id: MeatSteak
  start: start
  graph:

  - node: start
    edges:
    - to: meat steak
      completed:
      - !type:PlaySound
        sound: /Audio/Effects/sizzle.ogg
      steps:
      - minTemperature: 335

  - node: meat steak
    entity: FoodMeatCooked
    # Imperial medieval start
    transform:
    - !type:UserWhitelistCompGrantTransform
      whitelist:
        components:
        - Farmer
      grants:
      - type: FarmerBoostOnConsume
        time: 15
    # Imperial medieval end

