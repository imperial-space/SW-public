- type: constructionGraph
  id: Tortilla
  start: start
  graph:
  - node: start
    entity: FoodDoughTortillaSlice
    edges:
    - to: flat
      steps:
      - tool: Rolling
        doAfter: 1
  - node: flat
    entity: FoodDoughTortillaFlat
    # Imperial medieval start
    transform:
    - !type:UserWhitelistCompGrantTransform
      whitelist:
        components:
        - Farmer
      grants:
      - type: FarmerBoostOnConsume
        time: 15
    # Imperial medieval end
