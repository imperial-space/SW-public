- type: gameMap
  id: Meta
  mapName: 'Meta Station'
  mapPath: /Maps/meta.yml
  minPlayers: 50
  maxPlayers: 80
  stations:
    Meta:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Meta Station {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'TG'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_meta.yml
        - type: StationJobs
          availableJobs: # 68 jobs total w/o latejoins & interns, 95 jobs total w/ latejoins & interns
            #command (7)
            Captain: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            HeadOfSecurity: [ 1, 1 ]
            ChiefMedicalOfficer: [ 1, 1 ]
            ChiefEngineer: [ 1, 1 ]
            ResearchDirector: [ 1, 1 ]
            Quartermaster: [ 1, 1 ]
            #service (14 - 16)
            Bartender: [ 2, 2 ]
            Botanist: [ 2, 3 ]
            Chef: [ 2, 2 ]
            Janitor: [ 2, 3 ]
            Adjutant: [ 1, 1 ]
            Chaplain: [ 1, 1 ]
            Librarian: [ 1, 1 ]
            ServiceWorker: [ 2, 2 ]
            Reporter: [ 2, 2 ]
            #engineering
            AtmosphericTechnician: [ 3, 3 ]
            StationEngineer: [ 6, 8 ]
            TechnicalAssistant: [ 6, 8 ]
            SeniorEngineer: [ 1, 1 ] # imperial space senior roles
            #medical
            Chemist: [ 2, 3 ]
            MedicalDoctor: [ 4, 6 ]
            MedicalIntern: [ 4, 6 ]
            Paramedic: [ 1, 2 ]
            SeniorPhysician: [ 1, 1 ] # imperial space senior roles
            #science
            Scientist: [ 5, 7 ]
            ResearchAssistant: [ 3, 6 ]
            SeniorResearcher: [ 1, 1 ] # imperial space senior roles
            #security
            Warden: [ 1, 1 ]
            SecurityOfficer: [ 6, 6 ]
            Detective: [ 1, 1 ]
            SecurityCadet: [ 4, 4 ] #intern, not counted
            Lawyer: [ 2, 2 ]
            SeniorOfficer: [ 1, 1 ] # imperial space senior roles
            Brigmedic: [ 1, 1 ] # imperial Brigmedic
            #supply
            SalvageSpecialist: [ 3, 3 ]
            CargoTechnician: [ 3, 5 ]
            #civilian
            Passenger: [ -1, -1 ]
            Clown: [ 1, 1 ]
            Mime: [ 1, 1 ]
            Musician: [ 1, 1 ]
            IAA: [ 1, 1 ] # imperial IAA
            #silicon
            StationAi: [ 1, 1 ]
            Borg: [ 4, 4 ]
