- type: entity
  name: "item"
  id: BaseItem
  abstract: true
  components:
  - type: Item
    size: Small
  - type: Animateable
  - type: Clickable
  - type: InteractionOutline
  - type: MovedByPressure
  - type: EmitSoundOnCollide
    sound:
      collection: WeakHit
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Effects/drop.ogg
      params:
        volume: 2
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 5
    soundHit:
      collection: MetalThud
  - type: CollisionWake
  - type: GravityAffected
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 20
        mask:
        - Impassable # CrystallEdge swap ItemMask to Impassable only
        restitution: 0.3  # fite me
        friction: 0.2
  - type: Sprite
    drawdepth: Items
    noRot: false
  - type: Pullable
  - type: DamageExaminable
  - type: UseDelayOnMelee # imperial medieval start
  - type: UseDelay
    delay: 0.1
  - type: Customizable
  - type: RDWeight
    value: 0.2
  - type: RDWeightExamine
    examines:
      "Вес: [color=#A8FF99]невесомый (<5г)[/color]":
        min: 0
        max: 0.05   # вес пера
      "Вес: [color=#7DFF66]легкий (<20г)[/color]":
        min: 0.05
        max: 0.22   # CURSE OF 220
      "Вес: [color=#ADFF2F]небольшой (<1кг)[/color]":
        min: 0.22
        max: 1      # вес смартфона или книги
      "Вес: [color=#D4FF33]ощутимый (<3кг)[/color]":
        min: 1
        max: 3      # вес ноутбука
      "Вес: [color=#FFFF00]умеренный (<7кг)[/color]":
        min: 3
        max: 7      # вес домашней кошки
      "Вес: [color=#FFD700]увесистый (<15кг)[/color]":
        min: 7
        max: 15     # вес тяжелого рюкзака
      "Вес: [color=#FFBF00]довольно тяжелый (<25кг)[/color]":
        min: 15
        max: 25     # вес микроволновки
      "Вес: [color=#FF8C00]тяжелый (<40кг)[/color]":
        min: 25
        max: 40     # вес мешка с цементом
      "Вес: [color=#FF4500]очень тяжелый (<55кг)[/color]":
        min: 40
        max: 55     # вес крупной собаки
      "Вес: [color=#FF0000]громоздкий (<70кг)[/color]":
        min: 55
        max: 70     # вес среднего человека
      "Вес: [color=#DC143C]весьма солидный (<85кг)[/color]":
        min: 70
        max: 85     # вес крупного человека
      "Вес: [color=#B22222]чрезвычайно тяжелый (<100кг)[/color]":
        min: 85
        max: 100    # вес наковальни
      "Вес: [color=#8B0000]невероятно тяжелый (<120кг)[/color]":
        min: 100
        max: 120    # вес холодильника
      "Вес: [color=#800000]почти неподъемный (<135кг)[/color]":
        min: 120
        max: 135    # вес мотоциклетного двигателя
      "Вес: [color=#660000]недвижимый (>135кг)[/color]":
        min: 135
        max: 25000    # вес пианино
  - type: RDWeightThrowModifier
    curve: !type:RDWeightModifierLinearCurve
      min: 5
      max: 20
  - type: TrashClear
  #- type: MedievalWeaponSkillCategory
  #  skill: Throwing # imperial medieval end
  #CrystallEdge
  - type: CEZPhysics


- type: entity
  name: "storage item"
  id: BaseStorageItem
  parent: BaseItem
  abstract: true
  components:
  - type: Storage
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []

- type: entity
  id: BaseBagOpenClose
  abstract: true
  components:
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SharedBagOpenVisuals.BagState: # You don't have to use both of these if its not necessary.
        closeLayer:
          Open: { visible: false }
          Closed: { visible: true }
        openLayer:
          Open: { visible: true }
          Closed: { visible: false }

# PowerCellSlot parents
- type: entity
  id: PowerCellSlotSmallItem
  abstract: true
  components:
    - type: ContainerContainer
      containers:
        cell_slot: !type:ContainerSlot { }
    - type: PowerCellSlot
      cellSlotId: cell_slot
    - type: ItemSlots
      slots:
        cell_slot:
          name: power-cell-slot-component-slot-name-default
          startingItem: PowerCellSmall

