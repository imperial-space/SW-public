- type: entity
  id: BaseStockPart
  name: stock part
  parent: BaseItem
  description: What?
  abstract: true
  components:
    - type: Sprite
      sprite: Objects/Misc/stock_parts.rsi
    - type: Item
      size: Tiny
    - type: Stack
      count: 1

- type: entity
  id: MicroManipulatorStockPart
  name: modular machine part
  parent: BaseStockPart
  description: A basic machine part used in the construction of a variety of devices.
  suffix: Rating 1
  components:
    - type: Material # Imperial Space
    - type: PhysicalComposition # Imperial Space
      materialComposition:
        Manipulator: 100
    - type: Sprite
      state: micro_mani
    - type: Stack
      stackType: Manipulator
    - type: Tag # Imperial Space Добавлен тег для инженерного киборга
      tags:
      - Manipulator
      - RawMaterial
      - ConstructionMaterial
