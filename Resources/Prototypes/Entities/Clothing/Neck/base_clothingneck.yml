- type: entity
  abstract: true
  parent: Clothing
  id: ClothingNeckBase
  components:
  - type: Item
    size: Normal # imperial medieval
  - type: Clothing
    quickEquip: true
    slots:
    - neck
    equipDelay: 0.01 # imperial medieval
    unequipDelay: 0.01 # imperial medieval
    equipSound: # imperial medieval
      path: /Audio/Imperial/Medieval/cloak_equip.ogg # imperial medieval
    unequipSound: # imperial medieval
      path: /Audio/Imperial/Medieval/cloak_unequip.ogg # imperial medieval
  - type: Sprite
    state: icon
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: MaterialCloth1
      amount: 2
  - type: PhysicalComposition # 50% of the amount of cloth you'd obtain upon butchering
    materialComposition:
      Cloth: 100
  - type: Food
    requiresSpecialDigestion: true
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: Fiber
          Quantity: 10
  - type: Tag
    tags:
    - ClothMade
    - Recyclable
    - WhitelistChameleon

- type: entity
  abstract: true
  parent: ClothingNeckBase
  id: ClothingScarfBase
  components:
  - type: Tag
    tags:
    - Scarf
    - ClothMade
    - Recyclable
    - WhitelistChameleon
