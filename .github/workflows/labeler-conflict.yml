name: Check Merge Conflicts

on:
  pull_request: # даёт доступ к текущему PR, но если PR из форка, то метки всё равно не добавятся.
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  issues: write
  pull-requests: write

jobs:
  Label:
    if: ( github.event.pull_request.draft == false ) && ( github.actor != 'PJBot' )
    runs-on: ubuntu-latest
    steps:
      - name: Check for Merge Conflicts
        uses: eps1lon/actions-label-merge-conflict@v3.0.0
        with:
          dirtyLabel: "S: Merge Conflict"
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          commentOnDirty: "В этом запросе на извлечение есть конфликты, пожалуйста, устраните их, прежде чем мы сможем оценить запрос на извлечение."
